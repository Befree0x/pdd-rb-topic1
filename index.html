uot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100108101,&quot;group&quot;:1001081,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;В случаях, не оговоренных Правилами дорожного движения, согласование дорожного движения осуществляется:&quot;,&quot;a&quot;:[&quot;Коммунальными службами.&quot;,&quot;Дорожно-эксплуатационной службой.&quot;,&quot;Государственной автомобильной инспекцией.&quot;,&quot;Департаментом «Белавтодор» Министерства транспорта и коммуникаций.&quot;],&quot;c&quot;:2,&quot;e&quot;:&quot;&lt;p&gt;В случаях, не оговоренных Правилами дорожного движения, а также при применении в экспериментальных целях технических средств организации дорожного движения согласование дорожного движения осуществляется Государственной автомобильной инспекцией МВД.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100108201,&quot;group&quot;:1001082,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Кто осуществляет согласование дорожного движения при применении в экспериментальных целях технических средств организации дорожного движения, не предусмотренных Правилами дорожного движения?&quot;,&quot;a&quot;:[&quot;Государственная автомобильная инспекция.&quot;,&quot;Транспортная инспекция Министерства транспорта и коммуникаций.&quot;,&quot;Республиканский орган государственного управления по стандартизации, метрологии и сертификации.&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;В случаях, не оговоренных Правилами дорожного движения, а также при применении в экспериментальных целях технических средств организации дорожного движения согласование дорожного движения осуществляется Государственной автомобильной инспекцией МВД.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100108202,&quot;group&quot;:1001082,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;В каких случаях на дорогах могут применяться технические средства организации дорожного движения, не предусмотренные Правилами дорожного движения?&quot;,&quot;a&quot;:[&quot;В случае согласования с ГАИ в экспериментальных целях.&quot;,&quot;В случае согласования с Министерством транспорта и коммуникаций на международных автотрассах.&quot;,&quot;В случае согласования с Министерством по чрезвычайным ситуациям при техногенных катастрофах и стихийных бедствиях.&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;Технические средства организации дорожного движения, не предусмотренные Правилами дорожного движения, могут применяться в экспериментальных целях по согласованию с ГАИ.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100108271,&quot;group&quot;:1001082,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;При встречном движении на тротуаре водители транспортных средств:&quot;,&quot;a&quot;:[&quot;Должны учитывать, что на дорогах установлено правостороннее движение.&quot;,&quot;Могут двигаться по любой стороне тротуара.&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;На дорогах Республики Беларусь установлено &lt;strong&gt;правостороннее движение транспортных средств&lt;/strong&gt;. Это значит, что на элементах дороги, на которых организовано встречное движение (проезжая часть, велодорожка, тротуар и проч.), транспортные средства должны разъезжаться левыми бортами (держаться правее).&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100108271.jpg&quot;,&quot;sourceImage&quot;:&quot;1.82.71.jpg&quot;},{&quot;id&quot;:100108303,&quot;group&quot;:1001083,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;В каком случае водитель может быть привлечён к ответственности за нарушения вступивших в силу изменений к Правилам дорожного движения?&quot;,&quot;a&quot;:[&quot;В любом случае.&quot;,&quot;Только в случае, если он ознакомлен с изменениями в Правилах дорожного движения.&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;Нарушение Правил дорожного движения влечёт ответственность, установленную законодательными актами.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100200101,&quot;group&quot;:1002001,&quot;t&quot;:1,&quot;chapter&quot;:2,&quot;chapters&quot;:[2],&quot;q&quot;:&quot;На что из перечисленного не имеют права участники дорожного движения?&quot;,&quot;a&quot;:[&quot;Обеспечение безопасных и эффективных условий дорожного движения.&quot;,&quot;Получение от уполномоченных лиц государственных органов достоверной информации о безопасных условиях дорожного движения.&quot;,&quot;Получение от уполномоченных лиц государственных органов достоверной информации о наиболее оптимальных маршрутах движения.&quot;,&quot;Получение от уполномоченных лиц государственных органов достоверной информации о качестве продукции, работ и услуг, связанных с обеспечением безопасности дорожного движения.&quot;],&quot;c&quot;:2,&quot;e&quot;:&quot;&lt;p&gt;Участники дорожного движения имеют право на обеспечение безопасных и эффективных условий дорожного движения, на получение от уполномоченных лиц государственных органов достоверной информации о безопасных условиях дорожного движения, на получение от уполномоченных лиц государственных органов достоверной информации о качестве продукции, работ и услуг, связанных с обеспечением безопасности дорожного движения.&lt;/p&gt;\r\n&lt;p&gt;Что же касается предоставления информации о наиболее оптимальных маршрутах движения, то предоставление такой информации не входит в обязанности должностных лиц государственных органов.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100200102,&quot;group&quot;:1002001,&quot;t&quot;:1,&quot;chapter&quot;:2,&quot;chapters&quot;:[2],&quot;q&quot;:&quot;На что из перечисленного не имеют права участники дорожного движения?&quot;,&quot;a&quot;:[&quot;Обеспечение безопасных условий дорожного движения.&quot;,&quot;Обеспечение эффективных условий дорожного движения.&quot;,&quot;Обеспечение безаварийных условий дорожного движения.&quot;,&quot;Имеют право на всё перечисленное.&quot;],&quot;c&quot;:2,&quot;e&quot;:&quot;&lt;p&gt;Обеспечение безаварийных условий движения невозможно без соблюдения всеми участниками дорожного движения Правил дорожного движения и дополнительных мер безопасности, исходя из дорожных и погодных условий.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100200103,&quot;group&quot;:1002001,&quot;t&quot;:1,&quot;chapter&quot;:2,&quot;chapters&quot;:[2],&quot;q&quot;:&quot;На что из перечисленного имеют право участники дорожного движения?&quot;,&quot;a&quot;:[&quot;Обеспечение эффективных условий дорожного движения.&quot;,&quot;Получение от уполномоченных лиц государственных органов достоверной информации о безопасных условиях дорожного движения.&quot;,&quot;Получение от уполномоченных лиц государственных органов достоверной информации о причинах введения ограничения или запрещения движения по дорогам.&quot;,&quot;Имеют право на всё перечисленное.&quot;],&quot;c&quot;:3,&quot;e&quot;:&quot;&lt;p&gt;Участники дорожного движения имеют право и на обеспечение эффективных условий дорожного движения, и на получение от уполномоченных лиц государственных органов достоверной информации о безопасных условиях дорожного движения, о причинах введения ограничения или запрещения движения по дорогам.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100200201,&quot;group&quot;:1002002,&quot;t&quot;:1,&quot;chapter&quot;:2,&quot;chapters&quot;:[2],&quot;q&quot;:&quot;Кто из участников дорожного движения имеет право на получение медицинской помощи в случае ДТП?&quot;,&quot;a&quot;:[&quot;Только лица, имеющие договор страхования здоровья.&quot;,&quot;Только лица, не нарушавшие Правила дорожного движения на момент совершения ДТП.&quot;,&quot;Имеют все участники дорожного движения.&quot;],&quot;c&quot;:2,&quot;e&quot;:&quot;&lt;p&gt;Каждый участник дорожного движения имеет право на получение медицинской помощи в случае ДТП вне зависимости от наличия и степени вины в совершении происшествия, а также без договора страхования жизни и здоровья.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100200201.jpg&quot;,&quot;sourceImage&quot;:&quot;2.2.1.jpg&quot;},{&quot;id&quot;:100200202,&quot;group&quot;:1002002,&quot;t&quot;:1,&quot;chapter&quot;:2,&quot;chapters&quot;:[2],&quot;q&quot;:&quot;На что имеет право участник дорожного движения в случае ДТП?&quot;,&quot;a&quot;:[&quot;На получение медицинской помощи.&quot;,&quot;На обжалование в порядке, определённом законодательством, решений, действий (бездействия) должностных лиц государственных органов, осуществляющих государственное регулирование и управление в сфере дорожного движения и обеспечения его безопасности.&quot;,&quot;На всё перечисленное.&quot;],&quot;c&quot;:2,&quot;e&quot;:&quot;&lt;p&gt;Каждый участник дорожного движения в случае ДТП имеет право на получение медицинской помощи, и каждый участник дорожного движения имеет право на обжалование в порядке, определённом законодательством, решений, действий (бездействия) должностных лиц государственных органов, осуществляющих государственное регулирование и управление в сфере дорожного движения и обеспечения его безопасности.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100200202.jpg&quot;,&quot;sourceImage&quot;:&quot;2.2.2.jpg&quot;},{&quot;id&quot;:100200301,&quot;group&quot;:1002003,&quot;t&quot;:1,&quot;chapter&quot;:2,&quot;chapters&quot;:[2],&quot;q&quot;:&quot;Если при ДТП был причинён вред здоровью или имуществу участников дорожного движения, имеют ли они право на возмещение причинённого им вреда?&quot;,&quot;a&quot;:[&quot;Имеют только водители.&quot;,&quot;Не имеют пассажиры транспортных средств, водители которых виновны в совершении ДТП.&quot;,&quot;Имеют все участники дорожного движения.&quot;],&quot;c&quot;:2,&quot;e&quot;:&quot;&lt;p&gt;Каждый участник дорожного движения (как водитель, так и пассажир) в случае ДТП имеет право на возмещение причинённого им и (или) их имуществу вреда в порядке, установленном законодательством.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100200301.jpg&quot;,&quot;sourceImage&quot;:&quot;2.3.1.jpg&quot;},{&quot;id&quot;:100200302,&quot;group&quot;:1002003,&quot;t&quot;:1,&quot;chapter&quot;:2,&quot;chapters&quot;:[2],&quot;q&quot;:&quot;Имеет ли право водитель на возмещение причинённого ему или его имуществу вреда в порядке, установленном законодательством?&quot;,&quot;a&quot;:[&quot;Имеет в любом случае.&quot;,&quot;Да, только если его автомобиль застрахован.&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;Водитель в случае ДТП имеет право на возмещение причинённого ему или его имуществу вреда в порядке, установленном законодательством. Причём данное право действует не только в отношении автомобиля, но и в отношении прочего имущества.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100200401,&quot;group&quot;:1002004,&quot;t&quot;:1,&quot;chapter&quot;:2,&quot;chapters&quot;:[2],&quot;q&quot;:&quot;Что входит в обязанности участников дорожного движения?&quot;,&quot;a&quot;:[&quot;Только знать относящиеся к ним правила.&quot;,&quot;Знать и соблюдать относящиеся к ним требования Правил дорожного движения.&quot;,&quot;Знать весь текст Правил дорожного движения и соблюдать относящиеся к ним правила.&quot;,&quot;Знать и соблюдать относящиеся к ним требования Правил дорожного движения и требовать от остальных участников дорожного движения выполнения Правил.&quot;],&quot;c&quot;:1,&quot;e&quot;:&quot;&lt;p&gt;Участник дорожного движения должен знать и соблюдать относящиеся к нему требования Правил дорожного движения, например пешеход не обязан знать правила расположения транспортных средств на проезжей части дороги, но требования, относящиеся к пешеходам, знать и соблюдать обязан.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100200402,&quot;group&quot;:1002004,&quot;t&quot;:1,&quot;chapter&quot;:2,&quot;chapters&quot;:[2],&quot;q&quot;:&quot;Что входит в обязанности участников дорожного движения?&quot;,&quot;a&quot;:[&quot;Знать относящиеся к ним требования Правил дорожного движения.&quot;,&quot;Соблюдать относящиеся к ним требования Правил дорожного движения.&quot;,&quot;Всё перечисленное.&quot;],&quot;c&quot;:2,&quot;e&quot;:&quot;&lt;p&gt;Участник дорожного движения должен знать и соблюдать относящиеся к нему требования Правил дорожного движения.&lt;/p&gt;\r\n&lt;p&gt;Невозможно добиться соблюдения Правил дорожного движения, если участники дорожного движения не знают относящиеся к ним требования.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100200501,&quot;group&quot;:1002005,&quot;t&quot;:1,&quot;chapter&quot;:2,&quot;chapters&quot;:[2],&quot;q&quot;:&quot;Чем обязаны руководствоваться участники дорожного движения?&quot;,&quot;a&quot;:[&quot;Дорожными знаками.&quot;,&quot;Сигналами светофоров.&quot;,&quot;Сигналами регулировщика.&quot;,&quot;Горизонтальной и вертикальной дорожной разметкой.&quot;,&quot;Всем перечисленным.&quot;],&quot;c&quot;:4,&quot;e&quot;:&quot;&lt;p&gt;Участник дорожного движения должен руководствоваться сигналами регулировщика, а если он отсутствует — сигналами светофоров, а также руководствоваться при нахождении на дороге дорожными знаками и дорожной разметкой.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100200502,&quot;group&quot;:1002005,&quot;t&quot;:1,&quot;chapter&quot;:2,&quot;chapters&quot;:[2],&quot;q&quot;:&quot;Кто из участников дорожного движения обязан руководствоваться сигналами регулировщика?&quot;,&quot;a&quot;:[&quot;Только водители.&quot;,&quot;Водители и пешеходы.&quot;],&quot;c&quot;:1,&quot;e&quot;:&quot;&lt;p&gt;Сигналы регулировщика являются обязательными для исполнения всеми участниками дорожного движения.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100200502.jpg&quot;,&quot;sourceImage&quot;:&quot;2.5.2.jpg&quot;},{&quot;id&quot;:100200601,&quot;group&quot;:1002006,&quot;t&quot;:1,&quot;chapter&quot;:2,&quot;chapters&quot;:[2],&quot;q&quot;:&quot;Что из нижеперечисленного входит в обязанности участников дорожного движения?&quot;,&quot;a&quot;:[&quot;Действовать добросовестно и корректно.&quot;,&quot;Быть внимательными и взаимно вежливыми.&quot;,&quot;Не создавать препятствий и опасности для дорожного движения.&quot;,&quot;Всё перечисленное.&quot;],&quot;c&quot;:3,&quot;e&quot;:&quot;&lt;p&gt;Каждый участник дорожного движения обязан действовать добросовестно и корректно, быть внимательным и взаимно вежливым, принимать меры по обеспечению собственной безопасности и безопасности других участников движения, не создавать препятствий и опасности для дорожного движения. Только при таком условии может быть обеспечена безопасность дорожного движения.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100200701,&quot;group&quot;:1002007,&quot;t&quot;:1,&quot;chapter&quot;:2,&quot;chapters&quot;:[2],&quot;q&quot;:&quot;Что обязаны выполнять участники дорожного движения при сопровождении детей?&quot;,&quot;a&quot;:[&quot;Принимать все возможные меры по недопущению их самостоятельного выхода на проезжую часть дороги, кроме пешеходных переходов.&quot;,&quot;Принимать все возможные меры по недопущению их самостоятельного выхода на проезжую часть дороги (кроме жилых и пешеходных зон).&quot;,&quot;Принимать все возможные меры по недопущению их самостоятельного выхода на проезжую часть дороги, включая жилые и пешеходные зоны.&quot;],&quot;c&quot;:1,&quot;e&quot;:&quot;&lt;p&gt;Участники дорожного движения при сопровождении детей обязаны принимать все возможные меры по недопущению их самостоятельного выхода на проезжую часть дороги (в том числе на пешеходных переходах, при пересечении дороги по линиям тротуаров или обочин, а также при посадке (высадке) детей в перевозящие их автобусы).&lt;/p&gt;\r\n&lt;p&gt;Данное правило не действует в жилых и пешеходных зонах ввиду низкой скорости движения транспортных средств и преимущества в движении у пешеходов.&lt;/p&gt;\r\n&lt;p&gt;Однако следует помнить, что немалое количество наездов на детей случается как раз на (или вблизи) дворовой территории, вблизи школ и дошкольных учреждений.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100200701.jpg&quot;,&quot;sourceImage&quot;:&quot;2.7.1.jpg&quot;},{&quot;id&quot;:100200702,&quot;group&quot;:1002007,&quot;t&quot;:1,&quot;chapter&quot;:2,&quot;chapters&quot;:[2],&quot;q&quot;:&quot;Что обязаны выполнять участники дорожного движения при сопровождении детей?&quot;,&quot;a&quot;:[&quot;Обозначить детей световозвращающими элементами.&quot;,&quot;Провести инструктаж о правилах поведения на дорогах и в общественном транспорте.&quot;,&quot;Принимать все возможные меры по недопущению их самостоятельного выхода на проезжую часть дороги (кроме жилых и пешеходных зон).&quot;,&quot;Всё перечисленное.&quot;],&quot;c&quot;:2,&quot;e&quot;:&quot;&lt;p&gt;Участники дорожного движения при сопровождении детей обязаны принимать все возможные меры по недопущению их самостоятельного выхода на проезжую часть дороги (в том числе на пешеходных переходах, при пересечении дороги по линиям тротуаров или обочин, а также при посадке (высадке) детей в перевозящие их автобусы).&lt;/p&gt;\r\n&lt;p&gt;Данное правило не действует в жилых и пешеходных зонах ввиду низкой скорости движения транспортных средств и преимущества в движении у пешеходов.&lt;/p&gt;\r\n&lt;p&gt;Однако следует помнить, что немалое количество наездов на детей случается как раз на (или вблизи) дворовой территории, вблизи школ и дошкольных учреждений.&lt;/p&gt;\r\n&lt;p&gt;И хоть Правила дорожного движения не обязывают проводить обязательный инструктаж по правилам поведения на дорогах и не требуется обозначать ребёнка световозвращающими элементами (кроме движения по краю проезжей части или обочине в тёмное время суток), меры дополнительной предосторожности не будут лишними.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100200702.jpg&quot;,&quot;sourceImage&quot;:&quot;2.7.2.jpg&quot;},{&quot;id&quot;:100200801,&quot;group&quot;:1002008,&quot;t&quot;:1,&quot;chapter&quot;:2,&quot;chapters&quot;:[2],&quot;q&quot;:&quot;Что из нижеперечисленного не входит в обязанности участников дорожного движения?&quot;,&quot;a&quot;:[&quot;Принимать меры по задержанию лиц, загрязняющих дороги.&quot;,&quot;Не выбрасывать мусор и иные предметы вне специально отведённых мест.&quot;,&quot;Принимать меры по недопущению загрязнения дорог и окружающей среды.&quot;,&quot;Участники дорожного движения обязаны выполнить всё перечисленное.&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;Участники дорожного движения не обязаны принимать меры по задержанию лиц, загрязняющих дороги, но можно оказать содействие правоохранительным органам в установлении лиц, загрязняющих дороги для дальнейшего их привлечения к административной ответственности.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100200802,&quot;group&quot;:1002008,&quot;t&quot;:1,&quot;chapter&quot;:2,&quot;chapters&quot;:[2],&quot;q&quot;:&quot;Разрешено ли участникам дорожного движения выбрасывать мусор на дорогах?&quot;,&quot;a&quot;:[&quot;Нет, не разрешено.&quot;,&quot;Разрешено в специально отведённых местах.&quot;,&quot;Разрешено, если это не приводит к загрязнению дорог.&quot;,&quot;Разрешено вне населённых пунктов и охраняемых территорий.&quot;],&quot;c&quot;:1,&quot;e&quot;:&quot;&lt;p&gt;Участники дорожного движения обязаны не загрязнять дорогу и окружающую среду.&lt;/p&gt;\r\n&lt;p&gt;Мусор и иные предметы разрешено выбрасывать только в отведённых для этого местах.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100300101,&quot;group&quot;:1003001,&quot;t&quot;:2,&quot;chapter&quot;:3,&quot;chapters&quot;:[3],&quot;q&quot;:&quot;Укажите, какие права имеет водитель:&quot;,&quot;a&quot;:[&quot;Управлять транспортным средством в установленном порядке.&quot;,&quot;Знать причину, по которой остановлено его транспортное средство.&quot;,&quot;Передавать управление другому лицу, имеющему при себе водительское удостоверение соответствующей категории.&quot;,&quot;Все перечисленные.&quot;],&quot;c&quot;:3,&quot;e&quot;:&quot;&lt;p&gt;Водитель имеет право управлять транспортным средством в установленном порядке (после достижения установленного возраста и получения водительского удостоверения соответствующей категории) и передавать управление другому лицу, имеющему при себе водительское удостоверение соответствующей категории, убедившись, что данное лицо не находится в состоянии, при котором запрещено управлять транспортным средством.&lt;/p&gt;\r\n&lt;p&gt;Должностные лица, имеющие право остановки транспортных средств, могут останавливать транспортные средства только для осуществления возложенных на них функций, поэтому водитель также вправе знать причину, по которой остановлено его транспортное средство.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100300102,&quot;group&quot;:1003001,&quot;t&quot;:2,&quot;chapter&quot;:3,&quot;chapters&quot;:[3],&quot;q&quot;:&quot;Кому водитель имеет право передавать управление транспортным средством?&quot;,&quot;a&quot;:[&quot;Владельцу транспортного средства.&quot;,&quot;Сотруднику милиции при выполнении неотложного служебного задания.&quot;,&quot;Лицу, имеющему при себе водительское удостоверение соответствующей категории.&quot;,&quot;Всем перечисленным.&quot;],&quot;c&quot;:2,&quot;e&quot;:&quot;&lt;p&gt;Водитель имеет право передавать управление другому лицу, имеющему при себе водительское удостоверение соответствующей категории, убедившись, что данное лицо не находится в состоянии, при котором запрещено управлять транспортным средством.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100300133,&quot;group&quot;:1003001,&quot;t&quot;:2,&quot;chapter&quot;:3,&quot;chapters&quot;:[3],&quot;q&quot;:&quot;Укажите, какие права имеет водитель:&quot;,&quot;a&quot;:[&quot;Иметь при себе и передавать для проверки сотрудникам ГАИ водительское удостоверение.&quot;,&quot;Своевременно получать на механическое транспортное средство, находящееся в его владении, разрешение на допуск транспортного средства к участию в дорожном движении.&quot;,&quot;Передавать управление другому лицу, имеющему при себе водительское удостоверение соответствующей категории.&quot;,&quot;Все перечисленные.&quot;],&quot;c&quot;:2,&quot;e&quot;:&quot;&lt;p&gt;Водитель имеет право передавать управление другому лицу, имеющему при себе водительское удостоверение соответствующей категории, убедившись, что данное лицо не находится в состоянии, при котором запрещено управлять транспортным средством.&lt;/p&gt;\r\n&lt;p&gt;Оставшиеся варианты ответов относятся не к правам водителя, а к его обязанностям.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100300202,&quot;group&quot;:1003002,&quot;t&quot;:2,&quot;chapter&quot;:3,&quot;chapters&quot;:[3],&quot;q&quot;:&quot;Обязан ли сотрудник ГАИ, остановивший транспортное средство, предъявить водителю служебное удостоверение?&quot;,&quot;a&quot;:[&quot;Нет, не обязан.&quot;,&quot;Обязан предъявить по требованию водителя.&quot;,&quot;Обязан в случае, если зафиксировал нарушение водителем Правил дорожного движения.&quot;],&quot;c&quot;:1,&quot;e&quot;:&quot;&lt;p&gt;Если водитель сомневается, что перед ним находится сотрудник ГАИ, либо хочет обжаловать его решения, действия, он может потребовать предъявить его служебное удостоверение. Сотрудник ГАИ в таком случае обязан его предъявить.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100300202.jpg&quot;,&quot;sourceImage&quot;:&quot;3.2.2.jpg&quot;},{&quot;id&quot;:100300203,&quot;group&quot;:1003002,&quot;t&quot;:2,&quot;chapter&quot;:3,&quot;chapters&quot;:[3],&quot;q&quot;:&quot;Обязан ли сотрудник ГАИ, остановивший транспортное средство, предъявить водителю служебное удостоверение?&quot;,&quot;a&quot;:[&quot;Обязан предъявить по требованию водителя.&quot;,&quot;Обязан только вне населённых пунктов в тёмное время суток.&quot;,&quot;Обязан только вне населённых пунктов при отсутствии транспортного средства оперативного назначения.&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;Если водитель сомневается, что перед ним находится сотрудник ГАИ, либо хочет обжаловать его решения, действия, он может потребовать предъявить его служебное удостоверение. Сотрудник ГАИ в таком случае обязан его предъявить.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100300302,&quot;group&quot;:1003003,&quot;t&quot;:2,&quot;chapter&quot;:3,&quot;chapters&quot;:[3],&quot;q&quot;:&quot;Что должен предъявить по требованию водителя сотрудник ГАИ, остановивший транспортное средство?&quot;,&quot;a&quot;:[&quot;Страховой полис.&quot;,&quot;Технический паспорт.&quot;,&quot;Служебное удостоверение.&quot;,&quot;Водительское удостоверение.&quot;,&quot;Всё перечисленное.&quot;],&quot;c&quot;:2,&quot;e&quot;:&quot;&lt;p&gt;Сотрудник ГАИ, остановивший транспортное средство, обязан предъявить по требованию водителя служебное удостоверение.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100300401,&quot;group&quot;:1003004,&quot;t&quot;:2,&quot;chapter&quot;:3,&quot;chapters&quot;:[3],&quot;q&quot;:&quot;Какие из перечисленных прав есть у водителя?&quot;,&quot;a&quot;:[&quot;Получать медицинскую помощь в случае дорожно-транспортного происшествия.&quot;,&quot;Знать причину, по которой сотрудником ГАИ остановлено транспортное средство, а также его фамилию и должность.&quot;,&quot;Передавать управление другому лицу, имеющему при себе водительское удостоверение на право управления механическим транспортным средством соответствующей категории.&quot;,&quot;Все перечисленные.&quot;],&quot;c&quot;:3,&quot;e&quot;:&quot;&lt;p&gt;Водитель имеет право передавать управление другому лицу, имеющему при себе водительское удостоверение соответствующей категории, убедившись, что данное лицо не находится в состоянии, при котором запрещено управлять транспортным средством.&lt;/p&gt;\r\n&lt;p&gt;Также водитель имеет право знать, по какой причине сотрудник ГАИ остановил его транспортное средство.&lt;/p&gt;\r\n&lt;p&gt;Кроме того, водитель, как участник дорожного движения, на основании положений второй главы Правил дорожного движения имеет право на получение медицинской помощи в случае дорожно-транспортного происшествия.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100300403,&quot;group&quot;:1003004,&quot;t&quot;:2,&quot;chapter&quot;:3,&quot;chapters&quot;:[3],&quot;q&quot;:&quot;Какие из перечисленных прав есть у водителя?&quot;,&quot;a&quot;:[&quot;Знать причину, по которой сотрудником ГАИ остановлено транспортное средство, а также его фамилию и должность.&quot;,&quot;Передавать управление другому лицу, имеющему при себе водительское удостоверение на право управления механическим транспортным средством другой категории.&quot;,&quot;Все перечисленные.&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;Водитель имеет право передавать управление другому лицу, имеющему при себе водительское удостоверение только соответствующей категории, убедившись, что данное лицо не находится в состоянии, при котором запрещено управлять транспортным средством.&lt;/p&gt;\r\n&lt;p&gt;Также водитель имеет право знать, по какой причине сотрудник ГАИ остановил его транспортное средство.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100300404,&quot;group&quot;:1003004,&quot;t&quot;:2,&quot;chapter&quot;:3,&quot;chapters&quot;:[3],&quot;q&quot;:&quot;Каким правом из перечисленных не обладает водитель?&quot;,&quot;a&quot;:[&quot;На обжалование решения должностного лица ГАИ.&quot;,&quot;На получение медицинской помощи в случае дорожно-транспортного происшествия.&quot;,&quot;На передачу управления другому лицу, имеющему право на управление транспортным средством другой категории.&quot;,&quot;На получение достоверной информации о безопасных условиях дорожного движения, причинах введения ограничения или запрещения движения по дорогам.&quot;,&quot;Обладает всеми перечисленными правами.&quot;],&quot;c&quot;:2,&quot;e&quot;:&quot;&lt;p&gt;Водитель имеет право передавать управление другому лицу, имеющему при себе водительское удостоверение только соответствующей категории, убедившись, что данное лицо не находится в состоянии, при котором запрещено управлять транспортным средством.&lt;/p&gt;\r\n&lt;p&gt;Остальными перечисленными правами водитель обладает, исходя из положений второй главы, как участник дорожного движения.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100300601,&quot;group&quot;:1003006,&quot;t&quot;:2,&quot;chapter&quot;:3,&quot;chapters&quot;:[3],&quot;q&quot;:&quot;Каким образом сотрудником ГАИ может выражаться требование об остановке транспортного средства?&quot;,&quot;a&quot;:[&quot;Жестом руки.&quot;,&quot;Путём подачи сигнала жезлом.&quot;,&quot;С помощью громкоговорящего устройства.&quot;,&quot;Путём включения на транспортном средстве оперативного назначения маячка красного цвета.&quot;,&quot;Может выражаться всеми перечисленными способами.&quot;],&quot;c&quot;:4,&quot;e&quot;:&quot;&lt;p&gt;Сотрудник ГАИ может, исходя из обстановки, подать сигнал об остановке транспортного средства жезлом, жестом руки, с помощью громкоговорящего устройства и путём включения на транспортном средстве оперативного назначения маячка красного цвета.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100300602,&quot;group&quot;:1003006,&quot;t&quot;:2,&quot;chapter&quot;:3,&quot;chapters&quot;:[3],&quot;q&quot;:&quot;Что должны использовать для подачи сигнала об остановке транспортного средства должностные лица органов внутренних дел (кроме сотрудников ГАИ)?&quot;,&quot;a&quot;:[&quot;Жезл.&quot;,&quot;Красный флажок.&quot;,&quot;Громкоговорящее устройство.&quot;,&quot;Диск с красным сигналом (световозвращателем).&quot;],&quot;c&quot;:3,&quot;e&quot;:&quot;&lt;p&gt;Должностные лица органов внутренних дел, кроме сотрудников ГАИ, для подачи сигнала об остановке транспортного средства должны использовать диск с красным сигналом (световозвращателем).&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100300603,&quot;group&quot;:1003006,&quot;t&quot;:2,&quot;chapter&quot;:3,&quot;chapters&quot;:[3],&quot;q&quot;:&quot;Каким образом сотрудником ГАИ не может выражаться требование об остановке транспортного средства?&quot;,&quot;a&quot;:[&quot;Жестом руки.&quot;,&quot;С помощью громкоговорящего устройства.&quot;,&quot;Путём включения на транспортном средстве оперативного назначения маячка синего цвета.&quot;,&quot;Может выражаться всеми перечисленными способами.&quot;],&quot;c&quot;:2,&quot;e&quot;:&quot;&lt;p&gt;Сотрудник ГАИ может, исходя из обстановки, подать сигнал об остановке транспортного средства жезлом, жестом руки, с помощью громкоговорящего устройства и путём включения на транспортном средстве оперативного назначения маячка красного цвета.&lt;/p&gt;\r\n&lt;p&gt;Включение на транспортном средстве оперативного назначения маячка синего цвета означает, что водители движущихся транспортных средств должны снизить скорость и остановиться в случае необходимости, но если необходимости остановки нет, водители могут продолжать движение, не останавливаясь.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100300701,&quot;group&quot;:1003007,&quot;t&quot;:2,&quot;chapter&quot;:3,&quot;chapters&quot;:[3],&quot;q&quot;:&quot;Должностные лица каких из перечисленных органов не имеют права остановки транспортных средств для осуществления возложенных на указанные органы функций?&quot;,&quot;a&quot;:[&quot;Органов пограничной службы.&quot;,&quot;Вооружённых Сил.&quot;,&quot;Министерства по чрезвычайным ситуациям.&quot;,&quot;Внутренних войск Министерства внутренних дел.&quot;,&quot;Все перечисленные имеют право остановки транспортных средств.&quot;],&quot;c&quot;:2,&quot;e&quot;:&quot;&lt;p&gt;Все перечисленные должностные лица, кроме Министерства по чрезвычайным ситуациям, имеют право остановки транспортного средства для осуществления возложенных на указанные органы функций.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100300702,&quot;group&quot;:1003007,&quot;t&quot;:2,&quot;chapter&quot;:3,&quot;chapters&quot;:[3],&quot;q&quot;:&quot;Должностные лица каких из перечисленных органов имеют права остановки транспортных средств для осуществления возложенных на указанные органы функций?&quot;,&quot;a&quot;:[&quot;Органов внутренних дел.&quot;,&quot;Органов государственной охраны.&quot;,&quot;Вооружённых Сил.&quot;,&quot;Государственной инспекции охраны животного и растительного мира при Президенте Республики Беларусь.&quot;,&quot;Всех перечисленных.&quot;],&quot;c&quot;:4,&quot;e&quot;:&quot;&lt;p&gt;Должностные лица всех перечисленных органов имеют право остановки транспортных средств, но только для осуществления возложенных на указанные органы функций.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100300703,&quot;group&quot;:1003007,&quot;t&quot;:2,&quot;chapter&quot;:3,&quot;chapters&quot;:[3],&quot;q&quot;:&quot;Должностные лица каких из перечисленных органов имеют права остановки транспортных средств для осуществления возложенных на указанные органы функций?&quot;,&quot;a&quot;:[&quot;Государственной лесной охраны.&quot;,&quot;Органов государственной безопасности.&quot;,&quot;Вооружённых Сил.&quot;,&quot;Органов финансовых расследований Комитета государственного контроля.&quot;,&quot;Всех перечисленных.&quot;],&quot;c&quot;:4,&quot;e&quot;:&quot;&lt;p&gt;Должностные лица всех перечисленных органов имеют право остановки транспортных средств, но только для осуществления возложенных на указанные органы функций.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100300801,&quot;group&quot;:1003008,&quot;t&quot;:2,&quot;chapter&quot;:3,&quot;chapters&quot;:[3],&quot;q&quot;:&quot;Какие документы из перечисленных обязан передавать для проверки водитель механического транспортного средства должностным лицам (кроме сотрудника ГАИ), имеющим право остановки транспортного средства для осуществления возложенных на них функций?&quot;,&quot;a&quot;:[&quot;Водительское удостоверение или документ, удостоверяющий его личность.&quot;,&quot;Документ, подтверждающий заключение договора обязательного страхования гражданской ответственности владельца транспортного средства.&quot;,&quot;Все перечисленные.&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;Должностным лицам органов, имеющих право остановки транспортных средств (кроме сотрудников ГАИ), водитель обязан передавать для проверки документ, удостоверяющий его личность, или водительское удостоверение.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100300802,&quot;group&quot;:1003008,&quot;t&quot;:2,&quot;chapter&quot;:3,&quot;chapters&quot;:[3],&quot;q&quot;:&quot;Какие документы из перечисленных обязан передавать для проверки водитель механического транспортного средства, эксплуатируемого индивидуальным предпринимателем, должностным лицам Транспортной инспекции Министерства транспорта и коммуникаций?&quot;,&quot;a&quot;:[&quot;Свидетельство о регистрации (технический паспорт, технический талон) механического транспортного средства, прицепа (прицепов) к нему.&quot;,&quot;Транспортные документы, предусмотренные законодательными актами.&quot;,&quot;Водительское удостоверение или документ, удостоверяющий его личность.&quot;,&quot;Все перечисленные.&quot;],&quot;c&quot;:3,&quot;e&quot;:&quot;&lt;p&gt;Должностным лицам Транспортной инспекции Министерства транспорта и коммуникаций водитель механического транспортного средства, эксплуатируемого юридическим лицом или индивидуальным предпринимателем, обязан передавать для проверки документ, удостоверяющий его личность, или водительское удостоверение, свидетельство о регистрации (технический паспорт, технический талон) механического транспортного средства, прицепа (прицепов) к нему, а также транспортные документы, предусмотренные законодательными актами.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100300901,&quot;group&quot;:1003009,&quot;t&quot;:2,&quot;chapter&quot;:3,&quot;chapters&quot;:[3],&quot;q&quot;:&quot;Какие документы из указанных водитель обязан предъявлять сотруднику таможенных органов в соответствии с Правилами дорожного движения?&quot;,&quot;a&quot;:[&quot;Документ, удостоверяющий личность, или водительское удостоверение.&quot;,&quot;Разрешение на допуск транспортного средства к участию в дорожном движении.&quot;,&quot;Оба документа.&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;Должностным лицам органов имеющих право остановки транспортных средств (кроме сотрудников ГАИ), водитель обязан передавать для проверки документ, удостоверяющий его личность, или водительское удостоверение.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100300902,&quot;group&quot;:1003009,&quot;t&quot;:2,&quot;chapter&quot;:3,&quot;chapters&quot;:[3],&quot;q&quot;:&quot;Обязан ли водитель автомобиля иметь при себе и передавать для проверки сотрудникам ГАИ медицинскую справку?&quot;,&quot;a&quot;:[&quot;Да, обязан.&quot;,&quot;Нет, не обязан.&quot;],&quot;c&quot;:1,&quot;e&quot;:&quot;&lt;p&gt;Водитель автомобиля не обязан иметь при себе и передавать для проверки сотрудникам ГАИ медицинскую справку.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100300941,&quot;group&quot;:1003009,&quot;t&quot;:2,&quot;chapter&quot;:3,&quot;chapters&quot;:[3],&quot;q&quot;:&quot;Какие из перечисленных документов водитель механического транспортного средства обязан иметь при себе и передавать для проверки сотрудникам ГАИ?&quot;,&quot;a&quot;:[&quot;Разрешение на допуск транспортного средства к участию в дорожном движении.&quot;,&quot;Разрешение органа связи на использование средств радио- и спутниковой связи при их наличии на транспортном средстве.&quot;,&quot;Свидетельство о регистрации (технический паспорт, технический талон) механического транспортного средства, прицепа (прицепов) к нему.&quot;,&quot;Все перечисленные документы.&quot;],&quot;c&quot;:2,&quot;e&quot;:&quot;&lt;p&gt;Водитель механического транспортного средства обязан иметь при себе и передавать для проверки сотрудникам ГАИ:&lt;/p&gt;\r\n&lt;ul&gt;&lt;li&gt;водительское удостоверение,&lt;/li&gt;\r\n&lt;li&gt;свидетельство о регистрации (технический паспорт, технический талон) механического транспортного средства, прицепа (прицепов) к нему,&lt;/li&gt;\r\n&lt;li&gt;документ, подтверждающий заключение договора обязательного страхования гражданской ответственности владельца транспортного средства (договор внутреннего страхования, либо договор комплексного внутреннего страхования, либо договор пограничного страхования, либо договор союзного страхования, либо договор страхования, заключённый со страховой организацией государства, с уполномоченной организацией которого Белорусским бюро по транспортному страхованию заключено соглашение о сотрудничестве, и действительный на территории Республики Беларусь, либо договор страхования, заключённый в рамках межгосударственной (международной) системы страхования Союзного государства со страховой организацией Российской Федерации), за исключением случая заключения договора страхования в электронном виде;&lt;/li&gt;\r\n&lt;li&gt;документы, подтверждающие правомерность установки опознавательного знака «Инвалид» при его наличии на транспортном средстве, за исключением иностранных граждан и лиц без гражданства.&lt;/li&gt;&lt;/ul&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100300941.jpg&quot;,&quot;sourceImage&quot;:&quot;3.9.41.jpg&quot;},{&quot;id&quot;:100301001,&quot;group&quot;:1003010,&quot;t&quot;:2,&quot;chapter&quot;:3,&quot;chapters&quot;:[3],&quot;q&quot;:&quot;По требованию какого должностного лица водитель обязан пройти в установленном порядке проверку на предмет определения состояния алкогольного опьянения?&quot;,&quot;a&quot;:[&quot;По требованию сотрудника ГАИ.&quot;,&quot;По требованию должностного лица органов государственной безопасности.&quot;,&quot;По требованию должностного лица Транспортной инспекции Министерства транспорта и коммуникаций.&quot;,&quot;Всех перечисленных.&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;Водитель обязан пройти в установленном порядке проверку на предмет определения состояния алкогольного опьянения только по требованию сотрудника ГАИ.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100301002,&quot;group&quot;:1003010,&quot;t&quot;:2,&quot;chapter&quot;:3,&quot;chapters&quot;:[3],&quot;q&quot;:&quot;Обязан ли водитель пройти в установленном порядке проверку на предмет определения состояния алкогольного опьянения по требованию сотрудника ГАИ?&quot;,&quot;a&quot;:[&quot;Обязан только в случае нарушения Правил дорожного движения.&quot;,&quot;Обязан только в случае участия в дорожно-транспортном происшествии.&quot;,&quot;Обязан в любом случае.&quot;],&quot;c&quot;:2,&quot;e&quot;:&quot;&lt;p&gt;Водитель обязан пройти в установленном порядке проверку на предмет определения состояния алкогольного опьянения по требованию сотрудника ГАИ независимо от обстоятельств остановки транспортного средства.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100301141,&quot;group&quot;:1003011,&quot;t&quot;:2,&quot;chapter&quot;:3,&quot;chapters&quot;:[3],&quot;q&quot;:&quot;На каких транспортных средствах перед перевозкой пассажира водитель обязан убедиться, что его пассажир не находится в состоянии алкогольного опьянения?&quot;,&quot;a&quot;:[&quot;На мопеде, мотоцикле (кроме перевозки в боковом прицепе к мотоциклу).&quot;,&quot;На мопеде, мотоцикле (в том числе при перевозке в боковом прицепе к мотоциклу).&quot;,&quot;На мопеде, мотоцикле или легковом автомобиле.&quot;,&quot;На мопеде, мотоцикле, легковом или грузовом автомобиле.&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;Перед перевозкой пассажира на мопеде, мотоцикле (кроме бокового прицепа к мотоциклу) водитель обязан убедиться, что пассажир не находится в состоянии алкогольного опьянения либо в состоянии, вызванном потреблением наркотических средств, психотропных веществ, их аналогов, токсических или других одурманивающих веществ.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100301142,&quot;group&quot;:1003011,&quot;t&quot;:2,&quot;chapter&quot;:3,&quot;chapters&quot;:[3],&quot;q&quot;:&quot;Разрешается ли мотоциклисту перевозить на заднем сиденье пассажира, находящегося в состоянии, вызванном потреблением лекарственных психотропных веществ?&quot;,&quot;a&quot;:[&quot;Да, только в ближайшее медицинское учреждение.&quot;,&quot;Нет, не разрешается.&quot;],&quot;c&quot;:1,&quot;e&quot;:&quot;&lt;p&gt;Водителю запрещается перевозить на мопеде, мотоцикле (кроме бокового прицепа к мотоциклу) пассажира, заведомо для водителя находящегося в состоянии алкогольного опьянения либо в состоянии, вызванном потреблением наркотических средств, психотропных веществ, их аналогов, токсических или других одурманивающих веществ.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100301142.jpg&quot;,&quot;sourceImage&quot;:&quot;3.11.42.jpg&quot;},{&quot;id&quot;:100301203,&quot;group&quot;:1003012,&quot;t&quot;:2,&quot;chapter&quot;:3,&quot;chapters&quot;:[3],&quot;q&quot;:&quot;Когда согласно Правилам дорожного движения водитель обязан проверять техническое состояние транспортного средства?&quot;,&quot;a&quot;:[&quot;Перед началом движения.&quot;,&quot;По возвращении к месту стоянки или хранения.&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;Водитель обязан перед началом движения проверить техническое состояние автомобиля, так как от этого напрямую зависит безопасность дорожного движения.&lt;/p&gt;\r\n&lt;p&gt;Если водитель будет кроме того проверять техническое состояние транспортного средства и по возвращении к месту стоянки или ремонта — это очень хорошо, но в обязанности водителя такие действия согласно Правилам дорожного движения не входят.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100301232,&quot;group&quot;:1003012,&quot;t&quot;:2,&quot;chapter&quot;:3,&quot;chapters&quot;:[3],&quot;q&quot;:&quot;Что из перечисленного входит в обязанности водителя?&quot;,&quot;a&quot;:[&quot;Содержать в чистоте стёкла и внешние световые приборы транспортного средства.&quot;,&quot;Проверять техническое состояние транспортного средства перед началом движения.&quot;,&quot;Содержать участвующее в дорожном движении транспортное средство в технически исправном состоянии.&quot;,&quot;Своевременно получать на находящееся в его владении (пользовании) механическое транспортное средство разрешение на допуск транспортного средства к участию в дорожном движении в порядке, установленном законодательством.&quot;,&quot;Всё перечисленное.&quot;],&quot;c&quot;:4,&quot;e&quot;:&quot;&lt;p&gt;Водитель обязан перед началом движения проверить техническое состояние автомобиля. Водитель обязан содержать транспортное средство в технически исправном состоянии, содержать в чистоте стёкла и внешние световые приборы, а также своевременно получать на находящееся в его владении (пользовании) механическое транспортное средство разрешение на допуск транспортного средства к участию в дорожном движении.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100301301,&quot;group&quot;:1003013,&quot;t&quot;:2,&quot;chapter&quot;:3,&quot;chapters&quot;:[3],&quot;q&quot;:&quot;Что из перечисленного обязан выполнить водитель перед началом движения?&quot;,&quot;a&quot;:[&quot;Отдохнуть не менее 14 часов.&quot;,&quot;Проверить техническое состояние транспортного средства.&quot;,&quot;Прогреть двигатель до температуры охлаждающей жидкости не менее 90 градусов.&quot;,&quot;Всё перечисленное.&quot;],&quot;c&quot;:1,&quot;e&quot;:&quot;&lt;p&gt;Водитель обязан в соответствии с Правилами дорожного движения перед началом движения проверить техническое состояние автомобиля.&lt;/p&gt;\r\n&lt;p&gt;Норма обязательного суточного отдыха водителя в ПДД не оговорена, при этом водителю запрещается при управлении находиться в утомлённом состоянии.&lt;/p&gt;\r\n&lt;p&gt;Прогревать двигатель до оптимальной температуры охлаждающей жидкости нет необходимости, но при управлении автомобилем необходимо контролировать показания контрольно-измерительных приборов, в том числе температуру охлаждающей жидкости.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100301302,&quot;group&quot;:1003013,&quot;t&quot;:2,&quot;chapter&quot;:3,&quot;chapters&quot;:[3],&quot;q&quot;:&quot;Если перед началом движения водитель обнаружил, что внешние световые приборы загрязнены, обязан ли он их очистить до начала движения?&quot;,&quot;a&quot;:[&quot;Обязан только в тёмное время суток.&quot;,&quot;Обязан только в тёмное время суток и в условиях недостаточной видимости.&quot;,&quot;Обязан в любом случае.&quot;],&quot;c&quot;:2,&quot;e&quot;:&quot;&lt;p&gt;Водитель обязан в соответствии с Правилами дорожного движения содержать в чистоте стёкла и внешние световые приборы транспортного средства.&lt;/p&gt;\r\n&lt;p&gt;Загрязнение стёкол ухудшает обзорность и видимость дороги, а загрязненные внешние световые приборы ухудшают видимость подаваемых сигналов и ухудшают освещённость дороги в тёмное время суток.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100301401,&quot;group&quot;:1003014,&quot;t&quot;:2,&quot;chapter&quot;:3,&quot;chapters&quot;:[3],&quot;q&quot;:&quot;Разрешается ли перевозить в населённом пункте пассажиров с непристёгнутыми ремнями безопасности в транспортном средстве, оборудованном ремнями безопасности?&quot;,&quot;a&quot;:[&quot;Нет, не разрешается.&quot;,&quot;Да, разрешается в любых случаях.&quot;,&quot;Разрешается только на заднем сиденье.&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;Водитель обязан при движении, как вне населённого пункта, так и в населённом пункте быть пристёгнутым и не перевозить пассажиров с непристёгнутыми ремнями безопасности (кроме случаев, оговоренных в Правилах дорожного движения).&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100301403,&quot;group&quot;:1003014,&quot;t&quot;:2,&quot;chapter&quot;:3,&quot;chapters&quot;:[3],&quot;q&quot;:&quot;Обязан ли водитель автомобиля-такси, перевозя пассажира в населённом пункте в транспортном средстве, оборудованном ремнями безопасности, быть пристёгнутым?&quot;,&quot;a&quot;:[&quot;Да, обязан.&quot;,&quot;Нет, не обязан.&quot;],&quot;c&quot;:1,&quot;e&quot;:&quot;&lt;p&gt;Водитель автомобиля-такси, перевозя пассажира (пассажиров), не обязан при движении в населённом пункте быть пристёгнутым, но при этом ему запрещается перевозить пассажиров с непристёгнутыми ремнями безопасности (кроме пассажиров с медицинскими противопоказаниями, перечень которых определяется Министерством здравоохранения).&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100301441,&quot;group&quot;:1003014,&quot;t&quot;:2,&quot;chapter&quot;:3,&quot;chapters&quot;:[3],&quot;q&quot;:&quot;Требуется ли от водителя показанного транспортного средства при движении быть в застёгнутом мотошлеме?&quot;,&quot;a&quot;:[&quot;Требуется, если оно соответствует термину «мопед».&quot;,&quot;Требуется, если оно соответствует термину «мотоцикл».&quot;,&quot;Требуется в любом случае.&quot;,&quot;Не требуется.&quot;],&quot;c&quot;:2,&quot;e&quot;:&quot;&lt;p&gt;Водитель обязан при движении на мотоцикле, мопеде быть в застёгнутом мотошлеме независимо от особенностей их конструкции.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100301441.jpg&quot;,&quot;sourceImage&quot;:&quot;3.14.41.jpg&quot;},{&quot;id&quot;:100301501,&quot;group&quot;:1003015,&quot;t&quot;:2,&quot;chapter&quot;:3,&quot;chapters&quot;:[3],&quot;q&quot;:&quot;Обязано ли быть пристёгнуто ремнём безопасности лицо, обучаемое управлению механическим транспортным средством?&quot;,&quot;a&quot;:[&quot;Не обязано при первоначальном обучении на автодроме.&quot;,&quot;Обязано только при обучении на дорогах общего пользования.&quot;,&quot;Обязано в любом случае.&quot;],&quot;c&quot;:2,&quot;e&quot;:&quot;&lt;p&gt;Лицо, обучаемое управлению механическим транспортным средством, должно быть пристёгнуто ремнём безопасности.&lt;/p&gt;\r\n&lt;p&gt;Допускается не пристёгиваться ремнём безопасности лицу, обучающему управлению механическим транспортным средством, когда транспортным средством управляет обучаемый управлению.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100301502,&quot;group&quot;:1003015,&quot;t&quot;:2,&quot;chapter&quot;:3,&quot;chapters&quot;:[3],&quot;q&quot;:&quot;Обязано ли быть пристёгнуто ремнём безопасности лицо, обучающее управлению механическим транспортным средством, когда транспортным средством управляет лицо, обучаемое управлению механическим транспортным средством?&quot;,&quot;a&quot;:[&quot;Не обязано при первоначальном обучении на автодроме.&quot;,&quot;Не обязано только при обучении на дорогах общего пользования.&quot;,&quot;Не обязано.&quot;],&quot;c&quot;:2,&quot;e&quot;:&quot;&lt;p&gt;Допускается не пристёгиваться ремнём безопасности лицу, обучающему управлению механическим транспортным средством, когда транспортным средством управляет обучаемый управлению.&lt;br&gt;\r\nЭто связано с тем, что лицо, обучающее управлению может быть вынуждено вмешаться в управление транспортным средством для исправления ошибок обучаемого, в том числе для предотвращения создания аварийной ситуации.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100301502.jpg&quot;,&quot;sourceImage&quot;:&quot;3.15.2.jpg&quot;},{&quot;id&quot;:100301603,&quot;group&quot;:1003016,&quot;t&quot;:2,&quot;chapter&quot;:3,&quot;chapters&quot;:[3],&quot;q&quot;:&quot;Кто из перечисленных лиц может не пристёгиваться ремнями безопасности при движении в транспортном средстве, оборудованном ремнями безопасности?&quot;,&quot;a&quot;:[&quot;Водитель автомобиля-такси во время перевозки пассажира в населённом пункте.&quot;,&quot;Пассажир транспортного средства оперативного назначения.&quot;,&quot;Пассажир с медицинскими противопоказаниями, перечень которых определяется Министерством здравоохранения.&quot;,&quot;Все перечисленные.&quot;],&quot;c&quot;:3,&quot;e&quot;:&quot;&lt;p&gt;&lt;strong&gt;Допускается не пристёгиваться ремнём безопасности:&lt;/strong&gt;&lt;/p&gt;\r\n&lt;ul&gt;\t&lt;li&gt;лицу (водителю или пассажиру) с медицинскими противопоказаниями, перечень которых определяется Министерством здравоохранения,&lt;/li&gt;\r\n\t&lt;li&gt;пассажиру транспортного средства оперативного назначения,&lt;/li&gt;\r\n\t&lt;li&gt;водителю автомобиля-такси при движении в населённом пункте во время перевозки пассажира.&lt;/li&gt;&lt;/ul&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100301631,&quot;group&quot;:1003016,&quot;t&quot;:2,&quot;chapter&quot;:3,&quot;chapters&quot;:[3],&quot;q&quot;:&quot;Кто из перечисленных лиц может не пристёгиваться ремнями безопасности при движении в транспортном средстве, оборудованном ремнями безопасности?&quot;,&quot;a&quot;:[&quot;Водитель автомобиля-такси при движении в населённом пункте во время перевозки пассажира.&quot;,&quot;Лицо, обучающее управлению механическим транспортным средством, когда транспортным средством управляет обучаемый управлению.&quot;,&quot;Лицо, принимающее квалификационный практический экзамен на право управления транспортным средством, когда транспортным средством управляет лицо, сдающее такой экзамен.&quot;,&quot;Все перечисленные.&quot;],&quot;c&quot;:3,&quot;e&quot;:&quot;&lt;p&gt;Допускается не пристёгиваться ремнём безопасности лицу, обучающему управлению механическим транспортным средством или принимающему квалификационный практический экзамен на право управления транспортным средством, когда транспортным средством управляет соответственно обучаемый управлению или лицо, сдающее такой экзамен.&lt;br&gt;\r\nЭто связано с тем, что такое лицо может быть вынуждено вмешаться в управление транспортным средством для исправления ошибок обучаемого, а также для предотвращения создания аварийной ситуации.&lt;br&gt;\r\nТакже допускается не пристёгиваться водителю автомобиля-такси — при движении в населённом пункте во время перевозки пассажира&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100301632,&quot;group&quot;:1003016,&quot;t&quot;:2,&quot;chapter&quot;:3,&quot;chapters&quot;:[3],&quot;q&quot;:&quot;Кто из перечисленных лиц может не пристёгиваться ремнями безопасности при движении в транспортном средстве, оборудованном ремнями безопасности?&quot;,&quot;a&quot;:[&quot;Водитель автомобиля-такси при движении вне населённого пункта.&quot;,&quot;Водитель автомобиля-такси при движении в населённом пункте, следуя к месту посадки пассажира.&quot;,&quot;Пассажир с медицинскими противопоказаниями, перечень которых определяется Министерством здравоохранения.&quot;,&quot;Все перечисленные.&quot;],&quot;c&quot;:2,&quot;e&quot;:&quot;&lt;p&gt;Допускается не пристёгиваться ремнём безопасности лицу (водителю или пассажиру) с медицинскими противопоказаниями, перечень которых определяется Министерством здравоохранения.&lt;/p&gt;\r\n&lt;p&gt;Остальные перечисленные лица обязаны быть пристёгнуты ремнями безопасности.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100301801,&quot;group&quot;:1003018,&quot;t&quot;:2,&quot;chapter&quot;:3,&quot;chapters&quot;:[3],&quot;q&quot;:&quot;Кому из перечисленных лиц разрешено не пристёгиваться ремнями безопасности при движении в транспортном средстве, оборудованном ремнями безопасности, в населённом пункте?&quot;,&quot;a&quot;:[&quot;Водителю автомобиля-такси во время перевозки пассажира.&quot;,&quot;Пассажиру транспортного средства оперативного назначения.&quot;,&quot;Пассажиру и водителю с медицинскими противопоказаниями, перечень которых определяется Министерством здравоохранения.&quot;,&quot;Лицу, обучающему управлению механическим транспортным средством, когда транспортным средством управляет обучаемый управлению.&quot;,&quot;Всем перечисленным.&quot;],&quot;c&quot;:4,&quot;e&quot;:&quot;&lt;p&gt;&lt;strong&gt;Допускается не пристёгиваться&lt;/strong&gt; ремнём безопасности &lt;strong&gt;лицу, обучающему управлению механическим транспортным средством&lt;/strong&gt;, когда транспортным средством управляет обучаемый управлению.&lt;br&gt; Это связано с тем, что лицо, обучающее управлению, может быть вынуждено вмешаться в управление транспортным средством для исправления ошибок обучаемого, в том числе для предотвращения создания аварийной ситуации.&lt;/p&gt;\r\n&lt;p&gt;Допускается также не пристёгиваться ремнём безопасности лицу (водителю или пассажиру) &lt;strong&gt;с медицинскими противопоказаниями&lt;/strong&gt;, перечень которых определяется Министерством здравоохранения, &lt;strong&gt;пассажиру транспортного средства оперативного назначения&lt;/strong&gt;, а также при движении &lt;strong&gt;в населённом пункте водителю автомобиля-такси во время перевозки пассажира&lt;/strong&gt;.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100301802,&quot;group&quot;:1003018,&quot;t&quot;:2,&quot;chapter&quot;:3,&quot;chapters&quot;:[3],&quot;q&quot;:&quot;Кто из перечисленных лиц должен пристёгиваться ремнями безопасности при движении в транспортном средстве, оборудованном ремнями безопасности, в населённом пункте?&quot;,&quot;a&quot;:[&quot;Пассажир автомобиля-такси.&quot;,&quot;Пассажир транспортного средства оперативного назначения.&quot;,&quot;Пассажир и водитель с медицинскими противопоказаниями, перечень которых определяется Министерством здравоохранения.&quot;,&quot;Все перечисленные.&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;Допускается также &lt;strong&gt;не пристёгиваться&lt;/strong&gt; ремнём безопасности лицу (водителю или пассажиру) &lt;strong&gt;с медицинскими противопоказаниями&lt;/strong&gt;, перечень которых определяется Министерством здравоохранения, и &lt;strong&gt;пассажиру транспортного средства оперативного назначения&lt;/strong&gt;, а также при движении в населённом пункте — водителю автомобиля-такси.&lt;/p&gt;\r\n&lt;p&gt;При этом &lt;strong&gt;пассажир автомобиля-такси должен быть пристёгнут ремнём безопасности&lt;/strong&gt; как в населённом пункте, так и вне его.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100301803,&quot;group&quot;:1003018,&quot;t&quot;:2,&quot;chapter&quot;:3,&quot;chapters&quot;:[3],&quot;q&quot;:&quot;Кому из перечисленных лиц разрешено не пристёгиваться ремнями безопасности при движении в транспортном средстве, оборудованном ремнями безопасности, вне населённого пункта?&quot;,&quot;a&quot;:[&quot;Водителю автомобиля-такси.&quot;,&quot;Пассажиру автомобиля-такси.&quot;,&quot;Пассажиру и водителю с медицинскими противопоказаниями, перечень которых определяется Министерством здравоохранения.&quot;,&quot;Всем перечисленным.&quot;],&quot;c&quot;:2,&quot;e&quot;:&quot;&lt;p&gt;Допускается не пристёгиваться ремнём безопасности лицу (водителю или пассажиру) с медицинскими противопоказаниями, перечень которых определяется Министерством здравоохранения.&lt;/p&gt;\r\n&lt;p&gt;При движении вне населённого пункта водитель и пассажир автомобиля-такси должны быть пристёгнуты ремнями безопасности.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100302001,&quot;group&quot;:1003020,&quot;t&quot;:2,&quot;chapter&quot;:3,&quot;chapters&quot;:[3],&quot;q&quot;:&quot;В каких местах из перечисленных водителю разрешено переезжать разделительную полосу?&quot;,&quot;a&quot;:[&quot;В населённых пунктах.&quot;,&quot;В местах, обозначенных соответствующими дорожными знаками, дорожной разметкой, оборудованных ограждающими или направляющими устройствами.&quot;,&quot;Во всех перечисленных местах.&quot;],&quot;c&quot;:1,&quot;e&quot;:&quot;&lt;p&gt;Разрешается переезжать разделительную полосу только в местах, обозначенных соответствующими дорожными знаками, дорожной разметкой, оборудованных ограждающими или направляющими устройствами.&lt;br&gt;\r\nЭто связано с тем, что разделительная полоса разделяет смежные проезжие части дороги (транспортные потоки) и её пересечение в необозначенном месте может привести к созданию аварийной ситуации с участием транспортных средств, движущихся по смежной проезжей части дороги.&lt;/p&gt;\r\n&lt;p&gt;В случае оборудования на разделительной полосе газона, пересечение разделительной полосы может привести также к повреждению растительного покрова и попаданию грязи на проезжую часть дороги.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100302003,&quot;group&quot;:1003020,&quot;t&quot;:2,&quot;chapter&quot;:3,&quot;chapters&quot;:[3],&quot;q&quot;:&quot;В каких случаях водителю разрешено переезжать разделительную зону?&quot;,&quot;a&quot;:[&quot;Для разворота при отсутствии разрывов сплошной линии дорожной разметки.&quot;,&quot;В местах, обозначенных соответствующими дорожными знаками, дорожной разметкой, оборудованных ограждающими или направляющими устройствами.&quot;,&quot;Во всех перечисленных случаях.&quot;],&quot;c&quot;:1,&quot;e&quot;:&quot;&lt;p&gt;Разрешается переезжать разделительную зону только в местах, обозначенных соответствующими дорожными знаками, дорожной разметкой, оборудованных ограждающими или направляющими устройствами.&lt;br&gt;\r\nЭто связано с тем, что разделительная зона разделяет смежные проезжие части дороги (транспортные потоки) и её пересечение в необозначенном месте может привести к созданию аварийной ситуации с участием транспортных средств, движущихся по смежной проезжей части дороги.&lt;/p&gt;\r\n&lt;p&gt;Кроме того, границы разделительной зоны определены сплошными линиями горизонтальной дорожной разметки, пересекать которые запрещено.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100302102,&quot;group&quot;:1003021,&quot;t&quot;:2,&quot;chapter&quot;:3,&quot;chapters&quot;:[3],&quot;q&quot;:&quot;Как Вы должны поступить в показанной ситуации, управляя легковым автомобилем?&quot;,&quot;a&quot;:[&quot;Предоставить преимущество пешеходу.&quot;,&quot;Подать звуковой сигнал, чтобы привлечь внимание пешехода.&quot;,&quot;Выполнить оба перечисленных действия.&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;Водитель обязан предоставлять преимущество пешеходам на нерегулируемых пешеходных переходах.&lt;/p&gt;\r\n&lt;p&gt;Преимущество пешеходу считается предоставленным, если расстояние между транспортным средством и приближающимся пешеходом (в момент пересечения транспортным средством траектории движения пешехода) составило не менее двух полос движения транспортного средства, а в случае, если между тротуаром и транспортным средством менее двух полос, — водителю необходимо следовать требованию «уступить дорогу (предоставить преимущество)».&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100302102.jpg&quot;,&quot;sourceImage&quot;:&quot;3.21.2.jpg&quot;},{&quot;id&quot;:100302241,&quot;group&quot;:1003022,&quot;t&quot;:2,&quot;chapter&quot;:3,&quot;chapters&quot;:[3],&quot;q&quot;:&quot;Предоставил ли преимущество мотоциклист пешеходу, проезжая безостановочно пешеходный переход в показанной ситуации?&quot;,&quot;a&quot;:[&quot;Нет, не предоставил.&quot;,&quot;Да, предоставил.&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;При подъезде к нерегулируемому пешеходному переходу водитель должен предоставить преимущество пешеходу. Преимущество пешеходу считается предоставленным, если расстояние между транспортным средством и приближающимся пешеходом (в момент пересечения транспортным средством траектории движения пешехода) составило не менее двух полос движения транспортного средства (в том числе одну полосу и трамвайные пути попутного направления).&lt;/p&gt;\r\n&lt;p&gt;Поэтому в показанной ситуации водитель не предоставил преимущество, так как между транспортным средством и пешеходом — менее двух полос движения.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100302241.jpg&quot;,&quot;sourceImage&quot;:&quot;3.22.41.jpg&quot;},{&quot;id&quot;:100302301,&quot;group&quot;:1003023,&quot;t&quot;:2,&quot;chapter&quot;:3,&quot;chapters&quot;:[3],&quot;q&quot;:&quot;В каком случае водителю разрешается покидать своё место или оставлять транспортное средство?&quot;,&quot;a&quot;:[&quot;Если приняты меры, исключающие возможность угона транспортного средства.&quot;,&quot;Если приняты меры, исключающие самопроизвольное движение транспортного средства.&quot;,&quot;Если приняты меры, исключающие произвольное срабатывание противоугонной звуковой сигнализации.&quot;,&quot;Если приняты все перечисленные меры.&quot;],&quot;c&quot;:1,&quot;e&quot;:&quot;&lt;p&gt;Если водитель покидает транспортное средство, он обязан принять меры, исключающие самопроизвольное движение транспортного средства в зависимости от уклона и расположения места, выбранного для остановки.&lt;/p&gt;\r\n&lt;p&gt;ДТП с участием неуправляемого транспортного средства — совсем не редкость.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100302302,&quot;group&quot;:1003023,&quot;t&quot;:2,&quot;chapter&quot;:3,&quot;chapters&quot;:[3],&quot;q&quot;:&quot;В каком случае водителю разрешается покинуть своё место или оставить транспортное средство, не приняв меры, исключающие его самопроизвольное движение?&quot;,&quot;a&quot;:[&quot;Если он будет находиться рядом с транспортным средством.&quot;,&quot;Если транспортное средство находится на ровной площадке.&quot;,&quot;Если в транспортном средстве находится пассажир на переднем сиденье.&quot;,&quot;Запрещается во всех перечисленных случаях.&quot;],&quot;c&quot;:3,&quot;e&quot;:&quot;&lt;p&gt;Если водитель покидает транспортное средство, он обязан принять меры, исключающие самопроизвольное движение транспортного средства.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует
