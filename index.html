 правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100302401,&quot;group&quot;:1003024,&quot;t&quot;:2,&quot;chapter&quot;:3,&quot;chapters&quot;:[3],&quot;q&quot;:&quot;Что из нижеперечисленного обязан выполнять водитель?&quot;,&quot;a&quot;:[&quot;Предоставлять транспортное средство для освобождения проезжей части дороги от транспортных средств, повреждённых при дорожно-транспортном происшествии.&quot;,&quot;Доставлять на управляемом транспортном средстве работников организаций здравоохранения для проезда к месту нахождения больного, жизнь которого находится под угрозой.&quot;,&quot;Доставлять на управляемом транспортном средстве лиц, нуждающихся в срочной медицинской помощи, в ближайшую организацию здравоохранения по требованию работников правоохранительных органов.&quot;,&quot;Всё перечисленное.&quot;],&quot;c&quot;:3,&quot;e&quot;:&quot;&lt;p&gt;Водитель обязан доставлять на управляемом транспортном средстве работников организаций здравоохранения для проезда к месту нахождения больного, жизнь которого находится под угрозой, а также доставлять на управляемом транспортном средстве лиц, нуждающихся в срочной медицинской помощи, в ближайшую организацию здравоохранения по требованию работников правоохранительных органов и организаций здравоохранения.&lt;/p&gt;\r\n&lt;p&gt;Также водитель обязан предоставлять транспортное средство (по требованию сотрудников ГАИ) для освобождения проезжей части дороги от транспортных средств, повреждённых при дорожно-транспортном происшествии.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100302501,&quot;group&quot;:1003025,&quot;t&quot;:2,&quot;chapter&quot;:3,&quot;chapters&quot;:[3],&quot;q&quot;:&quot;Кого из перечисленных лиц обязан доставлять на управляемом транспортном средстве водитель согласно Правилам дорожного движения?&quot;,&quot;a&quot;:[&quot;Лицо, нуждающееся в срочной медицинской помощи, в ближайшую организацию здравоохранения по требованию работника правоохранительных органов.&quot;,&quot;Работника правоохранительных органов для выполнения неотложных служебных обязанностей, связанных с преследованием лица, подозреваемого в совершении преступления.&quot;,&quot;Всех перечисленных.&quot;],&quot;c&quot;:2,&quot;e&quot;:&quot;&lt;p&gt;Водитель обязан доставлять на управляемом транспортном средстве работников правоохранительных органов для выполнения неотложных служебных обязанностей, связанных с преследованием лиц, подозреваемых в совершении преступлений, а также доставлять на управляемом транспортном средстве лиц, нуждающихся в срочной медицинской помощи, в ближайшую организацию здравоохранения по требованию работников правоохранительных органов.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100302502,&quot;group&quot;:1003025,&quot;t&quot;:2,&quot;chapter&quot;:3,&quot;chapters&quot;:[3],&quot;q&quot;:&quot;Кого из перечисленных лиц обязан доставлять на управляемом транспортном средстве водитель согласно Правилам дорожного движения?&quot;,&quot;a&quot;:[&quot;Работников правоохранительных органов для проезда к месту нахождения больного, жизнь которого находится под угрозой.&quot;,&quot;Лиц, нуждающихся в срочной медицинской помощи, в ближайшую организацию здравоохранения по требованию работников правоохранительных органов.&quot;,&quot;Всех перечисленных.&quot;],&quot;c&quot;:1,&quot;e&quot;:&quot;&lt;p&gt;Водитель обязан доставлять на управляемом транспортном средстве лиц, нуждающихся в срочной медицинской помощи, в ближайшую организацию здравоохранения по требованию работников правоохранительных органов, но при этом он не обязан доставлять на управляемом транспортном средстве работников правоохранительных органов для проезда к месту нахождения больного, жизнь которого находится под угрозой, в таком случае — только работников организаций здравоохранения.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100302503,&quot;group&quot;:1003025,&quot;t&quot;:2,&quot;chapter&quot;:3,&quot;chapters&quot;:[3],&quot;q&quot;:&quot;В каком случае водитель не обязан доставлять на управляемом транспортном средстве работников правоохранительных органов?&quot;,&quot;a&quot;:[&quot;Для проезда к месту несения службы в попутном направлении.&quot;,&quot;Для выполнения неотложных служебных обязанностей, связанных с преследованием лиц, подозреваемых в совершении преступлений.&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;Водитель не обязан доставлять на управляемом транспортном средстве работников правоохранительных органов для проезда к месту работы.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100302601,&quot;group&quot;:1003026,&quot;t&quot;:2,&quot;chapter&quot;:3,&quot;chapters&quot;:[3],&quot;q&quot;:&quot;Кого из перечисленных лиц обязан доставлять на управляемом транспортном средстве водитель согласно Правилам дорожного движения?&quot;,&quot;a&quot;:[&quot;Работников организаций здравоохранения для проезда к месту нахождения больного, жизнь которого находится под угрозой.&quot;,&quot;Лиц, нуждающихся в срочной медицинской помощи, в ближайшую организацию здравоохранения по требованию работников правоохранительных органов.&quot;,&quot;Лиц, нуждающихся в срочной медицинской помощи, в ближайшую организацию здравоохранения по требованию работников организаций здравоохранения.&quot;,&quot;Всех перечисленных.&quot;],&quot;c&quot;:3,&quot;e&quot;:&quot;&lt;p&gt;Водитель обязан доставлять на управляемом транспортном средстве работников организаций здравоохранения для проезда к месту нахождения больного, жизнь которого находится под угрозой, а также доставлять на управляемом транспортном средстве лиц, нуждающихся в срочной медицинской помощи, в ближайшую организацию здравоохранения по требованию работников правоохранительных органов и организаций здравоохранения.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100302602,&quot;group&quot;:1003026,&quot;t&quot;:2,&quot;chapter&quot;:3,&quot;chapters&quot;:[3],&quot;q&quot;:&quot;Кого из перечисленных лиц обязан доставлять на управляемом транспортном средстве водитель согласно Правилам дорожного движения?&quot;,&quot;a&quot;:[&quot;Работников Министерства по чрезвычайным ситуациям для проезда к месту стихийного бедствия.&quot;,&quot;Работников правоохранительных органов для проезда к месту нахождения больного, жизнь которого находится под угрозой.&quot;,&quot;Работников организаций здравоохранения для проезда к месту нахождения больного, жизнь которого находится под угрозой.&quot;],&quot;c&quot;:2,&quot;e&quot;:&quot;&lt;p&gt;Водитель обязан доставлять на управляемом транспортном средстве для проезда к месту нахождения больного, жизнь которого находится под угрозой только работников организаций здравоохранения.&lt;/p&gt;\r\n&lt;p&gt;Работников Министерства по чрезвычайным ситуациям для проезда к месту стихийного бедствия водитель доставлять не обязан.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100302603,&quot;group&quot;:1003026,&quot;t&quot;:2,&quot;chapter&quot;:3,&quot;chapters&quot;:[3],&quot;q&quot;:&quot;Кого из перечисленных лиц обязан доставлять на управляемом транспортном средстве водитель согласно Правилам дорожного движения?&quot;,&quot;a&quot;:[&quot;Должностных лиц Министерства обороны к месту несения службы для выполнения неотложных служебных обязанностей.&quot;,&quot;Лиц, нуждающихся в срочной медицинской помощи, в ближайшую организацию здравоохранения по требованию работников правоохранительных органов.&quot;,&quot;Работников организаций здравоохранения для проезда к месту нахождения больного, жизни которого не угрожает опасность, для выполнения плановых процедур по оказанию медицинской помощи.&quot;],&quot;c&quot;:1,&quot;e&quot;:&quot;&lt;p&gt;Водитель обязан доставлять на управляемом транспортном средстве для проезда к месту нахождения больного, жизнь которого находится под угрозой работников организаций здравоохранения.&lt;/p&gt;\r\n&lt;p&gt;Доставка должностных лиц в иных перечисленных случаях в обязанности водителя не входит.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100302841,&quot;group&quot;:1003028,&quot;t&quot;:2,&quot;chapter&quot;:3,&quot;chapters&quot;:[3],&quot;q&quot;:&quot;Кто из велосипедистов в показанной ситуации нарушает Правила дорожного движения, управляя велосипедом на тротуаре одной рукой?&quot;,&quot;a&quot;:[&quot;Только велосипедист, управляющий велосипедом левой рукой.&quot;,&quot;Только велосипедист, управляющий велосипедом правой рукой.&quot;,&quot;Оба велосипедиста нарушают.&quot;,&quot;Оба велосипедиста не нарушают.&quot;],&quot;c&quot;:2,&quot;e&quot;:&quot;&lt;p&gt;Водителю запрещается двигаться на мотоцикле, мопеде, велосипеде на одном колесе, а также двигаться на мотоцикле, мопеде, велосипеде, не держась за руль обеими руками, за исключением случаев подачи сигнала рукой, или не держа ноги на педалях (подножках).&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100302841.jpg&quot;,&quot;sourceImage&quot;:&quot;3.28.41.jpg&quot;},{&quot;id&quot;:100303001,&quot;group&quot;:1003030,&quot;t&quot;:2,&quot;chapter&quot;:3,&quot;chapters&quot;:[3],&quot;q&quot;:&quot;Разрешается ли обучать управлению механическим транспортным средством в индивидуальном порядке на дорогах общего пользования?&quot;,&quot;a&quot;:[&quot;Разрешается только при наличии у обучающего водительского стажа не менее двух лет.&quot;,&quot;Разрешается только при наличии у обучающего водительского удостоверения соответствующей категории.&quot;,&quot;Разрешается при выполнении обоих условий.&quot;,&quot;Запрещается.&quot;],&quot;c&quot;:3,&quot;e&quot;:&quot;&lt;p&gt;Обучение управлению механическим транспортным средством в индивидуальном порядке разрешается только на площадках или автодромах, закрытых для дорожного движения.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100303002,&quot;group&quot;:1003030,&quot;t&quot;:2,&quot;chapter&quot;:3,&quot;chapters&quot;:[3],&quot;q&quot;:&quot;Разрешается ли обучать управлению механическим транспортным средством в индивидуальном порядке?&quot;,&quot;a&quot;:[&quot;Разрешается только на площадках или автодромах, закрытых для дорожного движения.&quot;,&quot;Разрешается только при наличии у обучающего водительского удостоверения и водительского стажа не менее двух лет.&quot;,&quot;Разрешается только при выполнении обоих условий.&quot;,&quot;Запрещается.&quot;],&quot;c&quot;:2,&quot;e&quot;:&quot;&lt;p&gt;Обучение управлению механическим транспортным средством в индивидуальном порядке разрешается только на площадках или автодромах, закрытых для дорожного движения, при наличии у обучающего водительского удостоверения и водительского стажа не менее двух лет.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100303003,&quot;group&quot;:1003030,&quot;t&quot;:2,&quot;chapter&quot;:3,&quot;chapters&quot;:[3],&quot;q&quot;:&quot;Разрешается ли обучать управлению механическим транспортным средством в индивидуальном порядке на дорогах общего пользования?&quot;,&quot;a&quot;:[&quot;Разрешается в случае дополнительного оборудования автомобиля педалями привода сцепления и тормоза для обучающего.&quot;,&quot;Разрешается в случае дополнительного оборудования автомобиля необходимым количеством зеркал заднего вида для обучающего.&quot;,&quot;Разрешается только при выполнении обоих условий.&quot;,&quot;Запрещается.&quot;],&quot;c&quot;:3,&quot;e&quot;:&quot;&lt;p&gt;Обучение управлению механическим транспортным средством в индивидуальном порядке разрешается только на площадках или автодромах, закрытых для дорожного движения.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100303101,&quot;group&quot;:1003031,&quot;t&quot;:2,&quot;chapter&quot;:3,&quot;chapters&quot;:[3],&quot;q&quot;:&quot;Разрешается ли обучать управлению механическим транспортным средством в индивидуальном порядке на дорогах общего пользования?&quot;,&quot;a&quot;:[&quot;Разрешается при достижении обучаемым необходимого возраста.&quot;,&quot;Разрешается при наличии у обучаемого необходимых знаний Правил дорожного движения.&quot;,&quot;Разрешается при наличии у обучаемого необходимых навыков управления, полученных при занятиях на закрытых для дорожного движения площадке или автодроме.&quot;,&quot;Разрешается только при выполнении всех перечисленных условий.&quot;,&quot;Запрещается.&quot;],&quot;c&quot;:4,&quot;e&quot;:&quot;&lt;p&gt;Обучение управлению механическим транспортным средством в индивидуальном порядке разрешается только на площадках или автодромах, закрытых для дорожного движения.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100303102,&quot;group&quot;:1003031,&quot;t&quot;:2,&quot;chapter&quot;:3,&quot;chapters&quot;:[3],&quot;q&quot;:&quot;Разрешается ли обучать управлению механическим транспортным средством в индивидуальном порядке при отсутствии у обучающего водительского удостоверения?&quot;,&quot;a&quot;:[&quot;Разрешается только на площадках или автодромах, закрытых для дорожного движения.&quot;,&quot;Разрешается только при наличии у обучающего водительского стажа не менее двух лет.&quot;,&quot;Разрешается только при выполнении обоих условий.&quot;,&quot;Запрещается.&quot;],&quot;c&quot;:3,&quot;e&quot;:&quot;&lt;p&gt;Обучение управлению механическим транспортным средством в индивидуальном порядке разрешается только при наличии у обучающего водительского удостоверения и водительского стажа не менее двух лет.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100303103,&quot;group&quot;:1003031,&quot;t&quot;:2,&quot;chapter&quot;:3,&quot;chapters&quot;:[3],&quot;q&quot;:&quot;Разрешается ли обучать управлению механическим транспортным средством в индивидуальном порядке при наличии у обучающего водительского стажа менее двух лет?&quot;,&quot;a&quot;:[&quot;Разрешается только при наличии у обучающего при себе водительского удостоверения.&quot;,&quot;Разрешается только на площадках или автодромах, закрытых для дорожного движения.&quot;,&quot;Разрешается только при выполнении обоих условий.&quot;,&quot;Запрещается.&quot;],&quot;c&quot;:3,&quot;e&quot;:&quot;&lt;p&gt;Обучение управлению механическим транспортным средством в индивидуальном порядке разрешается только при наличии у обучающего водительского удостоверения и водительского стажа не менее двух лет.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100303201,&quot;group&quot;:1003032,&quot;t&quot;:2,&quot;chapter&quot;:3,&quot;chapters&quot;:[3],&quot;q&quot;:&quot;Разрешается ли обучать управлению механическим транспортным средством в индивидуальном порядке на дорогах общего пользования?&quot;,&quot;a&quot;:[&quot;Разрешается только по дорогам с неинтенсивным движением вне населённых пунктов.&quot;,&quot;Разрешается, кроме участков улиц и дорог, где Министерством внутренних дел запрещено обучение управлению механическими транспортными средствами.&quot;,&quot;Запрещается.&quot;],&quot;c&quot;:2,&quot;e&quot;:&quot;&lt;p&gt;Обучение управлению механическим транспортным средством в индивидуальном порядке разрешается только на площадках или автодромах, закрытых для дорожного движения.&lt;/p&gt;\r\n&lt;p&gt;Обучение управлению механическим транспортным средством в индивидуальном порядке на дорогах общего пользования запрещено.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100303232,&quot;group&quot;:1003032,&quot;t&quot;:2,&quot;chapter&quot;:3,&quot;chapters&quot;:[3],&quot;q&quot;:&quot;Разрешается ли обучать управлению механическим транспортным средством в индивидуальном порядке?&quot;,&quot;a&quot;:[&quot;Разрешается только по дорогам с неинтенсивным движением вне населённых пунктов.&quot;,&quot;Разрешается только на участках улиц и дорог, где Министерством внутренних дел не запрещено обучение управлению механическими транспортными средствами.&quot;,&quot;Разрешается только на площадках или автодромах, закрытых для дорожного движения, при наличии у обучающего водительского удостоверения и водительского стажа не менее двух лет.&quot;,&quot;Запрещается.&quot;],&quot;c&quot;:2,&quot;e&quot;:&quot;&lt;p&gt;Обучение управлению механическим транспортным средством в индивидуальном порядке разрешается только на площадках или автодромах, закрытых для дорожного движения.&lt;/p&gt;\r\n&lt;p&gt;При этом у обучающего при себе должно быть водительское удостоверение соответствующей категории и водительский стаж должен составлять не менее двух лет.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100303501,&quot;group&quot;:1003035,&quot;t&quot;:2,&quot;chapter&quot;:3,&quot;chapters&quot;:[3],&quot;q&quot;:&quot;Разрешено ли управлять транспортным средством, если водитель находится в болезненном состоянии, ставящем под угрозу безопасность дорожного движения?&quot;,&quot;a&quot;:[&quot;Разрешено под воздействием лекарственных средств, повышающих внимание и быстроту реакции.&quot;,&quot;Разрешено на незначительные расстояния при наличии пассажира, контролирующего состояние водителя.&quot;,&quot;Запрещено.&quot;],&quot;c&quot;:2,&quot;e&quot;:&quot;&lt;p&gt;Категорически запрещается управлять транспортным средством, находясь в болезненном состоянии, ставящем под угрозу безопасность дорожного движения.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100303502,&quot;group&quot;:1003035,&quot;t&quot;:2,&quot;chapter&quot;:3,&quot;chapters&quot;:[3],&quot;q&quot;:&quot;Разрешено ли управлять транспортным средством, если водитель находится в болезненном состоянии, ставящем под угрозу безопасность дорожного движения?&quot;,&quot;a&quot;:[&quot;Разрешено при следовании в ближайшую организацию здравоохранения для получения срочной медицинской помощи.&quot;,&quot;Разрешено водителю транспортного средства оперативного назначения для выполнения неотложных служебных обязанностей, связанных с преследованием лиц, подозреваемых в совершении преступлений.&quot;,&quot;Запрещено.&quot;],&quot;c&quot;:2,&quot;e&quot;:&quot;&lt;p&gt;Категорически запрещается управлять транспортным средством, находясь в болезненном состоянии, ставящем под угрозу безопасность дорожного движения.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100303601,&quot;group&quot;:1003036,&quot;t&quot;:2,&quot;chapter&quot;:3,&quot;chapters&quot;:[3],&quot;q&quot;:&quot;В каком случае водителю, находящемуся под воздействием лекарственных препаратов, запрещено управлять транспортным средством?&quot;,&quot;a&quot;:[&quot;Если под воздействием лекарственных препаратов у него снижены внимание и быстрота реакции.&quot;,&quot;Если под воздействием лекарственных препаратов у него повышены внимание и быстрота реакции.&quot;,&quot;Если под воздействием лекарственных препаратов у него внимание и быстрота реакции не изменились.&quot;,&quot;Запрещено в любом случае.&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;Большинство лекарственных препаратов не влияют на возможности человека по управлению транспортным средством.&lt;/p&gt;\r\n&lt;p&gt;Запрещается управлять транспортным средством только в том случае, если лекарственные препараты способствуют снижению внимания и ухудшают реакцию. Как правило, это обезболивающие и успокоительные средства.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100303602,&quot;group&quot;:1003036,&quot;t&quot;:2,&quot;chapter&quot;:3,&quot;chapters&quot;:[3],&quot;q&quot;:&quot;Разрешено ли управлять транспортным средством, если водитель находится под воздействием лекарственных средств, снижающих внимание и быстроту реакции?&quot;,&quot;a&quot;:[&quot;Разрешено при доставке скоропортящихся грузов.&quot;,&quot;Разрешено при следовании в ближайшую организацию здравоохранения для получения срочной медицинской помощи.&quot;,&quot;Запрещено.&quot;],&quot;c&quot;:2,&quot;e&quot;:&quot;&lt;p&gt;Запрещается управлять транспортным средством только в случае, если лекарственные препараты способствуют снижению внимания и ухудшают реакцию. Как правило, это обезболивающие и успокоительные средства.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100303603,&quot;group&quot;:1003036,&quot;t&quot;:2,&quot;chapter&quot;:3,&quot;chapters&quot;:[3],&quot;q&quot;:&quot;Разрешено ли водителю управлять транспортным средством в состоянии утомления, ставящем под угрозу безопасность дорожного движения?&quot;,&quot;a&quot;:[&quot;Запрещено.&quot;,&quot;Разрешено при наличии пассажира на переднем сиденье.&quot;,&quot;Разрешено при движении после окончания рабочей смены к месту стоянки.&quot;,&quot;Разрешено после употребления препаратов, повышающих внимание и быстроту реакции.&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;Запрещается управлять транспортным средством в утомлённом состоянии, так как в таком состоянии у водителя снижается внимание и быстрота реакции, ухудшается зрение, водитель может уснуть при управлении автомобилем.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100303801,&quot;group&quot;:1003038,&quot;t&quot;:2,&quot;chapter&quot;:3,&quot;chapters&quot;:[3],&quot;q&quot;:&quot;Разрешено ли участвовать в дорожном движении на транспортном средстве с загрязнениями (наслоениями), ограничивающими обзорность дороги?&quot;,&quot;a&quot;:[&quot;Разрешено при загрязнении стёкол вне зоны, очищаемой стеклоочистителями.&quot;,&quot;Разрешено при загрязнении заднего стекла при наличии наружных боковых зеркал заднего вида.&quot;,&quot;Разрешено при выполнении обоих условий.&quot;,&quot;Запрещено.&quot;],&quot;c&quot;:3,&quot;e&quot;:&quot;&lt;p&gt;Запрещается управлять транспортным средством, у которого загрязнение стёкол ограничивает обзорность дороги.&lt;/p&gt;\r\n&lt;p&gt;В случае сложных погодных условий необходимо периодически очищать от загрязнений стёкла и внешние световые приборы, в том числе площадь стёкол, находящуюся вне зоны, очищаемой стеклоочистителями.&lt;/p&gt;\r\n&lt;p&gt;То же самое касается очистки стёкол от снега и инея, замерзания стёкол при движении (как правило, задних боковых) в зимнее время.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100303802,&quot;group&quot;:1003038,&quot;t&quot;:2,&quot;chapter&quot;:3,&quot;chapters&quot;:[3],&quot;q&quot;:&quot;Водителю запрещается участие в дорожном движении, если максимальное расстояние, на котором невозможно различать днём в ясную погоду информацию на регистрационном знаке из-за его загрязнения, составляет:&quot;,&quot;a&quot;:[&quot;40 метров.&quot;,&quot;50 метров.&quot;,&quot;75 метров.&quot;,&quot;100 метров.&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;Водителю запрещается участвовать в дорожном движении на транспортном средстве с загрязнениями (наслоениями), ограничивающими обзорность дороги и не позволяющими различать днём в ясную погоду информацию на регистрационном знаке (временном номерном знаке) с расстояния 40 метров и менее.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100303802.jpg&quot;,&quot;sourceImage&quot;:&quot;3.38.2.jpg&quot;},{&quot;id&quot;:100303803,&quot;group&quot;:1003038,&quot;t&quot;:2,&quot;chapter&quot;:3,&quot;chapters&quot;:[3],&quot;q&quot;:&quot;Разрешается ли водителю участвовать в дорожном движении на транспортном средстве с загрязнениями (наслоениями), не позволяющими различать днём в ясную погоду информацию на регистрационном знаке с расстояния 40 метров и менее?&quot;,&quot;a&quot;:[&quot;Разрешается при возможности видеть информацию на втором регистрационном знаке.&quot;,&quot;Разрешается при дублировании информации, размещённой на регистрационном знаке, на заднем борту грузового автомобиля или на задней части кузова автобуса.&quot;,&quot;Запрещается.&quot;],&quot;c&quot;:2,&quot;e&quot;:&quot;&lt;p&gt;Водителю запрещается участвовать в дорожном движении на транспортном средстве с загрязнениями (наслоениями), ограничивающими обзорность дороги и не позволяющими различать днём в ясную погоду информацию на регистрационном знаке (временном номерном знаке) с расстояния 40 метров и менее даже при наличии дублирования информации на заднем борту (задней стороне кузова).&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100303803.jpg&quot;,&quot;sourceImage&quot;:&quot;3.38.3.jpg&quot;},{&quot;id&quot;:100303861,&quot;group&quot;:1003038,&quot;t&quot;:2,&quot;chapter&quot;:3,&quot;chapters&quot;:[3],&quot;q&quot;:&quot;Водителю запрещается участвовать в дорожном движении на транспортном средстве с загрязнениями (наслоениями), не позволяющими различать днём в ясную погоду информацию на регистрационном знаке (временном номерном знаке) с расстояния:&quot;,&quot;a&quot;:[&quot;40 метров и менее.&quot;,&quot;50 метров и менее.&quot;,&quot;100 метров и менее.&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;Водителю запрещается участвовать в дорожном движении на транспортном средстве с загрязнениями (наслоениями), не позволяющими различать днём в ясную погоду информацию на регистрационном знаке (временном номерном знаке) с расстояния 40 метров и менее.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100303861.jpg&quot;,&quot;sourceImage&quot;:&quot;3.38.61.jpg&quot;},{&quot;id&quot;:100303902,&quot;group&quot;:1003039,&quot;t&quot;:2,&quot;chapter&quot;:3,&quot;chapters&quot;:[3],&quot;q&quot;:&quot;Разрешается ли водителю пользоваться во время движения транспортного средства мобильным телефоном?&quot;,&quot;a&quot;:[&quot;Разрешается только для отправки коротких текстовых сообщений.&quot;,&quot;Разрешается только если для этого нет необходимости держать телефон в руке либо воздействовать на него рукой.&quot;,&quot;Запрещается в любом случае.&quot;],&quot;c&quot;:1,&quot;e&quot;:&quot;&lt;p&gt;Водителю запрещается пользоваться во время движения транспортного средства аппаратом радио- и телефонной связи, если для этого необходимо держать их в руке либо воздействовать на них рукой.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100303903,&quot;group&quot;:1003039,&quot;t&quot;:2,&quot;chapter&quot;:3,&quot;chapters&quot;:[3],&quot;q&quot;:&quot;Разрешается ли водителю пользоваться во время движения транспортного средства мобильным телефоном?&quot;,&quot;a&quot;:[&quot;Разрешается для вызова экстренных служб.&quot;,&quot;Разрешается только если для этого нет необходимости держать телефон в руке либо воздействовать на него рукой.&quot;,&quot;Запрещается в любом случае.&quot;,&quot;Разрешается в любом случае.&quot;],&quot;c&quot;:1,&quot;e&quot;:&quot;&lt;p&gt;Водителю запрещается пользоваться во время движения транспортного средства аппаратом радио- и телефонной связи, если для этого необходимо держать их в руке либо воздействовать на них рукой.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100304001,&quot;group&quot;:1003040,&quot;t&quot;:2,&quot;chapter&quot;:3,&quot;chapters&quot;:[3],&quot;q&quot;:&quot;Что запрещается водителю?&quot;,&quot;a&quot;:[&quot;Управлять транспортным средством под воздействием лекарственных средств, повышающих внимание и быстроту реакции.&quot;,&quot;Двигаться на транспортном средстве с ошипованными шинами по дороге общего пользования с усовершенствованным покрытием.&quot;,&quot;Пользоваться во время движения аппаратом радио- и телефонной связи, если при этом не возникнет необходимости держать аппарат радио- и телефонной связи в руке либо воздействовать на него рукой.&quot;,&quot;Участвовать в дорожном движении на транспортном средстве с загрязнениями, не позволяющими различать днём в ясную погоду информацию на регистрационном знаке (временном номерном знаке) с расстояния 40 метров и менее.&quot;,&quot;Всё перечисленное.&quot;],&quot;c&quot;:3,&quot;e&quot;:&quot;&lt;p&gt;Водителю разрешается управлять транспортным средством под воздействием лекарственных препаратов, не снижающих внимание и не ухудшающих реакцию, двигаться по дороге на транспортном средстве с ошипованными шинами, особенно в зимнее время при наличии гололедных явлений, пользоваться во время движения телефонной и радиосвязью, если при этом не возникнет необходимости держать аппарат радио- и телефонной связи в руке либо воздействовать на него рукой.&lt;/p&gt;\r\n&lt;p&gt;Водителю запрещается управлять транспортным средством, у которого загрязнение регистрационного знака (временного номерного знака) не позволяет видеть информацию с расстояния 40 метров и менее.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100304002,&quot;group&quot;:1003040,&quot;t&quot;:2,&quot;chapter&quot;:3,&quot;chapters&quot;:[3],&quot;q&quot;:&quot;Что запрещается водителю?&quot;,&quot;a&quot;:[&quot;Управлять транспортным средством под воздействием лекарственных средств, снижающих внимание и быстроту реакции.&quot;,&quot;Двигаться на транспортном средстве с металлическими шипами (кроме ошипованных шин) по дороге общего пользования с усовершенствованным покрытием.&quot;,&quot;Участвовать в дорожном движении на транспортном средстве с загрязнениями, не позволяющими различать днём в ясную погоду информацию на регистрационном знаке (временном номерном знаке) с расстояния 40 метров и менее.&quot;,&quot;Пользоваться во время движения аппаратом радио- и телефонной связи, если для этого необходимо держать его в руке либо воздействовать на него рукой.&quot;,&quot;Всё перечисленное.&quot;],&quot;c&quot;:4,&quot;e&quot;:&quot;&lt;p&gt;Все перечисленные действия водителю запрещены, так как могут повлиять на безопасность дорожного движения, а регистрационные знаки (временные номерные знаки) должны быть чистыми и читаться днём в ясную погоду с расстояния не менее 40 метров.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100304003,&quot;group&quot;:1003040,&quot;t&quot;:2,&quot;chapter&quot;:3,&quot;chapters&quot;:[3],&quot;q&quot;:&quot;В чём должен убедиться водитель, передавая управление транспортным средством лицу, имеющему при себе водительское удостоверение соответствующей категории?&quot;,&quot;a&quot;:[&quot;В том, что это лицо не находится в утомлённом состоянии.&quot;,&quot;В том, что это лицо не находится в состоянии алкогольного опьянения.&quot;,&quot;В том, что это лицо не находится под воздействием лекарственных препаратов, снижающих внимание и быстроту реакции.&quot;,&quot;Обязан убедиться во всём вышеперечисленном.&quot;],&quot;c&quot;:1,&quot;e&quot;:&quot;&lt;p&gt;Водитель не всегда может безошибочно определить, находится ли другое лицо в утомлённом состоянии или под воздействием тех или иных лекарственных препаратов, но по определённым признакам можно безошибочно определить, что это лицо находится в состоянии алкогольного опьянения.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100304301,&quot;group&quot;:1003043,&quot;t&quot;:2,&quot;chapter&quot;:3,&quot;chapters&quot;:[3],&quot;q&quot;:&quot;Какие документы водитель механического транспортного средства обязан иметь при себе и передавать для проверки сотрудникам ГАИ?&quot;,&quot;a&quot;:[&quot;Акт освидетельствования баллонов на газобаллонных транспортных средствах.&quot;,&quot;Акт выдачи механического транспортного средства владельцу после его переоборудования для работы на сжатом (сжиженном) газе.&quot;,&quot;Свидетельство о регистрации (технический паспорт, технический талон) механического транспортного средства.&quot;,&quot;Все перечисленные документы.&quot;],&quot;c&quot;:2,&quot;e&quot;:&quot;&lt;p&gt;Водитель не обязан иметь при себе и передавать для проверки сотрудникам ГАИ акты освидетельствования газовых баллонов и выдачи механического транспортного средства владельцу после его переоборудования для работы на сжатом (сжиженном) газе на газобаллонных транспортных средствах.&lt;/p&gt;\r\n&lt;p&gt;К перечню документов, которые водитель обязан иметь при себе и передавать для проверки сотрудникам ГАИ, относится свидетельство о регистрации (технический паспорт, технический талон) механического транспортного средства, прицепа (прицепов) к нему, а в отношении незарегистрированного транспортного средства — документ, подтверждающий законность его приобретения.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100304332,&quot;group&quot;:1003043,&quot;t&quot;:2,&quot;chapter&quot;:3,&quot;chapters&quot;:[3],&quot;q&quot;:&quot;Какие документы водитель легкового автомобиля обязан иметь при себе и передавать для проверки сотрудникам ГАИ?&quot;,&quot;a&quot;:[&quot;Водительское удостоверение либо биометрический документ, удостоверяющий личность.&quot;,&quot;Документ, подтверждающий заключение договора обязательного страхования гражданской ответственности владельца транспортного средства, за исключением случаев заключения договора страхования в электронном виде.&quot;,&quot;Документы, подтверждающие правомерность установки опознавательного знака «Инвалид» при его наличии на транспортном средстве (за исключением иностранных граждан и лиц без гражданства).&quot;,&quot;Свидетельство о регистрации (технический паспорт, технический талон) механического транспортного средства, прицепа (прицепов) к нему, а в отношении незарегистрированного транспортного средства - документ, подтверждающий законность его приобретения.&quot;,&quot;Все перечисленные документы.&quot;],&quot;c&quot;:4,&quot;e&quot;:&quot;&lt;p&gt;Водитель легкового автомобиля обязан иметь при себе и передавать для проверки сотрудникам ГАИ все перечисленные документы.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100304501,&quot;group&quot;:1003045,&quot;t&quot;:2,&quot;chapter&quot;:3,&quot;chapters&quot;:[3],&quot;q&quot;:&quot;Кому из перечисленных должностных лиц водитель обязан передавать для проверки свидетельство о регистрации механического транспортного средства?&quot;,&quot;a&quot;:[&quot;Сотруднику ГАИ.&quot;,&quot;Сотруднику Военной автомобильной инспекции.&quot;,&quot;Государственному инспектору Министерства по налогам и сборам.&quot;,&quot;Всем перечисленным лицам.&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;Водитель обязан иметь при себе и передавать для проверки сотрудникам ГАИ свидетельство о регистрации механического транспортного средства (техпаспорт).&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100304502,&quot;group&quot;:1003045,&quot;t&quot;:2,&quot;chapter&quot;:3,&quot;chapters&quot;:[3],&quot;q&quot;:&quot;Разрешается ли водителю механического транспортного средства не иметь при себе документ, подтверждающий заключение договора обязательного страхования гражданской ответственности владельца транспортного средства?&quot;,&quot;a&quot;:[&quot;Разрешается, если водитель не является владельцем транспортного средства.&quot;,&quot;Разрешается, если договор внутреннего страхования заключён в электронном виде.&quot;,&quot;Разрешается до десяти суток с момента государственной регистрации транспортного средства.&quot;],&quot;c&quot;:1,&quot;e&quot;:&quot;&lt;p&gt;Водитель не обязан иметь при себе договор обязательного страхования гражданской ответственности лишь в случае, если договор страхования заключён в электронном виде.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100400101,&quot;group&quot;:1004001,&quot;t&quot;:3,&quot;chapter&quot;:4,&quot;chapters&quot;:[4],&quot;q&quot;:&quot;На каком пешеходном переходе пешеход имеет преимущество перед транспортными средствами?&quot;,&quot;a&quot;:[&quot;На нерегулируемом пешеходном переходе.&quot;,&quot;На регулируемом пешеходном переходе при разрешающем сигнале регулировщика или светофора.&quot;,&quot;На всех перечисленных пешеходных переходах.&quot;],&quot;c&quot;:2,&quot;e&quot;:&quot;&lt;p&gt;Пешеход имеет преимущество перед транспортными средствами при переходе нерегулируемого пешеходного перехода.&lt;/p&gt;\r\n&lt;p&gt;В случае перехода дороги на разрешающий сигнал регулировщика или светофора на регулируемом пешеходном переходе пешеход также имеет преимущество при одновременном праве на движение с транспортными средствами.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100400102,&quot;group&quot;:1004001,&quot;t&quot;:3,&quot;chapter&quot;:4,&quot;chapters&quot;:[4],&quot;q&quot;:&quot;Кто имеет преимущество на регулируемом пешеходном переходе при разрешающем сигнале регулировщика?&quot;,&quot;a&quot;:[&quot;Пешеход.&quot;,&quot;Водитель транспортного средства.&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;При разрешающем сигнале регулировщика для водителя и пешехода, пешеход имеет преимущественное право на движение в намеченном направлении, а водитель автомобиля обязан предоставить ему преимущество.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100400102.jpg&quot;,&quot;sourceImage&quot;:&quot;4.1.2.jpg&quot;},{&quot;id&quot;:100400103,&quot;group&quot;:1004001,&quot;t&quot;:3,&quot;chapter&quot;:4,&quot;chapters&quot;:[4],&quot;q&quot;:&quot;Кто имеет преимущество на регулируемом пешеходном переходе при разрешающем сигнале светофора?&quot;,&quot;a&quot;:[&quot;Пешеход.&quot;,&quot;Водитель транспортного средства.&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;При разрешающем сигнале светофора для водителя и пешехода, пешеход имеет преимущественное право на движение в намеченном направлении, а водитель автомобиля обязан предоставить ему преимущество.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100400103.jpg&quot;,&quot;sourceImage&quot;:&quot;4.1.3.jpg&quot;},{&quot;id&quot;:100400104,&quot;group&quot;:1004001,&quot;t&quot;:3,&quot;chapter&quot;:4,&quot;chapters&quot;:[4],&quot;q&quot;:&quot;Имеет ли право пешеход на преимущественное пересечение проезжей части дороги в показанной ситуации?&quot;,&quot;a&quot;:[&quot;Да, имеет.&quot;,&quot;Нет, не имеет.&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;В показанной ситуации водитель автомобиля обязан предоставить преимущество пешеходу. На нерегулируемом пешеходном переходе пешеход имеет право на преимущественное пересечение проезжей части дороги.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100400104.jpg&quot;,&quot;sourceImage&quot;:&quot;4.1.4.jpg&quot;},{&quot;id&quot;:100400202,&quot;group&quot;:1004002,&quot;t&quot;:3,&quot;chapter&quot;:4,&quot;chapters&quot;:[4],&quot;q&quot;:&quot;В каком случае пешеход имеет право двигаться по краю проезжей части дороги?&quot;,&quot;a&quot;:[&quot;Только при отсутствии тротуаров и пешеходных дорожек или невозможности движения по ним.&quot;,&quot;При отсутствии тротуаров, пешеходных, велосипедных дорожек и обочин или невозможности движения по ним.&quot;,&quot;В любом случае, если пешеход ведёт велосипед или мопед, обозначенный габаритными огнями, сигнальными фонарями или световозвращателями.&quot;],&quot;c&quot;:1,&quot;e&quot;:&quot;&lt;p&gt;Пешеход может двигаться по краю проезжей части дороги (навстречу движению) только при отсутствии тротуаров, пешеходных, велосипедных дорожек и обочин или при невозможности движения по ним.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100400231,&quot;group&quot;:1004002,&quot;t&quot;:3,&quot;chapter&quot;:4,&quot;chapters&quot;:[4],&quot;q&quot;:&quot;В каком случае пешеход имеет право двигаться по обочине?&quot;,&quot;a&quot;:[&quot;Только при отсутствии тротуаров и пешеходных дорожек.&quot;,&quot;Только при отсутствии тротуаров, пешеходных и велосипедных дорожек.&quot;,&quot;В любом случае может двигаться по левой обочине навстречу движению.&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;Пешеход может двигаться по обочине дороги или велосипедной дорожке только при отсутствии тротуаров и пешеходных дорожек с обеих сторон дороги.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100400302,&quot;group&quot;:1004003,&quot;t&quot;:3,&quot;chapter&quot;:4,&quot;chapters&quot;:[4],&quot;q&quot;:&quot;Как должен обозначить себя пешеход при движении по тротуару в тёмное время суток?&quot;,&quot;a&quot;:[&quot;Сигнальными фонарями.&quot;,&quot;Световозвращающим элементом (элементами).&quot;,&quot;Пешеход должен идти с включённым фонарём, освещая себе дорогу.&quot;,&quot;Пешеход не обязан обозначать себя при движении в тёмное время суток по тротуару.&quot;],&quot;c&quot;:3,&quot;e&quot;:&quot;&lt;p&gt;При движении по тротуару в тёмное время суток пешеход &lt;strong&gt;не обязан обозначать себя световозвращающим элементом&lt;/strong&gt; или элементами, но при этом он, возможно, будет пересекать проезжую часть дороги на перекрёстках и по пешеходным переходам, а значит &lt;strong&gt;обозначить себя световозвращающим элементом — будет не лишним для обеспечения личной безопасности&lt;/strong&gt;.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100400401,&quot;group&quot;:1004004,&quot;t&quot;:3,&quot;chapter&quot;:4,&quot;chapters&quot;:[4],&quot;q&quot;:&quot;По какой траектории пешеходу разрешается перейти проезжую часть дороги, убедившись, что выход на проезжую часть дороги безопасен, если в пределах видимости отсутствуют пешеходные переходы?&quot;,&quot;a&quot;:[&quot;Только по траектории «А».&quot;,&quot;Только по траектории «Б».&quot;,&quot;Как по траектории «А», так и по траектории «Б».&quot;,&quot;Пешеход в показанной ситуации не имеет права переходить проезжую часть дороги.&quot;],&quot;c&quot;:2,&quot;e&quot;:&quot;&lt;p&gt;При отсутствии в пределах видимости надземных, подземных, наземных пешеходных переходов пешеходу разрешается пересекать проезжую часть дороги на перекрёстках по линии тротуаров или обочин (на показанном перекрёстке по линии тротуаров).&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100400401.jpg&quot;,&quot;sourceImage&quot;:&quot;4.4.1.jpg&quot;},{&quot;id&quot;:100400402,&quot;group&quot;:1004004,&quot;t&quot;:3,&quot;chapter&quot;:4,&quot;chapters&quot;:[4],&quot;q&quot;:&quot;По какой траектории пешеходу разрешается перейти проезжую часть дороги, убедившись, что выход на проезжую часть дороги безопасен?&quot;,&quot;a&quot;:[&quot;Только по траектории «А».&quot;,&quot;Только по траектории «Б».&quot;,&quot;Как по траектории «А», так и по траектории «Б».&quot;,&quot;Пешеход в показанной ситуации не имеет права переходить проезжую часть дороги.&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;При наличии в пределах видимости пешеходных переходов пешеходу разрешается пересекать проезжую часть только по пешеходным переходам.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100400402.jpg&quot;,&quot;sourceImage&quot;:&quot;4.4.2.jpg&quot;},{&quot;id&quot;:100400403,&quot;group&quot;:1004004,&quot;t&quot;:3,&quot;chapter&quot;:4,&quot;chapters&quot;:[4],&quot;q&quot;:&quot;По какой траектории пешеходу разрешается перейти проезжую часть дороги, убедившись, что выход на проезжую часть дороги безопасен, если в пределах видимости отсутствуют пешеходные переходы?&quot;,&quot;a&quot;:[&quot;Только по траектории «А».&quot;,&quot;Только по траектории «Б».&quot;,&quot;Как по траектории «А», так и по траектории «Б».&quot;,&quot;Пешеход в показанной ситуации не имеет права переходить проезжую часть дороги.&quot;],&quot;c&quot;:2,&quot;e&quot;:&quot;&lt;p&gt;При отсутствии в пределах видимости надземных, подземных, наземных пешеходных переходов пешеходу разрешается пересекать проезжую часть дороги на перекрёстках по линии тротуаров или обочин (на показанном перекрёстке по линии тротуаров).&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100400403.jpg&quot;,&quot;sourceImage&quot;:&quot;4.4.3.jpg&quot;},{&quot;id&quot;:100400404,&quot;group&quot;:1004004,&quot;t&quot;:3,&quot;chapter&quot;:4,&quot;chapters&quot;:[4],&quot;q&quot;:&quot;Разрешается ли пешеходу в показанной ситуации перейти проезжую часть дороги при наличии в непосредственной близости подземного пешеходного перехода?&quot;,&quot;a&quot;:[&quot;Разрешается только по подземному пешеходному переходу.&quot;,&quot;Разрешается вне подземного пешеходного перехода при отсутствии в пределах видимости приближающихся транспортных средств.&quot;,&quot;Разрешается в обоих случаях.&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;При наличии в пределах видимости надземных, подземных или наземных пешеходных переходов пешеходу разрешается пересекать проезжую часть только по ним (на показанном рисунке — по подземному пешеходному переходу).&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100400404.jpg&quot;,&quot;sourceImage&quot;:&quot;4.4.4.jpg&quot;},{&quot;id&quot;:100400441,&quot;group&quot;:1004004,&quot;t&quot;:3,&quot;chapter&quot;:4,&quot;chapters&quot;:[4],&quot;q&quot;:&quot;Пешеход обязан переходить (пересекать) проезжую часть дороги:&quot;,&quot;a&quot;:[&quot;По подземному, надземному, наземному пешеходным переходам, а при их отсутствии в пределах видимости, — на перекрёстке по линии тротуаров или обочин.&quot;,&quot;По подземному, надземному пешеходным переходам, а при их отсутствии — по наземному пешеходному переходу (при отсутствии наземного пешеходного перехода — на перекрёстке по линии тротуаров или обочин).&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;Пешеход обязан переходить (пересекать) проезжую часть дороги по подземному, надземному, наземному (убедившись в безопасности) пешеходным переходам (на выбор при имеющейся возможности), а при их отсутствии в пределах видимости, — на перекрёстке по линии тротуаров или обочин.&lt;br&gt; При пересечении проезжей части дороги вне подземного или наземного пешеходного перехода пешеходу необходимо быть особенно внимательным.&lt;/p&gt;\r\n&lt;p&gt;Согласно «Конвенции о дорожном движении» пешеходы не должны пересекать проезжую часть дороги, не приняв мер предосторожности.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100400481,&quot;group&quot;:1004004,&quot;t&quot;:3,&quot;chapter&quot;:4,&quot;chapters&quot;:[4],&quot;q&quot;:&quot;Правильно ли переходит проезжую часть дороги пешеход, указанный стрелкой?&quot;,&quot;a&quot;:[&quot;Да, правильно.&quot;,&quot;Нет, неправильно.&quot;],&quot;c&quot;:1,&quot;e&quot;:&quot;&lt;p&gt;Пешеход обязан переходить проезжую часть дороги по подземному, надземному, наземному пешеходным переходам при их наличии. В показанной ситуации пешеход переходит проезжую часть дороги не по пешеходному переходу, а по велосипедному переезду.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100400481.jpg&quot;,&quot;sourceImage&quot;:&quot;4.4.81.jpg&quot;},{&quot;id&quot;:100400482,&quot;group&quot;:1004004,&quot;t&quot;:3,&quot;chapter&quot;:4,&quot;chapters&quot;:[4],&quot;q&quot;:&quot;Правильно ли пешеходы переходят проезжую часть дороги?&quot;,&quot;a&quot;:[&quot;Правильно переходит пешеход «А».&quot;,&quot;Правильно переходит пешеход «Б».&quot;,&quot;Правильно переходят оба пешехода.&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;Пешеход обязан переходить проезжую часть дороги по подземному, надземному, наземному пешеходным переходам при их наличии. В показанной ситуации пешеход «Б» переходит проезжую часть дороги не по пешеходному переходу, а по велосипедному переезду.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100400482.jpg&quot;,&quot;sourceImage&quot;:&quot;4.4.82.jpg&quot;},{&quot;id&quot;:100400501,&quot;group&quot;:1004005,&quot;t&quot;:3,&quot;chapter&quot;:4,&quot;chapters&quot;:[4],&quot;q&quot;:&quot;Водителю какого транспортного средства пешеход не должен создавать препятствия для движения при переходе проезжей части дороги в показанной ситуации?&quot;,&quot;a&quot;:[&quot;Водителю автомобиля «А».&quot;,&quot;Водителю автомобиля «Б».&quot;,&quot;Водителям автомобилей «А» и «Б».&quot;,&quot;Пешеход имеет преимущество в показанной ситуации.&quot;],&quot;c&quot;:2,&quot;e&quot;:&quot;&lt;p&gt;При отсутствии в пределах видимости подземных, надземных, наземных пешеходных переходов и перекрёстков пешеходу разрешается пересекать проезжую часть дороги только на участке дороги, хорошо просматриваемом в обе стороны, убедившись в безопасности перехода, по кратчайшей траектории, уступив дорогу транспортным средствам.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100400501.jpg&quot;,&quot;sourceImage&quot;:&quot;4.5.1.jpg&quot;},{&quot;id&quot;:100400502,&quot;group&quot;:1004005,&quot;t&quot;:3,&quot;chapter&quot;:4,&quot;chapters&quot;:[4],&quot;q&quot;:&quot;Должен ли пешеход обозначить себя световозвращающим элементом (элементами) при пересечении проезжей части дороги вне подземного, надземного, наземного пешеходного переходов и перекрёстка в тёмное время суток?&quot;,&quot;a&quot;:[&quot;Пешеход должен обозначить себя.&quot;,&quot;Пешеходу рекомендуется обозначить себя.&quot;,&quot;Пешеход должен обозначить себя только на неосвещённых участках дороги.&quot;],&quot;c&quot;:1,&quot;e&quot;:&quot;&lt;p&gt;При пересечении проезжей части дороги вне подземного, надземного, наземного пешеходного переходов и перекрёстка в тёмное время суток пешеходу &lt;strong&gt;рекомендуется обозначить себя световозвращающим элементом&lt;/strong&gt; (элементами).&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100400601,&quot;group&quot;:1004006,&quot;t&quot;:3,&quot;chapter&quot;:4,&quot;chapters&quot;:[4],&quot;q&quot;:&quot;При переходе проезжей части дороги пешеход остановился. В каком случае он не нарушил Правила дорожного движения?&quot;,&quot;a&quot;:[&quot;Если остановился на островке безопасности.&quot;,&quot;Если остановился на линии, разделяющей попутные транспортные потоки.&quot;,&quot;Если остановился на линии, разделяющей встречные транспортные потоки.&quot;,&quot;Нарушил во всех случаях.&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;При пересечении проезжей части дороги пешеходу запрещается задерживаться и останавливаться на проезжей части дороги, за исключением остановки на островке безопасности.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100400602,&quot;group&quot;:1004006,&quot;t&quot;:3,&quot;chapter&quot;:4,&quot;chapters&quot;:[4],&quot;q&quot;:&quot;Разрешено ли в какой-либо из указанных точек пешеходу остановиться и задержаться при переходе проезжей части дороги?&quot;,&quot;a&quot;:[&quot;Разрешено в точке «А» или «В».&quot;,&quot;Разрешено только в точке «Б».&quot;,&quot;Разрешено в любой из указанных точек.&quot;,&quot;Пешеходу запрещено останавливаться и задерживаться при переходе проезжей части дороги, указанной на рисунке.&quot;],&quot;c&quot;:3,&quot;e&quot;:&quot;&lt;p&gt;При пересечении проезжей части дороги задерживаться и останавливаться на проезжей части дороги в показанной ситуации запрещено, так как на пешеходном переходе отсутствует островок безопасности.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100400602.jpg&quot;,&quot;sourceImage&quot;:&quot;4.6.2.jpg&quot;},{&quot;id&quot;:100400603,&quot;group&quot;:1004006,&quot;t&quot;:3,&quot;chapter&quot;:4,&quot;chapters&quot;:[4],&quot;q&quot;:&quot;Разрешено ли пешеходу на нерегулируемом пешеходном переходе остановиться и вернуться назад?&quot;,&quot;a&quot;:[&quot;Да, разрешено остановиться на островке безопасности и вернуться назад.&quot;,&quot;Да, разрешено остановиться, не доходя до островка безопасности, и вернуться назад.&quot;,&quot;Нет, запрещено.&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;При пересечении проезжей части дороги задерживаться и останавливаться на проезжей части дороги запрещено, кроме остановки на островке безопасности.&lt;/p&gt;\r\n&lt;p&gt;При этом следует помнить, что разворот пешехода на островке безопасности будет неожиданностью для водителей транспортных средств, и, прежде чем продолжить движение в обратном направлении, пешеход обязан убедиться в безопасности перехода проезжей части дороги.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100400603.jpg&quot;,&quot;sourceImage&quot;:&quot;4.6.3.jpg&quot;},{&quot;id&quot;:100400701,&quot;group&quot;:1004007,&quot;t&quot;:3,&quot;chapter&quot;:4,&quot;chapters&quot;:[4],&quot;q&quot;:&quot;Разрешается ли пешеходу перейти проезжую часть по траектории, показанной на рисунке, при отсутствии в пределах видимости пешеходных переходов?&quot;,&quot;a&quot;:[&quot;Да, разрешается.&quot;,&quot;Да, при условии, что дорога хорошо просматривается в обе стороны, убедившись в отсутствии приближающихся транспортных средств.&quot;,&quot;Нет, не разрешается.&quot;],&quot;c&quot;:2,&quot;e&quot;:&quot;&lt;p&gt;Пешеходу запрещается пересекать вне пешеходных переходов проезжую часть дороги с шестью полосами движения и более.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100400701.jpg&quot;,&quot;sourceImage&quot;:&quot;4.7.1.jpg&quot;},{&quot;id&quot;:100400702,&quot;group&quot;:1004007,&quot;t&quot;:3,&quot;chapter&quot;:4,&quot;chapters&quot;:[4],&quot;q&quot;:&quot;Разрешается ли пешеходу перейти проезжую часть по траектории, показанной на рисунке, при отсутствии в пределах видимости пешеходных переходов и перекрёстка?&quot;,&quot;a&quot;:[&quot;Да, разрешается.&quot;,&quot;Да, при условии, что дорога хорошо просматривается в обе стороны, убедившись в отсутствии приближающихся транспортных средств.&quot;,&quot;Нет, не разрешается.&quot;],&quot;c&quot;:2,&quot;e&quot;:&quot;&lt;p&gt;Пешеходу запрещается пересекать вне пешеходных переходов дорогу с разделительной полосой или разделительной зоной.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100400702.jpg&quot;,&quot;sourceImage&quot;:&quot;4.7.2.jpg&quot;},{&quot;id&quot;:100400703,&quot;group&quot;:1004007,&quot;t&quot;:3,&quot;chapter&quot;:4,&quot;chapters&quot;:[4],&quot;q&quot;:&quot;Разрешается ли пешеходу перейти проезжую часть по траектории, показанной на рисунке, при отсутствии в пределах видимости пешеходных переходов и перекрёстка?&quot;,&quot;a&quot;:[&quot;Да, разрешается.&quot;,&quot;Да, при условии, что дорога хорошо просматривается в обе стороны, убедившись в отсутствии приближающихся транспортных средств.&quot;,&quot;Нет, не разрешается.&quot;],&quot;c&quot;:1,&quot;e&quot;:&quot;&lt;p&gt;Пешеходу в показанной ситуации пересекать проезжую часть разрешено, если дорога хорошо просматривается в обе стороны, убедившись в отсутствии приближающихся транспортных средств.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100400703.jpg&quot;,&quot;sourceImage&quot;:&quot;4.7.3.jpg&quot;},{&quot;id&quot;:100400801,&quot;group&quot;:1004008,&quot;t&quot;:3,&quot;chapter&quot;:4,&quot;chapters&quot;:[4],&quot;q&quot;:&quot;Как должен двигаться пешеход, ведущий обозначенный световозвращателями велосипед по обочине в тёмное время суток?&quot;,&quot;a&quot;:[&quot;По ходу движения транспортных средств.&quot;,&quot;Навстречу движению транспортных средств.&quot;,&quot;По обочине любого направления движения.&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;Пешеходу, ведущему по обочине велосипед, который обозначен световозвращателями, следует идти по ходу движения транспортных средств, чтобы не вводить в заблуждение водителей этих транспортных средств.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100400802,&quot;group&quot;:1004008,&quot;t&quot;:3,&quot;chapter&quot;:4,&quot;chapters&quot;:[4],&quot;q&quot;:&quot;Как в светлое время суток должен двигаться пешеход, ведущий по обочине велосипед, обозначенный световозвращателями?&quot;,&quot;a&quot;:[&quot;По ходу движения транспортных средств.&quot;,&quot;Навстречу движению транспортных средств.&quot;,&quot;По обочине любого направления движения.&quot;],&quot;c&quot;:2,&quot;e&quot;:&quot;&lt;p&gt;Пешеходу, ведущему по обочине велосипед, который обозначен световозвращателями, в светлое время суток разрешается двигаться по обочине любого направления, но безопаснее всё же — навстречу движению.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100400803,&quot;group&quot;:1004008,&quot;t&quot;:3,&quot;chapter&quot;:4,&quot;chapters&quot;:[4],&quot;q&quot;:&quot;Как должен двигаться пешеход, ведущий велосипед по краю проезжей части дороги, обозначенный световозвращателями, в светлое время суток?&quot;,&quot;a&quot;:[&quot;По ходу движения транспортных средств.&quot;,&quot;Навстречу движению транспортных средств.&quot;,&quot;По краю проезжей части дороги любого направления движения.&quot;],&quot;c&quot;:1,&quot;e&quot;:&quot;&lt;p&gt;Пешеходу, ведущему велосипед по краю проезжей части дороги, который обозначен световозвращателями, в светлое время суток разрешается двигаться навстречу движению.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100401142,&quot;group&quot;:1004011,&quot;t&quot;:3,&quot;chapter&quot;:4,&quot;chapters&quot;:[4],&quot;q&quot;:&quot;Пешеход, передвигающийся на самокате и намеревающийся пересечь проезжую часть дороги по пешеходному переходу, обязан:&quot;,&quot;a&quot;:[&quot;Пересекать проезжую часть дороги со скоростью идущего шагом пешехода только при наличии рядом пешеходов, идущих по пешеходному переходу пешком.&quot;,&quot;Пересекать проезжую часть дороги со скоростью идущего шагом пешехода независимо от наличия на пешеходном переходе других пешеходов.&quot;],&quot;c&quot;:1,&quot;e&quot;:&quot;&lt;p&gt;Пешеход обязан при передвижении на самокате пересекать проезжую часть дороги &lt;strong&gt;со скоростью идущего шагом пешехода&lt;/strong&gt; независимо от наличия других пешеходов на пешеходном переходе.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100401143,&quot;group&quot;:1004011,&quot;t&quot;:3,&quot;chapter&quot;:4,&quot;chapters&quot;:[4],&quot;q&quot;:&quot;Пешеход, передвигающийся на спортивном инвентаре, при пересечении проезжей части дороги обязан:&quot;,&quot;a&quot;:[&quot;Убедиться, что выход (выезд) на проезжую часть дороги безопасен.&quot;,&quot;Пересекать проезжую часть дороги со скоростью идущего шагом пешехода.&quot;,&quot;Обязан соблюдать оба перечисленных требования.&quot;],&quot;c&quot;:2,&quot;e&quot;:&quot;&lt;p&gt;Пешеход обязан при передвижении на спортивном инвентаре пересекать проезжую часть дороги со скоростью идущего шагом пешехода, убедившись, что выход (выезд) на проезжую часть дороги безопасен.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100401541,&quot;group&quot;:1004015,&quot;t&quot;:3,&quot;chapter&quot;:4,&quot;chapters&quot;:[4],&quot;q&quot;:&quot;Обязан ли пешеход по требованию сотрудника ГАИ пройти в установленном порядке проверку на предмет определения состояния алкогольного опьянения?&quot;,&quot;a&quot;:[&quot;Обязан только в случае участия в дорожно-транспортном происшествии.&quot;,&quot;Обязан только в случае нарушения Правил дорожного движения.&quot;,&quot;Обязан в любом перечисленном случае.&quot;],&quot;c&quot;:2,&quot;e&quot;:&quot;&lt;p&gt;Пешеход обязан по требованию сотрудника ГАИ пройти в установленном порядке проверку (освидетельствование) на предмет определения состояния алкогольного опьянения либо состояния, вызванного потреблением наркотических средств, психотропных веществ, их аналогов, токсических или других одурманивающих веществ.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100401542,&quot;group&quot;:1004015,&quot;t&quot;:3,&quot;chapter&quot;:4,&quot;chapters&quot;:[4],&quot;q&quot;:&quot;Кто из перечисленных участников дорожного движения обязан по требованию сотрудника ГАИ пройти в установленном порядке проверку (освидетельствование) на предмет определения состояния алкогольного опьянения?&quot;,&quot;a&quot;:[&quot;Пешеход.&quot;,&quot;Велосипедист.&quot;,&quot;Водитель мопеда.&quot;,&quot;Все перечисленные.&quot;],&quot;c&quot;:3,&quot;e&quot;:&quot;&lt;p&gt;И пешеход, и водитель транспортного средства обязаны по требованию сотрудника ГАИ пройти в установленном порядке проверку (освидетельствование) на предмет определения состояния алкогольного опьянения либо состояния, вызванного потреблением наркотических средств, психотропных веществ, их аналогов, токсических или других одурманивающих веществ.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100500101,&quot;group&quot;:1005001,&quot;t&quot;:4,&quot;chapter&quot;:5,&quot;chapters&quot;:[5],&quot;q&quot;:&quot;Как должна осуществляться посадка (высадка) пассажиров?&quot;,&quot;a&quot;:[&quot;После полной остановки транспортного средства только с тротуара или обочины.&quot;,&quot;После полной остановки транспортного средства с посадочной площадки, а в случае её отсутствия — с тротуара или обочины.&quot;,&quot;После полной остановки транспортного средства с посадочной площадки, а в случае её отсутствия — с тротуара или обочины. В случае отсутствия тротуара или обочины — с проезжей части дороги при условии, что не будет создано помех движущимся транспортным средствам.&quot;],&quot;c&quot;:1,&quot;e&quot;:&quot;&lt;p&gt;Посадка (высадка) пассажиров во избежание наезда на них движущихся транспортных средств или создания аварийной ситуации должна осуществляться с посадочной площадки, а в случае её отсутствия — с тротуара или обочины.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100500102,&quot;group&quot;:1005001,&quot;t&quot;:4,&quot;chapter&quot;:5,&quot;chapters&quot;:[5],&quot;q&quot;:&quot;Разрешается ли выполнять посадку (высадку) пассажиров с проезжей части дороги?&quot;,&quot;a&quot;:[&quot;Нет, не разрешается.&quot;,&quot;Да, при отсутствии посадочной площадки, тротуара или обочины при принятии водителем мер предосторожности.&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;Посадка (высадка) пассажиров во избежание наезда на них движущихся транспортных средств или создания аварийной ситуации должна осуществляться с посадочной площадки, а в случае её отсутствия — с тротуара или обочины. В случае отсутствия обочины следует отказаться от посадки (высадки) пассажиров в данном месте.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100500103,&quot;group&quot;:1005001,&quot;t&quot;:4,&quot;chapter&quot;:5,&quot;chapters&quot;:[5],&quot;q&quot;:&quot;Разрешено ли пассажиру, сидящему на переднем сиденье, выйти из автомобиля в такой ситуации?&quot;,&quot;a&quot;:[&quot;Да, только со стороны тротуара.&quot;,&quot;Да, только убедившись в отсутствии движущихся транспортных средств.&quot;,&quot;Нет, не разрешается в любом случае.&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;Водитель красного автомобиля остановился неправильно для высадки пассажира, сидящего на переднем сиденье.&lt;/p&gt;\r\n&lt;p&gt;Так как высадка пассажиров на проезжую часть запрещена, водитель обязан выйти из автомобиля и выпустить пассажира через свою дверь, даже если для пассажира это будет связано с определёнными неудобствами.&lt;/p&gt;\r\n&lt;p&gt;Кроме того, в некоторых автомобилях есть возможность для прохода к задним сиденьям для пассажира, сидящего на переднем сиденье, и следовательно для выхода на сторону тротуара.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100500103.jpg&quot;,&quot;sourceImage&quot;:&quot;5.1.3.jpg&quot;},{&quot;id&quot;:100500164,&quot;group&quot;:1005001,&quot;t&quot;:4,&quot;chapter&quot;:5,&quot;chapters&quot;:[5],&quot;q&quot;:&quot;Разрешено ли будет пассажиру, находящемуся на переднем сиденье, выйти из автомобиля на проезжую часть дороги, если Вы остановитесь у левого тротуара?&quot;,&quot;a&quot;:[&quot;Да, разрешено, убедившись в безопасности и отсутствии приближающихся транспортных средств.&quot;,&quot;Нет, не разрешено.&quot;],&quot;c&quot;:1,&quot;e&quot;:&quot;&lt;p&gt;Не допускается высадка пассажира на проезжую часть дороги.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100500164.jpg&quot;,&quot;sourceImage&quot;:&quot;5.1.64.jpg&quot;},{&quot;id&quot;:100500201,&quot;group&quot;:1005002,&quot;t&quot;:4,&quot;chapter&quot;:5,&quot;chapters&quot;:[5],&quot;q&quot;:&quot;По какой траектории разрешено осуществить посадку в автомобиль, стоящий на противоположной стороне дороги (при отсутствии в пределах видимости надземного, подземного, наземного пешеходных переходов и перекрёстков)?&quot;,&quot;a&quot;:[&quot;Только по траектории «А».&quot;,&quot;Только по траектории «Б».&quot;,&quot;По любой из показанных траекторий.&quot;],&quot;c&quot;:1,&quot;e&quot;:&quot;&lt;p&gt;Так как посадка пассажиров с проезжей части дороги запрещена, пассажир обязан перейти безопасно для себя и остальных участников движения дорогу по траектории «Б» и осуществить посадку с тротуара.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100500201.jpg&quot;,&quot;sourceImage&quot;:&quot;5.2.1.jpg&quot;},{&quot;id&quot;:100500202,&quot;group&quot;:1005002,&quot;t&quot;:4,&quot;chapter&quot;:5,&quot;chapters&quot;:[5],&quot;q&quot;:&quot;С какой стороны пассажиру разрешено осуществлять посадку в легковой автомобиль?&quot;,&quot;a&quot;:[&quot;Только со стороны тротуара.&quot;,&quot;Со стороны тротуара и со стороны проезжей части дороги.&quot;,&quot;Со стороны тротуара и со стороны проезжей части дороги при условии, что все посадочные места в автомобиле со стороны тротуара заняты.&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;Так как посадка пассажиров с проезжей части дороги запрещена, пассажиру разрешено в показанной ситуации осуществить посадку только с тротуара.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100500202.jpg&quot;,&quot;sourceImage&quot;:&quot;5.2.2.jpg&quot;},{&quot;id&quot;:100500203,&quot;group&quot;:1005002,&quot;t&quot;:4,&quot;chapter&quot;:5,&quot;chapters&quot;:[5],&quot;q&quot;:&quot;Где разрешено ожидать трамвай при отсутствии посадочной площадки?&quot;,&quot;a&quot;:[&quot;На тротуаре.&quot;,&quot;На проезжей части.&quot;,&quot;На проезжей части или на тротуаре.&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;В показанной ситуации пешеход обязан ожидать трамвай в ожидании посадки только на тротуаре и не выходить на проезжую часть дороги до полной остановки трамвая.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100500203.jpg&quot;,&quot;sourceImage&quot;:&quot;5.2.3.jpg&quot;},{&quot;id&quot;:100500263,&quot;group&quot;:1005002,&quot;t&quot;:4,&quot;chapter&quot;:5,&quot;chapters&quot;:[5],&quot;q&quot;:&quot;Разрешено ли водителю выйти на проезжую часть дороги, чтобы, обойдя автомобиль, продолжить движение по тротуару?&quot;,&quot;a&quot;:[&quot;Да, разрешено.&quot;,&quot;Нет, не разрешено.&quot;,&quot;Разрешено, убеди
