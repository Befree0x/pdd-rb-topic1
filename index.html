quot;,&quot;a&quot;:[&quot;Одну.&quot;,&quot;Две.&quot;,&quot;Три.&quot;,&quot;Четыре.&quot;,&quot;Шесть.&quot;],&quot;c&quot;:3,&quot;e&quot;:&quot;&lt;p&gt;Показанная проезжая часть дороги имеет четыре полосы движения, обозначенные соответствующей дорожной разметкой. Крайние элементы дороги, отделённые от проезжей части дороги широкими сплошными линиями горизонтальной дорожной разметки — это обочины.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100105302.jpg&quot;,&quot;sourceImage&quot;:&quot;1.53.2.jpg&quot;},{&quot;id&quot;:100105303,&quot;group&quot;:1001053,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Сколько полос движения имеет проезжая часть дороги, изображённая на рисунке?&quot;,&quot;a&quot;:[&quot;Одну.&quot;,&quot;Три.&quot;,&quot;Четыре.&quot;,&quot;Пять.&quot;,&quot;Шесть.&quot;],&quot;c&quot;:2,&quot;e&quot;:&quot;&lt;p&gt;Показанная проезжая часть дороги имеет четыре полосы движения. Их количество и их границы определяются при отсутствии линий разметки самими водителями, исходя из габаритов транспортных средств и необходимых боковых интервалов. Трамвайный путь не является полосой движения — это отдельный элемент дороги, по которому может быть разрешено движение безрельсовых транспортных средств только в определённых случаях.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100105303.jpg&quot;,&quot;sourceImage&quot;:&quot;1.53.3.jpg&quot;},{&quot;id&quot;:100105331,&quot;group&quot;:1001053,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Как называется расстояние по ширине дороги от крайних габаритных точек транспортных средств, движущихся попутно или во встречных направлениях?&quot;,&quot;a&quot;:[&quot;Дистанция.&quot;,&quot;Боковой интервал.&quot;,&quot;Габаритная ширина.&quot;,&quot;Дорожный просвет.&quot;],&quot;c&quot;:1,&quot;e&quot;:&quot;&lt;p&gt;Показанная проезжая часть позволяет осуществлять встречное движение транспортных средств по двум полосам движения (попутная и встречная).&lt;/p&gt;\r\n&lt;p&gt;Расстояние между транспортными средствами при их встречном разъезде в показанной ситуации обеспечивает безопасные условия движения и называется боковым интервалом.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100105331.jpg&quot;,&quot;sourceImage&quot;:&quot;1.53.31.jpg&quot;},{&quot;id&quot;:100105401,&quot;group&quot;:1001054,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Что означает термин «преимущество»?&quot;,&quot;a&quot;:[&quot;Право на первоочередное движение в намеченном направлении по отношению к другим участникам дорожного движения.&quot;,&quot;Требование, означающее не возобновлять или не продолжать движение или не осуществлять какой-либо манёвр, если это может вынудить другого участника дорожного движения изменить направление или скорость движения.&quot;,&quot;Положение транспортного средства на проезжей части дороги, предназначенной для движения в данном направлении, не дающее возможности движения даже одноколейных транспортных средств соответственно правее (левее) в попутном направлении.&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;Преимуществом или приоритетом в Правилах дорожного движения считается право на первоочередное движение в намеченном направлении, если пути движения участников дорожного движения пересекаются.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100105402,&quot;group&quot;:1001054,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Выберите из перечисленных вариантов наиболее полное определение термина «преимущество»:&quot;,&quot;a&quot;:[&quot;Право на движение в намеченном направлении после включения разрешающего сигнала светофора.&quot;,&quot;Право на первоочередное движение в намеченном направлении по отношению к другим участникам дорожного движения.&quot;,&quot;Расположение транспортного средства справа по отношению к другим транспортным средствам на равнозначном перекрёстке.&quot;,&quot;Движение транспортного средства по главной дороге по отношению к транспортным средствам, находящимся на второстепенной дороге.&quot;],&quot;c&quot;:1,&quot;e&quot;:&quot;&lt;p&gt;Преимуществом или приоритетом в Правилах дорожного движения считается право на первоочередное движение в намеченном направлении. В предложенных вариантах ответов это право не очевидно, так как мы не видим всей дорожной обстановки. К примеру, по второстепенной дороге движется транспортное средство оперативного назначения с включёнными проблесковыми сигналами и тому подобное.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100105501,&quot;group&quot;:1001055,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Соответствует ли буксируемый автомобиль термину «прицеп»?&quot;,&quot;a&quot;:[&quot;Нет, не соответствует.&quot;,&quot;Соответствует в любом случае.&quot;,&quot;Соответствует, только если у него выключен двигатель.&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;Буксируемый автомобиль не является прицепом, так как прицеп — это транспортное средство, предназначенное для движения в составе с механическим транспортным средством.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100105501.jpg&quot;,&quot;sourceImage&quot;:&quot;1.55.1.jpg&quot;},{&quot;id&quot;:100105502,&quot;group&quot;:1001055,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Соответствует ли транспортное средство «Б» термину «прицеп»?&quot;,&quot;a&quot;:[&quot;Да, соответствует.&quot;,&quot;Нет, не соответствует.&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;В показанной ситуации буквой «Б» обозначен полуприцеп, который согласно термину «автопоезд» является прицепом.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100105502.jpg&quot;,&quot;sourceImage&quot;:&quot;1.55.2.jpg&quot;},{&quot;id&quot;:100105601,&quot;group&quot;:1001056,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Сколько проезжих частей имеет показанная дорога?&quot;,&quot;a&quot;:[&quot;Одну.&quot;,&quot;Две.&quot;,&quot;Три.&quot;,&quot;Шесть.&quot;],&quot;c&quot;:1,&quot;e&quot;:&quot;&lt;p&gt;В показанной ситуации изображена дорога с двумя проезжими частями, разделенными конструктивно выделенным элементом — разделительной полосой. Двойная сплошная линия горизонтальной дорожной разметки не является элементом, разделяющим смежные проезжие части дороги.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100105601.jpg&quot;,&quot;sourceImage&quot;:&quot;1.56.1.jpg&quot;},{&quot;id&quot;:100105602,&quot;group&quot;:1001056,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Сколько проезжих частей имеет показанная дорога?&quot;,&quot;a&quot;:[&quot;Одну.&quot;,&quot;Две.&quot;,&quot;Четыре.&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;В показанной ситуации изображена дорога с одной проезжей частью, так как двойная сплошная линия горизонтальной дорожной разметки (линия 1.3) не является элементом, разделяющим смежные проезжие части дороги.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100105602.jpg&quot;,&quot;sourceImage&quot;:&quot;1.56.2.jpg&quot;},{&quot;id&quot;:100105603,&quot;group&quot;:1001056,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Сколько проезжих частей имеет дорога, изображённая на рисунке?&quot;,&quot;a&quot;:[&quot;Одну.&quot;,&quot;Две.&quot;,&quot;Три.&quot;,&quot;Четыре.&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;На рисунке изображена дорога с одной проезжей частью. Трамвайный путь не является проезжей частью дороги, равно как и пешеходная дорожка.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100105603.jpg&quot;,&quot;sourceImage&quot;:&quot;1.56.3.jpg&quot;},{&quot;id&quot;:100105701,&quot;group&quot;:1001057,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Сколько проезжих частей имеет дорога, изображённая на рисунке?&quot;,&quot;a&quot;:[&quot;Одну.&quot;,&quot;Две.&quot;,&quot;Три.&quot;,&quot;Четыре.&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;На рисунке изображена дорога с одной проезжей частью. Пешеходная дорожка не является проезжей частью дороги.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100105701.jpg&quot;,&quot;sourceImage&quot;:&quot;1.57.1.jpg&quot;},{&quot;id&quot;:100105801,&quot;group&quot;:1001058,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Что из нижеперечисленного наиболее полно соответствует термину «проезжая часть дороги»?&quot;,&quot;a&quot;:[&quot;Полоса земли, на которой размещается дорога и все её сооружения.&quot;,&quot;Часть дороги, предназначенная для движения только безрельсовых транспортных средств.&quot;,&quot;Элемент дороги, предназначенный для движения транспортных средств и в случаях, предусмотренных Правилами дорожного движения, — для движения пешеходов.&quot;,&quot;Выделенный конструктивно или с помощью линий горизонтальной дорожной разметки элемент дороги, предназначенный для движения водителей велосипедов, обозначенный дорожным знаком «Велосипедная дорожка».&quot;],&quot;c&quot;:2,&quot;e&quot;:&quot;&lt;p&gt;Проезжая часть дороги — это элемент, предназначенный для движения транспортных средств. При этом движение пешеходов по ней может быть тоже разрешено в определённых Правилами дорожного движения случаях (жилая зона, пешеходная зона, движение по краю проезжей части дороги и тому подобное).&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100105802,&quot;group&quot;:1001058,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Укажите правильное обозначение ширины проезжей части дороги, изображённой на рисунке, если обочина имеет асфальтобетонное покрытие:&quot;,&quot;a&quot;:[&quot;«А».&quot;,&quot;«Б».&quot;,&quot;«В».&quot;],&quot;c&quot;:1,&quot;e&quot;:&quot;&lt;p&gt;Проезжая часть дороги обозначена буквой «Б». Буквой «А» обозначена вся ширина дороги, а буквой «В» — ширина полосы движения.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100105802.jpg&quot;,&quot;sourceImage&quot;:&quot;1.58.2.jpg&quot;},{&quot;id&quot;:100105901,&quot;group&quot;:1001059,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Чем является элемент дороги, обозначенный на изображении?&quot;,&quot;a&quot;:[&quot;Разделительной зоной.&quot;,&quot;Разделительной полосой.&quot;],&quot;c&quot;:1,&quot;e&quot;:&quot;&lt;p&gt;Обозначенный элемент дороги выделен конструктивно и разделяет смежные проезжие части дороги, следовательно, — это разделительная полоса.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100105901.jpg&quot;,&quot;sourceImage&quot;:&quot;1.59.1.jpg&quot;},{&quot;id&quot;:100105902,&quot;group&quot;:1001059,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Чем является элемент дороги, обозначенный на изображении?&quot;,&quot;a&quot;:[&quot;Разделительной зоной.&quot;,&quot;Разделительной полосой.&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;Обозначенный элемент дороги выделен при помощи линий горизонтальной дорожной разметки и разделяет смежные проезжие части дороги, следовательно, — это разделительная зона.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100105902.jpg&quot;,&quot;sourceImage&quot;:&quot;1.59.2.jpg&quot;},{&quot;id&quot;:100106041,&quot;group&quot;:1001060,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Предоставил ли преимущество водитель легкового автомобиля пешеходу, проезжая безостановочно пешеходный переход в показанной ситуации (светофор выключен)?&quot;,&quot;a&quot;:[&quot;Нет, не предоставил.&quot;,&quot;Да, предоставил.&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;При подъезде к нерегулируемому пешеходному переходу водитель должен предоставить преимущество пешеходу. Преимущество пешеходу считается предоставленным, если расстояние между транспортным средством и приближающимся пешеходом (в момент пересечения транспортным средством траектории движения пешехода) составило не менее двух полос движения транспортного средства (в том числе одну полосу и трамвайные пути попутного направления).&lt;/p&gt;\r\n&lt;p&gt;Поэтому в показанной ситуации водитель не предоставил преимущество, так как между транспортным средством и пешеходом — одна полоса движения.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100106041.jpg&quot;,&quot;sourceImage&quot;:&quot;1.60.41.jpg&quot;},{&quot;id&quot;:100106042,&quot;group&quot;:1001060,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Предоставил ли преимущество водитель легкового автомобиля пешеходу, проезжая безостановочно пешеходный переход в показанной ситуации?&quot;,&quot;a&quot;:[&quot;Нет, не предоставил.&quot;,&quot;Да, предоставил.&quot;],&quot;c&quot;:1,&quot;e&quot;:&quot;&lt;p&gt;При подъезде к нерегулируемому пешеходному переходу водитель должен предоставить преимущество пешеходу. Преимущество пешеходу считается предоставленным, если расстояние между транспортным средством и приближающимся пешеходом (в момент пересечения транспортным средством траектории движения пешехода) составило не менее двух полос движения транспортного средства (в том числе одну полосу и трамвайные пути попутного направления).&lt;/p&gt;\r\n&lt;p&gt;Трамвайный путь попутного направления по ширине равен трамвайному пути встречного направления. Учитывая, что в термине приведён не исключительный список («в том числе...»), два трамвайных пути приравнены к двум полосам движения транспортного средства.&lt;/p&gt;\r\n&lt;p&gt;Поэтому в показанной ситуации водитель предоставил преимущество пешеходу.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100106042.jpg&quot;,&quot;sourceImage&quot;:&quot;1.60.42.jpg&quot;},{&quot;id&quot;:100106140,&quot;group&quot;:1001061,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Предоставил ли преимущество пешеходу в показанной ситуации водитель жёлтого легкового автомобиля?&quot;,&quot;a&quot;:[&quot;Да, предоставил.&quot;,&quot;Нет, не предоставил.&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;Преимущество пешеходу считается предоставленным, если расстояние между транспортным средством и приближающимся пешеходом (в момент пересечения транспортным средством траектории движения пешехода) составило не менее двух полос движения транспортного средства (в том числе одну полосу и трамвайные пути попутного направления).&lt;/p&gt;\r\n&lt;p&gt;Трамвайный путь попутного направления по ширине равен трамвайному пути встречного направления. Учитывая, что в термине приведён не исключительный список («в том числе...»), два трамвайных пути приравнены к двум полосам движения транспортного средства.&lt;/p&gt;\r\n&lt;p&gt;Поэтому в показанной ситуации водитель предоставил преимущество пешеходу.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100106140.jpg&quot;,&quot;sourceImage&quot;:&quot;1.61.40.jpg&quot;},{&quot;id&quot;:100106141,&quot;group&quot;:1001061,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Кто из показанных участников дорожного движения передвигается на средстве персональной мобильности?&quot;,&quot;a&quot;:[&quot;Участник дорожного движения, передвигающийся на электросамокате.&quot;,&quot;Участник дорожного движения, передвигающийся на электрическом велосипеде.&quot;,&quot;Оба участника дорожного движения передвигаются на средствах персональной мобильности.&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;Электросамокат, имеющий максимальную конструктивную скорость не более 25 км/ч, является средством персональной мобильности.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100106141.jpg&quot;,&quot;sourceImage&quot;:&quot;1.61.41.jpg&quot;},{&quot;id&quot;:100106171,&quot;group&quot;:1001061,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Предоставил ли преимущество пешеходу в показанной ситуации водитель жёлтого легкового автомобиля?&quot;,&quot;a&quot;:[&quot;Да, предоставил.&quot;,&quot;Нет, не предоставил.&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;Преимущество пешеходу считается предоставленным, так как расстояние между жёлтым автомобилем и приближающимся пешеходом (в момент пересечения транспортным средством траектории движения пешехода) составило не менее двух полос движения транспортного средства.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100106171.jpg&quot;,&quot;sourceImage&quot;:&quot;1.61.71.jpg&quot;},{&quot;id&quot;:100106202,&quot;group&quot;:1001062,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Кто из перечисленных лиц соответствует термину «регулировщик»?&quot;,&quot;a&quot;:[&quot;Сотрудник ГАИ, осуществляющий регулирование дорожного движения в форменной одежде повышенной видимости с элементами из световозвращающего материала, с жезлом и свистком.&quot;,&quot;Должностное лицо Транспортной инспекции Министерства транспорта и коммуникаций в жилете повышенной видимости с элементами из световозвращающего материала с диском с красным сигналом (световозвращателем).&quot;,&quot;Все перечисленные лица.&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;Регулировщиком является сотрудник ГАИ, регулирующий движение в форменной одежде с жезлом и свистком. Должностное лицо Транспортной инспекции Министерства транспорта и коммуникаций имеет в определённых случаях право остановки транспортного средства, однако согласно Правилам дорожного движения к регулировщику не приравнено.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100106231,&quot;group&quot;:1001062,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Кто из перечисленных лиц соответствует термину «регулировщик»?&quot;,&quot;a&quot;:[&quot;Работник дорожно-строительной организации в одежде из световозвращающего материала, с диском с красным сигналом (световозвращателем) при исполнении своих служебных обязанностей.&quot;,&quot;Дежурный на железнодорожном переезде в одежде из световозвращающего материала, с диском с красным сигналом (световозвращателем) при исполнении ими своих служебных обязанностей.&quot;,&quot;Сотрудник Военной автомобильной инспекции Вооружённых Сил в форменной одежде повышенной видимости с элементами из световозвращающего материала, с диском с красным сигналом (световозвращателем) и свистком при обеспечении движения организованных транспортных колонн, в состав которых входят транспортные средства, принадлежащие воинским формированиям.&quot;,&quot;Все перечисленные лица.&quot;],&quot;c&quot;:3,&quot;e&quot;:&quot;&lt;p&gt;Все перечисленные лица при исполнении ими служебных обязанностей соответствуют термину «регулировщик».&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100106233,&quot;group&quot;:1001062,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Кто из перечисленных лиц соответствует термину «регулировщик»?&quot;,&quot;a&quot;:[&quot;Сотрудник ГАИ, осуществляющий регулирование дорожного движения в соответствующей экипировке на перекрёстке при работающих светофорах.&quot;,&quot;Сотрудник Военной автомобильной инспекции Вооружённых Сил в соответствующей экипировке при обеспечении движения организованной транспортной колонны, в состав которой входят транспортные средства, принадлежащие Министерству обороны.&quot;,&quot;Сотрудник органов пограничной службы в соответствующей экипировке при обеспечении движения организованной транспортной колонны, в состав которой входят транспортные средства, принадлежащие Государственному пограничному комитету.&quot;,&quot;Все перечисленные лица.&quot;],&quot;c&quot;:3,&quot;e&quot;:&quot;&lt;p&gt;Все перечисленные лица соответствуют термину «регулировщик». Причём Сотрудники Военной автомобильной инспекции и органов пограничной службы приравнены к регулировщику только в определённых Правилами дорожного движения случаях.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100106241,&quot;group&quot;:1001062,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Приравниваются ли к регулировщику дежурные на железнодорожных переездах и паромных переправах в одежде из световозвращающего материала, с диском с красным сигналом (световозвращателем)?&quot;,&quot;a&quot;:[&quot;Да, при исполнении ими своих служебных обязанностей.&quot;,&quot;Нет, не приравниваются.&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;К регулировщику приравниваются работники дорожно-строительных и эксплуатационных организаций, дежурные на железнодорожных переездах и паромных переправах в одежде из световозвращающего материала, с диском с красным сигналом (световозвращателем) при исполнении ими своих служебных обязанностей.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100106301,&quot;group&quot;:1001063,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;В каком из перечисленных случаев водитель поставил автомобиль на стоянку?&quot;,&quot;a&quot;:[&quot;Преднамеренно прекратил движение на время более 5 минут, чтобы пообедать.&quot;,&quot;Преднамеренно прекратил движение на время более 5 минут для посадки пассажиров.&quot;,&quot;Преднамеренно прекратил движение на время более 5 минут для разгрузки транспортного средства.&quot;,&quot;Непреднамеренно прекратил движение на время более 5 минут из-за появившейся опасности для дорожного движения.&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;Стоянка — это преднамеренное прекращение движения на время более 5 минут, не связанное с посадкой (высадкой) пассажиров или загрузкой (разгрузкой) транспортного средства или зарядкой электромобиля.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100106302,&quot;group&quot;:1001063,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Что из нижеперечисленного не соответствует термину «стоянка транспортного средства»?&quot;,&quot;a&quot;:[&quot;Преднамеренное прекращение движения транспортного средства более чем на 5 минут для отдыха водителя.&quot;,&quot;Преднамеренное прекращение движения транспортного средства более чем на 5 минут для проверки крепления и состояния груза.&quot;,&quot;Прекращение движения транспортного средства более чем на 5 минут для поиска причины неисправности транспортного средства.&quot;,&quot;Все соответствует.&quot;],&quot;c&quot;:2,&quot;e&quot;:&quot;&lt;p&gt;Стоянка — это преднамеренное прекращение движения на время более 5 минут, не связанное с посадкой (высадкой) пассажиров, или загрузкой (разгрузкой) транспортного средства, или зарядкой электромобиля. А прекращение движения с целью поиска причины неисправности транспортного средства относится к термину «вынужденная остановка транспортного средства».&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100106303,&quot;group&quot;:1001063,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Что из нижеперечисленного соответствует термину «стоянка транспортного средства»?&quot;,&quot;a&quot;:[&quot;Преднамеренное прекращение движения транспортного средства более чем на 5 минут для высадки пассажиров.&quot;,&quot;Преднамеренное прекращение движения электромобиля более чем на 5 минут для зарядки.&quot;,&quot;Прекращение движения транспортного средства более чем на 5 минут для устранения выявленной в пути технической неисправности.&quot;,&quot;Преднамеренное прекращение движения транспортного средства более чем на 5 минут для проверки технического состояния транспортного средства.&quot;],&quot;c&quot;:3,&quot;e&quot;:&quot;&lt;p&gt;Стоянка — это преднамеренное прекращение движения на время более 5 минут, не связанное с посадкой (высадкой) пассажиров, или загрузкой (разгрузкой) транспортного средства, или зарядкой электромобиля. Прекращение движения с целью устранения причины неисправности транспортного средства относится к термину «вынужденная остановка транспортного средства». В случае проверки технического состояния транспортного средства в пути следования мы не говорим о том, что прекращение движения вызвано технической неисправностью, это может быть обусловлено, в том числе, пройденным расстоянием.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100106501,&quot;group&quot;:1001065,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Что из нижеперечисленного соответствует термину «тёмное время суток»?&quot;,&quot;a&quot;:[&quot;Промежуток времени, который начинается после захода солнца и заканчивается с восходом солнца.&quot;,&quot;Промежуток времени, который начинается с начала вечерних сумерек и заканчивается после восхода солнца.&quot;,&quot;Промежуток времени, который начинается через 30 минут после захода солнца и заканчивается за 30 минут до восхода солнца.&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;Тёмное время суток — это промежуток времени, начинающийся после захода солнца и заканчивающийся с восходом солнца. Если видимость дороги ухудшилась до захода солнца или остается плохой после восхода — водитель сам вправе решать, включать ли ему ближний свет фар, ходовые огни или противотуманные фары. Однако если видимость дороги ухудшилась до недостаточной, фары дальнего или ближнего света следует включить обязательно! &lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100106501.jpg&quot;,&quot;sourceImage&quot;:&quot;1.65.1.jpg&quot;},{&quot;id&quot;:100106502,&quot;group&quot;:1001065,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Что из нижеперечисленного соответствует термину «тёмное время суток»?&quot;,&quot;a&quot;:[&quot;Промежуток времени, который начинается до захода солнца и заканчивается после восхода солнца.&quot;,&quot;Промежуток времени, который начинается после захода солнца и заканчивается с восходом солнца.&quot;,&quot;Промежуток времени, который начинается, когда видимость дороги в направлении движения уменьшается до 300 метров, и заканчивается, когда видимость дороги в направлении движения становится более 300 метров.&quot;],&quot;c&quot;:1,&quot;e&quot;:&quot;&lt;p&gt;Тёмное время суток — это промежуток времени, начинающийся после захода солнца и заканчивающийся с восходом солнца.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100106503,&quot;group&quot;:1001065,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Что из нижеперечисленного соответствует термину «тёмное время суток»?&quot;,&quot;a&quot;:[&quot;Промежуток времени, который начинается после захода солнца и заканчивается с восходом солнца.&quot;,&quot;Промежуток времени, который начинается через 30 минут после начала вечерних сумерек и заканчивается через 30 минут после начала утренних сумерек.&quot;,&quot;Промежуток времени, который начинается с момента, когда водитель вынужден включить фары ближнего или дальнего света, и заканчивается с момента, когда водитель может выключить фары без ущерба для безопасности дорожного движения.&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;Тёмное время суток — это промежуток времени, начинающийся после захода солнца и заканчивающийся с восходом солнца.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100106601,&quot;group&quot;:1001066,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Как называется термин, характеризующий максимальную массу транспортного средства, установленную изготовителем (с грузом, водителем и пассажирами)?&quot;,&quot;a&quot;:[&quot;Технически допустимая общая масса.&quot;,&quot;Фактическая масса.&quot;,&quot;Масса в снаряжённом состоянии.&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;Технически допустимая общая масса — это максимальная масса транспортного средства, установленная изготовителем (с грузом, водителем и пассажирами).&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100106601.jpg&quot;,&quot;sourceImage&quot;:&quot;1.66.1.jpg&quot;},{&quot;id&quot;:100106602,&quot;group&quot;:1001066,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Из предложенных вариантов выберите наиболее полное и правильное определение термина «технически допустимая общая масса»:&quot;,&quot;a&quot;:[&quot;Максимальная масса транспортного средства, установленная изготовителем (с грузом, водителем и пассажирами).&quot;,&quot;Масса транспортного средства без груза, водителя и пассажиров.&quot;,&quot;Максимальная масса груза, перевозимого транспортным средством, установленная изготовителем.&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;Технически допустимая общая масса — это максимальная масса транспортного средства, установленная изготовителем (с грузом, водителем и пассажирами).&lt;/p&gt;\r\n&lt;p&gt;Водителю запрещается участвовать в дорожном движении на транспортном средстве, у которого фактическая масса превышает технически допустимую общую массу.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100106602.jpg&quot;,&quot;sourceImage&quot;:&quot;1.66.2.jpg&quot;},{&quot;id&quot;:100106701,&quot;group&quot;:1001067,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Из предложенных вариантов выберите наиболее полное и правильное определение термина «Транспортная колонна»:&quot;,&quot;a&quot;:[&quot;Группа из двух или более транспортных средств, следующих друг за другом по одной полосе движения.&quot;,&quot;Группа из двух или более автомобилей, следующих друг за другом по одной полосе движения с постоянно включённым ближним светом фар.&quot;,&quot;Группа из двух или более механических транспортных средств, следующих друг за другом по одной полосе движения с постоянно включённым ближним светом фар, обозначенная опознавательными знаками «Колонна».&quot;],&quot;c&quot;:2,&quot;e&quot;:&quot;&lt;p&gt;Термин «Транспортная колонна» складывается из четырёх составляющих: два и более механических транспортных средств, движение осуществляется по одной полосе движения с постоянно включённым ближним светом фар, транспортные средства обозначены опознавательными знаками «Колонна» .&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100106702,&quot;group&quot;:1001067,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Что из нижеперечисленного соответствует термину «Транспортная колонна»?&quot;,&quot;a&quot;:[&quot;Группа из двух или более механических транспортных средств, следующих друг за другом по одной полосе движения с постоянно включённым ближним светом фар, обозначенная опознавательными знаками «Колонна».&quot;,&quot;Транспортное средство, движущееся с постоянно включённым ближним светом фар в сопровождении транспортных средств оперативного назначения с включёнными проблесковыми сигналами (маячками) синего или синего и красного цветов.&quot;,&quot;Группа из двух или более транспортных средств оперативного назначения, следующих друг за другом по одной полосе движения с постоянно включённым ближним светом фар и включёнными проблесковыми сигналами (маячками) синего цвета.&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;Термин «Транспортная колонна» складывается из четырёх составляющих: два и более механических транспортных средств, движение осуществляется по одной полосе движения с постоянно включённым ближним светом фар, транспортные средства обозначены опознавательными знаками «Колонна» .&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100106703,&quot;group&quot;:1001067,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Является ли показанная группа велосипедистов транспортной колонной?&quot;,&quot;a&quot;:[&quot;Не является.&quot;,&quot;Является в любом случае.&quot;,&quot;Является при условии включения фар (фонарей) белого цвета спереди и фонарей красного цвета сзади.&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;Транспортной колонной согласно Правилам дорожного движения является только колонна, состоящая из механических транспортных средств, а велосипеды не являются механическими транспортными средствами.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100106703.jpg&quot;,&quot;sourceImage&quot;:&quot;1.67.3.jpg&quot;},{&quot;id&quot;:100106801,&quot;group&quot;:1001068,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Что из нижеперечисленного соответствует термину «Транспортное средство оперативного назначения»?&quot;,&quot;a&quot;:[&quot;Транспортное средство, не имеющее специальной цветографической окраски, но имеющее световую и звуковую сигнализацию (проблесковые сигналы / маячки синего цвета).&quot;,&quot;Механическое транспортное средство для выполнения разнообразных технологических операций, а также привода стационарных машин, оборудованное сигналами (маячками) оранжевого цвета.&quot;,&quot;Механическое транспортное средство, оборудованное технологическим оборудованием для буксировки повреждённых при ДТП автомобилей, не имеющее специальной цветографической раскраски, но имеющее специальные сигналы (маячки) оранжевого цвета.&quot;,&quot;Все соответствуют.&quot;,&quot;Все не соответствуют.&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;Отличительным признаком транспортного средства оперативного назначения является наличие проблесковых сигналов (маячков) синего или синего и красного цветов.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100106801.jpg&quot;,&quot;sourceImage&quot;:&quot;1.68.1.jpg&quot;},{&quot;id&quot;:100106802,&quot;group&quot;:1001068,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Что из нижеперечисленного соответствует термину «Транспортное средство оперативного назначения»?&quot;,&quot;a&quot;:[&quot;Транспортное средство, имеющее специальную цветографическую окраску и (или) световую и звуковую сигнализацию.&quot;,&quot;Транспортное средство, осуществляющее сопровождение транспортных средств, перевозящих крупногабаритные грузы, с включённым маячком оранжевого цвета.&quot;,&quot;Транспортное средство таких габаритов, при которых для проезда по дорогам требуется специальное разрешение, выдаваемое в порядке, установленном законодательством.&quot;,&quot;Механическое транспортное средство, осуществляющее движение в скоростном сообщении, движущееся по установленному маршруту с обозначенными остановочными пунктами.&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;Транспортным средством оперативного назначения является транспортное средство, имеющее специальную цветографическую окраску (соответствующее сочетание цветов) и (или) световую (проблесковые сигналы (маячки) синего или синего и красного цветов) и звуковую сигнализацию.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100106901,&quot;group&quot;:1001069,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Что из нижеперечисленного соответствует термину «Главная дорога»?&quot;,&quot;a&quot;:[&quot;Дорога с гравийным покрытием по отношению к грунтовой дороге.&quot;,&quot;Любая дорога по отношению к выездам с прилегающей территории.&quot;,&quot;Дорога, обозначенная дорожным знаком «Дорога для автомобилей», по отношению к пересекаемой.&quot;,&quot;Соответствуют все перечисленные.&quot;],&quot;c&quot;:3,&quot;e&quot;:&quot;&lt;p&gt;Во всех приведённых примерах дороги соответствуют термину «Главная дорога», то есть дорога, обозначенная дорожным знаком 5.3 «Дорога для автомобилей» , дорога по отношению к выездам с прилегающей территории и дорога с гравийным покрытием по отношению к дороге с грунтовым покрытием.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100106902,&quot;group&quot;:1001069,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Что из нижеперечисленного соответствует термину «Главная дорога»?&quot;,&quot;a&quot;:[&quot;Дорога с гравийным покрытием по отношению к дороге с булыжным покрытием.&quot;,&quot;Дорога с асфальтобетонным покрытием по отношению к дороге с булыжным покрытием.&quot;,&quot;Дорога, обозначенная знаком «Примыкание второстепенной дороги», по отношению к примыкающей дороге.&quot;,&quot;Соответствуют все перечисленные.&quot;],&quot;c&quot;:2,&quot;e&quot;:&quot;&lt;p&gt;Из приведённых примеров соответствует термину «Главная дорога» только дорога, обозначенная дорожным знаком 2.3.2, 2.3.3 «Примыкание второстепенной дороги»  , по отношению к примыкающей.&lt;/p&gt;\r\n&lt;p&gt;Дорога с гравийным покрытием по отношению к дороге с булыжным покрытием при отсутствии знаков приоритета будет считаться второстепенной, а дорога с асфальтобетонным покрытием по отношению к дороге с булыжным покрытием будет считаться равнозначной.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100106903,&quot;group&quot;:1001069,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Делает ли дорогу без усовершенствованного покрытия наличие участка с усовершенствованным покрытием непосредственно перед перекрёстком равной по значению с пересекаемой дорогой с усовершенствованным покрытием?&quot;,&quot;a&quot;:[&quot;Да.&quot;,&quot;Нет.&quot;],&quot;c&quot;:1,&quot;e&quot;:&quot;&lt;p&gt;Наличие на дороге без усовершенствованного покрытия участка дороги с усовершенствованным покрытием непосредственно перед перекрёстком не делает такую дорогу равной по значению с пересекаемой дорогой с усовершенствованным покрытием.&lt;/p&gt;\r\n&lt;p&gt;Такие участки предназначены для того, чтобы грязь с колёс выезжающих автомобилей не попадала на покрытие главной дороги, ухудшая на перекрёстке и вблизи его коэффициент сцепления и делая его неравномерным по ширине проезжей части дороги, а также для предохранения от разрушения кромки покрытия проезжей части дороги на перекрёстке.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100106903.jpg&quot;,&quot;sourceImage&quot;:&quot;1.69.3.jpg&quot;},{&quot;id&quot;:100106904,&quot;group&quot;:1001069,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Какая дорога является главной по отношению к пересекаемой?&quot;,&quot;a&quot;:[&quot;Дорога с трамвайными путями по отношению к дороге без трамвайных путей.&quot;,&quot;Дорога с асфальтобетонным покрытием по отношению к дороге из булыжника.&quot;,&quot;Дорога со щебёночным покрытием по отношению к дороге с грунтовым покрытием.&quot;,&quot;Дорога, обозначенная дорожным знаком «Дорога для автомобилей», по отношению к пересекаемой.&quot;,&quot;Дорога, обозначенная дорожным знаком «Движение без остановки запрещено», по отношению к пересекаемой.&quot;],&quot;c&quot;:3,&quot;e&quot;:&quot;&lt;p&gt;Из приведённых примеров соответствует термину «Главная дорога» только дорога, обозначенная дорожным знаком 5.3 «Дорога для автомобилей» , по отношению к пересекаемой.&lt;/p&gt;\r\n&lt;p&gt;Дорога с асфальтобетонным покрытием по отношению к дороге с булыжным покрытием при отсутствии дорожных знаков приоритета будет считаться равнозначной, а дорога со щебёночным покрытием по отношению к дороге с грунтовым покрытием — равнозначной.&lt;/p&gt;\r\n&lt;p&gt;Наличие на дороге трамвайных путей или продолжение в обе стороны по отношению к примыкающей или пересекаемой не делает такую дорогу главной.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100107001,&quot;group&quot;:1001070,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Что из нижеперечисленного соответствует термину «Главная дорога»?&quot;,&quot;a&quot;:[&quot;Дорога с трамвайными путями по отношению к дороге без трамвайных путей.&quot;,&quot;Дорога с грунтовым покрытием по отношению к выезду со строительной площадки.&quot;,&quot;Дорога, имеющая продолжение в обе стороны, по отношению к примыкающей к ней дороге.&quot;,&quot;Часть перекрёстка, по которому организовано круговое движение, по отношению к выездам на перекрёсток.&quot;],&quot;c&quot;:1,&quot;e&quot;:&quot;&lt;p&gt;Из приведённых примеров соответствует термину «Главная дорога» только дорога с грунтовым покрытием по отношению к выезду со строительной площадки (как любая дорога по отношению к выездам с прилегающей территории).&lt;/p&gt;\r\n&lt;p&gt;Наличие на дороге трамвайных путей или продолжение в обе стороны по отношению к примыкающей или пересекаемой не делает такую дорогу главной. Наличие и направление главной дороги на перекрёстке с круговым движением может быть определено только соответствующими дорожными знаками.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100107002,&quot;group&quot;:1001070,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Что из нижеперечисленного соответствует термину «Главная дорога»?&quot;,&quot;a&quot;:[&quot;Дорога с грунтовым покрытием по отношению к дороге со щебёночным покрытием.&quot;,&quot;Дорога с разделительной полосой по отношению к дороге без разделительной полосы.&quot;,&quot;Дорога, обозначенная дорожным знаком «Автомагистраль», по отношению к примыкающей дороге.&quot;,&quot;Дорога с бóльшим количеством полос движения по отношению к дороге с меньшим количеством полос движения.&quot;],&quot;c&quot;:2,&quot;e&quot;:&quot;&lt;p&gt;Из приведённых примеров термину «Главная дорога» соответствует только дорога, обозначенная дорожным знаком 5.1 «Автомагистраль»  по отношению к примыкающей дороге.&lt;/p&gt;\r\n&lt;p&gt;Наличие на дороге разделительной полосы или большего количества полос движения по отношению к примыкающей или пересекаемой не делает такую дорогу главной.&lt;/p&gt;\r\n&lt;p&gt;Две дороги со щебёночным и грунтовым покрытием при отсутствии дорожных знаков приоритета будут считаться равными по значению (равнозначными).&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100107003,&quot;group&quot;:1001070,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Что из нижеперечисленного соответствует термину «Главная дорога»?&quot;,&quot;a&quot;:[&quot;Дорога с любым покрытием по отношению к выезду с прилегающей территории.&quot;,&quot;Дорога, на которой перед перекрёстком установлены знаки приоритета.&quot;,&quot;Дорога с гравийным покрытием по отношению к дороге с покрытием из брусчатки.&quot;,&quot;Дорога со щебёночным покрытием, не обработанным органическими или минеральными вяжущими материалами, по отношению к грунтовой дороге.&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;Из приведённых примеров термину «Главная дорога» соответствует только дорога по отношению к выезду с прилегающей территории.&lt;/p&gt;\r\n&lt;p&gt;Наличие на дороге перед перекрёстком дорожных знаков приоритета говорит о том, что перекрёсток является обозначенным, поэтому необходимо уточнить, какие именно дорожные знаки установлены перед перекрёстком.&lt;/p&gt;\r\n&lt;p&gt;Дорога без усовершенствованного покрытия по отношению к дороге с усовершенствованным покрытием при отсутствии дорожных знаков приоритета будут считаться второстепенной.&lt;/p&gt;\r\n&lt;p&gt;Две дороги со щебёночным и грунтовым покрытием при отсутствии дорожных знаков приоритета будут считаться равными по значению (равнозначными).&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100107004,&quot;group&quot;:1001070,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Что из нижеперечисленного соответствует термину «Главная дорога»?&quot;,&quot;a&quot;:[&quot;Дорога, обозначенная дорожным знаком «Главная дорога», по отношению к примыкающей дороге.&quot;,&quot;Дорога с двухсторонним движением по отношению к дороге с односторонним движением.&quot;,&quot;Дорога с асфальтобетонным покрытием по отношению к дороге с гравийным покрытием, обработанным органическими или минеральными вяжущими материалами.&quot;,&quot;Соответствуют все перечисленные.&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;Из приведённых примеров термину «Главная дорога» соответствует только дорога, обозначенная дорожным знаком 2.1 «Главная дорога»  по отношению к примыкающей дороге.&lt;/p&gt;\r\n&lt;p&gt;Дорога с двусторонним движением не является главной по отношению к дороге с односторонним движением при отсутствии дорожных знаков приоритета.&lt;/p&gt;\r\n&lt;p&gt;Две дороги с усовершенствованным покрытием при отсутствии знаков приоритета будут считаться равными по значению (равнозначными).&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100107101,&quot;group&quot;:1001071,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Какое из транспортных средств в показанной ситуации находится на главной дороге?&quot;,&quot;a&quot;:[&quot;Грузовой автомобиль на дороге с гравийным покрытием.&quot;,&quot;Легковой автомобиль на дороге с асфальтобетонным покрытием.&quot;],&quot;c&quot;:1,&quot;e&quot;:&quot;&lt;p&gt;В показанной ситуации легковой автомобиль движется по дороге с усовершенствованным покрытием, а грузовой — без усовершенствованного покрытия. Дорожных знаков приоритета перед перекрёстком нет, следовательно, легковой автомобиль находится на главной дороге.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100107101.jpg&quot;,&quot;sourceImage&quot;:&quot;1.71.1.jpg&quot;},{&quot;id&quot;:100107102,&quot;group&quot;:1001071,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Какое из транспортных средств в показанной ситуации находится на главной дороге?&quot;,&quot;a&quot;:[&quot;Колёсный трактор, движущийся по дороге с булыжным покрытием.&quot;,&quot;Легковой автомобиль, движущийся по дороге с гравийным покрытием.&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;Колёсный трактор движется по дороге с усовершенствованным (булыжным) покрытием, а легковой — без усовершенствованного покрытия.&lt;/p&gt;\r\n&lt;p&gt;Дорожных знаков приоритета перед перекрёстком нет, следовательно, колёсный трактор находится на главной дороге.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100107102.jpg&quot;,&quot;sourceImage&quot;:&quot;1.71.2.jpg&quot;},{&quot;id&quot;:100107103,&quot;group&quot;:1001071,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Какое из транспортных средств в показанной ситуации находится на главной дороге?&quot;,&quot;a&quot;:[&quot;Грузовой автомобиль.&quot;,&quot;Легковой автомобиль.&quot;],&quot;c&quot;:1,&quot;e&quot;:&quot;&lt;p&gt;На дороге, по которой движется легковой автомобиль, перед перекрёстком установлен дорожный знак 2.1 «Главная дорога» , поэтому легковой автомобиль находится на главной дороге.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100107103.jpg&quot;,&quot;sourceImage&quot;:&quot;1.71.3.jpg&quot;},{&quot;id&quot;:100107104,&quot;group&quot;:1001071,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Какой из автомобилей находится на главной дороге?&quot;,&quot;a&quot;:[&quot;Красный автомобиль, подъехавший к перекрёстку по дороге с гравийным покрытием.&quot;,&quot;Синий автомобиль, подъехавший к перекрёстку по дороге с грунтовым покрытием.&quot;,&quot;Автомобили находятся перед перекрёстком равнозначных дорог.&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;Согласно определению, дорога с гравийным покрытием является главной по отношению к дороге с грунтовым покрытием.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100107104.jpg&quot;,&quot;sourceImage&quot;:&quot;1.71.4.jpg&quot;},{&quot;id&quot;:100107161,&quot;group&quot;:1001071,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;В данной ситуации, приближаясь по дороге с гравийным покрытием к примыканию справа дороги с грунтовым покрытием, Вы находитесь:&quot;,&quot;a&quot;:[&quot;На главной дороге.&quot;,&quot;На второстепенной дороге.&quot;,&quot;На дороге, равной по значению с примыкающей дорогой справа.&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;Дорога с гравийным покрытием является главной по отношению к дороге с грунтовым покрытием, если перед перекрёстком отсутствуют знаки, определяющие наличие главной или второстепенной дороги, либо предупреждающие о наличии перекрёстка равнозначных дорог.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100107161.jpg&quot;,&quot;sourceImage&quot;:&quot;1.71.61.jpg&quot;},{&quot;id&quot;:100107241,&quot;group&quot;:1001072,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Является ли автопоезд комбинированным транспортным средством?&quot;,&quot;a&quot;:[&quot;Да, является.&quot;,&quot;Нет, не является.&quot;],&quot;c&quot;:1,&quot;e&quot;:&quot;&lt;p&gt;Автопоезд — это состав транспортных средств, состоящий из автомобиля (колёсного трактора) и буксируемого им прицепа, прицепа-роспуска.&lt;/p&gt;\r\n&lt;p&gt;Комбинированное транспортное средство — это состав транспортных средств, состоящий из грузового автомобиля, автомобиля-тягача, седельного тягача, колёсного трактора и буксируемого механического транспортного средства.&lt;br&gt; Поэтому автопоезд не является комбинированным транспортным средством.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100107241.jpg&quot;,&quot;sourceImage&quot;:&quot;1.72.41.jpg&quot;},{&quot;id&quot;:100107242,&quot;group&quot;:1001072,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Является ли показанный состав транспортных средств комбинированным транспортным средством?&quot;,&quot;a&quot;:[&quot;Да, является.&quot;,&quot;Нет, не является.&quot;],&quot;c&quot;:1,&quot;e&quot;:&quot;&lt;p&gt;Комбинированное транспортное средство — это состав транспортных средств, состоящий из грузового автомобиля, автомобиля-тягача, седельного тягача, колёсного трактора и буксируемого механического транспортного средства.&lt;br&gt; Поэтому состав транспортных средств, в котором буксирующее транспортное средство — легковой автомобиль, не является комбинированным транспортным средством.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100107242.jpg&quot;,&quot;sourceImage&quot;:&quot;1.72.42.jpg&quot;},{&quot;id&quot;:100107243,&quot;group&quot;:1001072,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Является ли показанный состав транспортных средств комбинированным транспортным средством?&quot;,&quot;a&quot;:[&quot;Да, является.&quot;,&quot;Нет, не является.&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;Комбинированное транспортное средство — это состав транспортных средств, состоящий из грузового автомобиля, автомобиля-тягача, седельного тягача, колёсного трактора и буксируемого механического транспортного средства.&lt;br&gt; Поэтому показанный состав транспортных средств является комбинированным транспортным средством.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100107243.jpg&quot;,&quot;sourceImage&quot;:&quot;1.72.43.jpg&quot;},{&quot;id&quot;:100107244,&quot;group&quot;:1001072,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Какой из показанных составов транспортных средств является комбинированным транспортным средством?&quot;,&quot;a&quot;:[&quot;Легковой автомобиль, буксирующий прицеп.&quot;,&quot;Грузовой автомобиль, буксирующий легковой автомобиль.&quot;,&quot;Оба являются.&quot;,&quot;Оба не являются.&quot;],&quot;c&quot;:1,&quot;e&quot;:&quot;&lt;p&gt;Комбинированное транспортное средство — это состав транспортных средств, состоящий из грузового автомобиля, автомобиля-тягача, седельного тягача, колёсного трактора и буксируемого механического транспортного средства.&lt;/p&gt;\r\n&lt;p&gt;Состав транспортных средств, в котором осуществляется буксировка прицепа, не является комбинированным транспортным средством.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100107244.jpg&quot;,&quot;sourceImage&quot;:&quot;1.72.44.jpg&quot;},{&quot;id&quot;:100107301,&quot;group&quot;:1001073,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Какое из перечисленных дорожных покрытий является усовершенствованным?&quot;,&quot;a&quot;:[&quot;Покрытие из брусчатки.&quot;,&quot;Покрытие из булыжника.&quot;,&quot;Покрытие из асфальтобетонных смесей.&quot;,&quot;Все перечисленные.&quot;],&quot;c&quot;:3,&quot;e&quot;:&quot;&lt;p&gt;Все перечисленные виды покрытия соответствуют термину «Усовершенствованное покрытие».&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100107302,&quot;group&quot;:1001073,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Какое из перечисленных дорожных покрытий является усовершенствованным?&quot;,&quot;a&quot;:[&quot;Покрытие из брусчатки.&quot;,&quot;Покрытие из шлаковых материалов, не обработанных органическими или минеральными вяжущими материалами.&quot;,&quot;Покрытие из гравийных материалов, не обработанных органическими или минеральными вяжущими материалами.&quot;,&quot;Все перечисленные.&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;Из перечисленных видов покрытия только покрытие дороги из брусчатки является усовершенствованным.&lt;/p&gt;\r\n&lt;p&gt;Покрытие дороги из сыпучих материалов (шлаковых, гравийных) не является усовершенствованным, если оно не обработано специальными вяжущими материалами.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100107303,&quot;group&quot;:1001073,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Какое из перечисленных дорожных покрытий является усовершенствованным?&quot;,&quot;a&quot;:[&quot;Покрытие из булыжника.&quot;,&quot;Покрытие из цементобетонных смесей.&quot;,&quot;Покрытие из щебёночных материалов, обработанных органическими или минеральными вяжущими материалами.&quot;,&quot;Все перечисленные.&quot;],&quot;c&quot;:3,&quot;e&quot;:&quot;&lt;p&gt;Все перечисленные виды покрытия соответствуют термину «Усовершенствованное покрытие», в том числе и из щебёночных материалов, так как оно обработано специальными вяжущими материалами.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100107304,&quot;group&quot;:1001073,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Считается ли дорожное покрытие из булыжника усовершенствованным?&quot;,&quot;a&quot;:[&quot;Да, считается.&quot;,&quot;Нет, не считается.&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;Дорожное покрытие из штучных материалов: брусчатки, булыжника, клинкера, мозаики и тому подобных является усовершенствованным наряду с покрытием дороги из асфальтобетонных или цементобетонных смесей.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100107304.jpg&quot;,&quot;sourceImage&quot;:&quot;1.73.4.jpg&quot;},{&quot;id&quot;:100107501,&quot;group&quot;:1001075,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Что означает требование «уступить дорогу (предоставить преимущество)»?&quot;,&quot;a&quot;:[&quot;Остановиться перед дорожным знаком «Движение без остановки запрещено».&quot;,&quot;Прекратить дальнейшее движение, если другой участник движения находится на главной дороге.&quot;,&quot;Не возобновлять движение, снизить скорость движения вплоть до остановки транспортного средства или не осуществлять какой-либо манёвр (за исключением требования освободить занимаемую полосу движения, подаваемого регулировщиком или водителем транспортного средства оперативного назначения), если это может вынудить другого участника (других участников) дорожного движения изменить направление и (или) скорость движения.&quot;],&quot;c&quot;:2,&quot;e&quot;:&quot;&lt;p&gt;Требование «уступить дорогу (предоставить преимущество)» не обязательно означает прекращение движения, оно гораздо шире и должно рассматриваться в контексте конкретной дорожной ситуации.&lt;/p&gt;\r\n&lt;p&gt;Действия участника дорожного движения, который обязан уступить дорогу, не должны приводить к тому, что тот, кому он уступает дорогу, будет вынужден изменить направление движения и (или) скорость.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100107502,&quot;group&quot;:1001075,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;В каком случае водитель нарушит требование «уступить дорогу (предоставить преимущество)» по отношению к другим участникам дорожного движения?&quot;,&quot;a&quot;:[&quot;Если своими действиями он вынудит другого участника дорожного движения увеличить скорость без изменения направления движения.&quot;,&quot;Если своими действиями он вынудит другого участника дорожного движения повысить внимание без изменения скорости и направления движения.&quot;,&quot;Если своими действиями он вынудит другого участника дорожного движения продолжить движение без изменения скорости и направления движения.&quot;,&quot;Если своими действиями он вынудит другого участника дорожного движения подать предупредительный сигнал светом фар без изменения скорости и направления движения.&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;Требование «уступить дорогу (предоставить преимущество)» не будет выполнено, если это вынудит другого участника дорожного движения (имеющего преимущество) изменить скорость движения и (или) направление движения.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100107503,&quot;group&quot;:1001075,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;В каком случае водитель не нарушит требование «уступить дорогу» по отношению к другим участникам дорожного движения?&quot;,&quot;a&quot;:[&quot;Если своими действиями он вынудит другого участника дорожного движения увеличить скорость без изменения направления движения.&quot;,&quot;Если своими действиями он вынудит другого участника дорожного движения остановиться перед перекрёстком в занимаемой полосе движения.&quot;,&quot;Если своими действиями он вынудит другого участника дорожного движения вернуться в ранее занимаемую полосу движения без изменения скорости движения.&quot;,&quot;Если своими действиями он вынудит другого участника дорожного движения переключить дальний свет на ближний без изменения скорости и направления движения.&quot;],&quot;c&quot;:3,&quot;e&quot;:&quot;&lt;p&gt;Требование «уступить дорогу» не будет нарушено, если это не вынудит другого участника дорожного движения (имеющего преимущество) изменить скорость движения и (или) направление движения.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100107602,&quot;group&quot;:1001076,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;В каком случае водитель не нарушит требование «уступить дорогу (предоставить преимущество)» по отношению к другим участникам дорожного движения?&quot;,&quot;a&quot;:[&quot;Если своими действиями он вынудит пешехода отказаться от перехода проезжей части двухполосной дороги.&quot;,&quot;Если своими действиями он вынудит другого участника дорожного движения осуществить обгон с увеличением скорости движения.&quot;,&quot;Если своими действиями он вынудит другого участника дорожного движения включить маячок синего цвета, уменьшив скорость, не изменяя направления движения.&quot;,&quot;Если своими действиями он вынудит другого участника дорожного движения подать звуковой сигнал и двигаться с особой осторожностью без изменения выбранной скорости движения и направления движения.&quot;],&quot;c&quot;:3,&quot;e&quot;:&quot;&lt;p&gt;Требование «уступить дорогу (предоставить преимущество)» будет нарушено, если это вынудит другого участника дорожного движения (в том числе и пешехода) изменить скорость движения и (или) направление движения.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100107801,&quot;group&quot;:1001078,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Кто из перечисленных ниже лиц является участником дорожного движения?&quot;,&quot;a&quot;:[&quot;Регулировщик.&quot;,&quot;Лицо, сдающее квалификационный практический экзамен на право управления механическим транспортным средством.&quot;,&quot;Работник городских тепловых сетей, выполняющий на дороге в установленном порядке внеплановые ремонтные работы.&quot;,&quot;Все перечисленные не являются участниками дорожного движения.&quot;],&quot;c&quot;:1,&quot;e&quot;:&quot;&lt;p&gt;Согласно термину «Участник дорожного движения» не являются таковыми регулировщики и работники, выполняющие в установленном порядке на дороге ремонтные и другие работы.&lt;/p&gt;\r\n&lt;p&gt;Все остальные лица, находящиеся в пределах дороги (в том числе и лицо, сдающее квалификационный практический экзамен на право управления механическим транспортным средством) являются участниками дорожного движения.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100107802,&quot;group&quot;:1001078,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Кто из перечисленных ниже лиц не является участником дорожного движения?&quot;,&quot;a&quot;:[&quot;Водитель маршрутного транспортного средства.&quot;,&quot;Водитель транспортного средства оперативного назначения.&quot;,&quot;Лицо, обучаемое управлению механическим транспортным средством.&quot;,&quot;Сотрудник Военной автомобильной инспекции при обеспечении движения организованных транспортных колонн.&quot;,&quot;Все перечисленные.&quot;],&quot;c&quot;:3,&quot;e&quot;:&quot;&lt;p&gt;Согласно термину «Участник дорожного движения» не являются таковыми регулировщики и работники, выполняющие в установленном порядке на дороге ремонтные и другие работы.&lt;/p&gt;\r\n&lt;p&gt;Сотрудник Военной автомобильной инспекции Вооружённых Сил в соответствующей экипировке при обеспечении движения организованных транспортных колонн приравнен к регулировщику, соответственно он не является участником дорожного движения.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100107803,&quot;group&quot;:1001078,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Кто из перечисленных ниже лиц является участником дорожного движения?&quot;,&quot;a&quot;:[&quot;Пешеход, ведущий велосипед по дороге.&quot;,&quot;Пешеход, передвигающийся в инвалидной коляске.&quot;,&quot;Водитель крупногабаритного транспортного средства.&quot;,&quot;Пассажир транспортного средства оперативного назначения.&quot;,&quot;Все перечисленные.&quot;],&quot;c&quot;:4,&quot;e&quot;:&quot;&lt;p&gt;Согласно термину «Участник дорожного движения» не являются таковыми регулировщики и работники, выполняющие в установленном порядке на дороге ремонтные и другие работы.&lt;/p&gt;\r\n&lt;p&gt;Все остальные лица, находящиеся в пределах дороги: водители, пассажиры и пешеходы — являются участниками дорожного движения.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100107903,&quot;group&quot;:1001079,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Какие из перечисленных элементов (при их наличии) не являются элементами дороги?&quot;,&quot;a&quot;:[&quot;Обрезы.&quot;,&quot;Обочины.&quot;,&quot;Разделительные полосы.&quot;,&quot;Настилы железнодорожных переездов.&quot;,&quot;Все являются элементами дороги.&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;Согласно термину «Элементы дороги» из перечисленных вариантов обрезы не являются элементом дороги.&lt;/p&gt;\r\n&lt;p&gt;Обрез дороги — это полоса земли с обеих сторон дороги предназначенная для обустройства велосипедных и пешеходных дорожек, защитных насаждений, линий связи и проч.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100107935,&quot;group&quot;:1001079,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Что из нижеперечисленного соответствует термину «путепровод»?&quot;,&quot;a&quot;:[&quot;Инженерное сооружение, устраиваемое в местах пересечения дорог или дороги с железнодорожными путями для обеспечения беспрепятственного движения в разных уровнях.&quot;,&quot;Пересечение дороги с железнодорожными путями на одном уровне.&quot;,&quot;Соответствует всё перечисленное.&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;Путепровод — это инженерное сооружение, устраиваемое в местах пересечения дорог или дороги с железнодорожными путями для обеспечения беспрепятственного движения в разных уровнях.&lt;br&gt; Также целями обустройства путепроводов является повышение пропускной способности и обеспечение безопасности движения.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100107971,&quot;group&quot;:1001079,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;На каком из фрагментов изображения показан путепровод?&quot;,&quot;a&quot;:[&quot;Только на фрагменте «А».&quot;,&quot;Только на фрагменте «Б».&quot;,&quot;На обоих фрагментах показаны путепроводы.&quot;],&quot;c&quot;:2,&quot;e&quot;:&quot;&lt;p&gt;Путепроводом является любое инженерное сооружение, устраиваемое в местах пересечения дорог или дороги с железнодорожными путями в разных уровнях. Поэтому то, что показано на обоих фрагментах изображения, считается путепроводами.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100107971.jpg&quot;,&quot;sourceImage&quot;:&quot;1.79.71.jpg&quot;},{&quot;id&quot;:100108041,&quot;group&quot;:1001080,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Какое определение из нижеперечисленных соответствует термину «электромобиль»?&quot;,&quot;a&quot;:[&quot;Транспортное средство, приводимое в движение только электродвигателем от внутреннего перезаряжаемого источника электроэнергии.&quot;,&quot;Транспортное средство, приводимое в движение гибридным двигателем.&quot;,&quot;Транспортное средство, приводимое в движение электродвигателем, питание которого обеспечивается по подвесной контактной сети от внешнего источника электрического тока.&quot;,&quot;Все перечисленные соответствуют термину «электромобиль».&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;Электромобилем является транспортное средство, приводимое в движение только электродвигателем от внутреннего перезаряжаемого источника электроэнергии.&lt;/p&gt;\r\n&lt;p&gt;Иными словами, транспортные средства, приводимые в движение гибридными силовыми установками, а также питание электродвигателя которых может обеспечиваться от контактной сети, не являются электромобилями.&lt;/p&gt;&quot;,&quot;w&q
