 .&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100102402.jpg&quot;,&quot;sourceImage&quot;:&quot;1.24.2.jpg&quot;},{&quot;id&quot;:100102403,&quot;group&quot;:1001024,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Водитель какого автомобиля движется по территории населённого пункта?&quot;,&quot;a&quot;:[&quot;Водитель автобуса, находящегося на дороге после знака «Начало границы населённого пункта».&quot;,&quot;Водитель легкового автомобиля, находящийся на дороге до знака «Начало границы населённого пункта».&quot;,&quot;Оба водителя осуществляют движение по дороге вне населённого пункта.&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;Водитель автобуса проехал место установки дорожного знака 5.24 «Начало границы населённого пункта» , а это значит, что он уже движется по территории населённого пункта, а водитель легкового автомобиля — нет.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100102403.jpg&quot;,&quot;sourceImage&quot;:&quot;1.24.3.jpg&quot;},{&quot;id&quot;:100102501,&quot;group&quot;:1001025,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Какие из перечисленных дорожных условий соответствуют термину «недостаточная видимость»?&quot;,&quot;a&quot;:[&quot;Видимость дороги в направлении движения менее 300 метров в условиях сильного дождя.&quot;,&quot;Видимость дороги в направлении движения менее 300 метров, ограниченная поворотом дороги.&quot;,&quot;Видимость дороги в направлении движения менее 300 метров, ограниченная транспортными средствами, движущимися впереди.&quot;,&quot;Соответствуют все перечисленные.&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;Если видимость дороги в направлении движения составляет менее 300 метров ввиду обильных осадков — то такие условия соответствуют термину «недостаточная видимость дороги», в остальных перечисленных случаях речь идёт о возможной ограниченной обзорности дороги.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100102502,&quot;group&quot;:1001025,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Какие из перечисленных дорожных условий соответствуют термину «недостаточная видимость»?&quot;,&quot;a&quot;:[&quot;Видимость дороги в направлении движения менее 300 метров, обусловленная снегопадом.&quot;,&quot;Видимость дороги в направлении движения менее 300 метров, обусловленная туманом вблизи водоёма.&quot;,&quot;Видимость дороги в направлении движения менее 300 метров, обусловленная сильной задымлённостью.&quot;,&quot;Соответствуют все перечисленные.&quot;],&quot;c&quot;:3,&quot;e&quot;:&quot;&lt;p&gt;Если видимость дороги в направлении движения составляет менее 300 метров ввиду снижения прозрачности атмосферы из-за погодных, метеорологических условий или иных факторов (дым, туман, смог и прочее), то такие условия соответствуют термину «недостаточная видимость дороги».&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100102503,&quot;group&quot;:1001025,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Какие из перечисленных дорожных условий соответствуют термину «недостаточная видимость»?&quot;,&quot;a&quot;:[&quot;Видимость дороги в направлении движения в тёмное время суток, обусловленная освещённостью дороги фарами автомобиля.&quot;,&quot;Видимость дороги в направлении движения менее 300 метров, обусловленная погодными (метеорологическими) условиями и другими факторами, снижающими прозрачность атмосферы.&quot;,&quot;Обзорность дороги, ограниченная её геометрическими параметрами, придорожными инженерными сооружениями, насаждениями и прочими объектами, а также транспортными средствами.&quot;,&quot;Соответствуют все перечисленные.&quot;],&quot;c&quot;:1,&quot;e&quot;:&quot;&lt;p&gt;Если видимость дороги в направлении движения составляет менее 300 метров ввиду снижения прозрачности атмосферы из-за погодных условий или иных факторов (дым, туман, смог и прочее), то такие условия соответствуют термину «недостаточная видимость дороги».&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100102601,&quot;group&quot;:1001026,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;При каком минимальном расстоянии видимости в направлении движения, обусловленной выпадением осадков, видимость дороги не будет считаться недостаточной?&quot;,&quot;a&quot;:[&quot;50 метров.&quot;,&quot;100 метров.&quot;,&quot;150 метров.&quot;,&quot;300 метров.&quot;,&quot;500 метров.&quot;],&quot;c&quot;:3,&quot;e&quot;:&quot;&lt;p&gt;Недостаточной видимостью дороги считается видимость в направлении движения менее 300 метров, обусловленная погодными условиями или иными факторами, снижающими прозрачность атмосферы.&lt;br&gt;\r\nПредельная величина расстояния 300 метров принята как минимальная расчётная с учётом возможности остановки при экстренном торможении транспортного средства в случае движения навстречу друг другу транспортных средств при скорости каждого из них 90 км/ч. Поэтому видимость дороги на меньшем расстоянии считается недостаточной.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100102601.jpg&quot;,&quot;sourceImage&quot;:&quot;1.26.1.jpg&quot;},{&quot;id&quot;:100102602,&quot;group&quot;:1001026,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Видимость дороги в направлении движения, обусловленная погодными (метеорологическими) условиями, считается недостаточной, если составляет менее:&quot;,&quot;a&quot;:[&quot;300 метров.&quot;,&quot;500 метров.&quot;,&quot;Величины безопасной дистанции.&quot;,&quot;Величины предполагаемого тормозного пути.&quot;,&quot;Величины предполагаемого остановочного пути.&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;Если в описанных условиях видимость дороги в направлении движения составляет менее 300 метров, и это обусловлено погодными условиями, снижающими прозрачность атмосферы, то такие условия соответствуют термину «недостаточная видимость дороги».&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100102602.jpg&quot;,&quot;sourceImage&quot;:&quot;1.26.2.jpg&quot;},{&quot;id&quot;:100102681,&quot;group&quot;:1001026,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;В показанной ситуации Вы, двигаясь за рулём легкового автомобиля, находитесь:&quot;,&quot;a&quot;:[&quot;Только в условиях ограниченной обзорности дороги.&quot;,&quot;Только в условиях недостаточной видимости дороги.&quot;,&quot;В условиях ограниченной обзорности и недостаточной видимости дороги.&quot;],&quot;c&quot;:2,&quot;e&quot;:&quot;&lt;p&gt;Показанные дорожные условия характеризуются видимостью в направлении движения менее 300 метров в условиях снегопада, так что они соответствуют недостаточной видимости. При этом грузовой автопоезд справа ограничивает обзорность вперёд вправо в сторону съезда с транспортной развязки и въезда на путепровод. Поэтому такие условия соответствуют также ограниченной обзорности дороги.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100102681.jpg&quot;,&quot;sourceImage&quot;:&quot;1.26.81.jpg&quot;},{&quot;id&quot;:100102801,&quot;group&quot;:1001028,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Является ли с данного направления перекрёсток обозначенным, если перед ним установлен этот дорожный знак?&quot;,&quot;a&quot;:[&quot;Да, является.&quot;,&quot;Нет, не является.&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;Обозначенный перекрёсток — это перекрёсток, перед которым на данной дороге установлен дорожный знак (знаки) приоритета.&lt;/p&gt;\r\n&lt;p&gt;В данном случае перед перекрёстком установлен дорожный знак 2.4 «Уступить дорогу» , который входит в группу знаков приоритета.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100102801.jpg&quot;,&quot;sourceImage&quot;:&quot;1.28.1.jpg&quot;},{&quot;id&quot;:100102803,&quot;group&quot;:1001028,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Является ли с данного направления перекрёсток обозначенным, если Вы приближаетесь к нему в населённом пункте?&quot;,&quot;a&quot;:[&quot;Да, является.&quot;,&quot;Нет, не является.&quot;],&quot;c&quot;:1,&quot;e&quot;:&quot;&lt;p&gt;Обозначенный перекрёсток — это перекрёсток, перед которым на данной дороге установлен дорожный знак (знаки) приоритета.&lt;/p&gt;\r\n&lt;p&gt;В данном случае перед перекрёстком отсутствуют дорожные знаки, и он не будет считаться обозначенным.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100102803.jpg&quot;,&quot;sourceImage&quot;:&quot;1.28.3.jpg&quot;},{&quot;id&quot;:100102832,&quot;group&quot;:1001028,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Является ли с данного направления перекрёсток обозначенным, если перед ним установлены такие дорожные знаки в населённом пункте?&quot;,&quot;a&quot;:[&quot;Да, является.&quot;,&quot;Нет, не является.&quot;],&quot;c&quot;:1,&quot;e&quot;:&quot;&lt;p&gt;Обозначенный перекрёсток — это перекрёсток, перед которым на данной дороге установлен дорожный знак (знаки) приоритета.&lt;/p&gt;\r\n&lt;p&gt;В показанном случае перед перекрёстком с данного направления отсутствуют дорожные знаки, входящие в группу знаков приоритета.&lt;/p&gt;\r\n&lt;p&gt;Дорожный знак приоритета 2.4 «Уступить дорогу» , установленный справа, делает перекрёсток обозначенным для водителей, приближающихся к нему справа.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100102832.jpg&quot;,&quot;sourceImage&quot;:&quot;1.28.32.jpg&quot;},{&quot;id&quot;:100102871,&quot;group&quot;:1001028,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Через 60 метров Вы, управляя автомобилем, подъедете:&quot;,&quot;a&quot;:[&quot;К обозначенному перекрёстку.&quot;,&quot;К необозначенному перекрёстку.&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;Перед перекрёстком с данного направления установлен дорожный знак приоритета «Примыкание второстепенной дороги». Табличка под знаком указывает расстояние до перекрёстка. Следовательно, этот перекрёсток является обозначенным.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100102871.jpg&quot;,&quot;sourceImage&quot;:&quot;1.28.71.jpg&quot;},{&quot;id&quot;:100102872,&quot;group&quot;:1001028,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Какие фрагменты рисунка соответствуют определению «обозначенный перекрёсток»?&quot;,&quot;a&quot;:[&quot;Только фрагмент «А».&quot;,&quot;Только фрагмент «Б».&quot;,&quot;Оба соответствуют.&quot;,&quot;Оба не соответствуют.&quot;],&quot;c&quot;:2,&quot;e&quot;:&quot;&lt;p&gt;Согласно определению, обозначенным перекрёстком является любой перекрёсток, перед которым с данного направления установлены знаки приоритета.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100102872.jpg&quot;,&quot;sourceImage&quot;:&quot;1.28.72.jpg&quot;},{&quot;id&quot;:100102901,&quot;group&quot;:1001029,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Что в показанной ситуации собирается выполнить водитель легкового автомобиля?&quot;,&quot;a&quot;:[&quot;Обгон.&quot;,&quot;Опережение, не связанное с выполнением обгона.&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;При отсутствии дорожных знаков половина ширины проезжей части дороги, расположенная слева, считается её встречной стороной, поэтому водитель при опережении грузового автомобиля будет производить обгон (опережение, связанное с выездом на встречную полосу движения).&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100102901.jpg&quot;,&quot;sourceImage&quot;:&quot;1.29.1.jpg&quot;},{&quot;id&quot;:100102903,&quot;group&quot;:1001029,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Что в показанной ситуации намерен выполнить водитель синего легкового автомобиля?&quot;,&quot;a&quot;:[&quot;Обгон.&quot;,&quot;Опережение.&quot;],&quot;c&quot;:1,&quot;e&quot;:&quot;&lt;p&gt;Двойная сплошная линия горизонтальной дорожной разметки разделяет транспортные потоки противоположных направлений, водитель синего легкового автомобиля при совершении опережения её не пересекает, следовательно, выполняя опережение жёлтого автомобиля, обгон он не выполняет.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100102903.jpg&quot;,&quot;sourceImage&quot;:&quot;1.29.3.jpg&quot;},{&quot;id&quot;:100103001,&quot;group&quot;:1001030,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Является ли обгоном действие, которое Вы намереваетесь выполнить в показанной ситуации?&quot;,&quot;a&quot;:[&quot;Да, является.&quot;,&quot;Нет, не является.&quot;],&quot;c&quot;:1,&quot;e&quot;:&quot;&lt;p&gt;Выезжая на встречную полосу движения, Вы не совершаете обгон, так как автобус стоит, а объезд неподвижного транспортного средства не является по определению опережением. Обгон является опережением, связанным с выездом на встречную сторону дороги (полосу движения).&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100103001.jpg&quot;,&quot;sourceImage&quot;:&quot;1.30.1.jpg&quot;},{&quot;id&quot;:100103032,&quot;group&quot;:1001030,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Является ли обгоном действие, выполняемое в показанной ситуации водителем красного легкового автомобиля?&quot;,&quot;a&quot;:[&quot;Да, является.&quot;,&quot;Нет, не является.&quot;],&quot;c&quot;:1,&quot;e&quot;:&quot;&lt;p&gt;Объезд неподвижного транспортного средства не является опережением, следовательно, не является и обгоном, так как обгон — это опережение, связанное с выездом на встречную сторону дороги (полосу движения).&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100103032.jpg&quot;,&quot;sourceImage&quot;:&quot;1.30.32.jpg&quot;},{&quot;id&quot;:100103102,&quot;group&quot;:1001031,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Какое из перечисленных действий соответствует термину «обгон»?&quot;,&quot;a&quot;:[&quot;Опережение движущегося транспортного средства, не связанное с перестроением на встречную полосу движения.&quot;,&quot;Опережение движущегося транспортного средства, связанное с выездом на встречную сторону проезжей части дороги.&quot;,&quot;Опережение движущегося транспортного средства, не связанное с выездом из занимаемой полосы движения попутного направления.&quot;,&quot;Все соответствуют.&quot;],&quot;c&quot;:1,&quot;e&quot;:&quot;&lt;p&gt;Только опережение, связанное с выездом (перестроением) на встречную полосу движения (встречную сторону проезжей части дороги), согласно ПДД является обгоном.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100103201,&quot;group&quot;:1001032,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Что из нижеперечисленного наиболее полно соответствует термину «обзорность дороги»?&quot;,&quot;a&quot;:[&quot;Объективная возможность видеть дорожную обстановку с места водителя.&quot;,&quot;Видимость дороги в направлении движения менее 300 метров, обусловленная сильным туманом.&quot;,&quot;Максимальное расстояние в направлении движения, на котором с места водителя можно распознать элементы дороги и технические средства организации дорожного движения перед транспортным средством и правильно ориентироваться при управлении им.&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;В Правилах дорожного движения под обзорностью дороги понимается объективная возможность видеть дорожную обстановку с места водителя. Обусловлена обзорность дороги элементами конструкции транспортного средства, количеством, конструкцией и размерами зеркал заднего вида, а также геометрическими параметрами дороги, расположением других транспортных средств, сооружений, и прочих объектов, находящихся на дороге и в непосредственной близости от неё.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100103301,&quot;group&quot;:1001033,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Дорожный знак (дорожные знаки) какой группы должен быть установлен перед перекрёстком, чтобы он считался обозначенным?&quot;,&quot;a&quot;:[&quot;Приоритета.&quot;,&quot;Запрещающие.&quot;,&quot;Предписывающие.&quot;,&quot;Предупреждающие.&quot;,&quot;Информационно-указательные.&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;Перекрёсток считается обозначенным, если перед ним на данной дороге непосредственно или на установленном Правилами дорожного движения расстоянии установлены дорожные знаки приоритета.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100103302,&quot;group&quot;:1001033,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Перед перекрёстком установлены только дорожные знаки приоритета совместно с информационно-указательными. Считается ли этот перекрёсток обозначенным?&quot;,&quot;a&quot;:[&quot;Да.&quot;,&quot;Нет.&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;Если перед перекрёстком установлены дорожные знаки приоритета, то такой перекрёсток считается обозначенным. Знаки приоритета могут быть установлены как самостоятельно, так и с дорожными знаками других групп, а также с дорожными светофорами.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100103303,&quot;group&quot;:1001033,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Перед перекрёстком установлены только дорожные знаки сервиса совместно с информационно-указательными. Считается ли этот перекрёсток обозначенным?&quot;,&quot;a&quot;:[&quot;Да.&quot;,&quot;Нет.&quot;],&quot;c&quot;:1,&quot;e&quot;:&quot;&lt;p&gt;Перекрёсток не считается обозначенным, если перед ним на данной дороге не установлены дорожные знаки приоритета, не смотря на применение других технических средств организации дорожного движения.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100103401,&quot;group&quot;:1001034,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Выберите один из вариантов ответа, при котором перекрёсток будет считаться обозначенным:&quot;,&quot;a&quot;:[&quot;Перед перекрёстком установлены знаки сервиса.&quot;,&quot;Перед перекрёстком установлен указатель направлений с названиями улиц.&quot;,&quot;Перед перекрёстком установлены светофоры совместно со знаками приоритета.&quot;,&quot;Перед перекрёстком установлены светофоры совместно с информационно-указательными знаками.&quot;],&quot;c&quot;:2,&quot;e&quot;:&quot;&lt;p&gt;Если перед перекрёстком установлены дорожные знаки приоритета, то такой перекрёсток считается обозначенным. Знаки приоритета могут быть установлены как самостоятельно, так и с дорожными знаками других групп, а также с дорожными светофорами.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100103402,&quot;group&quot;:1001034,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Перекрёсток считается обозначенным, если перед ним установлены:&quot;,&quot;a&quot;:[&quot;Светофоры.&quot;,&quot;Дорожные знаки приоритета.&quot;,&quot;Светофоры или дорожные знаки приоритета.&quot;],&quot;c&quot;:1,&quot;e&quot;:&quot;&lt;p&gt;Перекрёсток считается обозначенным, если перед ним на данной дороге непосредственно или на установленном Правилами дорожного движения расстоянии установлены дорожные знаки приоритета. Установки только дорожных светофоров недостаточно для того, чтобы перекрёсток считался обозначенным.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100103403,&quot;group&quot;:1001034,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Является ли перекрёсток обозначенным, если перед ним установлен этот дорожный знак?&quot;,&quot;a&quot;:[&quot;Да.&quot;,&quot;Нет.&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;Перед перекрёстком установлен дорожный знак «2.5 Движение без остановки запрещено», который относится к группе знаков приоритета, следовательно, показанный на рисунке перекрёсток является обозначенным.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100103403.jpg&quot;,&quot;sourceImage&quot;:&quot;1.34.3.jpg&quot;},{&quot;id&quot;:100103501,&quot;group&quot;:1001035,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Что из нижеперечисленного соответствует термину «ограниченная обзорность дороги»?&quot;,&quot;a&quot;:[&quot;Обзорность дороги, ограниченная величиной и регулировкой зеркал заднего вида.&quot;,&quot;Обзорность дороги, ограниченная автомобильным противосолнечным козырьком, повернутым вниз.&quot;,&quot;Обзорность дороги, ограниченная транспортными средствами, движущимися в попутном направлении.&quot;,&quot;Соответствуют все перечисленные.&quot;],&quot;c&quot;:2,&quot;e&quot;:&quot;&lt;p&gt;Ограниченной обзорностью дороги считаются условия, когда обзорность с места водителя ограничивается не конструкцией управляемого транспортного средства, а другими транспортными средствами или прочими объектами, находящимися на дороге или в непосредственной близости от неё.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100103502,&quot;group&quot;:1001035,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Что из нижеперечисленного соответствует термину «ограниченная обзорность дороги»?&quot;,&quot;a&quot;:[&quot;Обзорность дороги, ограниченная объектами придорожного сервиса.&quot;,&quot;Обзорность дороги, ограниченная переломом продольного профиля дороги.&quot;,&quot;Обзорность дороги, ограниченная транспортными средствами, припаркованными перед перекрёстком.&quot;,&quot;Соответствуют все перечисленные.&quot;],&quot;c&quot;:3,&quot;e&quot;:&quot;&lt;p&gt;Ограниченной обзорностью дороги считаются условия, когда обзорность с места водителя ограничена геометрическими параметрами дороги (поворот, конец подъёма и проч.), придорожными инженерными сооружениями, насаждениями, прочими объектами и транспортными средствами.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100103503,&quot;group&quot;:1001035,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Что из нижеперечисленного соответствует термину «ограниченная обзорность дороги»?&quot;,&quot;a&quot;:[&quot;Обзорность дороги, ограниченная придорожными насаждениями.&quot;,&quot;Объективная возможность видеть дорожную обстановку с места водителя.&quot;,&quot;Видимость дороги в направлении движения менее 300 метров, обусловленная погодными и метеорологическими условиями.&quot;,&quot;Соответствуют все перечисленные.&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;Ограниченной обзорностью дороги считаются условия, когда обзорность с места водителя ограничена геометрическими параметрами дороги (поворот, конец подъёма и проч.), придорожными инженерными сооружениями, насаждениями, прочими объектами и транспортными средствами без учёта погодных условий и других факторов, снижающих прозрачность атмосферы.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100103601,&quot;group&quot;:1001036,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;В показанной ситуации, подъезжая к повороту дороги, Вы находитесь в условиях, соответствующих термину:&quot;,&quot;a&quot;:[&quot;«Ограниченная обзорность дороги».&quot;,&quot;«Недостаточная видимость дороги».&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;Если обзорность дороги ограничена геометрическими параметрами дороги и насаждениями, как в показанной ситуации, то такие условия соответствуют термину «ограниченная обзорность дороги».&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100103601.jpg&quot;,&quot;sourceImage&quot;:&quot;1.36.1.jpg&quot;},{&quot;id&quot;:100103602,&quot;group&quot;:1001036,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;К какому термину относится движение по дороге, которая просматривается в направлении движения менее чем на 150 метров с места водителя в условиях сильного снегопада?&quot;,&quot;a&quot;:[&quot;«Ограниченная обзорность дороги».&quot;,&quot;«Недостаточная видимость дороги».&quot;,&quot;«Препятствие для дорожного движения».&quot;],&quot;c&quot;:1,&quot;e&quot;:&quot;&lt;p&gt;Если видимость дороги, обусловленная снегопадом, в направлении движения составляет менее 300 метров, такие условия соответствуют термину «недостаточная видимость дороги».&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100103603,&quot;group&quot;:1001036,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;В показанной ситуации, двигаясь по дороге, Вы находитесь в условиях, соответствующих термину:&quot;,&quot;a&quot;:[&quot;«Ограниченная обзорность дороги».&quot;,&quot;«Недостаточная видимость дороги».&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;Ограниченная обзорность дороги — это обзорность дороги, ограниченная геометрическими параметрами дороги, придорожными инженерными сооружениями, насаждениями и прочими объектами, а также транспортными средствами.&lt;/p&gt;\r\n&lt;p&gt;В данной ситуации обзорность ограничена выпуклым переломом продольного профиля дороги, образованным мостовым сооружением.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100103603.jpg&quot;,&quot;sourceImage&quot;:&quot;1.36.3.jpg&quot;},{&quot;id&quot;:100103661,&quot;group&quot;:1001036,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;В показанной ситуации Вы, управляя легковым автомобилем, находитесь:&quot;,&quot;a&quot;:[&quot;В условиях ограниченной обзорности дороги.&quot;,&quot;В условиях недостаточной видимости дороги.&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;В показанной ситуации обзорность дороги ограничена придорожными насаждениями, сооружениями и геометрическими параметрами дороги. Такие условия называются ограниченной обзорностью.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100103661.jpg&quot;,&quot;sourceImage&quot;:&quot;1.36.61.jpg&quot;},{&quot;id&quot;:100103702,&quot;group&quot;:1001037,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Что из нижеперечисленного соответствует термину «полоса движения»?&quot;,&quot;a&quot;:[&quot;Любая из продольных полос проезжей части дороги, не обозначенная горизонтальной разметкой и имеющая ширину, достаточную для движения велосипедов в один ряд.&quot;,&quot;Любая из продольных полос проезжей части дороги, не обозначенная горизонтальной дорожной разметкой и имеющая ширину, достаточную для движения мопедов в один ряд.&quot;,&quot;Любая из продольных полос проезжей части дороги, не обозначенная горизонтальной дорожной разметкой и имеющая ширину, достаточную для движения автомобилей в один ряд.&quot;,&quot;Соответствует всё перечисленное.&quot;],&quot;c&quot;:2,&quot;e&quot;:&quot;&lt;p&gt;Если полоса движения не обозначена линиями горизонтальной дорожной разметки, то её ширина определяется самими водителями с учётом ширины, достаточной для движения транспортных средств, кроме одноколейных, в один ряд.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100103703,&quot;group&quot;:1001037,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Какой буквой на рисунке обозначена ширина полосы движения?&quot;,&quot;a&quot;:[&quot;Буквой «А».&quot;,&quot;Буквой «Б».&quot;,&quot;Буквой «В».&quot;],&quot;c&quot;:2,&quot;e&quot;:&quot;&lt;p&gt;Буквой «А» обозначена ширина проезжей части дороги, буквой «Б» — ширина попутной стороны проезжей части дороги, буквой «В» — ширина первой (крайней правой) полосы движения.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100103703.jpg&quot;,&quot;sourceImage&quot;:&quot;1.37.3.jpg&quot;},{&quot;id&quot;:100103704,&quot;group&quot;:1001037,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Сколько полос движения имеет показанная проезжая часть дороги?&quot;,&quot;a&quot;:[&quot;Одну.&quot;,&quot;Две.&quot;,&quot;Три.&quot;,&quot;Четыре.&quot;,&quot;Шесть.&quot;],&quot;c&quot;:1,&quot;e&quot;:&quot;&lt;p&gt;Полоса движения — это любая из продольных полос проезжей части дороги, обозначенная или не обозначенная горизонтальной дорожной разметкой и имеющая ширину, достаточную для движения транспортных средств (за исключением одноколейных) в один ряд.&lt;/p&gt;\r\n&lt;p&gt;В данном случае количество полос движения определено линиями горизонтальной дорожной разметки. Проезжая часть дороги имеет две полосы движения.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100103704.jpg&quot;,&quot;sourceImage&quot;:&quot;1.37.4.jpg&quot;},{&quot;id&quot;:100103801,&quot;group&quot;:1001038,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Что из нижеперечисленного не соответствует термину «опасность для движения»?&quot;,&quot;a&quot;:[&quot;Изменение условий дорожного движения, угрожающее безопасности участников дорожного движения, вынуждающее водителя остановиться.&quot;,&quot;Изменение условий дорожного движения, угрожающее безопасности участников дорожного движения, вынуждающее водителя увеличить скорость.&quot;,&quot;Изменение технического состояния транспортного средства, угрожающее безопасности участников дорожного движения, вынуждающее водителя снизить скорость движения.&quot;,&quot;Все соответствуют.&quot;],&quot;c&quot;:1,&quot;e&quot;:&quot;&lt;p&gt;Как ни странно, но согласно Правилам дорожного движения изменение условий дорожного движения, угрожающее безопасности участников дорожного движения, вынуждающее водителя увеличить скорость, не соответствует термину «опасность для движения», например, увеличение скорости, чтобы избежать столкновения или для вывода переднеприводного автомобиля или прицепа из бокового заноса.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100103802,&quot;group&quot;:1001038,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Что из нижеперечисленного соответствует термину «опасность для движения»?&quot;,&quot;a&quot;:[&quot;Появление объекта, препятствующего движению, вынуждающего водителя совершить объезд, не изменяя скорость движения.&quot;,&quot;Изменение условий дорожного движения, угрожающее безопасности участников дорожного движения, вынуждающее водителя остановиться.&quot;,&quot;Изменение технического состояния транспортного средства, не угрожающее безопасности участников дорожного движения, вынуждающее водителя снизить скорость движения.&quot;,&quot;Все соответствуют.&quot;],&quot;c&quot;:1,&quot;e&quot;:&quot;&lt;p&gt;Изменения условий движения, соответствующие термину «опасность для движения», характеризуются наличием угрозы безопасности участников дорожного движения, которая вынудила водителя снизить скорость движения или остановиться.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100103803,&quot;group&quot;:1001038,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Какому термину соответствует состояние дорожного движения, обеспечивающее минимальную вероятность возникновения опасности для движения и дорожно-транспортного происшествия?&quot;,&quot;a&quot;:[&quot;Преимущество.&quot;,&quot;Опасность для движения.&quot;,&quot;Безопасность дорожного движения.&quot;],&quot;c&quot;:2,&quot;e&quot;:&quot;&lt;p&gt;Состояние дорожного движения, обеспечивающее минимальную вероятность возникновения опасности для движения и дорожно-транспортного происшествия, соответствует термину «Безопасность дорожного движения».&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100103803.jpg&quot;,&quot;sourceImage&quot;:&quot;1.38.3.jpg&quot;},{&quot;id&quot;:100103901,&quot;group&quot;:1001039,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Что из нижеперечисленного соответствует термину «опережение»?&quot;,&quot;a&quot;:[&quot;Объезд стоящего транспортного средства, связанный с выездом на встречную полосу движения.&quot;,&quot;Движение транспортного средства со скоростью, превышающей скорость движущегося навстречу транспортного средства.&quot;,&quot;Движение транспортного средства со скоростью, превышающей скорость попутно двигающегося транспортного средства.&quot;],&quot;c&quot;:2,&quot;e&quot;:&quot;&lt;p&gt;Опережение — это движение транспортного средства слева или справа со скоростью, превышающей скорость попутно движущегося транспортного средства. Опережение может осуществляться как после перестроения или смещения в пределах полосы движения, так и без изменения положения на проезжей части дороги.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100103902,&quot;group&quot;:1001039,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Совершает ли водитель легкового автомобиля опережение в показанной ситуации?&quot;,&quot;a&quot;:[&quot;Да, совершает.&quot;,&quot;Нет, не совершает.&quot;],&quot;c&quot;:1,&quot;e&quot;:&quot;&lt;p&gt;Водитель легкового автомобиля не осуществляет опережение, так как проезжает мимо остановившегося, а не находящегося в движении, автобуса.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100103902.jpg&quot;,&quot;sourceImage&quot;:&quot;1.39.2.jpg&quot;},{&quot;id&quot;:100103903,&quot;group&quot;:1001039,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Совершает ли водитель легкового автомобиля опережение в показанной ситуации?&quot;,&quot;a&quot;:[&quot;Да, совершает.&quot;,&quot;Нет, не совершает.&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;Водитель легкового автомобиля осуществляет опережение, так как проезжает с более высокой скоростью мимо начавшего движение автобуса.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100103903.jpg&quot;,&quot;sourceImage&quot;:&quot;1.39.3.jpg&quot;},{&quot;id&quot;:100103971,&quot;group&quot;:1001039,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Соответствует ли термину «опережение» движение автомобиля со скоростью, превышающей скорость движения попутного велосипедиста?&quot;,&quot;a&quot;:[&quot;Да, соответствует.&quot;,&quot;Нет, не соответствует.&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;Движение со скоростью, превышающей скорость движения попутного транспортного средства (в том числе велосипеда), считается опережением.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100103971.jpg&quot;,&quot;sourceImage&quot;:&quot;1.39.71.jpg&quot;},{&quot;id&quot;:100104001,&quot;group&quot;:1001040,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Является ли показанная группа транспортных средств организованной транспортной колонной?&quot;,&quot;a&quot;:[&quot;Да, является.&quot;,&quot;Нет, не является.&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;Если транспортная колонна движется в сопровождении транспортного средства оперативного назначения с включёнными проблесковыми сигналами (маячками), то она является согласно Правилам дорожного движения организованной транспортной колонной.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100104001.jpg&quot;,&quot;sourceImage&quot;:&quot;1.40.1.jpg&quot;},{&quot;id&quot;:100104002,&quot;group&quot;:1001040,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Является ли группа транспортных средств, состоящая только из трёх автобусов, изображённая на рисунке, организованной транспортной колонной?&quot;,&quot;a&quot;:[&quot;Да, является.&quot;,&quot;Нет, не является.&quot;],&quot;c&quot;:1,&quot;e&quot;:&quot;&lt;p&gt;В показанной ситуации транспортная колонна из трёх автобусов движется без сопровождения транспортного средства (транспортных средств) оперативного назначения, следовательно, она не является организованной транспортной колонной.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100104002.jpg&quot;,&quot;sourceImage&quot;:&quot;1.40.2.jpg&quot;},{&quot;id&quot;:100104003,&quot;group&quot;:1001040,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Что из нижеперечисленного соответствует термину «организованная транспортная колонна»?&quot;,&quot;a&quot;:[&quot;Транспортная колонна, движущаяся в сопровождении транспортного средства с включённым маячком оранжевого цвета.&quot;,&quot;Транспортное средство, движущееся с постоянно включённым ближним светом фар в сопровождении транспортного средства оперативного назначения с включёнными проблесковыми сигналами синего цвета.&quot;,&quot;Все варианты соответствуют.&quot;],&quot;c&quot;:1,&quot;e&quot;:&quot;&lt;p&gt;В организованной транспортной колонне сопровождением транспортного средства или транспортной колонны может быть только транспортное средство (транспортные средства) оперативного назначения с включёнными проблесковыми сигналами (маячками) синего или синего и красного цветов.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100104101,&quot;group&quot;:1001041,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Что из нижеперечисленного соответствует термину «организованная транспортная колонна»?&quot;,&quot;a&quot;:[&quot;Транспортное средство, движущееся с постоянно включённым ближним светом фар в сопровождении транспортных средств оперативного назначения с включёнными проблесковыми сигналами синего цвета.&quot;,&quot;Транспортная колонна из десяти грузовых автомобилей, движущихся с постоянно включённым ближним светом фар в сопровождении транспортного средства оперативного назначения с включёнными проблесковыми сигналами синего и красного цвета.&quot;,&quot;Соответствует всё перечисленное.&quot;],&quot;c&quot;:2,&quot;e&quot;:&quot;&lt;p&gt;В организованной транспортной колонне в сопровождении транспортного средства или транспортных средств оперативного назначения может осуществлять движение как одно транспортное средство, так и транспортная колонна.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100104132,&quot;group&quot;:1001041,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Что из нижеперечисленного соответствует термину «организованная транспортная колонна»?&quot;,&quot;a&quot;:[&quot;Группа велосипедистов, движущаяся в сопровождении транспортного средства с включёнными проблесковыми сигналами оранжевого цвета.&quot;,&quot;Группа из трёх автобусов, следующих друг за другом по одной полосе движения с постоянно включённым ближним светом фар, обозначенная опознавательными знаками «Колонна».&quot;,&quot;Два автобуса, следующие друг за другом по одной полосе движения с постоянно включённым ближним светом фар, обозначенные опознавательными знаками «Колонна», в сопровождении транспортных средств оперативного назначения с включёнными проблесковыми сигналами синего или синего и красного цветов.&quot;,&quot;Соответствуют все перечисленные.&quot;],&quot;c&quot;:2,&quot;e&quot;:&quot;&lt;p&gt;В организованной транспортной колонне в сопровождении транспортного средства или транспортных средств оперативного назначения могут осуществлять движение только механические транспортные средства. Кроме того, колонна, сопровождаемая транспортным средством с включённым маячком оранжевого цвета, не будет соответствовать согласно Правилам дорожного движения термину «организованная транспортная колонна».&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100104201,&quot;group&quot;:1001042,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Что из нижеперечисленного соответствует термину «остановка транспортного средства»?&quot;,&quot;a&quot;:[&quot;Прекращение движения транспортного средства на время до 5 минут, связанное с проверкой документов сотрудником ДПС ГАИ.&quot;,&quot;Преднамеренное прекращение движения транспортного средства на время до 5 минут, связанное с осмотром перевозимого груза.&quot;,&quot;Непреднамеренное прекращение движения транспортного средства на время до 5 минут, связанное с заменой вышедшей из строя лампочки внешнего светового прибора.&quot;,&quot;Все соответствуют.&quot;],&quot;c&quot;:1,&quot;e&quot;:&quot;&lt;p&gt;Остановкой является только преднамеренное прекращение движения. Если транспортное средство остановлено должностным лицом, имеющим право остановки транспортного средства, или прекращение движения вызвано технической неисправностью, то такое прекращение движения не является остановкой.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100104202,&quot;group&quot;:1001042,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Что из нижеперечисленного соответствует термину «остановка транспортного средства»?&quot;,&quot;a&quot;:[&quot;Преднамеренное прекращение движения транспортного средства на время до 5 минут для телефонного разговора.&quot;,&quot;Преднамеренное прекращение движения транспортного средства на время более 5 минут для высадки пассажиров.&quot;,&quot;Преднамеренное прекращение движения электромобиля на время более 5 минут для зарядки.&quot;,&quot;Все соответствуют.&quot;],&quot;c&quot;:3,&quot;e&quot;:&quot;&lt;p&gt;Любое преднамеренное прекращение движения на время до пяти минут является остановкой, а также более пяти минут, если это связано с посадкой (высадкой) пассажиров, или загрузкой (разгрузкой) транспортного средства, или зарядкой электромобиля.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100104203,&quot;group&quot;:1001042,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Что из нижеперечисленного соответствует термину «остановка транспортного средства»?&quot;,&quot;a&quot;:[&quot;Преднамеренное прекращение движения транспортного средства на время более 5 минут для загрузки транспортного средства.&quot;,&quot;Преднамеренное прекращение движения транспортного средства на время более 5 минут для проверки крепления перевозимого груза.&quot;,&quot;Преднамеренное прекращение движения транспортного средства на время более 5 минут для проверки состояния перевозимого груза.&quot;,&quot;Все соответствуют.&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;Преднамеренное прекращение движения на время более пяти минут является остановкой только если это необходимо для посадки (высадки) пассажиров либо загрузки (разгрузки) транспортного средства.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100104204,&quot;group&quot;:1001042,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Соответствует ли термину «остановка транспортного средства» преднамеренное прекращение движения для разгрузки транспортного средства?&quot;,&quot;a&quot;:[&quot;Да, только если на время до пяти минут.&quot;,&quot;Да, независимо от затраченного времени на разгрузку.&quot;,&quot;Нет, не соответствует.&quot;],&quot;c&quot;:1,&quot;e&quot;:&quot;&lt;p&gt;Остановка транспортного средства — это преднамеренное прекращение движения транспортного средства на время до 5 минут, а также более чем на 5 минут, если это необходимо для посадки (высадки) пассажиров либо загрузки (разгрузки) транспортного средства.&lt;br&gt;\r\nИными словами, совершенно неважно, сколько продлиться процесс разгрузки, — всё равно такое прекращение движения будет считаться остановкой.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100104204.jpg&quot;,&quot;sourceImage&quot;:&quot;1.42.4.jpg&quot;},{&quot;id&quot;:100104241,&quot;group&quot;:1001042,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Поставив электромобиль на длительную (многочасовую) зарядку, водитель:&quot;,&quot;a&quot;:[&quot;Совершит остановку.&quot;,&quot;Поставит автомобиль на стоянку.&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;Преднамеренное прекращение движения, если это необходимо для зарядки электромобиля, является остановкой.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100104241.jpg&quot;,&quot;sourceImage&quot;:&quot;1.42.41.jpg&quot;},{&quot;id&quot;:100104302,&quot;group&quot;:1001043,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Кто из перечисленных лиц является очевидцем дорожно-транспортного происшествия?&quot;,&quot;a&quot;:[&quot;Пешеход, непосредственно наблюдавший дорожно-транспортное происшествие, который располагает соответствующей информацией и может её предоставить.&quot;,&quot;Пассажир транспортного средства, непосредственно наблюдавший ДТП, который располагает соответствующей информацией и может её предоставить.&quot;,&quot;Работник коммунальной службы, выполнявший в установленном порядке на дороге ремонтные работы, непосредственно наблюдавший дорожно-транспортное происшествие, который располагает соответствующей информацией и может её предоставить.&quot;,&quot;Все являются очевидцами дорожно-транспортного происшествия.&quot;],&quot;c&quot;:3,&quot;e&quot;:&quot;&lt;p&gt;Очевидцем ДТП является лицо, непосредственно наблюдавшее ДТП, которое располагает соответствующей информацией и может её предоставить. Поэтому все перечисленные лица — очевидцы ДТП.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100104303,&quot;group&quot;:1001043,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Можно ли считать очевидцем дорожно-транспортного происшествия пешехода, который не видел непосредственно момента совершения ДТП, но слышал звук удара и зафиксировал в памяти положение транспортных средств на проезжей части дороги после совершения ДТП?&quot;,&quot;a&quot;:[&quot;Да.&quot;,&quot;Нет.&quot;],&quot;c&quot;:1,&quot;e&quot;:&quot;&lt;p&gt;Очевидцем ДТП является только лицо, непосредственно наблюдавшее ДТП, поэтому указанное в вопросе лицо не является очевидцем ДТП.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100104303.jpg&quot;,&quot;sourceImage&quot;:&quot;1.43.3.jpg&quot;},{&quot;id&quot;:100104401,&quot;group&quot;:1001044,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Является ли перекрёстком показанное на рисунке место примыкания к дороге выезда с прилегающей территории?&quot;,&quot;a&quot;:[&quot;Да, является.&quot;,&quot;Нет, не является.&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;В месте выезда с прилегающей территории образуется примыкание на одном уровне, которое, согласно термину, является перекрёстком.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100104401.jpg&quot;,&quot;sourceImage&quot;:&quot;1.44.1.jpg&quot;},{&quot;id&quot;:100104402,&quot;group&quot;:1001044,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Является ли перекрёстком участок дороги, показанный на рисунке?&quot;,&quot;a&quot;:[&quot;Да, является.&quot;,&quot;Нет, не является.&quot;],&quot;c&quot;:1,&quot;e&quot;:&quot;&lt;p&gt;В показанном месте отсутствует выезд с остановочных мест, имеющий проезжую часть и оборудованный как примыкание одной дороги к другой.&lt;/p&gt;\r\n&lt;p&gt;Перекрёстком является только место пересечения, примыкания или разветвления дорог.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100104402.jpg&quot;,&quot;sourceImage&quot;:&quot;1.44.2.jpg&quot;},{&quot;id&quot;:100104403,&quot;group&quot;:1001044,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;В каком случае правильно указаны границы перекрёстка?&quot;,&quot;a&quot;:[&quot;На рисунке «А».&quot;,&quot;На рисунке «Б».&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;Границы перекрёстка определяются воображаемыми линиями, соединяющими наиболее удалённые от центра перекрёстка начала закруглений проезжих частей дорог.&lt;/p&gt;\r\n&lt;p&gt;Такие линии изображены на первом рисунке, обозначенном буквой «А».&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100104403.jpg&quot;,&quot;sourceImage&quot;:&quot;1.44.3.jpg&quot;},{&quot;id&quot;:100104501,&quot;group&quot;:1001045,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Является ли перекрёстком пересечение (примыкание, разветвление) дорог, на котором организовано круговое движение?&quot;,&quot;a&quot;:[&quot;Да, является.&quot;,&quot;Нет, не является.&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;В показанной ситуации изображён въезд на перекрёсток с круговым движением.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100104501.jpg&quot;,&quot;sourceImage&quot;:&quot;1.45.1.jpg&quot;},{&quot;id&quot;:100104502,&quot;group&quot;:1001045,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Является ли перекрёстком участок дороги, показанный на изображении?&quot;,&quot;a&quot;:[&quot;Да, является.&quot;,&quot;Нет, не является.&quot;],&quot;c&quot;:1,&quot;e&quot;:&quot;&lt;p&gt;На показанном участке дороги перекрёстка нет, так как имеется не разветвление дороги, а разделение проезжих частей из-за установленного фонтана.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100104502.jpg&quot;,&quot;sourceImage&quot;:&quot;1.45.2.jpg&quot;},{&quot;id&quot;:100104503,&quot;group&quot;:1001045,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Является ли перекрёстком показанное на рисунке примыкание?&quot;,&quot;a&quot;:[&quot;Да, является.&quot;,&quot;Нет, не является.&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;На рисунке показан Т-образный перекрёсток (место примыкания одной дороги к другой).&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100104503.jpg&quot;,&quot;sourceImage&quot;:&quot;1.45.3.jpg&quot;},{&quot;id&quot;:100104504,&quot;group&quot;:1001045,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Является ли показанное пересечение дороги с железнодорожными путями железнодорожным переездом?&quot;,&quot;a&quot;:[&quot;Да, является.&quot;,&quot;Нет, не является.&quot;],&quot;c&quot;:1,&quot;e&quot;:&quot;&lt;p&gt;Железнодорожным переездом является только пересечение дороги с железнодорожными путями на одном уровне.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100104504.jpg&quot;,&quot;sourceImage&quot;:&quot;1.45.4.jpg&quot;},{&quot;id&quot;:100104601,&quot;group&quot;:1001046,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Какое из перечисленных пересечений (примыканий) является перекрёстком неравнозначных дорог?&quot;,&quot;a&quot;:[&quot;Пересечение дороги с дорожкой для всадников.&quot;,&quot;Пересечение проезжей части дороги с велосипедной дорожкой.&quot;,&quot;Выезд на дорогу с дворовой территории при отсутствии дорожных знаков приоритета.&quot;,&quot;Пересечение дороги с асфальтобетонным покрытием с дорогой, имеющей булыжное покрытие, при отсутствии дорожных знаков приоритета.&quot;],&quot;c&quot;:2,&quot;e&quot;:&quot;&lt;p&gt;Согласно термину «перекрёсток» не считаются перекрёстками пересечения дороги с пешеходными и велосипедными дорожками, а также с дорожками для всадников. Кроме того, в определении «главная дорога» сказано, что любая дорога является главной по отношению к выездам с прилегающей территории. Что касается дорог с асфальтобетонным и булыжным покрытием, то обе они имеют усовершенствованное покрытие, и при отсутствии дорожных знаков приоритета будут считаться равнозначными.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100104602,&quot;group&quot;:1001046,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Какое из перечисленных пересечений (примыканий) является перекрёстком равнозначных дорог при отсутствии дорожных знаков приоритета?&quot;,&quot;a&quot;:[&quot;Выезд на дорогу из жилой зоны.&quot;,&quot;Пересечение дороги с дорожкой для всадников.&quot;,&quot;Пересечение дороги, имеющей асфальтобетонное покрытие, с дорогой, имеющей гравийное покрытие, обработанное органическими или минеральными вяжущими материалами.&quot;,&quot;Пересечение дороги, имеющей асфальтобетонное покрытие, с дорогой, имеющей гравийное покрытие, не обработанное органическими или минеральными вяжущими материалами.&quot;],&quot;c&quot;:2,&quot;e&quot;:&quot;&lt;p&gt;Согласно термину «перекрёсток» не считаются перекрёстками пересечения дороги с дорожками для всадников, а согласно термину «главная дорога» выезд с прилегающей территории, а также пересечение дороги с усовершенствованным покрытием с дорогой без усовершенствованного покрытия не будут считаться равнозначными, так как есть дорога, являющаяся главной. В случае пересечения двух дорог с усовершенствованным покрытием и отсутствии дорожных знаков приоритета принято считать такой перекрёсток равнозначным.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100104603,&quot;group&quot;:1001046,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Какое из перечисленных примыканий является перекрёстком?&quot;,&quot;a&quot;:[&quot;Выезд на дорогу со двора.&quot;,&quot;Выезд на дорогу со строительной площадки.&quot;,&quot;Выезд на дорогу с автозаправочной станции.&quot;,&quot;Выезд на дорогу со специальной площадки, предназначенной для стоянки транспортных средств.&quot;,&quot;Все являются перекрёстками.&quot;],&quot;c&quot;:4,&quot;e&quot;:&quot;&lt;p&gt;Перекрёстками являются пересечения, примыкания и разветвления дорог. Если выезд с прилегающей территории оборудован как участок дороги (имеет выраженные границы проезжей части дороги), то такое примыкание или пересечение является перекрёстком.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100104604,&quot;group&quot;:1001046,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Что такое перекрёсток?&quot;,&quot;a&quot;:[&quot;Место пересечения дороги с железнодорожными путями на одном уровне.&quot;,&quot;Место пересечения, примыкания или разветвления дорог на одном уровне.&quot;],&quot;c&quot;:1,&quot;e&quot;:&quot;&lt;p&gt;Перекрёстками являются пересечения, примыкания и разветвления дорог, а пересечение дороги с железнодорожными путями на одном уровне является железнодорожным переездом.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100104701,&quot;group&quot;:1001047,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Является ли участок разделительной полосы, через которую проходит пешеходный переход, островком безопасности?&quot;,&quot;a&quot;:[&quot;Да, является.&quot;,&quot;Нет, не является.&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;Пешеход при переходе проезжих частей дорог находится в относительной безопасности на участке разделительной полосы, через которую проходит пешеходный переход, поэтому такой участок разделительной полосы относится к островку безопасности.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100104701.jpg&quot;,&quot;sourceImage&quot;:&quot;1.47.1.jpg&quot;},{&quot;id&quot;:100104732,&quot;group&quot;:1001047,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Является ли показанный участок разделительной зоны, ограниченный сплошной линией горизонтальной разметки, через который проходит пешеходный переход, островком безопасности?&quot;,&quot;a&quot;:[&quot;Да, является.&quot;,&quot;Нет, не является.&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;Островки безопасности на пешеходных переходах, защитные элементы которых обеспечивают конструктивное выделение, предназначены для безопасной остановки пешеходов при переходе проезжей части дороги.&lt;br&gt; В показанной ситуации на участке разделительной зоны, через которую проходит пешеходный переход, оборудованы защитные элементы. Следовательно, на показанном участке разделительной зоны оборудован островок безопасности.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100104732.jpg&quot;,&quot;sourceImage&quot;:&quot;1.47.32.jpg&quot;},{&quot;id&quot;:100104741,&quot;group&quot;:1001047,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Является ли участок пешеходного перехода, на котором остановился пешеход, островком безопасности?&quot;,&quot;a&quot;:[&quot;Да, является.&quot;,&quot;Нет, не является.&quot;],&quot;c&quot;:1,&quot;e&quot;:&quot;&lt;p&gt;Островок безопасности — это техническое средство организации дорожного движения на наземных пешеходных переходах, защитные элементы которого обеспечивают конструктивное выделение места для безопасной остановки пешеходов при переходе проезжей части дороги.&lt;/p&gt;\r\n&lt;p&gt;В показанном месте защитные элементы отсутствуют, поэтому показанный участок пешеходного перехода не является островком безопасности.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100104741.jpg&quot;,&quot;sourceImage&quot;:&quot;1.47.41.jpg&quot;},{&quot;id&quot;:100104841,&quot;group&quot;:1001048,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Является ли показанное мостовое сооружение путепроводом?&quot;,&quot;a&quot;:[&quot;Да, является.&quot;,&quot;Нет, не является.&quot;],&quot;c&quot;:1,&quot;e&quot;:&quot;&lt;p&gt;Путепровод — это инженерное сооружение, устраиваемое в местах пересечения дорог или дороги с железнодорожными путями для обеспечения беспрепятственного движения в разных уровнях.&lt;/p&gt;\r\n&lt;p&gt;Мостовое сооружение над водной преградой путепроводом не является.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100104841.jpg&quot;,&quot;sourceImage&quot;:&quot;1.48.41.jpg&quot;},{&quot;id&quot;:100104901,&quot;group&quot;:1001049,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Кто из перечисленных лиц является пешеходом?&quot;,&quot;a&quot;:[&quot;Физическое лицо, ведущее по дороге мопед.&quot;,&quot;Физическое лицо, ведущее по дороге средство персональной мобильности.&quot;,&quot;Физическое лицо, передвигающееся по дороге в инвалидной коляске.&quot;,&quot;Все перечисленные.&quot;],&quot;c&quot;:3,&quot;e&quot;:&quot;&lt;p&gt;Все перечисленные участники дорожного движения являются пешеходами, так как они осуществляют движение по дороге вне транспортных средств (инвалидная коляска не является транспортным средством).&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100104902,&quot;group&quot;:1001049,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Кто из перечисленных лиц является пешеходом?&quot;,&quot;a&quot;:[&quot;Физическое лицо, ведущее по дороге мотоцикл.&quot;,&quot;Физическое лицо, сходящее с транспортного средства.&quot;,&quot;Физическое лицо, перегоняющее через дорогу стадо коров.&quot;,&quot;Физическое лицо, выполняющее в установленном порядке работы на дороге.&quot;,&quot;Все перечисленные.&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;Из перечисленных лиц пешеходом является только лицо, ведущее мотоцикл. Лицо, выполняющее на дороге работы, не является участником дорожного движения, лицо, сходящее с транспортного средства, является в этот момент ещё пассажиром, а погонщик скота приравнен к водителю.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100104903,&quot;group&quot;:1001049,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Кто из перечисленных лиц является пешеходом?&quot;,&quot;a&quot;:[&quot;Физическое лицо, везущее по дороге санки.&quot;,&quot;Физическое лицо, двигающееся вне транспортного средства по обочине.&quot;,&quot;Физическое лицо, пересекающее проезжую часть дороги по кратчайшей траектории при отсутствии в пределах видимости пешеходных переходов и перекрёстков.&quot;,&quot;Все перечисленные.&quot;],&quot;c&quot;:3,&quot;e&quot;:&quot;&lt;p&gt;Лица, передвигающиеся по дороге вне транспортного средства и при этом не выполняющие на дороге в установленном порядке работы, являются пешеходами.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100105001,&quot;group&quot;:1001050,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Кто из перечисленных лиц является пешеходом?&quot;,&quot;a&quot;:[&quot;Физическое лицо, ведущее велосипед по пешеходному переходу.&quot;,&quot;Ребёнок, перебегающий проезжую часть дороги вне пешеходного перехода.&quot;,&quot;Физическое лицо, передвигающееся по краю проезжей части в инвалидной коляске при наличии обочины.&quot;,&quot;Все перечисленные являются пешеходами.&quot;],&quot;c&quot;:3,&quot;e&quot;:&quot;&lt;p&gt;Лица, передвигающиеся по дороге вне транспортного средства (инвалидная коляска не является транспортным средством) и при этом не выполняющие на дороге в установленном порядке работы, являются пешеходами.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100105002,&quot;group&quot;:1001050,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Кто из перечисленных лиц не является пешеходом?&quot;,&quot;a&quot;:[&quot;Физическое лицо, передвигающееся в салоне стоящего на остановке автобуса.&quot;,&quot;Физическое лицо, передвигающееся по велосипедной дорожке на роликовых коньках.&quot;,&quot;Физическое лицо, участвующее в дорожном движении вне транспортного средства и не выполняющее в установленном порядке на дороге ремонтные и другие работы.&quot;,&quot;Физическое лицо, ведущее по дороге средство персональной мобильности.&quot;,&quot;Все перечисленные не являются пешеходами.&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;Лицо, находящееся в транспортном средстве, не является пешеходом, даже если транспортное средство остановилось.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100105041,&quot;group&quot;:1001050,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Каким участником дорожного движения является лицо, передвигающееся на электросамокате?&quot;,&quot;a&quot;:[&quot;Водителем.&quot;,&quot;Пешеходом.&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;Средство персональной мобильности является транспортным средством, а управляющее им лицо — водителем.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100105041.jpg&quot;,&quot;sourceImage&quot;:&quot;1.50.41.jpg&quot;},{&quot;id&quot;:100105071,&quot;group&quot;:1001050,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;К каким участникам дорожного движения приравниваются лица, передвигающиеся на средствах персональной мобильности?&quot;,&quot;a&quot;:[&quot;К пешеходам.&quot;,&quot;К велосипедистам.&quot;,&quot;К водителям мопедов.&quot;],&quot;c&quot;:1,&quot;e&quot;:&quot;&lt;p&gt;Лица, передвигающиеся на средствах персональной мобильности, &lt;strong&gt;приравниваются к велосипедистам&lt;/strong&gt; в силу того, что условия и правила передвижения для них и водителей велосипедов чаще всего совпадают.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100105071.jpg&quot;,&quot;sourceImage&quot;:&quot;1.50.71.jpg&quot;},{&quot;id&quot;:100105202,&quot;group&quot;:1001052,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Что из нижеперечисленного соответствует термину «пешеходный переход»?&quot;,&quot;a&quot;:[&quot;Элемент дороги, примыкающий к проезжей части дороги или отделённый от неё газоном, предназначенный для движения пешеходов и велосипедистов.&quot;,&quot;Участок проезжей части, предназначенный для движения пешеходов через проезжую часть дороги и обозначенный горизонтальной дорожной разметкой.&quot;,&quot;Выделенный конструктивно или с помощью линий горизонтальной дорожной разметки элемент дороги, предназначенный для движения пешеходов, обозначенный дорожным знаком «Пешеходная дорожка».&quot;,&quot;Соответствуют все перечисленные.&quot;],&quot;c&quot;:1,&quot;e&quot;:&quot;&lt;p&gt;Пешеходным переходом является участок проезжей части дороги, предназначенный для её пересечения пешеходами в установленном порядке. В остальных вариантах ответов указаны элементы дороги, специально предназначенные для движения пешеходов.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100105241,&quot;group&quot;:1001052,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Является ли пешеходной дорожкой элемент дороги, обозначенный показанной дорожной разметкой?&quot;,&quot;a&quot;:[&quot;Да, является.&quot;,&quot;Нет, не является.&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;Велосипедная дорожка обозначается дорожными знаками «4.5.1 Велосипедная дорожка» , «4.11.1 Велосипедная и пешеходная дорожка»  и (или) дорожной разметкой 1.29  либо 1.31  соответственно.&lt;/p&gt;\r\n&lt;p&gt;Показанная горизонтальная дорожная разметка — 1.31.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100105241.jpg&quot;,&quot;sourceImage&quot;:&quot;1.52.41.jpg&quot;},{&quot;id&quot;:100105301,&quot;group&quot;:1001053,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Сколько полос движения имеет показанная проезжая часть дороги?&quot;,&quot;a&quot;:[&quot;Одну.&quot;,&quot;Две.&quot;,&quot;Три.&quot;],&quot;c&quot;:1,&quot;e&quot;:&quot;&lt;p&gt;Показанная проезжая часть дороги имеет две полосы движения, обозначенные соответствующей дорожной разметкой. Элемент дороги, над которым установлен дорожный знак 4.5.1 «Велосипедная дорожка», не является полосой движения.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100105301.jpg&quot;,&quot;sourceImage&quot;:&quot;1.53.1.jpg&quot;},{&quot;id&quot;:100105302,&quot;group&quot;:1001053,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Сколько полос движения имеет показанная проезжая часть дороги?&
