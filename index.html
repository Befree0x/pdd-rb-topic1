вшись в безопасности, и если это не создаст препятствие для движения других участников дорожного движения.&quot;],&quot;c&quot;:2,&quot;e&quot;:&quot;&lt;p&gt;Водителю не запрещено выходить на проезжую часть дороги, но при этом он должен убедиться в личной безопасности, а также ему не запрещено открывать двери транспортного средства или держать их открытыми, только если это не создаст препятствие для движения других участников дорожного движения.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100500263.jpg&quot;,&quot;sourceImage&quot;:&quot;28.402.42.jpg&quot;},{&quot;id&quot;:100500301,&quot;group&quot;:1005003,&quot;t&quot;:4,&quot;chapter&quot;:5,&quot;chapters&quot;:[5],&quot;q&quot;:&quot;В каком случае пассажиры при движении механического транспортного средства, оборудованного ремнями безопасности, обязаны быть пристёгнутыми?&quot;,&quot;a&quot;:[&quot;Только при нахождении на переднем сиденье.&quot;,&quot;На всех сиденьях транспортного средства при движении вне населённого пункта.&quot;,&quot;На всех сиденьях, оборудованных ремнями безопасности.&quot;],&quot;c&quot;:2,&quot;e&quot;:&quot;&lt;p&gt;Ошибочно принято считать, что при размещении на задних сиденьях транспортного средства пристёгиваться ремнями безопасности необязательно. Как показывают исследования, при различных видах ДТП выживаемость пассажира, пристёгнутого на заднем сиденье, значительно выше, чем у непристёгнутого.&lt;/p&gt;\r\n&lt;p&gt;Пассажиры на всех сиденьях должны быть пристёгнуты ремнями безопасности, кроме случаев, указанных в Правилах дорожного движения.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100500302,&quot;group&quot;:1005003,&quot;t&quot;:4,&quot;chapter&quot;:5,&quot;chapters&quot;:[5],&quot;q&quot;:&quot;В каком случае пассажиру при поездке на мотоцикле разрешено быть без застёгнутого мотошлема?&quot;,&quot;a&quot;:[&quot;При поездке в боковом прицепе.&quot;,&quot;При поездке ребёнка в возрасте от 12 до 16 лет в боковом прицепе.&quot;,&quot;Любой пассажир должен быть в застёгнутом мотошлеме.&quot;],&quot;c&quot;:2,&quot;e&quot;:&quot;&lt;p&gt;Все пассажиры, перевозимые на мотоциклах и мопедах, должны быть в застёгнутых мотошлемах.&lt;/p&gt;\r\n&lt;p&gt;Если мотошлем по размеру головы пассажира подобрать затруднительно (например, для ребёнка), следует отказаться от перевозки такого пассажира.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100500401,&quot;group&quot;:1005004,&quot;t&quot;:4,&quot;chapter&quot;:5,&quot;chapters&quot;:[5],&quot;q&quot;:&quot;Что из перечисленного запрещается пассажиру во время движения?&quot;,&quot;a&quot;:[&quot;Закрывать двери транспортного средства.&quot;,&quot;Кричать в салоне автомобиля, отвлекая водителя от управления транспортным средством.&quot;,&quot;Сидеть на грузе, находящемся ниже уровня бортов, при поездке на грузовом автомобиле с грузовой платформой.&quot;,&quot;Всё перечисленное.&quot;],&quot;c&quot;:1,&quot;e&quot;:&quot;&lt;p&gt;Пассажиру запрещается отвлекать водителя от управления транспортным средством во время движения.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100500402,&quot;group&quot;:1005004,&quot;t&quot;:4,&quot;chapter&quot;:5,&quot;chapters&quot;:[5],&quot;q&quot;:&quot;Что из перечисленного запрещается пассажиру во время движения?&quot;,&quot;a&quot;:[&quot;При движении на грузовом автомобиле с бортовой платформой стоять, сидеть на его бортах или на грузе, находящемся выше бортов.&quot;,&quot;Отвлекать водителя от управления транспортным средством во время его движения и (или) мешать водителю в управлении транспортным средством.&quot;,&quot;Препятствовать закрытию дверей транспортного средства, а во время его движения высовываться в оконные проёмы, открывать двери транспортного средства.&quot;,&quot;Всё перечисленное.&quot;],&quot;c&quot;:3,&quot;e&quot;:&quot;&lt;p&gt;Пассажиру запрещается отвлекать водителя от управления транспортным средством во время движения или мешать ему в управлении.&lt;/p&gt;\r\n&lt;p&gt;Остальные перечисленные действия также запрещены, так как могут привести к травмированию пассажира.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100500641,&quot;group&quot;:1005006,&quot;t&quot;:4,&quot;chapter&quot;:5,&quot;chapters&quot;:[5],&quot;q&quot;:&quot;Обязан ли пассажир по требованию сотрудника ГАИ пройти в установленном порядке проверку на предмет определения состояния алкогольного опьянения?&quot;,&quot;a&quot;:[&quot;Да, обязан в случае движения на заднем сиденье мотоцикла.&quot;,&quot;Да, обязан в случае движения на заднем сиденье мопеда.&quot;,&quot;Обязан во всех перечисленных случаях.&quot;,&quot;Нет, не обязан.&quot;],&quot;c&quot;:2,&quot;e&quot;:&quot;&lt;p&gt;Пассажир обязан по требованию сотрудника ГАИ пройти в установленном порядке проверку (освидетельствование) на предмет определения состояния алкогольного опьянения либо состояния, вызванного потреблением наркотических средств, психотропных веществ, их аналогов, токсических или других одурманивающих веществ.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100600101,&quot;group&quot;:1006001,&quot;t&quot;:5,&quot;chapter&quot;:6,&quot;chapters&quot;:[6],&quot;q&quot;:&quot;Для чего служит маячок оранжевого цвета, установленный на автомобиле, перевозящем опасные грузы?&quot;,&quot;a&quot;:[&quot;Для привлечения внимания и предупреждения участников дорожного движения о возможной опасности.&quot;,&quot;Для получения преимущества в движении по отношению к другим транспортным средствам и пешеходам.&quot;,&quot;Для оповещения участников дорожного движения о возможности несоблюдения требований дорожных знаков и дорожной разметки.&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;В показанной ситуации маячок оранжевого цвета, установленный на автомобиле, перевозящем опасные грузы, не даёт преимущества в движении, а служит для привлечения внимания и предупреждения участников дорожного движения о возможной опасности.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100600101.jpg&quot;,&quot;sourceImage&quot;:&quot;6.1.1.jpg&quot;},{&quot;id&quot;:100600102,&quot;group&quot;:1006001,&quot;t&quot;:5,&quot;chapter&quot;:6,&quot;chapters&quot;:[6],&quot;q&quot;:&quot;Кто в показанной ситуации имеет преимущество?&quot;,&quot;a&quot;:[&quot;Водитель легкового автомобиля.&quot;,&quot;Водитель транспортного средства с включённым маячком оранжевого цвета.&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;В показанной ситуации водитель легкового автомобиля находится на главной дороге и пользуется преимуществом, так как включённый маячок оранжевого цвета не даёт преимущества в движении и служит для привлечения внимания и предупреждения участников дорожного движения о возможной опасности.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100600102.jpg&quot;,&quot;sourceImage&quot;:&quot;6.1.2.jpg&quot;},{&quot;id&quot;:100600201,&quot;group&quot;:1006002,&quot;t&quot;:5,&quot;chapter&quot;:6,&quot;chapters&quot;:[6],&quot;q&quot;:&quot;Что Вам необходимо предпринять, если по дороге навстречу приближается транспортное средство оперативного назначения с включённым маячком синего цвета и специальным звуковым сигналом?&quot;,&quot;a&quot;:[&quot;Уступить дорогу и обеспечить беспрепятственный проезд указанному транспортному средству.&quot;,&quot;Снизить скорость, двигаться как можно правее, быть готовым остановиться в случае необходимости.&quot;,&quot;Остановиться на правой обочине (при её отсутствии занять на проезжей части дороги крайнее правое положение) и не возобновлять движение до проезда транспортного средства оперативного назначения.&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;В показанной ситуации по дороге во встречном направлении приближается транспортное средство оперативного назначения с включённым маячком синего цвета и специальным звуковым сигналом, поэтому Вам необходимо уступить дорогу и обеспечить беспрепятственный проезд транспортному средству оперативного назначения.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100600201.jpg&quot;,&quot;sourceImage&quot;:&quot;6.2.1.jpg&quot;},{&quot;id&quot;:100600202,&quot;group&quot;:1006002,&quot;t&quot;:5,&quot;chapter&quot;:6,&quot;chapters&quot;:[6],&quot;q&quot;:&quot;Что необходимо предпринять водителю, если по дороге в попутном направлении приближается транспортное средство оперативного назначения с включённым маячком синего цвета и специальным звуковым сигналом?&quot;,&quot;a&quot;:[&quot;Уступить дорогу и обеспечить беспрепятственный проезд указанному транспортному средству.&quot;,&quot;Снизить скорость, двигаться как можно правее, чтобы дать возможность опередить себя транспортному средству оперативного назначения.&quot;,&quot;Остановиться на правой обочине (при её отсутствии занять на проезжей части дороги крайнее правое положение) и не возобновлять движение до проезда транспортного средства оперативного назначения.&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;Если по дороге в попутном направлении приближается транспортное средство оперативного назначения с включённым маячком синего цвета и специальным звуковым сигналом, водителю необходимо уступить дорогу и обеспечить беспрепятственный проезд указанному транспортному средству.&lt;/p&gt;\r\n&lt;p&gt;Правила дорожного движения не конкретизируют, каким образом водители транспортных средств должны уступить дорогу, их действия должны соответствовать складывающейся дорожной ситуации.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100600301,&quot;group&quot;:1006003,&quot;t&quot;:5,&quot;chapter&quot;:6,&quot;chapters&quot;:[6],&quot;q&quot;:&quot;Как должен поступить в показанной ситуации водитель зелёного автомобиля при приближении транспортного средства оперативного назначения с включённым маячком синего цвета?&quot;,&quot;a&quot;:[&quot;Занять на проезжей части дороги крайнее правое положение и остановиться у края тротуара.&quot;,&quot;Продолжить движение, уступая дорогу и обеспечивая беспрепятственный проезд указанному транспортному средству.&quot;],&quot;c&quot;:1,&quot;e&quot;:&quot;&lt;p&gt;В показанной ситуации водитель зелёного автомобиля при приближении транспортного средства оперативного назначения с включённым маячком синего цвета должен продолжить движение, уступая дорогу и обеспечивая беспрепятственный проезд транспортному средству оперативного назначения.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100600301.jpg&quot;,&quot;sourceImage&quot;:&quot;6.3.1.jpg&quot;},{&quot;id&quot;:100600302,&quot;group&quot;:1006003,&quot;t&quot;:5,&quot;chapter&quot;:6,&quot;chapters&quot;:[6],&quot;q&quot;:&quot;Требуется ли от водителя красного легкового автомобиля перестроиться в правую полосу движения при приближении транспортного средства оперативного назначения с включённым маячком синего цвета?&quot;,&quot;a&quot;:[&quot;Да.&quot;,&quot;Нет, если он не создаёт препятствия для движения указанному транспортному средству.&quot;],&quot;c&quot;:1,&quot;e&quot;:&quot;&lt;p&gt;В показанной ситуации по дороге во встречном направлении приближается транспортное средство оперативного назначения с включённым маячком синего цвета, поэтому если водитель красного легкового автомобиля не создаёт препятствия для движения транспортному средству оперативного назначения, то перестраиваться в правую полосу движения нет необходимости.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100600302.jpg&quot;,&quot;sourceImage&quot;:&quot;6.3.2.jpg&quot;},{&quot;id&quot;:100600303,&quot;group&quot;:1006003,&quot;t&quot;:5,&quot;chapter&quot;:6,&quot;chapters&quot;:[6],&quot;q&quot;:&quot;Требуется ли от водителя красного легкового автомобиля перестроиться в правую полосу движения при приближении транспортного средства оперативного назначения с включённым маячком синего цвета?&quot;,&quot;a&quot;:[&quot;Да.&quot;,&quot;Нет, если водитель поворачивает налево на ближайшем перекрёстке, а полоса справа от него свободна.&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;В показанной ситуации по дороге в попутном направлении приближается транспортное средство оперативного назначения с включённым маячком синего цвета, поэтому водителю красного легкового автомобиля необходимо перестроиться в правую полосу движения, уступить дорогу и обеспечить беспрепятственный проезд транспортному средству оперативного назначения.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100600303.jpg&quot;,&quot;sourceImage&quot;:&quot;6.3.3.jpg&quot;},{&quot;id&quot;:100600401,&quot;group&quot;:1006004,&quot;t&quot;:5,&quot;chapter&quot;:6,&quot;chapters&quot;:[6],&quot;q&quot;:&quot;Как должен поступить водитель красного легкового автомобиля в показанной ситуации?&quot;,&quot;a&quot;:[&quot;Остановиться на обочине и не возобновлять движение до проезда транспортного средства, замыкающего организованную транспортную колонну.&quot;,&quot;Продолжить движение по своей полосе движения, уступая дорогу и обеспечивая беспрепятственный проезд организованной транспортной колонны.&quot;],&quot;c&quot;:1,&quot;e&quot;:&quot;&lt;p&gt;В показанной ситуации по дороге в попутном направлении приближается организованная транспортная колонна в сопровождении транспортного средства оперативного назначения с включённым маячком синего цвета, поэтому водитель красного легкового автомобиля должен продолжить движение по своей полосе движения, уступая дорогу и обеспечивая беспрепятственный проезд организованной транспортной колонны.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100600401.jpg&quot;,&quot;sourceImage&quot;:&quot;6.4.1.jpg&quot;},{&quot;id&quot;:100600402,&quot;group&quot;:1006004,&quot;t&quot;:5,&quot;chapter&quot;:6,&quot;chapters&quot;:[6],&quot;q&quot;:&quot;Как Вам следует поступить в показанной ситуации?&quot;,&quot;a&quot;:[&quot;Остановиться на обочине и не возобновлять движение до проезда транспортного средства, замыкающего организованную транспортную колонну.&quot;,&quot;Продолжить движение по своей полосе движения, уступая дорогу и обеспечивая беспрепятственный проезд организованной транспортной колонны.&quot;],&quot;c&quot;:1,&quot;e&quot;:&quot;&lt;p&gt;В показанной ситуации по дороге во встречном направлении приближается организованная транспортная колонна в сопровождении транспортного средства оперативного назначения с включённым маячком синего цвета, поэтому разрешается продолжить движение по своей полосе движения, уступая дорогу и обеспечивая беспрепятственный проезд организованной транспортной колонны.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100600402.jpg&quot;,&quot;sourceImage&quot;:&quot;6.4.2.jpg&quot;},{&quot;id&quot;:100600501,&quot;group&quot;:1006005,&quot;t&quot;:5,&quot;chapter&quot;:6,&quot;chapters&quot;:[6],&quot;q&quot;:&quot;Кто в показанной ситуации обязан уступить дорогу?&quot;,&quot;a&quot;:[&quot;Водитель легкового автомобиля.&quot;,&quot;Водитель автомобиля скорой медицинской помощи, выезжающий на дорогу задним ходом.&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;В показанной ситуации водитель автомобиля скорой медицинской помощи выезжает на дорогу задним ходом с включённым маячком синего цвета, поэтому водитель легкового автомобиля обязан уступить дорогу.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100600501.jpg&quot;,&quot;sourceImage&quot;:&quot;6.5.1.jpg&quot;},{&quot;id&quot;:100600502,&quot;group&quot;:1006005,&quot;t&quot;:5,&quot;chapter&quot;:6,&quot;chapters&quot;:[6],&quot;q&quot;:&quot;Кто в показанной ситуации обязан уступить дорогу?&quot;,&quot;a&quot;:[&quot;Водитель легкового автомобиля, движущийся по главной дороге.&quot;,&quot;Водитель автомобиля скорой медицинской помощи, движущийся по второстепенной дороге.&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;В показанной ситуации водитель автомобиля скорой медицинской помощи движется по второстепенной дороге с включённым маячком синего цвета, поэтому водитель легкового автомобиля, движущийся по главной дороге, обязан уступить дорогу.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100600502.jpg&quot;,&quot;sourceImage&quot;:&quot;6.5.2.jpg&quot;},{&quot;id&quot;:100600503,&quot;group&quot;:1006005,&quot;t&quot;:5,&quot;chapter&quot;:6,&quot;chapters&quot;:[6],&quot;q&quot;:&quot;Кто в показанной ситуации обязан уступить дорогу?&quot;,&quot;a&quot;:[&quot;Вы, управляя легковым автомобилем.&quot;,&quot;Водитель автомобиля скорой медицинской помощи.&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;В показанной ситуации к узкому участку дороги приближается автомобиль скорой медицинской помощи с включёнными маячками синего цвета, поэтому Вы, управляя легковым автомобилем, обязаны уступить дорогу.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100600503.jpg&quot;,&quot;sourceImage&quot;:&quot;6.5.3.jpg&quot;},{&quot;id&quot;:100600601,&quot;group&quot;:1006006,&quot;t&quot;:5,&quot;chapter&quot;:6,&quot;chapters&quot;:[6],&quot;q&quot;:&quot;Кто проедет перекрёсток первым в показанной ситуации?&quot;,&quot;a&quot;:[&quot;Трамвай.&quot;,&quot;Автомобиль дорожно-патрульной службы с включённым маячком синего цвета.&quot;,&quot;Трамвай одновременно с зелёным легковым автомобилем.&quot;],&quot;c&quot;:1,&quot;e&quot;:&quot;&lt;p&gt;В показанной ситуации к перекрёстку приближается автомобиль ДПС с включённым маячком синего цвета, который, пользуясь преимуществом, проедет перекрёсток первым.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100600601.jpg&quot;,&quot;sourceImage&quot;:&quot;6.6.1.jpg&quot;},{&quot;id&quot;:100600602,&quot;group&quot;:1006006,&quot;t&quot;:5,&quot;chapter&quot;:6,&quot;chapters&quot;:[6],&quot;q&quot;:&quot;Кто проедет перекрёсток первым в показанной ситуации?&quot;,&quot;a&quot;:[&quot;Автомобиль скорой медицинской помощи.&quot;,&quot;Троллейбус одновременно c зелёным легковым автомобилем.&quot;,&quot;Автомобиль скорой медицинской помощи одновременно с автомобилем, перевозящим опасный груз.&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;В показанной ситуации к перекрёстку приближается автомобиль скорой медицинской помощи с включёнными маячками синего цвета, который, пользуясь преимуществом, проедет перекрёсток первым.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100600602.jpg&quot;,&quot;sourceImage&quot;:&quot;6.6.2.jpg&quot;},{&quot;id&quot;:100600603,&quot;group&quot;:1006006,&quot;t&quot;:5,&quot;chapter&quot;:6,&quot;chapters&quot;:[6],&quot;q&quot;:&quot;Может ли в показанной ситуации водитель автомобиля скорой медицинской помощи проехать перекрёсток на запрещающий сигнал светофора?&quot;,&quot;a&quot;:[&quot;Да, при условии обеспечения безопасности дорожного движения.&quot;,&quot;Нет, не может.&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;Водители транспортных средств оперативного назначения при условии обеспечения безопасности дорожного движения с включёнными маячками синего или синего и красного цветов могут отступать от требований светофоров.&lt;/p&gt;\r\n&lt;p&gt;Водители прочих транспортных средств обязаны уступить им дорогу и обеспечить беспрепятственный проезд.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100600603.jpg&quot;,&quot;sourceImage&quot;:&quot;6.6.3.jpg&quot;},{&quot;id&quot;:100600604,&quot;group&quot;:1006006,&quot;t&quot;:5,&quot;chapter&quot;:6,&quot;chapters&quot;:[6],&quot;q&quot;:&quot;В каких направлениях разрешено продолжить движение водителю автомобиля скорой медицинской помощи на ближайшем перекрёстке?&quot;,&quot;a&quot;:[&quot;Только прямо или налево.&quot;,&quot;Прямо, налево или на разворот.&quot;,&quot;Во всех направлениях.&quot;],&quot;c&quot;:2,&quot;e&quot;:&quot;&lt;p&gt;Водитель транспортного средства оперативного назначения при включении маячков синего цвета вправе отступать от требований предписывающего дорожного знака и может продолжить движение в любом направлении. При этом он обязан заблаговременно подать сигнал световыми указателями поворота соответствующего направления.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100600604.jpg&quot;,&quot;sourceImage&quot;:&quot;6.6.4.jpg&quot;},{&quot;id&quot;:100600701,&quot;group&quot;:1006007,&quot;t&quot;:5,&quot;chapter&quot;:6,&quot;chapters&quot;:[6],&quot;q&quot;:&quot;Как должны поступить в показанной ситуации водители красного и зелёного автомобилей при приближении транспортного средства оперативного назначения?&quot;,&quot;a&quot;:[&quot;Водители обоих автомобилей должны съехать на обочину и остановиться.&quot;,&quot [&quot;Съехать на обочину дороги и остановиться.&quot;,&quot;Занять крайнее правое положение на проезжей части дороги и остановиться.&quot;,&quot;Продолжить движение, уступая дорогу и обеспечивая беспрепятственный проезд.&quot;,&quot;Продолжать движение, заняв крайнее правое положение на проезжей части дороги.&quot;],&quot;c&quot;:2,&quot;e&quot;:&quot;&lt;p&gt;В показанной ситуации по дороге с разделительной полосой во встречном направлении приближается организованная транспортная колонна в сопровождении транспортного средства оперативного назначения с включёнными маячками синего и красного цветов, поэтому водитель белого легкового автомобиля должен продолжить движение, уступая дорогу и обеспечивая беспрепятственный проезд.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100601003.jpg&quot;,&quot;sourceImage&quot;:&quot;6.10.3.jpg&quot;},{&quot;id&quot;:100601101,&quot;group&quot;:1006011,&quot;t&quot;:5,&quot;chapter&quot;:6,&quot;chapters&quot;:[6],&quot;q&quot;:&quot;Водители каких автомобилей должны остановиться на обочине в показанной ситуации при приближении транспортного средства оперативного назначения?&quot;,&quot;a&quot;:[&quot;Только водитель автобуса.&quot;,&quot;Только водители автобуса и зелёного легкового автомобиля.&quot;,&quot;Водители всех автомобилей.&quot;],&quot;c&quot;:2,&quot;e&quot;:&quot;&lt;p&gt;В показанной ситуации при приближении по дороге с разделительной зоной транспортного средства оперативного назначения с включёнными маячками синего и красного цветов водители всех автомобилей должны остановиться на обочине.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100601101.jpg&quot;,&quot;sourceImage&quot;:&quot;6.11.1.jpg&quot;},{&quot;id&quot;:100601102,&quot;group&quot;:1006011,&quot;t&quot;:5,&quot;chapter&quot;:6,&quot;chapters&quot;:[6],&quot;q&quot;:&quot;Водители каких автомобилей должны остановиться на обочине в показанной ситуации при приближении транспортного средства оперативного назначения?&quot;,&quot;a&quot;:[&quot;Только водитель автобуса.&quot;,&quot;Только водители автобуса и зелёного легкового автомобиля.&quot;,&quot;Водители всех автомобилей.&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;В показанной ситуации при приближении по дороге с разделительной полосой транспортного средства оперативного назначения с включёнными маячками синего и красного цветов должен остановиться на обочине только водитель автобуса, двигающийся в попутном направлении.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100601102.jpg&quot;,&quot;sourceImage&quot;:&quot;6.11.2.jpg&quot;},{&quot;id&quot;:100601103,&quot;group&quot;:1006011,&quot;t&quot;:5,&quot;chapter&quot;:6,&quot;chapters&quot;:[6],&quot;q&quot;:&quot;Водители каких автомобилей должны остановиться на обочине в показанной ситуации при приближении транспортного средства оперативного назначения?&quot;,&quot;a&quot;:[&quot;Только водитель зелёного легкового автомобиля.&quot;,&quot;Водители грузового и зелёного легкового автомобиля.&quot;],&quot;c&quot;:1,&quot;e&quot;:&quot;&lt;p&gt;В показанной ситуации при приближении по дороге без разделительной полосы транспортного средства оперативного назначения с включёнными маячками синего и красного цветов водители грузового и зелёного легкового автомобиля должны остановиться на обочине.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100601103.jpg&quot;,&quot;sourceImage&quot;:&quot;6.11.3.jpg&quot;},{&quot;id&quot;:100601401,&quot;group&quot;:1006014,&quot;t&quot;:5,&quot;chapter&quot;:6,&quot;chapters&quot;:[6],&quot;q&quot;:&quot;Что должен предпринять водитель, если по дороге без разделительной полосы приближается в попутном направлении транспортное средство оперативного назначения с включёнными маячками синего и красного цветов и специальным звуковым сигналом?&quot;,&quot;a&quot;:[&quot;Продолжать движение, уступая дорогу и обеспечивая беспрепятственный проезд.&quot;,&quot;Остановиться на обочине, а при её отсутствии — занять крайнее правое положение в правой полосе движения и остановиться.&quot;],&quot;c&quot;:1,&quot;e&quot;:&quot;&lt;p&gt;Если по дороге без разделительной полосы приближается в попутном направлении транспортное средство оперативного назначения с включёнными маячками синего и красного цветов и специальным звуковым сигналом, водитель должен остановиться на обочине, а при её отсутствии — занять крайнее правое положение в правой полосе движения и остановиться.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100601402,&quot;group&quot;:1006014,&quot;t&quot;:5,&quot;chapter&quot;:6,&quot;chapters&quot;:[6],&quot;q&quot;:&quot;Как Вы должны поступить, управляя легковым автомобилем, если в показанной ситуации приближается транспортное средство оперативного назначения с включёнными маячками синего и красного цветов и специальным звуковым сигналом?&quot;,&quot;a&quot;:[&quot;Продолжать движение, уступая дорогу и обеспечивая беспрепятственный проезд.&quot;,&quot;Остановиться на обочине.&quot;],&quot;c&quot;:1,&quot;e&quot;:&quot;&lt;p&gt;Если по дороге без разделительной полосы приближается во встречном направлении транспортное средство оперативного назначения с включёнными маячками синего и красного цветов и специальным звуковым сигналом, то Вы должны остановиться на обочине, а при её отсутствии — занять крайнее правое положение в правой полосе движения и остановиться.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100601402.jpg&quot;,&quot;sourceImage&quot;:&quot;6.14.2.jpg&quot;},{&quot;id&quot;:100601601,&quot;group&quot;:1006016,&quot;t&quot;:5,&quot;chapter&quot;:6,&quot;chapters&quot;:[6],&quot;q&quot;:&quot;Что должен предпринять водитель, если по дороге с разделительной полосой приближается в попутном направлении транспортное средство оперативного назначения с включёнными маячками синего и красного цветов и специальным звуковым сигналом?&quot;,&quot;a&quot;:[&quot;Продолжать движение, уступая дорогу и обеспечивая беспрепятственный проезд.&quot;,&quot;Остановиться на обочине, а при её отсутствии — занять крайнее правое положение в правой полосе движения и остановиться.&quot;],&quot;c&quot;:1,&quot;e&quot;:&quot;&lt;p&gt;Если по дороге с разделительной полосой приближается в попутном направлении транспортное средство оперативного назначения с включёнными маячками синего и красного цветов и специальным звуковым сигналом, водитель должен остановиться на обочине, а при её отсутствии — занять крайнее правое положение в правой полосе движения и остановиться.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100601602,&quot;group&quot;:1006016,&quot;t&quot;:5,&quot;chapter&quot;:6,&quot;chapters&quot;:[6],&quot;q&quot;:&quot;Как Вы должны поступить, если по дороге с разделительной полосой приближается во встречном направлении транспортное средство оперативного назначения с включёнными маячками синего и красного цветов и специальным звуковым сигналом?&quot;,&quot;a&quot;:[&quot;Остановиться справа на обочине.&quot;,&quot;Продолжать движение, уступая дорогу и обеспечивая беспрепятственный проезд.&quot;],&quot;c&quot;:1,&quot;e&quot;:&quot;&lt;p&gt;В показанной ситуации по дороге с разделительной полосой во встречном направлении приближается транспортное средство оперативного назначения с включёнными маячками синего и красного цветов и специальным звуковым сигналом, поэтому Вы должны продолжать движение, уступая дорогу и обеспечивая беспрепятственный проезд.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100601602.jpg&quot;,&quot;sourceImage&quot;:&quot;6.16.2.jpg&quot;},{&quot;id&quot;:100601701,&quot;group&quot;:1006017,&quot;t&quot;:5,&quot;chapter&quot;:6,&quot;chapters&quot;:[6],&quot;q&quot;:&quot;Как Вы должны поступить, если по дороге с разделительной зоной приближается во встречном направлении транспортное средство оперативного назначения с включёнными маячками синего и красного цветов и специальным звуковым сигналом?&quot;,&quot;a&quot;:[&quot;Остановиться справа на обочине.&quot;,&quot;Продолжать движение, уступая дорогу и обеспечивая беспрепятственный проезд.&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;В показанной ситуации по дороге без разделительной полосы во встречном направлении приближается транспортное средство оперативного назначения с включёнными маячками синего и красного цветов и специальным звуковым сигналом, поэтому Вы должны остановиться справа на обочине.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100601701.jpg&quot;,&quot;sourceImage&quot;:&quot;6.17.1.jpg&quot;},{&quot;id&quot;:100601702,&quot;group&quot;:1006017,&quot;t&quot;:5,&quot;chapter&quot;:6,&quot;chapters&quot;:[6],&quot;q&quot;:&quot;Как Вы должны поступить, управляя легковым автомобилем, если в показанной ситуации по дороге с трамвайными путями посередине, расположенными на одном уровне с проезжей частью дороги, приближается транспортное средство оперативного назначения с включёнными маячками синего и красного цветов и специальным звуковым сигналом?&quot;,&quot;a&quot;:[&quot;Продолжать движение, уступая дорогу и обеспечивая беспрепятственный проезд.&quot;,&quot;Занять крайнее правое положение в правой полосе движения и остановиться.&quot;,&quot;Продолжать движение при наличии трамваев на трамвайных путях, уступая дорогу и обеспечивая беспрепятственный проезд транспортному средству оперативного назначения.&quot;],&quot;c&quot;:1,&quot;e&quot;:&quot;&lt;p&gt;В показанной ситуации по дороге с трамвайными путями посередине во встречном направлении приближается транспортное средство оперативного назначения с включёнными маячками синего и красного цветов и специальным звуковым сигналом, поэтому Вы должны остановиться на обочине, а при её отсутствии — занять крайнее правое положение в правой полосе движения и остановиться.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100601702.jpg&quot;,&quot;sourceImage&quot;:&quot;6.17.2.jpg&quot;},{&quot;id&quot;:100601703,&quot;group&quot;:1006017,&quot;t&quot;:5,&quot;chapter&quot;:6,&quot;chapters&quot;:[6],&quot;q&quot;:&quot;Что должен предпринять водитель, если по дороге с односторонним движением приближается в попутном направлении транспортное средство оперативного назначения с включёнными маячками синего и красного цветов и специальным звуковым сигналом?&quot;,&quot;a&quot;:[&quot;Остановиться на обочине, а при её отсутствии — занять крайнее правое положение в правой полосе движения и остановиться.&quot;,&quot;Продолжать движение, уступая дорогу и обеспечивая беспрепятственный проезд транспортному средству оперативного назначения.&quot;,&quot;Перестроиться на крайнюю правую полосу движения, уступая дорогу и обеспечивая беспрепятственный проезд транспортному средству оперативного назначения.&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;Если по дороге с односторонним движением приближается в попутном направлении транспортное средство оперативного назначения с включёнными маячками синего и красного цветов и специальным звуковым сигналом, водитель должен остановиться на обочине, а при её отсутствии — занять крайнее правое положение в правой полосе движения и остановиться.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100601801,&quot;group&quot;:1006018,&quot;t&quot;:5,&quot;chapter&quot;:6,&quot;chapters&quot;:[6],&quot;q&quot;:&quot;Правильно ли поступит водитель зелёного легкового автомобиля, заняв крайнее правое положение на проезжей части дороги и остановившись, при наличии обочины?&quot;,&quot;a&quot;:[&quot;Да.&quot;,&quot;Нет, так как необходимо съехать на обочину.&quot;,&quot;Нет, так как в этой ситуации останавливаться нет необходимости.&quot;],&quot;c&quot;:1,&quot;e&quot;:&quot;&lt;p&gt;В показанной ситуации по дороге в попутном направлении приближается организованная транспортная колонна в сопровождении транспортного средства оперативного назначения с включёнными маячками синего и красного цветов, поэтому водитель зелёного легкового автомобиля должен съехать на обочину и остановиться.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100601801.jpg&quot;,&quot;sourceImage&quot;:&quot;6.18.1.jpg&quot;},{&quot;id&quot;:100601802,&quot;group&quot;:1006018,&quot;t&quot;:5,&quot;chapter&quot;:6,&quot;chapters&quot;:[6],&quot;q&quot;:&quot;Правильно ли поступит водитель зелёного легкового автомобиля, заняв крайнее правое положение на проезжей части дороги и остановившись, при наличии обочины?&quot;,&quot;a&quot;:[&quot;Да.&quot;,&quot;Нет, так как необходимо съехать на обочину.&quot;,&quot;Нет, так как в этой ситуации останавливаться нет необходимости.&quot;],&quot;c&quot;:2,&quot;e&quot;:&quot;&lt;p&gt;В показанной ситуации по дороге с разделительной полосой во встречном направлении приближается организованная транспортная колонна в сопровождении транспортного средства оперативного назначения с включёнными маячками синего и красного цветов, поэтому водитель зелёного легкового автомобиля может продолжать движение, уступая дорогу и обеспечивая беспрепятственный проезд.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100601802.jpg&quot;,&quot;sourceImage&quot;:&quot;6.18.2.jpg&quot;},{&quot;id&quot;:100601901,&quot;group&quot;:1006019,&quot;t&quot;:5,&quot;chapter&quot;:6,&quot;chapters&quot;:[6],&quot;q&quot;:&quot;В какой момент водителю, совершившему остановку на обочине при движении транспортного средства оперативного назначения с включёнными маячками синего и красного цветов, сопровождавшего организованную транспортную колонну, разрешается возобновить движение?&quot;,&quot;a&quot;:[&quot;После проезда транспортного средства оперативного назначения с включёнными маячками синего и красного цветов.&quot;,&quot;После проезда замыкающего колонну транспортного средства оперативного назначения с включённым маячком синего цвета (транспортного средства с опознавательным знаком «Колонна»).&quot;],&quot;c&quot;:1,&quot;e&quot;:&quot;&lt;p&gt;В показанной ситуации водителю, совершившему остановку на обочине при движении транспортного средства оперативного назначения с включёнными маячками синего и красного цветов, сопровождавшего организованную транспортную колонну, разрешается возобновить движение после проезда замыкающего колонну транспортного средства оперативного назначения с включённым маячком синего цвета или транспортного средства с опознавательным знаком «Колонна».&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100601901.jpg&quot;,&quot;sourceImage&quot;:&quot;6.19.1.jpg&quot;},{&quot;id&quot;:100601902,&quot;group&quot;:1006019,&quot;t&quot;:5,&quot;chapter&quot;:6,&quot;chapters&quot;:[6],&quot;q&quot;:&quot;Транспортное средство оперативного назначения не сопровождает организованную транспортную колонну. В какой момент водителю, совершившему остановку на обочине при движении транспортного средства оперативного назначения с включёнными маячками синего и красного цветов, разрешается возобновить движение?&quot;,&quot;a&quot;:[&quot;После проезда транспортного средства оперативного назначения с включённым маячком синего цвета.&quot;,&quot;После того, как начнут движение водители остальных остановившихся на обочине транспортных средств.&quot;,&quot;После проезда транспортного средства оперативного назначения с включёнными маячками синего и красного цветов.&quot;],&quot;c&quot;:2,&quot;e&quot;:&quot;&lt;p&gt;В показанной ситуации водителю, совершившему остановку на обочине при движении транспортного средства оперативного назначения с включёнными маячками синего и красного цветов, разрешается возобновить движение после проезда транспортного средства оперативного назначения.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100601902.jpg&quot;,&quot;sourceImage&quot;:&quot;6.19.2.jpg&quot;},{&quot;id&quot;:100601903,&quot;group&quot;:1006019,&quot;t&quot;:5,&quot;chapter&quot;:6,&quot;chapters&quot;:[6],&quot;q&quot;:&quot;В какой момент водителю, совершившему остановку на обочине при движении организованной транспортной колонны, разрешается возобновить движение?&quot;,&quot;a&quot;:[&quot;После проезда последнего автобуса, движущегося в составе организованной транспортной колонны.&quot;,&quot;После проезда транспортного средства оперативного назначения с включённым маячком синего цвета.&quot;],&quot;c&quot;:1,&quot;e&quot;:&quot;&lt;p&gt;В показанной ситуации водителю, совершившему остановку на обочине при движении транспортного средства оперативного назначения с включёнными маячками синего и красного цветов, сопровождавшего организованную транспортную колонну, разрешается возобновить движение после проезда замыкающего колонну транспортного средства оперативного назначения с включённым маячком синего цвета.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100601903.jpg&quot;,&quot;sourceImage&quot;:&quot;6.19.3.jpg&quot;},{&quot;id&quot;:100602001,&quot;group&quot;:1006020,&quot;t&quot;:5,&quot;chapter&quot;:6,&quot;chapters&quot;:[6],&quot;q&quot;:&quot;Разрешается ли двигаться по соседней полосе движения с транспортным средством оперативного назначения с одинаковой скоростью?&quot;,&quot;a&quot;:[&quot;Да, разрешается.&quot;,&quot;Нет, не разрешается.&quot;,&quot;Нет, если транспортное средство оперативного назначения движется с включённым маячком синего или синего и красного цветов.&quot;],&quot;c&quot;:2,&quot;e&quot;:&quot;&lt;p&gt;Если транспортное средство оперативного назначения движется с включённым маячком синего или синего и красного цветов, то двигаться по соседней полосе движения с одинаковой скоростью с ним запрещено.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100602002,&quot;group&quot;:1006020,&quot;t&quot;:5,&quot;chapter&quot;:6,&quot;chapters&quot;:[6],&quot;q&quot;:&quot;Разрешается ли опережать транспортное средство оперативного назначения?&quot;,&quot;a&quot;:[&quot;Да, разрешается.&quot;,&quot;Нет, не разрешается.&quot;,&quot;Нет, если транспортное средство оперативного назначения движется с включённым маячком синего или синего и красного цветов.&quot;],&quot;c&quot;:2,&quot;e&quot;:&quot;&lt;p&gt;Если транспортное средство оперативного назначения движется с включённым маячком синего или синего и красного цветов, то опережать его запрещено.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100602003,&quot;group&quot;:1006020,&quot;t&quot;:5,&quot;chapter&quot;:6,&quot;chapters&quot;:[6],&quot;q&quot;:&quot;Разрешается ли занимать место в организованной транспортной колонне?&quot;,&quot;a&quot;:[&quot;Да, если в замыкании колонны нет транспортного средства оперативного назначения.&quot;,&quot;Да, если позволяет дистанция между движущимися в колонне транспортными средствами.&quot;,&quot;Нет, не разрешается.&quot;],&quot;c&quot;:2,&quot;e&quot;:&quot;&lt;p&gt;Занимать место в организованной транспортной колонне, пересекать её запрещено.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100602003.jpg&quot;,&quot;sourceImage&quot;:&quot;6.20.3.jpg&quot;},{&quot;id&quot;:100602101,&quot;group&quot;:1006021,&quot;t&quot;:5,&quot;chapter&quot;:6,&quot;chapters&quot;:[6],&quot;q&quot;:&quot;Двигаясь во второй полосе движения, водитель легкового автомобиля увидел в начале транспортной колонны транспортное средство оперативного назначения с включённым маячком синего цвета. Какие его действия в такой ситуации будут соответствовать Правилам дорожного движения?&quot;,&quot;a&quot;:[&quot;Снизит скорость, продолжая движение позади замыкающего колонну транспортного средства.&quot;,&quot;Продолжит движение по второй полосе движения, опережая организованную транспортную колонну, если скорость её движения не превышает 40 км/ч.&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;В показанной ситуации водитель легкового автомобиля, двигаясь во второй полосе движения, увидел в начале транспортной колонны транспортное средство оперативного назначения с включённым маячком синего цвета, поэтому должен снизить скорость, продолжая движение позади замыкающего колонну транспортного средства, так как опережать организованную транспортную колонну запрещено.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100602101.jpg&quot;,&quot;sourceImage&quot;:&quot;6.21.1.jpg&quot;},{&quot;id&quot;:100602102,&quot;group&quot;:1006021,&quot;t&quot;:5,&quot;chapter&quot;:6,&quot;chapters&quot;:[6],&quot;q&quot;:&quot;Водитель красного автомобиля увидел в зеркале заднего вида приближающуюся организованную транспортную колонну. Какие его действия в ситуации, когда первый автомобиль колонны поравнялся с ним (начал опережать его), будут соответствовать Правилам дорожного движения?&quot;,&quot;a&quot;:[&quot;Поравнявшись с организованной транспортной колонной, будет двигаться со скоростью колонны.&quot;,&quot;Увеличит скорость, чтобы не двигаться по соседней полосе с организованной транспортной колонной.&quot;,&quot;Продолжит движение с прежней скоростью, предоставляя возможность для дальнейшего опережения себя организованной транспортной колонне.&quot;],&quot;c&quot;:2,&quot;e&quot;:&quot;&lt;p&gt;В показанной ситуации водитель красного автомобиля увидел в зеркале заднего вида приближающуюся организованную транспортную колонну в сопровождении транспортного средства оперативного назначения с включённым маячком синего цвета. Поэтому ему необходимо продолжить движение с прежней скоростью, предоставляя возможность для дальнейшего опережения себя организованной транспортной колонне.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100602102.jpg&quot;,&quot;sourceImage&quot;:&quot;6.21.2.jpg&quot;},{&quot;id&quot;:100602103,&quot;group&quot;:1006021,&quot;t&quot;:5,&quot;chapter&quot;:6,&quot;chapters&quot;:[6],&quot;q&quot;:&quot;Разрешено ли выполнить опережение транспортного средства оперативного назначения с выключенными маячками синего и красного цветов?&quot;,&quot;a&quot;:[&quot;Разрешено, не превышая максимальную разрешённую скорость движения для данного участка дороги.&quot;,&quot;Запрещено.&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;Водителям не запрещается выполнять обгон и опережение транспортных средств оперативного назначения с выключенными маячками синего или синего и красного цветов, а также двигаться по соседним полосам движения с их скоростью движения.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100602103.jpg&quot;,&quot;sourceImage&quot;:&quot;6.21.3.jpg&quot;},{&quot;id&quot;:100602201,&quot;group&quot;:1006022,&quot;t&quot;:5,&quot;chapter&quot;:6,&quot;chapters&quot;:[6],&quot;q&quot;:&quot;Как Вы должны поступить при приближении к остановившемуся на противоположной стороне дороги транспортному средству оперативного назначения с включённым маячком синего цвета?&quot;,&quot;a&quot;:[&quot;Снизить скорость движения, чтобы иметь возможность немедленно остановиться в случае необходимости.&quot;,&quot;Продолжать движение, так как транспортное средство оперативного назначения стоит на противоположной стороне дороги.&quot;,&quot;Остановиться в полосе движения и не начинать движение без разрешения регулировщика или выключения маячка синего цвета.&quot;,&quot;Съехать на обочину и остановиться (при отсутствии обочины — занять крайнее правое положение на проезжей части дороги и остановиться).&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;В показанной ситуации при приближении к остановившемуся на противоположной стороне дороги транспортному средству оперативного назначения с включённым маячком синего цвета, Вам необходимо снизить скорость движения, чтобы иметь возможность немедленно остановиться в случае необходимости.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100602201.jpg&quot;,&quot;sourceImage&quot;:&quot;6.22.1.jpg&quot;},{&quot;id&quot;:100602202,&quot;group&quot;:1006022,&quot;t&quot;:5,&quot;chapter&quot;:6,&quot;chapters&quot;:[6],&quot;q&quot;:&quot;Как Вы должны поступить при приближении к остановившемуся на полосе движения транспортному средству оперативного назначения с включённым маячком синего цвета?&quot;,&quot;a&quot;:[&quot;Остановиться в полосе движения и не начинать движение без разрешения регулировщика или выключения маячка синего цвета.&quot;,&quot;Съехать на обочину и остановиться (при отсутствии обочины — занять крайнее правое положение на проезжей части дороги и остановиться).&quot;,&quot;Снизить скорость движения, чтобы иметь возможность немедленно остановиться в случае необходимости, после чего объехать остановившееся транспортное средство оперативного назначения.&quot;],&quot;c&quot;:2,&quot;e&quot;:&quot;&lt;p&gt;В показанной ситуации при приближении к остановившемуся на полосе движения транспортному средству оперативного назначения с включённым маячком синего цвета, Вы должны снизить скорость движения, чтобы иметь возможность немедленно остановиться в случае необходимости, после чего объехать остановившееся транспортное средство оперативного назначения.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100602202.jpg&quot;,&quot;sourceImage&quot;:&quot;6.22.2.jpg&quot;},{&quot;id&quot;:100602301,&quot;group&quot;:1006023,&quot;t&quot;:5,&quot;chapter&quot;:6,&quot;chapters&quot;:[6],&quot;q&quot;:&quot;Как Вы должны поступить, приближаясь в показанной ситуации к остановившемуся автомобилю скорой помощи с включёнными маячками?&quot;,&quot;a&quot;:[&quot;Остановиться справа у тротуара.&quot;,&quot;Снизить скорость движения, чтобы иметь возможность немедленно остановиться в случае необходимости.&quot;,&quot;Продолжать движение, так как транспортное средство оперативного назначения стоит на противоположной стороне дороги за разделительной полосой.&quot;],&quot;c&quot;:1,&quot;e&quot;:&quot;&lt;p&gt;В показанной ситуации, приближаясь к остановившемуся автомобилю скорой помощи с включёнными маячками синего цвета, Вы должны снизить скорость движения, чтобы иметь возможность немедленно остановиться в случае необходимости.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100602301.jpg&quot;,&quot;sourceImage&quot;:&quot;6.23.1.jpg&quot;},{&quot;id&quot;:100602302,&quot;group&quot;:1006023,&quot;t&quot;:5,&quot;chapter&quot;:6,&quot;chapters&quot;:[6],&quot;q&quot;:&quot;Что должен сделать водитель зелёного автомобиля при приближении к стоящему транспортному средству оперативного назначения в ситуации, показанной на рисунке?&quot;,&quot;a&quot;:[&quot;Остановиться в полосе движения и не начинать движение без разрешения регулировщика или выключения маячка синего цвета.&quot;,&quot;Убедиться в отсутствии встречных транспортных средств и с соблюдением мер предосторожности объехать остановившиеся транспортные средства.&quot;,&quot;Снизить скорость движения, чтобы иметь возможность немедленно остановиться в случае необходимости, после чего объехать остановившиеся транспортные средства, убедившись в отсутствии транспортных средств на встречной полосе движения.&quot;],&quot;c&quot;:2,&quot;e&quot;:&quot;&lt;p&gt;В показанной ситуации при приближении к стоящему транспортному средству оперативного назначения с включённым маячком синего цвета водитель зелёного автомобиля должен снизить скорость движения, чтобы иметь возможность немедленно остановиться в случае необходимости, после чего объехать остановившиеся транспортные средства, убедившись в отсутствии транспортных средств на встречной полосе движения.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100602302.jpg&quot;,&quot;sourceImage&quot;:&quot;6.23.2.jpg&quot;},{&quot;id&quot;:100602401,&quot;group&quot;:1006024,&quot;t&quot;:5,&quot;chapter&quot;:6,&quot;chapters&quot;:[6],&quot;q&quot;:&quot;Что должен сделать водитель зелёного автомобиля при приближении к стоящему транспортному средству оперативного назначения в ситуации, показанной на рисунке?&quot;,&quot;a&quot;:[&quot;Убедиться в отсутствии встречных транспортных средств и с соблюдением мер предосторожности объехать остановившиеся транспортные средства.&quot;,&quot;Остановиться в полосе движения, не доезжая до транспортного средства оперативного назначения, и не начинать движение без разрешения регулировщика или выключения маячка красного цвета.&quot;,&quot;Снизить скорость движения, чтобы иметь возможность немедленно остановиться в случае необходимости, после чего объехать остановившиеся транспортные средства, убедившись в отсутствии транспортных средств на встречной полосе движения.&quot;],&quot;c&quot;:1,&quot;e&quot;:&quot;&lt;p&gt;В показанной ситуации при приближении к стоящему транспортному средству оперативного назначения с включёнными маячками синего и красного цветов водитель зелёного автомобиля должен остановиться в полосе движения, не доезжая до транспортного средства оперативного назначения, и не начинать движение без разрешения регулировщика или выключения маячка красного цвета.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100602401.jpg&quot;,&quot;sourceImage&quot;:&quot;6.24.1.jpg&quot;},{&quot;id&quot;:100602402,&quot;group&quot;:1006024,&quot;t&quot;:5,&quot;chapter&quot;:6,&quot;chapters&quot;:[6],&quot;q&quot;:&quot;Что должен сделать водитель зелёного автомобиля при приближении к стоящему транспортному средству оперативного назначения в ситуации, показанной на рисунке?&quot;,&quot;a&quot;:[&quot;Снизить скорость движения, чтобы иметь возможность немедленно остановиться в случае необходимости.&quot;,&quot;Продолжать движение, так как транспортное средство оперативного назначения стоит на противоположной стороне дороги за разделительной полосой.&quot;,&quot;Остановиться в полосе движения, не доезжая до транспортного средства оперативного назначения, и не начинать движение без разрешения регулировщика или выключения маячка красного цвета.&quot;],&quot;c&quot;:2,&quot;e&quot;:&quot;&lt;p&gt;В показанной ситуации при приближении к стоящему транспортному средству оперативного назначения с включёнными маячками синего и красного цветов и сотруднику ГАИ, который подаёт сигнал об остановке жезлом, водитель зелёного автомобиля должен остановиться в полосе движения, не доезжая до транспортного средства оперативного назначения, и не начинать движение без разрешения регулировщика или выключения маячка красного цвета.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100602402.jpg&quot;,&quot;sourceImage&quot;:&quot;6.24.2.jpg&quot;},{&quot;id&quot;:100602403,&quot;group&quot;:1006024,&quot;t&quot;:5,&quot;chapter&quot;:6,&quot;chapters&quot;:[6],&quot;q&quot;:&quot;Водители каких транспортных средств обязаны остановиться при приближении к стоящему транспортному средству оперативного назначения с включёнными маячками синего и красного цветов?&quot;,&quot;a&quot;:[&quot;Только водитель грузового автомобиля.&quot;,&quot;Только водитель легкового автомобиля.&quot;,&quot;Водители автобуса и грузового автомобиля.&quot;,&quot;Водители всех автомобилей.&quot;],&quot;c&quot;:3,&quot;e&quot;:&quot;&lt;p&gt;В показанной ситуации при приближении к стоящему транспортному средству оперативного назначения с включёнными маячками синего и красного цветов и сотруднику ГАИ, который подаёт сигнал об остановке жезлом водителю зелёного автомобиля, водители всех автомобилей обязаны остановиться, не доезжая до транспортного средства оперативного назначения.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100602403.jpg&quot;,&quot;sourceImage&quot;:&quot;6.24.3.jpg&quot;},{&quot;id&quot;:100602501,&quot;group&quot;:1006025,&quot;t&quot;:5,&quot;chapter&quot;:6,&quot;chapters&quot;:[6],&quot;q&quot;:&quot;Как Вы должны поступить при приближении к стоящему транспортному средству оперативного назначения с включённым маячком красного цвета?&quot;,&quot;a&quot;:[&quot;Снизить скорость движения, чтобы иметь возможность немедленно остановиться в случае необходимости.&quot;,&quot;Остановиться, доехав до транспортного средства оперативного назначения, и продолжить движение только после разрешения регулировщика или выключения маячка красного цвета.&quot;,&quot;Остановиться, не доезжая до транспортного средства оперативного назначения, и продолжить движение только после разрешения регулировщика или выключения маячка красного цвета.&quot;],&quot;c&quot;:2,&quot;e&quot;:&quot;&lt;p&gt;В показанной ситуации при приближении к стоящему транспортному средству оперативного назначения с включённым маячком красного цвета водитель должен остановиться, не доезжая до транспортного средства оперативного назначения, и продолжить движение только после разрешения регулировщика или выключения маячка красного цвета.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100602501.jpg&quot;,&quot;sourceImage&quot;:&quot;6.25.1.jpg&quot;},{&quot;id&quot;:100602502,&quot;group&quot;:1006025,&quot;t&quot;:5,&quot;chapter&quot;:6,&quot;chapters&quot;:[6],&quot;q&quot;:&quot;Какого цвета маячок должен быть включён на стоящем транспортном средстве оперативного назначения для остановки движущегося по дороге транспортного средства?&quot;,&quot;a&quot;:[&quot;Синего цвета.&quot;,&quot;Красного цвета.&quot;,&quot;Любого из перечисленных цветов.&quot;],&quot;c&quot;:1,&quot;e&quot;:&quot;&lt;p&gt;Для остановки движущегося по дороге транспортного средства на стоящем транспортном средстве оперативного назначения должен быть включён маячок красного цвета.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100602701,&quot;group&quot;:1006027,&quot;t&quot;:5,&quot;chapter&quot;:6,&quot;chapters&quot;:[6],&quot;q&quot;:&quot;Для чего на транспортных средствах оперативного назначения может применяться специальный звуковой сигнал?&quot;,&quot;a&quot;:[&quot;Для предоставления преимущества в движении.&quot;,&quot;Для привлечения внимания участников дорожного движения.&quot;,&quot;Для подачи сигнала остановки водителям транспортных средств.&quot;,&quot;Во всех перечисленных случаях.&quot;],&quot;c&quot;:1,&quot;e&quot;:&quot;&lt;p&gt;На транспортных средствах оперативного назначения специальный звуковой сигнал может применяться для привлечения внимания участников дорожного движения.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100602702,&quot;group&quot;:1006027,&quot;t&quot;:5,&quot;chapter&quot;:6,&quot;chapters&quot;:[6],&quot;q&quot;:&quot;Обязаны ли водители транспортных средств оперативного назначения включать специальный звуковой сигнал при включении маячков синего или синего и красного цветов?&quot;,&quot;a&quot;:[&quot;Да, обязаны.&quot;,&quot;Нет, не обязаны.&quot;],&quot;c&quot;:1,&quot;e&quot;:&quot;&lt;p&gt;Включение специального звукового сигнала на транспортных средствах оперативного назначения при включении маячков синего или синего и красного цветов не обязательно. На транспортных средствах оперативного назначения специальный звуковой сигнал может применяться для привлечения внимания участников дорожного движения.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100602703,&quot;group&quot;:1006027,&quot;t&quot;:5,&quot;chapter&quot;:6,&quot;chapters&quot;:[6],&quot;q&quot;:&quot;Водителями транспортных средств оперативного назначения:&quot;,&quot;a&quot;:[&quot;Должен подаваться специальный звуковой сигнал для привлечения внимания участников дорожного движения.&quot;,&quot;Может подаваться специальный звуковой сигнал для привлечения внимания участников дорожного движения.&quot;,&quot;Не должен подаваться специальный звуковой сигнал во избежание отвлечения внимания участников дорожного движения.&quot;],&quot;c&quot;:1,&quot;e&quot;:&quot;&lt;p&gt;На транспортных средствах оперативного назначения специальный звуковой сигнал может применяться для привлечения внимания участников дорожного движения. Обязательное включение специального звукового сигнала на транспортных средствах оперативного назначения при включении маячков синего или синего и красного цветов не обязательно.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100602901,&quot;group&quot;:1006029,&quot;t&quot;:5,&quot;chapter&quot;:6,&quot;chapters&quot;:[6],&quot;q&quot;:&quot;Могут ли водители транспортных средств дорожно-эксплуатационной службы отступать от требований дорожных знаков и разметки?&quot;,&quot;a&quot;:[&quot;Могут только в ходе выполнения работ на дороге.&quot;,&quot;Могут в любом случае при включении маячка оранжевого цвета.&quot;,&quot;Могут только при включении маячка оранжевого цвета в ходе выполнения работ на дороге.&quot;],&quot;c&quot;:2,&quot;e&quot;:&quot;&lt;p&gt;Водители транспортных средств дорожно-эксплуатационной службы могут отступать от требований дорожных знаков и разметки только при включении маячка оранжевого цвета в ходе выполнения работ на дороге.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100602901.jpg&quot;,&quot;sourceImage&quot;:&quot;6.29.1.jpg&quot;},{&quot;id&quot;:100602902,&quot;group&quot;:1006029,&quot;t&quot;:5,&quot;chapter&quot;:6,&quot;chapters&quot;:[6],&quot;q&quot;:&quot;Предоставляет ли преимущество в движении маячок оранжевого цвета, включённый на механическом транспортном средстве, осуществляющем сопровождение при перевозке крупногабаритных грузов?&quot;,&quot;a&quot;:[&quot;Да, предоставляет.&quot;,&quot;Нет, не предоставляет.&quot;,&quot;Предоставляет только при проезде узких участков дорог, на которых затруднён встречный разъезд.&quot;],&quot;c&quot;:1,&quot;e&quot;:&quot;&lt;p&gt;В показанной ситуации включённый маячок оранжевого цвета на механическом транспортном средстве, осуществляющем сопровождение при перевозке крупногабаритных грузов, не даёт преимущества в движении и служит для привлечения внимания и предупреждения участников дорожного движения о возможной опасности.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100602902.jpg&quot;,&quot;sourceImage&quot;:&quot;6.29.2.jpg&quot;},{&quot;id&quot;:100602903,&quot;group&quot;:1006029,&quot;t&quot;:5,&quot;chapter&quot;:6,&quot;chapters&quot;:[6],&quot;q&quot;:&quot;Предоставляет ли преимущество в движении маячок оранжевого цвета, включённый на механическом транспортном средстве, перевозящем опасные грузы?&quot;,&quot;a&quot;:[&quot;Да, предоставляет.&quot;,&quot;Нет, не предоставляет.&quot;,&quot;Предоставляет только при проезде нерегулируемых перекрёстков.&quot;],&quot;c&quot;:1,&quot;e&quot;:&quot;&lt;p&gt;Включённый маячок оранжевого цвета на механическом транспортном средстве, перевозящем опасные грузы, не даёт преимущества в движении и служит для привлечения внимания и предупреждения участников дорожного движения о возможной опасности.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100602903.jpg&quot;,&quot;sourceImage&quot;:&quot;6.29.3.jpg&quot;},{&quot;id&quot;:100603001,&quot;group&quot;:1006030,&quot;t&quot;:5,&quot;chapter&quot;:6,&quot;chapters&quot;:[6],&quot;q&quot;:&quot;Обязан ли водитель, являющийся участником дорожно-транспортного происшествия, принять меры по оказанию необходимой помощи пострадавшему (пострадавшим)?&quot;,&quot;a&quot;:[&quot;Обязан только в случае невозможности вызова скорой медицинской помощи.&quot;,&quot;Обязан только в случае, если он является виновником дорожно-транспортного происшествия.&quot;,&quot;Обязан только в случае, если сам не пострадал в дорожно-транспортном происшествии.&quot;,&quot;Обязан во всех вышеперечисленных случаях.&quot;],&quot;c&quot;:3,&quot;e&quot;:&quot;&lt;p&gt;Водитель, являющийся участником дорожно-транспортного происшествия, обязан при необходимости принять меры по оказанию необходимой помощи пострадавшему (пострадавшим).&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100603001.jpg&quot;,&quot;sourceImage&quot;:&quot;6.30.1.jpg&quot;},{&quot;id&quot;:100603002,&quot;group&quot;:1006030,&quot;t&quot;:5,&quot;chapter&quot;:6,&quot;chapters&quot;:[6],&quot;q&quot;:&quot;Обязан ли водитель, являющийся участником дорожно-транспортного происшествия, вызвать скорую медицинскую помощь при наличии пострадавших?&quot;,&quot;a&quot;:[&quot;Обязан только в случае, если он является виновником дорожно-транспортного происшествия.&quot;,&quot;Обязан только в случае, если они сами попросят вызвать скорую медицинскую помощь.&quot;,&quot;Обязан в любом случае.&quot;],&quot;c&quot;:2,&quot;e&quot;:&quot;&lt;p&gt;Водитель, являющийся участником дорожно-транспортного происшествия, обязан при имеющейся возможности вызвать скорую медицинскую помощь при наличии пострадавших.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100603002.jpg&quot;,&quot;sourceImage&quot;:&quot;6.30.2.jpg&quot;},{&quot;id&quot;:100603101,&quot;group&quot;:1006031,&quot;t&quot;:5,&quot;chapter&quot;:6,&quot;chapters&quot;:[6],&quot;q&quot;:&quot;В каком случае водитель, являющийся участником дорожно-транспортного происшествия, обязан принять меры по доставке пострадавших в ближайшую организацию здравоохранения на одном или нескольких попутных транспортных средствах?&quot;,&quot;a&quot;:[&quot;Только в случае, если невозможно вызвать скорую медицинскую помощь.&quot;,&quot;Только в случае, если он является виновником в совершении дорожно-транспортного происшествия.&quot;,&quot;Только в случае, если невозможно доставить пострадавших на транспортном средстве, при участии которого совершено дорожно-транспортное происшествие.&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;Водитель, являющийся участником дорожно-транспортного происшествия, обязан принять меры по доставке пострадавших в ближайшую организацию здравоохранения на одном или нескольких попутных транспортных средствах только в случае, если невозможно вызвать скорую медицинскую помощь.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100603101.jpg&quot;,&quot;sourceImage&quot;:&quot;6.31.1.jpg&quot;},{&quot;id&quot;:100603102,&quot;group&quot;:1006031,&quot;t&quot;:5,&quot;chapter&quot;:6,&quot;chapters&quot;:[6],&quot;q&quot;:&quot;В каком случае водитель, являющийся участником дорожно-транспортного происшествия, обязан доставить пострадавших в ближайшую организацию здравоохранения на транспортном средстве, при участии которого совершено дорожно-транспортное происшествие?&quot;,&quot;a&quot;:[&quot;Только в случае отсутствия повреждений кузова транспортного средства.&quot;,&quot;Только в случае, если он является виновником в совершении дорожно-транспортного происшествия.&quot;,&quot;Только в случае, если невозможно вызвать скорую медицинскую помощь и отсутствии попутных транспортных средств.&quot;],&quot;c&quot;:2,&quot;e&quot;:&quot;&lt;p&gt;Водитель, являющийся участником дорожно-транспортного происшествия, обязан доставить пострадавших в ближайшую организацию здравоохранения на транспортном средстве, при участии которого совершено дорожно-транспортное происшествие только в случае, если невозможно вызвать скорую медицинскую помощь и отсутствии попутных транспортных средств.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100603102.jpg&quot;,&quot;sourceImage&quot;:&quot;6.31.2.jpg&quot;},{&quot;id&quot;:100603103,&quot;group&quot;:1006031,&quot;t&quot;:5,&quot;chapter&quot;:6,&quot;chapters&quot;:[6],&quot;q&quot;:&quot;В каком случае водитель, являющийся участником дорожно-транспортного происшествия, обязан доставить пострадавших в ближайшую организацию здравоохранения на транспортном средстве, при участии которого совершено дорожно-транспортное происшествие, если невозможно вызвать скорую медицинскую помощь и при отсутствии попутных транспортных средств?&quot;,&quot;a&quot;:[&quot;Обязан только в попутном направлении.&quot;,&quot;Обязан, если является виновником дорожно-транспортного происшествия.&quot;,&quot;Обязан, если не является виновником дорожно-транспортного происшествия.&quot;,&quot;Обязан во всех случаях.&quot;],&quot;c&quot;:3,&quot;e&quot;:&quot;&lt;p&gt;Водитель, являющийся участником дорожно-транспортного происшествия, обязан во всех случаях доставить пострадавших в ближайшую организацию здравоохранения на транспортном средстве, при участии которого совершено дорожно-транспортное происшествие, если невозможно вызвать скорую медицинскую помощь и при отсутствии попутных транспортных средств.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100603103.jpg&quot;,&quot;sourceImage&quot;:&quot;6.31.3.jpg&quot;},{&quot;id&quot;:100603202,&quot;group&quot;:1006032,&quot;t&quot;:5,&quot;chapter&quot;:6,&quot;chapters&quot;:[6],&quot;q&quot;:&quot;Обязан ли водитель, являющийся участником дорожно-транспортного происшествия, доставивший пострадавшего в дорожно-транспортном происшествии в организацию здравоохранения, возвратиться к месту дорожно-транспортного происшествия?&quot;,&quot;a&quot;:[&quot;Водитель обязан возвратиться к месту дорожно-транспортного происшествия.&quot;,&quot;Водитель может следовать в ближайшее отделение ГАИ для составления протокола на основании зафиксированных в присутствии очевидцев положения транспортного средства, следов и предметов, относящихся к дорожно-транспортному происшествию.&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;Водитель, являющийся участником дорожно-транспортного происшествия, обязан доставить пострадавшего в дорожно-транспортном происшествии в организацию здравоохранения и после этого возвратиться к месту дорожно-транспортного происшествия.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100603231,&quot;group&quot;:1006032,&quot;t&quot;:5,&quot;chapter&quot;:6,&quot;chapters&quot;:[6],&quot;q&quot;:&quot;Что обязан сообщить водитель, доставивший пострадавшего в дорожно-транспортном происшествии в организацию здравоохранения?&quot;,&quot;a&quot;:[&quot;Фамилию и адрес места жительства пострадавшего в дорожно-транспортном происшествии.&quot;,&quot;Фамилии и адреса очевидцев дорожно-транспортного происшествия, свою фамилию, предъявив общегражданский паспорт.&quot;,&quot;Марку автомобиля, при участии которого совершено дорожно-транспортное происшествие, стаж вождения и время нахождения за рулём автомобиля.&quot;,&quot;Свою фамилию, регистрационный знак (временный номерной знак) транспортного средства, предъявив водительское удостоверение или документ, удостоверяющий личность, и свидетельство о регистрации транспортного средства либо документ, подтверждающий законность его приобретения.&quot;],&quot;c&quot;:3,&quot;e&quot;:&quot;&lt;p&gt;Водитель, доставивший пострадавшего (пострадавших) в организацию здравоохранения, обязан сообщить в этой организации свою фамилию, регистрационный знак (временный номерной знак) транспортного средства, предъявив водительское удостоверение или документ, удостоверяющий личность, и свидетельство о регистрации транспортного средства либо документ, подтверждающий законность его приобретения.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100603233,&quot;group&quot;:1006032,&quot;t&quot;:5,&quot;chapter&quot;:6,&quot;chapters&quot;:[6],&quot;q&quot;:&quot;Что обязан сообщить водитель, доставивший пострадавшего в дорожно-транспортном происшествии в организацию здравоохранения?&quot;,&quot;a&quot;:[&quot;Свою фамилию, предъявив водительское удостоверение или документ, удостоверяющий личность.&quot;,&quot;Регистрационный знак (временный номерной знак) транспортного средства, предъявив свидетельство о регистрации транспортного средства либо документ, подтверждающий законность его приобретения.&quot;,&quot;Всё перечисленное.&quot;],&quot;c&quot;:2,&quot;e&quot;:&quot;&lt;p&gt;Водитель, доставивший пострадавшего (пострадавших) в организацию здравоохранения, обязан сообщить в этой организации свою фамилию, регистрационный знак (временный номерной знак) транспортного средства, предъявив водительское удостоверение или документ, удостоверяющий личность, и свидетельство о регистрации транспортного средства либо документ, подтверждающий законность его приобретения.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100603301,&quot;group&quot;:1006033,&quot;t&quot;:5,&quot;chapter&quot;:6,&quot;chapters&quot;:[6],&quot;q&quot;:&quot;Что предварительно необходимо сделать водителю, являющемуся участником дорожно-транспортного происшествия, в случае необходимости доставки пострадавшего в организацию здравоохранения на транспортном средстве, при участии которого совершено ДТП?&quot;,&quot;a&quot;:[&quot;Записать фамилии и адреса очевидцев дорожно-транспортного происшествия.&quot;,&quot;Оградить место дорожно-транспортного происшествия, организовать объезд места ДТП.&quot;,&quot;Зафиксировать в присутствии очевидцев положение транспортного средства, следы и предметы, относящиеся к дорожно-транспортному происшествию.&quot;],&quot;c&quot;:2,&quot;e&quot;:&quot;&lt;p&gt;Водителю, являющемуся участником дорожно-транспортного происшествия, в случае необходимости доставки пострадавшего в организа
