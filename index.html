      const questions = [{&quot;id&quot;:100100101,&quot;group&quot;:1001001,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Что из нижеперечисленного соответствует термину «автопоезд»?&quot;,&quot;a&quot;:[&quot;Колёсный трактор, буксирующий прицеп.&quot;,&quot;Эвакуатор, буксирующий на жёсткой сцепке неисправный автомобиль.&quot;,&quot;Велосипед, буксирующий велосипедный прицеп промышленного производства.&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;Автопоездом является состав транспортных средств, состоящий из автомобиля или колёсного трактора и буксируемого прицепа.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100100102,&quot;group&quot;:1001001,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Что из нижеперечисленного не соответствует термину «автопоезд»?&quot;,&quot;a&quot;:[&quot;Колёсный трактор, буксирующий полуприцеп.&quot;,&quot;Грузовой автомобиль, буксирующий прицеп-роспуск.&quot;,&quot;Легковой автомобиль, буксирующий одноосный прицеп.&quot;,&quot;Мопед, буксирующий велосипедный прицеп промышленного производства.&quot;],&quot;c&quot;:3,&quot;e&quot;:&quot;&lt;p&gt;Мопед, буксирующий прицеп, не является автопоездом, потому что тягачом в составе автопоезда может быть либо автомобиль, либо колёсный трактор.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100100103,&quot;group&quot;:1001001,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Что из нижеперечисленного не соответствует термину «автопоезд»?&quot;,&quot;a&quot;:[&quot;Грузовой автомобиль, буксирующий одноосный прицеп.&quot;,&quot;Легковой автомобиль, буксирующий прицеп массой более 550 килограммов.&quot;,&quot;Легковой автомобиль, буксирующий прицеп массой не более 550 килограммов.&quot;,&quot;Велосипед, буксирующий велосипедный прицеп промышленного производства.&quot;],&quot;c&quot;:3,&quot;e&quot;:&quot;&lt;p&gt;Велосипед, буксирующий прицеп, не является автопоездом, потому что тягачом в составе автопоезда может быть либо автомобиль, либо колёсный трактор.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100100201,&quot;group&quot;:1001002,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Что из нижеперечисленного соответствует термину «велосипед»?&quot;,&quot;a&quot;:[&quot;Средство персональной мобильности.&quot;,&quot;Мопед с выключенным двигателем, который пешеход ведёт по дороге.&quot;,&quot;Инвалидная коляска, приводимая в движение мускульной силой человека, находящегося в ней.&quot;,&quot;Трёхколёсное транспортное средство, приводимое в движение с помощью педалей мускульной силой человека, находящегося на (в) нём.&quot;],&quot;c&quot;:3,&quot;e&quot;:&quot;&lt;p&gt;Трёхколёсное транспортное средство, приводимое в движение с помощью педалей мускульной силой человека, находящегося на (в) нём, соответствует термину «велосипед», в отличие от остальных предложенных вариантов.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100100202,&quot;group&quot;:1001002,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Что из нижеперечисленного не соответствует термину «велосипед»?&quot;,&quot;a&quot;:[&quot;Роликовые коньки.&quot;,&quot;Инвалидная коляска, приводимая в движение электродвигателем.&quot;,&quot;Не соответствует всё перечисленное.&quot;],&quot;c&quot;:2,&quot;e&quot;:&quot;&lt;p&gt;Велосипед — это транспортное средство, которое приводится в движение мускульной силой человека (людей), находящегося на (в) нём, в частности при помощи педалей или рукояток.&lt;br&gt;\r\nК велосипеду приравниваются аналогичные по конструкции транспортные средства, имеющие электродвигатель номинальной максимальной мощностью в режиме длительной нагрузки, не превышающей 0.25 кВт, и (или) максимальную конструктивную скорость движения, определённую его технической характеристикой, не более 25 км/ч либо иной двигатель с аналогичной характеристикой.&lt;/p&gt;\r\n&lt;p&gt;Роликовые коньки и инвалидная коляска не являются транспортными средствами, а лица, передвигающиеся с помощью перечисленных устройств, являются пешеходами.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100100203,&quot;group&quot;:1001002,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Что из нижеперечисленного соответствует термину «велосипед»?&quot;,&quot;a&quot;:[&quot;Двухколёсное транспортное средство, приводимое в движение мускульной силой человека, находящегося на нём.&quot;,&quot;Трёхколёсное двухместное транспортное средство, приводимое в движение мускульной силой одного человека, находящегося в нём.&quot;,&quot;Соответствуют оба варианта ответа.&quot;],&quot;c&quot;:2,&quot;e&quot;:&quot;&lt;p&gt; Велосипед — транспортное средство, за исключением инвалидных колясок, которое имеет не менее двух (точное количество не оговаривается) колёс и приводится в движение мускульной силой человека (людей), находящегося на (в) нём, в частности при помощи педалей или рукояток.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100100301,&quot;group&quot;:1001003,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Что из нижеперечисленного соответствует термину «видимость дороги»?&quot;,&quot;a&quot;:[&quot;Максимальное расстояние, на котором с места водителя можно распознать пешехода.&quot;,&quot;Минимальное расстояние, на котором с места водителя можно увидеть «стоп-линию».&quot;,&quot;Максимальное расстояние в направлении движения, на котором с места водителя можно распознать количество проезжих частей на дороге.&quot;,&quot;Максимальное расстояние вправо от направления движения, на котором можно распознать транспортные средства, приближающиеся к перекрёстку по главной дороге.&quot;],&quot;c&quot;:2,&quot;e&quot;:&quot;&lt;p&gt;Видимость дороги — это максимальное расстояние в направлении движения, на котором с места водителя можно распознать элементы дороги и технические средства организации дорожного движения, а минимальное расстояние видимости «стоп-линии» обусловлено обзорностью с места водителя вперёд–вниз, ограниченной конструкцией автомобиля.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100100401,&quot;group&quot;:1001004,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Кто из перечисленных лиц является водителем?&quot;,&quot;a&quot;:[&quot;Физическое лицо, обучаемое управлению транспортным средством в момент сдачи квалификационного практического экзамена на автодроме.&quot;,&quot;Физическое лицо, управляющее транспортным средством, включая лицо, обучаемое управлению механическим транспортным средством (сдающее квалификационный практический экзамен на право управления механическим транспортным средством).&quot;,&quot;Физическое лицо, управляющее транспортным средством, за исключением лица, обучаемого управлению механическим транспортным средством (сдающего квалификационный практический экзамен на право управления механическим транспортным средством).&quot;],&quot;c&quot;:2,&quot;e&quot;:&quot;&lt;p&gt;Лицо, обучаемое управлению механическим транспортным средством, не является водителем даже при управлении транспортным средством. В таких случаях водителем является лицо, обучающее управлению механическим транспортным средством, и при этом находящееся в нём.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100100401.jpg&quot;,&quot;sourceImage&quot;:&quot;1.4.1.jpg&quot;},{&quot;id&quot;:100100402,&quot;group&quot;:1001004,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Кто из перечисленных лиц не является водителем?&quot;,&quot;a&quot;:[&quot;Всадник.&quot;,&quot;Велосипедист.&quot;,&quot;Лицо, управляющее гужевым транспортным средством.&quot;,&quot;Лицо, передвигающееся в инвалидной коляске.&quot;],&quot;c&quot;:3,&quot;e&quot;:&quot;&lt;p&gt;Лицо, передвигающееся в инвалидной коляске, является пешеходом, а не водителем. В остальных вариантах ответов перечислены лица, управляющие транспортными средствами, и лицо, приравненное к водителю (всадник).&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100100403,&quot;group&quot;:1001004,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Следует ли считать водителем лицо, обучающее управлению механическим транспортным средством?&quot;,&quot;a&quot;:[&quot;Да, при его нахождении в транспортном средстве.&quot;,&quot;Да, при его нахождении вне транспортного средства на автодроме.&quot;,&quot;Да, в обоих случаях.&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;Лицо, обучающее управлению механическим транспортным средством, считается водителем только при нахождении в транспортном средстве.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100100404,&quot;group&quot;:1001004,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Кого следует считать водителем?&quot;,&quot;a&quot;:[&quot;Лицо, обучаемое управлению механическим транспортным средством.&quot;,&quot;Лицо, обучающее управлению механическим транспортным средством и при этом находящееся в нём.&quot;,&quot;Лицо, обучающее управлению механическим транспортным средством и при этом не находящееся в нём.&quot;,&quot;Лицо, сдающее квалификационный практический экзамен на право управления механическим транспортным средством.&quot;,&quot;Все перечисленные считаются водителями.&quot;],&quot;c&quot;:1,&quot;e&quot;:&quot;&lt;p&gt;Лицо, обучающее управлению механическим транспортным средством, считается водителем только при нахождении в транспортном средстве. Лицо, обучаемое управлению механическим транспортным средством, водителем не является.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100100501,&quot;group&quot;:1001005,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;В каком случае лицо, обучаемое управлению механическим транспортным средством, является водителем?&quot;,&quot;a&quot;:[&quot;При обучении управлению колёсным трактором.&quot;,&quot;При проведении администрацией учебной организации контроля за обучением управлению механическим транспортным средством.&quot;,&quot;При сдаче квалификационного практического экзамена на право управления механическим транспортным средством.&quot;,&quot;Не является в любом из перечисленных случаев.&quot;],&quot;c&quot;:3,&quot;e&quot;:&quot;&lt;p&gt;Лицо, обучаемое управлению механическим транспортным средством, водителем не является.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100100502,&quot;group&quot;:1001005,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Является ли лицо, обучаемое управлению механическим транспортным средством, водителем?&quot;,&quot;a&quot;:[&quot;Да, при обучении вождению по дорогам общего пользования.&quot;,&quot;Да, когда обучаемое лицо причастно к управлению механическим транспортным средством.&quot;,&quot;Не является в любом из перечисленных случаев.&quot;],&quot;c&quot;:2,&quot;e&quot;:&quot;&lt;p&gt;Лицо, обучаемое управлению механическим транспортным средством, самоходной машиной (сдающее квалификационный практический экзамен на право управления механическим транспортным средством, самоходной машиной), согласно Правилам дорожного движения не является водителем.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100100502.jpg&quot;,&quot;sourceImage&quot;:&quot;1.5.2.jpg&quot;},{&quot;id&quot;:100100503,&quot;group&quot;:1001005,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;К какому участнику дорожного движения приравнивается физическое лицо, ведущее лошадь?&quot;,&quot;a&quot;:[&quot;К водителю.&quot;,&quot;К пешеходу.&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;К водителю приравниваются всадник, погонщик скота.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100100503.jpg&quot;,&quot;sourceImage&quot;:&quot;1.5.3.jpg&quot;},{&quot;id&quot;:100100541,&quot;group&quot;:1001005,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Пешеход станет водителем, если воспользуется для дальнейшего передвижения:&quot;,&quot;a&quot;:[&quot;Велосипедом.&quot;,&quot;Средством персональной мобильности (электросамокатом).&quot;,&quot;Любым из представленных устройств.&quot;],&quot;c&quot;:2,&quot;e&quot;:&quot;&lt;p&gt;Водитель — это физическое лицо, управляющее транспортным средством.&lt;/p&gt;\r\n&lt;p&gt;И велосипед, и средство персональной мобильности являются транспортными средствами.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100100541.jpg&quot;,&quot;sourceImage&quot;:&quot;1.5.41.jpg&quot;},{&quot;id&quot;:100100601,&quot;group&quot;:1001006,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Какие из показанных транспортных средств являются автомобилями?&quot;,&quot;a&quot;:[&quot;А и Б.&quot;,&quot;Б и В.&quot;,&quot;Только А.&quot;,&quot;Только Б.&quot;,&quot;Все изображённые транспортные средства.&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;Грузовой автомобиль и автобус являются автомобилями, а мотоцикл даже с боковым прицепом автомобилем не является. Автомобиль имеет не менее четырёх колёс, расположенных не менее чем на двух осях.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100100601.jpg&quot;,&quot;sourceImage&quot;:&quot;1.6.1.jpg&quot;},{&quot;id&quot;:100100602,&quot;group&quot;:1001006,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Является ли автомобиль с числом мест для сидения равным десяти (включая место водителя) автобусом?&quot;,&quot;a&quot;:[&quot;Да, является.&quot;,&quot;Нет, не является.&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;Автомобиль с числом мест более девяти, включая место водителя, является автобусом. Для управления таким транспортным средством необходимо водительское удостоверение категории «D».&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100100603,&quot;group&quot;:1001006,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;В каком случае квадрициклы (мотоколяски) приравниваются к автомобилям?&quot;,&quot;a&quot;:[&quot;Если имеют четыре колеса.&quot;,&quot;Если имеют приводы управления автомобильного типа.&quot;,&quot;Если имеют массу в снаряжённом состоянии не более 550 килограммов.&quot;,&quot;Только если выполняются все перечисленные условия.&quot;],&quot;c&quot;:3,&quot;e&quot;:&quot;&lt;p&gt;К автомобилям приравниваются квадрициклы (мотоколяски) — четырёхколёсные механические транспортные средства, имеющие приводы управления автомобильного типа и массу в снаряжённом состоянии не более 550 килограммов.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100100603.jpg&quot;,&quot;sourceImage&quot;:&quot;1.6.3.jpg&quot;},{&quot;id&quot;:100100604,&quot;group&quot;:1001006,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Какие из показанных транспортных средств являются автомобилями?&quot;,&quot;a&quot;:[&quot;Только транспортное средство, обозначенное буквой «А».&quot;,&quot;Только транспортное средство, обозначенное буквой «Б».&quot;,&quot;Все показанные транспортные средства.&quot;,&quot;Все показанные транспортные средства не являются автомобилями.&quot;],&quot;c&quot;:2,&quot;e&quot;:&quot;&lt;p&gt;Автомобилем считается любое механическое транспортное средство, имеющее не менее четырёх колёс, расположенных не менее чем на двух осях, за исключением колёсных тракторов и самоходных машин.&lt;/p&gt;\r\n&lt;p&gt;Поэтому оба изображённых транспортных средства являются автомобилями.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100100604.jpg&quot;,&quot;sourceImage&quot;:&quot;1.6.4.jpg&quot;},{&quot;id&quot;:100100701,&quot;group&quot;:1001007,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Что из нижеперечисленного является велосипедной дорожкой согласно Правилам дорожного движения?&quot;,&quot;a&quot;:[&quot;Только элемент дороги, выделенный конструктивно, предназначенный для движения велосипедистов и водителей средств персональной мобильности, обозначенный дорожным знаком «Велосипедная и пешеходная дорожка».&quot;,&quot;Только элемент дороги, выделенный с помощью линий горизонтальной дорожной разметки, предназначенный для движения велосипедистов и водителей средств персональной мобильности, обозначенный дорожным знаком «Велосипедная дорожка».&quot;,&quot;Только обособленная дорога, предназначенная для движения велосипедистов и водителей средств персональной мобильности, обозначенная дорожным знаком «Велосипедная дорожка».&quot;,&quot;Всё перечисленное.&quot;],&quot;c&quot;:3,&quot;e&quot;:&quot;&lt;p&gt;Велосипедная дорожка может быть как обособленной дорогой, так и элементом дороги, который может быть выделен конструктивно либо при помощи линий горизонтальной дорожной разметки.&lt;/p&gt;\r\n&lt;p&gt;Если велосипедная дорожка отделена от проезжей части дороги только при помощи линий горизонтальной дорожной разметки, водители механических транспортных средств на таком участке дороги должны быть очень внимательны и принимать все меры, обеспечивающие безопасные условия движения велосипедистов и пешеходов.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100100703,&quot;group&quot;:1001007,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Является ли показанная территория жилой зоной?&quot;,&quot;a&quot;:[&quot;Да, является.&quot;,&quot;Является только при наличии знака «Жилая зона».&quot;,&quot;Нет, не является.&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;Жилой зоной является не только территория, обозначенная соответствующими дорожными знаками, но и любая дворовая территория, прилегающая к жилой застройке.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100100703.jpg&quot;,&quot;sourceImage&quot;:&quot;1.7.3.jpg&quot;},{&quot;id&quot;:100100741,&quot;group&quot;:1001007,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Показанная велосипедная дорожка предназначена для движения:&quot;,&quot;a&quot;:[&quot;Только велосипедистов.&quot;,&quot;Велосипедистов и водителей средств персональной мобильности.&quot;],&quot;c&quot;:1,&quot;e&quot;:&quot;&lt;p&gt;Велосипедная дорожка предназначена для движения водителей велосипедов и средств персональной мобильности.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100100741.jpg&quot;,&quot;sourceImage&quot;:&quot;1.7.41.jpg&quot;},{&quot;id&quot;:100100772,&quot;group&quot;:1001007,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Какая из перечисленных территорий соответствует определению «жилая зона»?&quot;,&quot;a&quot;:[&quot;Территория дачного кооператива.&quot;,&quot;Территория сельскохозяйственного кооператива.&quot;,&quot;Все перечисленные территории соответствуют.&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;&lt;strong&gt;Территория дачного кооператива считается жилой зоной&lt;/strong&gt; ввиду отсутствия элементов для движения пешеходов (тротуаров, пешеходных дорожек, обочин) и из-за узких проездов для транспортных средств между дачными участками.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100100773,&quot;group&quot;:1001007,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Какие из перечисленных территорий соответствуют определению «жилая зона»?&quot;,&quot;a&quot;:[&quot;Территория дачного кооператива.&quot;,&quot;Территория садоводческого товарищества.&quot;,&quot;Все перечисленные территории соответствуют.&quot;],&quot;c&quot;:2,&quot;e&quot;:&quot;&lt;p&gt;&lt;strong&gt;Территории дачного кооператива и садового товарищества считаются жилой зоной&lt;/strong&gt; ввиду отсутствия элементов для движения пешеходов (тротуаров, пешеходных дорожек, обочин) и из-за узких проездов для транспортных средств между дачными и садовыми участками.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100100801,&quot;group&quot;:1001008,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Кто из нижеперечисленных лиц является водителем?&quot;,&quot;a&quot;:[&quot;Физическое лицо, обучаемое управлению самоходной машиной.&quot;,&quot;Физическое лицо, принимающее квалификационный практический экзамен на право управления механическим транспортным средством и при этом находящееся в нём.&quot;,&quot;Физическое лицо, принимающее квалификационный практический экзамен на право управления механическим транспортным средством и при этом не находящееся в нём.&quot;],&quot;c&quot;:1,&quot;e&quot;:&quot;&lt;p&gt;Физическое лицо, принимающее квалификационный практический экзамен на право управления механическим транспортным средством, приравнивается к водителю только при нахождении в транспортном средстве, а лицо, обучаемое управлению, водителем не является.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100100802,&quot;group&quot;:1001008,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Кто из нижеперечисленных лиц является водителем?&quot;,&quot;a&quot;:[&quot;Физическое лицо, обучаемое управлению механическим транспортным средством.&quot;,&quot;Физическое лицо, обучающее управлению механическим транспортным средством и при этом находящееся в нём.&quot;,&quot;Физическое лицо, обучающее управлению механическим транспортным средством и при этом не находящееся в нём.&quot;,&quot;Физическое лицо, принимающее квалификационный практический экзамен на право управления механическим транспортным средством и при этом не находящееся в нём.&quot;],&quot;c&quot;:1,&quot;e&quot;:&quot;&lt;p&gt;Физическое лицо, обучающее управлению механическим транспортным средством или принимающее квалификационный практический экзамен на право управления таким средством, приравнивается к водителю только при нахождении в транспортном средстве, а лицо, обучаемое управлению, водителем не является.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100100803,&quot;group&quot;:1001008,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Какие из нижеперечисленных лиц являются водителями?&quot;,&quot;a&quot;:[&quot;Погонщик скота.&quot;,&quot;Физическое лицо, управляющее самоходной машиной.&quot;,&quot;Физическое лицо, принимающее квалификационный практический экзамен на право управления механическим транспортным средством и при этом находящееся в нём.&quot;,&quot;Все вышеперечисленные.&quot;],&quot;c&quot;:3,&quot;e&quot;:&quot;&lt;p&gt;Физическое лицо, обучающее управлению механическим транспортным средством или принимающее квалификационный практический экзамен на право управления таким средством, приравнивается к водителю при нахождении в транспортном средстве, также к водителям приравниваются всадники и погонщики скота.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100100803.jpg&quot;,&quot;sourceImage&quot;:&quot;1.8.3.jpg&quot;},{&quot;id&quot;:100100901,&quot;group&quot;:1001009,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;В каком из перечисленных случаев водитель совершил вынужденную остановку?&quot;,&quot;a&quot;:[&quot;Остановился на обочине из-за прокола колеса.&quot;,&quot;Остановился у тротуара при появившемся стуке в подвеске правого колеса.&quot;,&quot;Остановился в полосе движения из-за ослепления фарами встречного автомобиля.&quot;,&quot;Во всех перечисленных случаях.&quot;],&quot;c&quot;:3,&quot;e&quot;:&quot;&lt;p&gt;Любое прекращение движения, вызванное технической неисправностью, а также опасностью для движения (в том числе из-за состояния водителя), является вынужденной остановкой транспортного средства.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100100902,&quot;group&quot;:1001009,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;В каком из перечисленных случаев водитель совершил вынужденную остановку?&quot;,&quot;a&quot;:[&quot;Остановился у тротуара для того, чтобы купить газету.&quot;,&quot;Остановился у тротуара для того, чтобы уточнить дорогу у прохожих.&quot;,&quot;Остановился у тротуара, чтобы устранить опасное для движения смещение перевозимого груза.&quot;,&quot;Водитель не совершил вынужденную остановку ни в одном из перечисленных случаев.&quot;],&quot;c&quot;:2,&quot;e&quot;:&quot;&lt;p&gt;В перечисленных вариантах ответов опасность для движения появилась только в случае смещения перевозимого груза, в остальных случаях ни опасности для движения, ни препятствия для движения нет, следовательно — остальные перечисленные случае не являются вынужденной остановкой.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100100903,&quot;group&quot;:1001009,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Водитель прекратил движение из-за того, что его ослепило заходящее солнце. Совершил ли он при этом вынужденную остановку?&quot;,&quot;a&quot;:[&quot;Да.&quot;,&quot;Нет.&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;Прекращение движения из-за опасности для движения, создаваемой состоянием водителя, является вынужденной остановкой транспортного средства.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100101001,&quot;group&quot;:1001010,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Какому из нижеперечисленных условий соответствует термин «вынужденная остановка транспортного средства»?&quot;,&quot;a&quot;:[&quot;Прекращение движения водителем такси для посадки пассажира.&quot;,&quot;Прекращение движения ввиду того, что пассажир потерял сознание.&quot;,&quot;Преднамеренное прекращение движения с целью высадки пассажиров.&quot;,&quot;Преднамеренное прекращение движения с целью разгрузки транспортного средства.&quot;],&quot;c&quot;:1,&quot;e&quot;:&quot;&lt;p&gt;Прекращение движения из-за опасности, создаваемой состоянием пассажира, является вынужденной остановкой транспортного средства.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100101002,&quot;group&quot;:1001010,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Какому из нижеперечисленных условий соответствует термин «вынужденная остановка транспортного средства»?&quot;,&quot;a&quot;:[&quot;Прекращение движения из-за перегрева двигателя.&quot;,&quot;Прекращение движения по требованию сотрудника ГАИ.&quot;,&quot;Прекращение движения в соответствии с требованием «уступить дорогу».&quot;,&quot;Прекращение движения из-за закрытого шлагбаума на железнодорожном переезде.&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;Любое прекращение движения, вызванное технической неисправностью, является вынужденной остановкой транспортного средства. В остальных перечисленных случаях опасность для движения отсутствует, а прекращение движения обусловлено выполнением требований Правил дорожного движения.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100101003,&quot;group&quot;:1001010,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Какому из нижеперечисленных условий соответствует термин «вынужденная остановка транспортного средства»?&quot;,&quot;a&quot;:[&quot;Прекращение движения по требованию регулировщика.&quot;,&quot;Прекращение движения на запрещающий сигнал светофора.&quot;,&quot;Прекращение движения из-за лежащего на проезжей части дороги пешехода.&quot;,&quot;Прекращение движения перед пешеходным переходом, чтобы предоставить преимущество пешеходам.&quot;],&quot;c&quot;:2,&quot;e&quot;:&quot;&lt;p&gt;Лежащий на проезжей части пешеход создаёт опасность для движения и является препятствием для движения. В остальных перечисленных случаях опасность для движения отсутствует, а прекращение движения обусловлено выполнением требований Правил дорожного движения.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100101101,&quot;group&quot;:1001011,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Какие транспортные средства находятся на главной дороге?&quot;,&quot;a&quot;:[&quot;Только автобус.&quot;,&quot;Только грузовой автомобиль.&quot;,&quot;Легковой автомобиль и автобус.&quot;,&quot;Транспортные средства находятся перед перекрёстком равнозначных дорог.&quot;],&quot;c&quot;:3,&quot;e&quot;:&quot;&lt;p&gt;Перед перекрёстком отсутствуют дорожные знаки приоритета, покрытие дорог — одинаковое, следовательно, такой перекрёсток считается перекрёстком равнозначных дорог. Наличие на одной из дорог трамвайных путей или большего количества полос движения не делает такую дорогу главной по отношению к другим дорогам.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100101101.jpg&quot;,&quot;sourceImage&quot;:&quot;1.11.1.jpg&quot;},{&quot;id&quot;:100101102,&quot;group&quot;:1001011,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Какие транспортные средства находятся на главной дороге?&quot;,&quot;a&quot;:[&quot;Только грузовой автомобиль.&quot;,&quot;Только легковой автомобиль.&quot;,&quot;Грузовой автомобиль и автобус.&quot;,&quot;Легковой и грузовой автомобили.&quot;],&quot;c&quot;:2,&quot;e&quot;:&quot;&lt;p&gt;Дорога, на которой находятся грузовой автомобиль и автобус, обозначена дорожным знаком 2.1 «Главная дорога» , поэтому перечисленные транспортные средства находятся на главной дороге.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100101102.jpg&quot;,&quot;sourceImage&quot;:&quot;1.11.2.jpg&quot;},{&quot;id&quot;:100101103,&quot;group&quot;:1001011,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Какие транспортные средства находятся на главной дороге?&quot;,&quot;a&quot;:[&quot;Только автобус.&quot;,&quot;Только легковой автомобиль.&quot;,&quot;Легковой автомобиль и автобус.&quot;,&quot;Легковой и грузовой автомобили.&quot;],&quot;c&quot;:2,&quot;e&quot;:&quot;&lt;p&gt;Дорога, на которой находятся легковой автомобиль и автобус, обозначена дорожным знаком 2.1 «Главная дорога» , поэтому перечисленные транспортные средства находятся на главной дороге.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100101103.jpg&quot;,&quot;sourceImage&quot;:&quot;1.11.3.jpg&quot;},{&quot;id&quot;:100101161,&quot;group&quot;:1001011,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;В показанной ситуации Вы:&quot;,&quot;a&quot;:[&quot;Находитесь на главной дороге.&quot;,&quot;Находитесь на второстепенной дороге.&quot;,&quot;Подъехали к перекрёстку равнозначных дорог.&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;Перед перекрёстком с показанного направления установлен дорожный знак \&quot;Главная дорога\&quot;, следовательно Вы находитесь на главной дороге.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100101161.jpg&quot;,&quot;sourceImage&quot;:&quot;1.11.61.jpg&quot;},{&quot;id&quot;:100101201,&quot;group&quot;:1001012,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Какая из перечисленных ситуаций соответствует термину «дорожно-транспортное происшествие»?&quot;,&quot;a&quot;:[&quot;Столкновение двух велосипедов, в результате которого один велосипед был повреждён.&quot;,&quot;Наезд гужевой повозки на пешехода, в результате которого пешеход получил лёгкие телесные повреждения.&quot;,&quot;Наезд велосипеда на гужевую повозку, в результате которого велосипедист получил лёгкие телесные повреждения.&quot;,&quot;Наезд мопеда на пешехода, в результате которого пешеход получил менее тяжкие телесные повреждения.&quot;],&quot;c&quot;:3,&quot;e&quot;:&quot;&lt;p&gt;ДТП — происшествие, совершённое с участием хотя бы одного находившегося в движении механического транспортного средства…&lt;br&gt; Велосипед и гужевое транспортное средство &lt;strong&gt;не являются механическими&lt;/strong&gt;, а мопед — это механическое транспортное средство.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100101202,&quot;group&quot;:1001012,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Какая из перечисленных ситуаций не соответствует термину «дорожно-транспортное происшествие»?&quot;,&quot;a&quot;:[&quot;Опрокидывание легкового автомобиля, в результате которого автомобиль был повреждён.&quot;,&quot;Наезд легкового автомобиля на препятствие, в результате которого водитель получил лёгкие телесные повреждения.&quot;,&quot;Наезд велосипеда на стоящий автомобиль, в результате которого велосипедист получил лёгкие телесные повреждения.&quot;,&quot;Наезд на препятствие в результате заноса грузового автомобиля, в результате которого было повреждено ограждение дворовой территории в частном секторе.&quot;],&quot;c&quot;:2,&quot;e&quot;:&quot;&lt;p&gt;ДТП — происшествие, совершённое с участием хотя бы одного находившегося в движении механического транспортного средства…&lt;br&gt; &lt;strong&gt;Велосипед не является механическим транспортным средством&lt;/strong&gt;, а автомобиль на момент совершения происшествия не находился в движении.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100101204,&quot;group&quot;:1001012,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Дорожно-транспортное происшествие — это:&quot;,&quot;a&quot;:[&quot;Столкновение двух автомобилей на перекрёстке, в результате которого оба автомобиля были повреждены.&quot;,&quot;Наезд движущегося автомобиля при парковке на стоящий автомобиль, в результате которого повреждения получил только стоящий автомобиль.&quot;,&quot;Оба перечисленных случая.&quot;],&quot;c&quot;:2,&quot;e&quot;:&quot;&lt;p&gt;ДТП — происшествие, совершённое с участием хотя бы одного находившегося в движении механического транспортного средства, поэтому оба перечисленных случая являются дорожно-транспортным происшествием.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100101301,&quot;group&quot;:1001013,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Что из нижеперечисленного соответствует термину «автомобиль»?&quot;,&quot;a&quot;:[&quot;Механическое транспортное средство, имеющее не менее четырёх колёс, расположенных не менее чем на двух осях, включая колёсные тракторы и самоходные машины.&quot;,&quot;Механическое транспортное средство, имеющее не менее четырёх колёс, расположенных не менее чем на двух осях, за исключением колёсных тракторов и самоходных машин.&quot;],&quot;c&quot;:1,&quot;e&quot;:&quot;&lt;p&gt;Автомобилем является любое механическое транспортное средство, имеющее не менее четырёх колёс, расположенных не менее чем на двух осях, за исключением колёсных тракторов и самоходных машин.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100101301.jpg&quot;,&quot;sourceImage&quot;:&quot;1.13.1.jpg&quot;},{&quot;id&quot;:100101302,&quot;group&quot;:1001013,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Соответствуют ли колёсные тракторы термину «автомобиль»?&quot;,&quot;a&quot;:[&quot;Соответствуют при участии в дорожном движении.&quot;,&quot;Не соответствуют.&quot;],&quot;c&quot;:1,&quot;e&quot;:&quot;&lt;p&gt;Автомобилем является любое механическое транспортное средство, имеющее не менее четырёх колёс, расположенных не менее чем на двух осях, за исключением колёсных тракторов и самоходных машин.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100101302.jpg&quot;,&quot;sourceImage&quot;:&quot;1.13.2.jpg&quot;},{&quot;id&quot;:100101303,&quot;group&quot;:1001013,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Соответствуют ли самоходные машины термину «автомобиль»?&quot;,&quot;a&quot;:[&quot;Соответствуют при участии в дорожном движении.&quot;,&quot;Не соответствуют.&quot;],&quot;c&quot;:1,&quot;e&quot;:&quot;&lt;p&gt;Автомобилем является любое механическое транспортное средство, имеющее не менее четырёх колёс, расположенных не менее чем на двух осях, за исключением колёсных тракторов и самоходных машин.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100101303.jpg&quot;,&quot;sourceImage&quot;:&quot;1.13.3.jpg&quot;},{&quot;id&quot;:100101304,&quot;group&quot;:1001013,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Приравнивается ли самоходная машина к транспортным средствам при её участии в дорожном движении?&quot;,&quot;a&quot;:[&quot;Да, приравнивается.&quot;,&quot;Нет, не приравнивается.&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;При участии в дорожном движении самоходные машины приравниваются к транспортным средствам, а их движение по дорогам должно осуществляться в соответствии с требованиями настоящих Правил, предъявляемыми к транспортным средствам.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100101304.jpg&quot;,&quot;sourceImage&quot;:&quot;1.13.4.jpg&quot;},{&quot;id&quot;:100101401,&quot;group&quot;:1001014,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Какое из нижеперечисленных определений соответствует термину «железнодорожный переезд»?&quot;,&quot;a&quot;:[&quot;Пересечение дороги с трамвайными путями на одном уровне.&quot;,&quot;Пересечение дороги с трамвайными путями на разных уровнях.&quot;,&quot;Пересечение дороги с железнодорожными путями на одном уровне.&quot;,&quot;Пересечение дороги с железнодорожными путями на разных уровнях.&quot;],&quot;c&quot;:2,&quot;e&quot;:&quot;&lt;p&gt;Железнодорожным переездом является пересечение дороги с железнодорожными путями на одном уровне. Пересечение с трамвайными путями железнодорожным переездом не является.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100101402,&quot;group&quot;:1001014,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Что из нижеперечисленного соответствует термину «железнодорожный переезд»?&quot;,&quot;a&quot;:[&quot;Пересечение дороги с железнодорожными путями на одном уровне, обозначенное соответствующими дорожными знаками.&quot;,&quot;Пересечение дороги с железнодорожными путями на одном уровне, не обозначенное дорожными знаками.&quot;,&quot;Пересечение дороги на одном уровне с железнодорожными путями, которые временно не используются для движения поездов.&quot;,&quot;Соответствует всё перечисленное.&quot;],&quot;c&quot;:3,&quot;e&quot;:&quot;&lt;p&gt;Любое пересечение дороги с железнодорожными путями на одном уровне является железнодорожным переездом вне зависимости от наличия технических средств организации дорожного движения и интенсивности движения железнодорожных транспортных средств.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100101403,&quot;group&quot;:1001014,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Что из нижеперечисленного наиболее полно соответствует термину «железнодорожный переезд»?&quot;,&quot;a&quot;:[&quot;Любое пересечение дороги с железнодорожными путями.&quot;,&quot;Пересечение дороги с железнодорожными путями на одном уровне.&quot;,&quot;Только пересечение дороги с железнодорожными путями на одном уровне, оборудованное сигнализацией и (или) шлагбаумом.&quot;,&quot;Только пересечение дороги с железнодорожными путями на одном уровне, обозначенное соответствующими дорожными знаками.&quot;],&quot;c&quot;:1,&quot;e&quot;:&quot;&lt;p&gt;Любое пересечение дороги с железнодорожными путями на одном уровне является железнодорожным переездом вне зависимости от наличия технических средств организации дорожного движения.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100101501,&quot;group&quot;:1001015,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Соответствует ли пересечение проезжей части дороги с трамвайными путями термину «железнодорожный переезд»?&quot;,&quot;a&quot;:[&quot;Да, если это пересечение с линией скоростного трамвая на одном уровне.&quot;,&quot;Да, если это пересечение обозначено дорожным знаком «Пересечение с трамвайной линией».&quot;,&quot;Нет, не соответствует.&quot;],&quot;c&quot;:2,&quot;e&quot;:&quot;&lt;p&gt;Пересечение дороги или проезжей части дороги с трамвайными путями не является железнодорожным переездом. Железнодорожным переездом является только пересечение дороги с железнодорожными путями на одном уровне.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100101501.jpg&quot;,&quot;sourceImage&quot;:&quot;1.15.1.jpg&quot;},{&quot;id&quot;:100101502,&quot;group&quot;:1001015,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Является ли железнодорожным переездом показанное пересечение?&quot;,&quot;a&quot;:[&quot;Да, является.&quot;,&quot;Нет, не является.&quot;],&quot;c&quot;:1,&quot;e&quot;:&quot;&lt;p&gt;Пересечение проезжей части дороги с трамвайными путями не является железнодорожным переездом. Железнодорожным переездом является только пересечение дороги с железнодорожными путями на одном уровне.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100101502.jpg&quot;,&quot;sourceImage&quot;:&quot;1.15.2.jpg&quot;},{&quot;id&quot;:100101503,&quot;group&quot;:1001015,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Является ли трамвай железнодорожным транспортным средством?&quot;,&quot;a&quot;:[&quot;Да, является.&quot;,&quot;Нет, не является.&quot;],&quot;c&quot;:1,&quot;e&quot;:&quot;&lt;p&gt;Трамвай — это механическое транспортное средство, предназначенное для движения по рельсам, участвующее в дорожном движении и не являющееся железнодорожным транспортным средством.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100101503.jpg&quot;,&quot;sourceImage&quot;:&quot;1.15.3.jpg&quot;},{&quot;id&quot;:100101601,&quot;group&quot;:1001016,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;В каком из перечисленных случаев водитель совершил маневрирование?&quot;,&quot;a&quot;:[&quot;Съехал на обочину для замены колеса.&quot;,&quot;Остановился перед светофором с запрещающим сигналом.&quot;,&quot;Объехал препятствие, не выезжая за пределы полосы движения.&quot;,&quot;Не перестраиваясь, опередил попутно двигавшееся в соседней полосе транспортное средство.&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;Из всего перечисленного маневрированием является лишь съезд с проезжей части дороги на обочину. Все остальные случаи не соответствуют термину «маневрирование».&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100101602,&quot;group&quot;:1001016,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Какое из перечисленных действий относится к термину «маневрирование»?&quot;,&quot;a&quot;:[&quot;Движение задним ходом.&quot;,&quot;Прекращение движения перед «стоп-линией».&quot;,&quot;Возобновление движения после включения разрешающего сигнала светофора.&quot;,&quot;Все вышеперечисленные.&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;Из всего перечисленного маневрированием является лишь движение задним ходом, в остальных случаях действия водителя не соответствуют термину «маневрирование».&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100101603,&quot;group&quot;:1001016,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Какое из перечисленных действий относится к термину «маневрирование»?&quot;,&quot;a&quot;:[&quot;Начало движения.&quot;,&quot;Движение задним ходом.&quot;,&quot;Перестроение из одной полосы движения в другую для объезда препятствия.&quot;,&quot;Все перечисленные.&quot;],&quot;c&quot;:3,&quot;e&quot;:&quot;&lt;p&gt;Все перечисленные случаи: начало движения, движение задним ходом и перестроение из одной полосы движения в другую являются маневрированием.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100101641,&quot;group&quot;:1001016,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Соответствует ли термину «маневрирование» выезд на трамвайные пути перед дальнейшим поворотом налево на перекрёстке?&quot;,&quot;a&quot;:[&quot;Да, соответствует.&quot;,&quot;Нет, термину соответствует непосредственно только поворот налево на перекрёстке.&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;К маневрированию относятся: начало движения, перестроение транспортного средства в движении из одной полосы движения в другую, выезд транспортного средства на трамвайные пути, съезд с них, а также его поворот направо или налево, разворот, съезд с проезжей части дороги, движение задним ходом.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100101641.jpg&quot;,&quot;sourceImage&quot;:&quot;1.16.41.jpg&quot;},{&quot;id&quot;:100101741,&quot;group&quot;:1001017,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;К велосипеду приравнивается транспортное средство, аналогичное по конструкции, имеющее электродвигатель с максимальной конструктивной скоростью движения, определённой его технической характеристикой:&quot;,&quot;a&quot;:[&quot;Не более 25 км/ч.&quot;,&quot;Не более 30 км/ч.&quot;,&quot;Не более 50 км/ч.&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;К велосипеду приравниваются транспортные средства, имеющие электродвигатель номинальной максимальной мощностью в режиме длительной нагрузки, не превышающей 0.25 кВт, и (или) максимальную конструктивную скорость движения, определённую его технической характеристикой, не более 25 км/ч либо иной двигатель с аналогичной характеристикой.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100101742,&quot;group&quot;:1001017,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Что из нижеперечисленного соответствует термину «велосипед»?&quot;,&quot;a&quot;:[&quot;Средство персональной мобильности, имеющее рулевое управление.&quot;,&quot;Двухколёсное транспортное средство, приводимое в движение мускульной силой человека, находящегося на нём, в частности при помощи рукояток.&quot;,&quot;Двухколёсное транспортное средство, приводимое в движение с помощью педалей и с помощью электродвигателя, и имеющее максимальную конструктивную скорость движения, определённую его технической характеристикой, более 25 км/ч.&quot;,&quot;Соответствуют все варианты ответов.&quot;],&quot;c&quot;:1,&quot;e&quot;:&quot;&lt;p&gt;Велосипед — это транспортное средство (а средство персональной мобильности таковым не является), которое имеет не менее двух колёс и приводится в движение мускульной силой человека (людей), находящегося на (в) нём, в частности при помощи педалей или рукояток.&lt;br&gt; &lt;strong&gt;К велосипеду приравниваются аналогичные по конструкции транспортные средства, имеющие&lt;/strong&gt; электродвигатель номинальной максимальной мощностью в режиме длительной нагрузки, не превышающей 0.25 кВт, и (или) &lt;strong&gt;максимальную конструктивную скорость движения, определённую его технической характеристикой, не более 25 км/ч&lt;/strong&gt; либо иной двигатель с аналогичной характеристикой.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100101743,&quot;group&quot;:1001017,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Что из нижеперечисленного соответствует термину «велосипед»?&quot;,&quot;a&quot;:[&quot;Двухколёсное транспортное средство, приводимое в движение при помощи рукояток мускульной силой человека, находящегося в нём.&quot;,&quot;Двухколёсное транспортное средство, приводимое в движение электродвигателем номинальной максимальной мощностью в режиме длительной нагрузки, превышающей 0.4 кВт, и имеющее максимальную конструктивную скорость движения, определённую его технической характеристикой, более 25 км/ч, а также массой, не превышающей 25 кг.&quot;,&quot;Соответствуют оба варианта ответа.&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;Велосипед — это транспортное средство, которое имеет не менее двух колёс и приводится в движение мускульной силой человека (людей), находящегося на (в) нём, в частности при помощи педалей или рукояток.&lt;br&gt; К велосипеду приравниваются аналогичные по конструкции транспортные средства, имеющие электродвигатель номинальной максимальной мощностью в режиме длительной нагрузки, не превышающей 0.25 кВт, и (или) максимальную конструктивную скорость движения, определённую его технической характеристикой, не более 25 км/ч либо иной двигатель с аналогичной характеристикой.&lt;/p&gt;\r\n&lt;p&gt;Вес велосипеда Правилами дорожного движения не регламентируется.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100101801,&quot;group&quot;:1001018,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Какая из перечисленных ситуаций соответствует термину «дорожно-транспортное происшествие»?&quot;,&quot;a&quot;:[&quot;Происшествие, в результате которого произошло возгорание автомобиля, не находившегося в движении.&quot;,&quot;Происшествие, в результате которого были похищены стеклоочистители с автомобиля, находившегося на неохраняемой стоянке.&quot;,&quot;Происшествие, в результате которого произошёл наезд автомобиля на пешехода с велосипедом, в результате которого был причинён вред здоровью пешехода.&quot;,&quot;Происшествие, совершённое с участием находившегося в движении велосипеда, в результате которого был повреждён автомобиль, не находившийся в движении.&quot;],&quot;c&quot;:2,&quot;e&quot;:&quot;&lt;p&gt;ДТП — это происшествие, совершённое с участием хотя бы одного находившегося в движении механического транспортного средства, в данном случае — автомобиля. Не считаются дорожно-транспортными происшествия с находящимися на стоянке транспортными средствами (возгорание, хищения и прочее).&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100101802,&quot;group&quot;:1001018,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Соответствует ли термину «дорожно-транспортное происшествие» ситуация, в которой был повреждён не находившийся в движении автомобиль?&quot;,&quot;a&quot;:[&quot;Да.&quot;,&quot;Нет.&quot;,&quot;Да, если происшествие совершено с участием другого находившегося в движении механического транспортного средства.&quot;],&quot;c&quot;:2,&quot;e&quot;:&quot;&lt;p&gt;Не считаются дорожно-транспортными происшествия с находящимися на стоянке транспортными средствами, но если при этом участвовало находящееся в движении другое механическое транспортное средство, то такое происшествие является дорожно-транспортным.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100101803,&quot;group&quot;:1001018,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Какая из перечисленных ситуаций соответствует термину «дорожно-транспортное происшествие»?&quot;,&quot;a&quot;:[&quot;Происшествие, совершённое с участием находившегося в движении колёсного трактора, в результате которого был повреждён не находившийся в движении автомобиль.&quot;,&quot;Происшествие, совершённое с участием находившегося в движении мопеда, в результате которого был совершён наезд на растущее дерево и повреждён мопед.&quot;,&quot;Происшествие, совершённое с участием находившегося в движении мотоцикла, в результате которого был совершён наезд на пешехода, получившего тяжкие телесные повреждения.&quot;,&quot;Соответствуют все перечисленные.&quot;],&quot;c&quot;:3,&quot;e&quot;:&quot;&lt;p&gt;Все перечисленные варианты соответствуют термину «дорожно-транспортное происшествие», потому что каждое было совершено с участием хотя бы одного находившегося в движении механического транспортного средства, и в результате был причинён вред здоровью физического лица (пешехода) или причинён вред имуществу.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100101902,&quot;group&quot;:1001019,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Какое из перечисленных транспортных средств является механическим?&quot;,&quot;a&quot;:[&quot;Прицеп.&quot;,&quot;Автобус.&quot;,&quot;Велосипед.&quot;,&quot;Гужевое транспортное средство.&quot;],&quot;c&quot;:1,&quot;e&quot;:&quot;&lt;p&gt;Автобус по определению является автомобилем, а автомобиль в свою очередь — механическим транспортным средством. Остальные перечисленные транспортные средства не являются механическими.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100101902.jpg&quot;,&quot;sourceImage&quot;:&quot;1.19.2.jpg&quot;},{&quot;id&quot;:100101903,&quot;group&quot;:1001019,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Какие из перечисленных транспортных средств являются механическими?&quot;,&quot;a&quot;:[&quot;Трамвай.&quot;,&quot;Мотоцикл.&quot;,&quot;Троллейбус.&quot;,&quot;Колёсный трактор.&quot;,&quot;Все перечисленные.&quot;],&quot;c&quot;:4,&quot;e&quot;:&quot;&lt;p&gt;Все перечисленные транспортные средства приводятся в движение двигателями: трамвай и троллейбус — электродвигателями, мотоциклы — бензиновыми или электрическими двигателями, а колёсные тракторы, как правило, — дизельными или комбинированными силовыми установками; следовательно, все они являются механическими транспортными средствами.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100101903.jpg&quot;,&quot;sourceImage&quot;:&quot;1.19.3.jpg&quot;},{&quot;id&quot;:100102001,&quot;group&quot;:1001020,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Какое из перечисленных транспортных средств не относится к механическим?&quot;,&quot;a&quot;:[&quot;Мопед.&quot;,&quot;Трамвай.&quot;,&quot;Велосипед.&quot;,&quot;Все перечисленные.&quot;],&quot;c&quot;:2,&quot;e&quot;:&quot;&lt;p&gt;Велосипед не относится к механическим транспортным средствам.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100102001.jpg&quot;,&quot;sourceImage&quot;:&quot;1.20.1.jpg&quot;},{&quot;id&quot;:100102002,&quot;group&quot;:1001020,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Какое из перечисленных транспортных средств относится к термину «механическое транспортное средство»?&quot;,&quot;a&quot;:[&quot;Прицеп.&quot;,&quot;Велосипед.&quot;,&quot;Прицеп-роспуск.&quot;,&quot;Колёсный трактор.&quot;,&quot;Гужевое транспортное средство.&quot;],&quot;c&quot;:3,&quot;e&quot;:&quot;&lt;p&gt;Из перечисленных транспортных средств только колёсный трактор приводится в движение двигателем и является механическим транспортным средством.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100102003,&quot;group&quot;:1001020,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Какое из перечисленных транспортных средств не относится к термину «механическое транспортное средство»?&quot;,&quot;a&quot;:[&quot;Автобус.&quot;,&quot;Трамвай.&quot;,&quot;Троллейбус.&quot;,&quot;Прицеп-роспуск.&quot;,&quot;Седельный тягач.&quot;],&quot;c&quot;:3,&quot;e&quot;:&quot;&lt;p&gt;Прицеп-роспуск является разновидностью прицепа и предназначен только для движения в составе с механическим транспортным средством, но механическим транспортным средством не является.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100102101,&quot;group&quot;:1001021,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Какое транспортное средство из перечисленных ниже соответствует термину «мотоцикл»?&quot;,&quot;a&quot;:[&quot;Двухколёсное механическое транспортное средство, приводимое в движение двигателем с рабочим объёмом до 50 куб. сантиметров, имеющее максимальную конструктивную скорость движения, определённую его технической характеристикой, более 50 км/ч.&quot;,&quot;Двухколёсное механическое транспортное средство, приводимое в движение двигателем с рабочим объёмом до 50 куб. сантиметров, имеющее максимальную конструктивную скорость движения, определённую его технической характеристикой, не более 50 км/ч.&quot;,&quot;Трёхколёсное механическое транспортное средство с приводами управления мотоциклетного типа, имеющие массу в снаряжённом состоянии более 550 килограммов (без учёта массы аккумуляторов электрических транспортных средств) и максимальную эффективную мощность двигателя, превышающую 15 кВт.&quot;,&quot;Соответствуют все перечисленные.&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;Мотоцикл — это двухколёсное механическое транспортное средство с боковым прицепом или без него, приводимое в движение двигателем с рабочим объёмом 50 куб. сантиметров и более (в случае двигателя внутреннего сгорания) или максимальная конструктивная скорость которого (при любом двигателе) превышает 50 км/ч. К мотоциклам приравниваются трёх- и четырёхколёсные механические транспортные средства с приводами управления мотоциклетного типа, имеющие массу в снаряжённом состоянии не более 550 килограммов (без учёта массы аккумуляторов электрических транспортных средств) и максимальную эффективную мощность двигателя, не превышающую 15 кВт.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100102102,&quot;group&quot;:1001021,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Какое транспортное средство из перечисленных ниже соответствует термину «мотоцикл»?&quot;,&quot;a&quot;:[&quot;Любое двухколёсное механическое транспортное средство с боковым прицепом.&quot;,&quot;Двухколёсное механическое транспортное средство с боковым прицепом или без него, приводимое в движение двигателем с рабочим объёмом 50 куб. сантиметров и более.&quot;,&quot;Двухколёсное механическое транспортное средство без бокового прицепа, приводимое в движение двигателем с рабочим объёмом до 50 куб. сантиметров, имеющее максимальную конструктивную скорость движения, определённую его технической характеристикой, не более 50 км/ч.&quot;,&quot;Соответствуют все перечисленные.&quot;],&quot;c&quot;:1,&quot;e&quot;:&quot;&lt;p&gt;Мотоцикл — это двухколёсное механическое транспортное средство с боковым прицепом или без него, приводимое в движение двигателем с рабочим объёмом 50 куб. сантиметров и более (в случае двигателя внутреннего сгорания) или максимальная конструктивная скорость которого (при любом двигателе) превышает 50 км/ч. К мотоциклам приравниваются трёх- и четырёхколёсные механические транспортные средства с приводами управления мотоциклетного типа, имеющие массу в снаряжённом состоянии не более 550 килограммов (без учёта массы аккумуляторов электрических транспортных средств) и максимальную эффективную мощность двигателя, не превышающую 15 кВт.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100102241,&quot;group&quot;:1001022,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Приравнивается ли к мотоциклу трёхколёсное механическое транспортное средство с приводами управления мотоциклетного типа?&quot;,&quot;a&quot;:[&quot;Да, если оно имеет массу в снаряжённом состоянии не более 550 килограммов (без учёта массы аккумуляторов электрического транспортного средства) и максимальную эффективную мощность двигателя, не превышающую 15 кВт.&quot;,&quot;Нет, не приравнивается.&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;К мотоциклам приравниваются трёх- и четырёхколёсные механические транспортные средства с приводами управления мотоциклетного типа, имеющие массу в снаряжённом состоянии не более 550 килограммов (без учёта массы аккумуляторов электрических транспортных средств) и максимальную эффективную мощность двигателя, не превышающую 15 кВт.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100102241.jpg&quot;,&quot;sourceImage&quot;:&quot;1.22.41.jpg&quot;},{&quot;id&quot;:100102271,&quot;group&quot;:1001022,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Если максимальная конструктивная скорость электровелосипеда составляет 55 км/ч, а номинальная мощность в режиме длительной нагрузки составляет 0.5 Вт, такое транспортное средство следует считать:&quot;,&quot;a&quot;:[&quot;Мопедом.&quot;,&quot;Мотоциклом.&quot;,&quot;Велосипедом.&quot;,&quot;Средством персональной мобильности.&quot;],&quot;c&quot;:1,&quot;e&quot;:&quot;&lt;p&gt;Показанное транспортное средство с перечисленными характеристиками следует считать &lt;strong&gt;мотоциклом&lt;/strong&gt; согласно Правил дорожного движения, т.к. его &lt;strong&gt;максимальная скорость превышает 50 км/ч&lt;/strong&gt;.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100102271.jpg&quot;,&quot;sourceImage&quot;:&quot;1.22.71.jpg&quot;},{&quot;id&quot;:100102301,&quot;group&quot;:1001023,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Является ли населённым пунктом объект, обозначенный таким дорожным знаком?&quot;,&quot;a&quot;:[&quot;Да, является.&quot;,&quot;Нет, не является.&quot;],&quot;c&quot;:1,&quot;e&quot;:&quot;&lt;p&gt;На рисунке изображён дорожный знак «5.26.1 Наименование объекта» — наименование объекта, не являющегося населённым пунктом (река, озеро, достопримечательности и тому подобное), а также обозначение административно-территориальных и территориальных единиц.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100102301.jpg&quot;,&quot;sourceImage&quot;:&quot;1.23.1.jpg&quot;},{&quot;id&quot;:100102302,&quot;group&quot;:1001023,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Что из нижеперечисленного соответствует термину «населённый пункт»?&quot;,&quot;a&quot;:[&quot;Территория, въезды на которую и выезды с которой обозначены дорожными знаками «Начало населённого пункта» и «Конец населённого пункта».&quot;,&quot;Территория, въезды на которую и выезды с которой обозначены дорожными знаками «Начало границы населённого пункта» и «Конец границы населённого пункта».&quot;,&quot;Соответствуют все перечисленные.&quot;],&quot;c&quot;:2,&quot;e&quot;:&quot;&lt;p&gt;Территория, которая в Правилах дорожного движения называется населённым пунктом, действительно может обозначаться двумя видами дорожных знаков: с белым или синим фоном (знак «Начало границы населённого пункта», установленный на автомагистрали, имеет зелёный фон). Разница состоит в том, что при установке знака «Начало границы населённого пункта» на данную дорогу (только на неё) не действуют правила, установленные для движения в населённом пункте.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100102303,&quot;group&quot;:1001023,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Что из нижеперечисленного соответствует термину «населённый пункт»?&quot;,&quot;a&quot;:[&quot;Территория, въезды на которую и выезды с которой обозначены знаками «Пешеходная зона» и «Конец пешеходной зоны».&quot;,&quot;Территория, въезды на которую и выезды с которой обозначены дорожными знаками «Начало границы населённого пункта» и «Конец границы населённого пункта».&quot;,&quot;Любая застроенная территория, въезды на которую обозначены дорожными знаками «Ограничение максимальной скорости» с обозначенной скоростью на знаке 60 км/ч.&quot;,&quot;Соответствуют все перечисленные.&quot;],&quot;c&quot;:1,&quot;e&quot;:&quot;&lt;p&gt;Населённым пунктом считается территория, въезды на которую и выезды с которой обозначены дорожными знаками «Начало населённого пункта» и «Конец населённого пункта» или дорожными знаками «Начало границы населённого пункта» и «Конец границы населённого пункта».&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100102401,&quot;group&quot;:1001024,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Является ли населённым пунктом территория, въезд на которую обозначен таким дорожным знаком?&quot;,&quot;a&quot;:[&quot;Да.&quot;,&quot;Нет.&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;В показанной ситуации изображён въезд на территорию, обозначенную дорожным знаком «5.22.1 Начало населённого пункта», следовательно, эта территория является населённым пунктом.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100102401.jpg&quot;,&quot;sourceImage&quot;:&quot;1.24.1.jpg&quot;},{&quot;id&quot;:100102402,&quot;group&quot;:1001024,&quot;t&quot;:0,&quot;chapter&quot;:1,&quot;chapters&quot;:[1],&quot;q&quot;:&quot;Где обозначено начало территории, соответствующей термину «населённый пункт»?&quot;,&quot;a&quot;:[&quot;В точке «А».&quot;,&quot;В точке «Б».&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;В точке «А» установлен дорожный знак 5.24 «Начало границы населённого пункта» , а это значит, что территория, соответствующая термину «населённый пункт», начинается уже в точке «А», а специальные требования Правил, устанавливающие порядок дорожного движения в населённых пунктах, начинают действовать на показанной дороге после проезда точки «Б», места установки дорожного знака 5.22.1 «Начало населённого пункта»
