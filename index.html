цию здравоохранения на транспортном средстве, при участии которого совершено ДТП, необходимо предварительно зафиксировать в присутствии очевидцев положение транспортного средства, следы и предметы, относящиеся к дорожно-транспортному происшествию.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100603301.jpg&quot;,&quot;sourceImage&quot;:&quot;6.33.1.jpg&quot;},{&quot;id&quot;:100603302,&quot;group&quot;:1006033,&quot;t&quot;:5,&quot;chapter&quot;:6,&quot;chapters&quot;:[6],&quot;q&quot;:&quot;Что предварительно необходимо сделать водителю, являющемуся участником дорожно-транспортного происшествия, в случае необходимости доставки пострадавшего в организацию здравоохранения на транспортном средстве, при участии которого совершено ДТП?&quot;,&quot;a&quot;:[&quot;Зафиксировать в присутствии очевидцев положение транспортного средства, следы и предметы, относящиеся к дорожно-транспортному происшествию.&quot;,&quot;Записать фамилии и адреса очевидцев дорожно-транспортного происшествия, опросить их, записав их показания, составить подробную схему ДТП, сфотографировать место ДТП.&quot;,&quot;Записать фамилии и адреса очевидцев дорожно-транспортного происшествия, сообщить им свой адрес, телефон и в какую организацию здравоохранения будет доставлен пострадавший.&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;Водителю, являющемуся участником дорожно-транспортного происшествия, в случае необходимости доставки пострадавшего в организацию здравоохранения на транспортном средстве, при участии которого совершено ДТП, необходимо предварительно зафиксировать в присутствии очевидцев положение транспортного средства, следы и предметы, относящиеся к дорожно-транспортному происшествию.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100603302.jpg&quot;,&quot;sourceImage&quot;:&quot;6.33.2.jpg&quot;},{&quot;id&quot;:100603401,&quot;group&quot;:1006034,&quot;t&quot;:5,&quot;chapter&quot;:6,&quot;chapters&quot;:[6],&quot;q&quot;:&quot;В каком ответе водитель, являющийся участником дорожно-транспортного происшествия, не нарушил последовательность действий, предписанную в таком случае Правилами дорожного движения?&quot;,&quot;a&quot;:[&quot;Остановился, включил аварийную световую сигнализацию, выставил знак аварийной остановки, оказал необходимую помощь пострадавшим, записал фамилии и адреса очевидцев, сообщил о случившемся в милицию.&quot;,&quot;Остановился, включил аварийную световую сигнализацию, выставил знак аварийной остановки, сообщил о случившемся в милицию, записал фамилии и адреса очевидцев, оказал необходимую помощь пострадавшим.&quot;,&quot;Остановился, включил аварийную световую сигнализацию, выставил знак аварийной остановки, сообщил о случившемся в милицию, оказал необходимую помощь пострадавшим, записал фамилии и адреса очевидцев.&quot;,&quot;Остановился, включил аварийную световую сигнализацию, выставил знак аварийной остановки, оказал необходимую помощь пострадавшим, сообщил о случившемся в милицию, записал фамилии и адреса очевидцев.&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;Водитель, являющийся участником дорожно-транспортного происшествия, должен остановиться, включить аварийную световую сигнализацию, выставить знак аварийной остановки, оказать необходимую помощь пострадавшим, записать фамилии и адреса очевидцев и сообщить о случившемся в милицию.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100603402,&quot;group&quot;:1006034,&quot;t&quot;:5,&quot;chapter&quot;:6,&quot;chapters&quot;:[6],&quot;q&quot;:&quot;В каком ответе водитель, являющийся участником дорожно-транспортного происшествия с участием одного транспортного средства, наиболее точно выполнил требования Правил дорожного движения при отсутствии пострадавших?&quot;,&quot;a&quot;:[&quot;Остановился, включил аварийную световую сигнализацию, выставил знак аварийной остановки, сообщил о случившемся в милицию, записал фамилии и адреса очевидцев, до прибытия сотрудников ГАИ принял все возможные меры по сохранению следов и предметов, относящихся к ДТП.&quot;,&quot;Остановился, включил аварийную световую сигнализацию, выставил знак аварийной остановки, до прибытия сотрудников ГАИ принял все возможные меры по сохранению следов и предметов, относящихся к ДТП, записал фамилии и адреса очевидцев, сообщил о случившемся в милицию.&quot;,&quot;Остановился, включил аварийную световую сигнализацию, выставил знак аварийной остановки, записал фамилии и адреса очевидцев, сообщил о случившемся в милицию, до прибытия сотрудников ГАИ принял все возможные меры по сохранению следов и предметов, относящихся к ДТП.&quot;],&quot;c&quot;:2,&quot;e&quot;:&quot;&lt;p&gt;Водитель, являющийся участником дорожно-транспортного происшествия с участием одного транспортного средства, должен остановиться, включить аварийную световую сигнализацию, выставить знак аварийной остановки, записать фамилии и адреса очевидцев, сообщить о случившемся в милицию и до прибытия сотрудников ГАИ принять все возможные меры по сохранению следов и предметов, относящихся к ДТП.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100603403,&quot;group&quot;:1006034,&quot;t&quot;:5,&quot;chapter&quot;:6,&quot;chapters&quot;:[6],&quot;q&quot;:&quot;В каком ответе правильно указаны действия водителя автомобиля, совершившего наезд на пешехода, после включения аварийной световой сигнализации?&quot;,&quot;a&quot;:[&quot;Принял меры по оказанию необходимой помощи пострадавшему, выставил знак аварийной остановки, сообщил в милицию.&quot;,&quot;Принял меры по оказанию необходимой помощи пострадавшему, сообщил в милицию, вызвал скорую медицинскую помощь, выставил знак аварийной остановки.&quot;,&quot;Выставил знак аварийной остановки, принял меры по оказанию необходимой помощи пострадавшему, вызвал скорую медицинскую помощь, записал фамилии и адреса очевидцев, сообщил в милицию.&quot;],&quot;c&quot;:2,&quot;e&quot;:&quot;&lt;p&gt;Водитель автомобиля, совершившего наезд на пешехода, после включения аварийной световой сигнализации должен выставить знак аварийной остановки, принять меры по оказанию необходимой помощи пострадавшему, вызвать скорую медицинскую помощь, записать фамилии и адреса очевидцев и сообщить в милицию.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100603501,&quot;group&quot;:1006035,&quot;t&quot;:5,&quot;chapter&quot;:6,&quot;chapters&quot;:[6],&quot;q&quot;:&quot;В каком случае водитель, являющийся участником дорожно-транспортного происшествия, вправе не сообщать о нём в ГАИ?&quot;,&quot;a&quot;:[&quot;Если в результате ДТП, произошедшего с участием двух транспортных средств (включая автопоезда), вред причинён только имуществу его участников и в отношении транспортных средств имеются договоры обязательного страхования гражданской ответственности их владельцев, а лица, управлявшие транспортными средствами, имеют право на управление транспортным средством соответствующей категории.&quot;,&quot;Если обстоятельства причинения вреда в связи с повреждением имущества в результате дорожно-транспортного происшествия, характер и перечень видимых повреждений транспортных средств не вызывают разногласий у участников данного происшествия и зафиксированы в извещениях о ДТП, бланки которых заполнены лицами, управлявшими транспортными средствами.&quot;,&quot;Если лица, управлявшие транспортными средствами, не предъявляют претензий к состоянию друг друга (данные лица не находятся в состоянии алкогольного опьянения либо в состоянии, вызванном употреблением наркотических средств, психотропных, токсических или других одурманивающих веществ, в результате ДТП не причинён вред жизни или здоровью), а вред, причинённый имуществу каждого из участников ДТП, оценивается ими в размере до 150 базовых величин.&quot;,&quot;Водитель вправе не сообщать в ГАИ только при выполнении всех перечисленных условий.&quot;],&quot;c&quot;:3,&quot;e&quot;:&quot;&lt;p&gt;Водитель, являющийся участником дорожно-транспортного происшествия, вправе не сообщать о нём в ГАИ только при выполнении всех перечисленных условий.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100603502,&quot;group&quot;:1006035,&quot;t&quot;:5,&quot;chapter&quot;:6,&quot;chapters&quot;:[6],&quot;q&quot;:&quot;Имеет ли право водитель, совершивший наезд на растущее дерево, не сообщать о случившемся в ГАИ, если в результате вред, причинённый его автомобилю, оценивается им в размере до 150 базовых величин?&quot;,&quot;a&quot;:[&quot;Да, имеет право не сообщать о случившемся в ГАИ.&quot;,&quot;Нет, не имеет права не сообщать о случившемся в ГАИ.&quot;],&quot;c&quot;:1,&quot;e&quot;:&quot;&lt;p&gt;Водитель, совершивший наезд на растущее дерево (ДТП при участии только одного механического транспортного средства), даже если в результате вред, причинённый его автомобилю, оценивается им в размере до 150 базовых величин, обязан сообщить о случившемся в ГАИ.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100603502.jpg&quot;,&quot;sourceImage&quot;:&quot;6.35.2.jpg&quot;},{&quot;id&quot;:100603503,&quot;group&quot;:1006035,&quot;t&quot;:5,&quot;chapter&quot;:6,&quot;chapters&quot;:[6],&quot;q&quot;:&quot;Вправе ли водители двух автомобилей при их попутном столкновении не сообщать о случившемся в ГАИ, если вред, причинённый каждому транспортному средству, оценивается ими в размере до 150 базовых величин, у пассажира имелось незначительное кровотечение, ему была наложена повязка, и ему не понадобилось обращаться в медицинское учреждение?&quot;,&quot;a&quot;:[&quot;Да, имеют право не сообщать о случившемся в ГАИ.&quot;,&quot;Нет, не имеют права не сообщать о случившемся в ГАИ.&quot;],&quot;c&quot;:1,&quot;e&quot;:&quot;&lt;p&gt;В показанной ситуации при попутном столкновении двух автомобилей был причинён вред здоровью пассажира. Поэтому водители обязаны сообщить о случившемся в ГАИ.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100603503.jpg&quot;,&quot;sourceImage&quot;:&quot;6.35.3.jpg&quot;},{&quot;id&quot;:100603601,&quot;group&quot;:1006036,&quot;t&quot;:5,&quot;chapter&quot;:6,&quot;chapters&quot;:[6],&quot;q&quot;:&quot;В каком случае водителю, являющемуся участником дорожно-транспортного происшествия, разрешается перемещать транспортное средство до прибытия сотрудников ГАИ на место ДТП?&quot;,&quot;a&quot;:[&quot;Если положение транспортного средства делает невозможной организацию объезда места ДТП.&quot;,&quot;Если необходимо доставить пострадавшего в ближайшую организацию здравоохранения при невозможности вызвать скорую помощь и отсутствии попутных транспортных средств, предварительно зафиксировав в присутствии очевидцев положение транспортного средства, следы и предметы, относящиеся к ДТП.&quot;,&quot;Разрешено в обоих случаях.&quot;],&quot;c&quot;:1,&quot;e&quot;:&quot;&lt;p&gt;Водителю, являющемуся участником дорожно-транспортного происшествия, разрешается перемещать транспортное средство до прибытия сотрудников ГАИ на место ДТП, если необходимо доставить пострадавшего в ближайшую организацию здравоохранения при невозможности вызвать скорую помощь и отсутствии попутных транспортных средств, предварительно зафиксировав в присутствии очевидцев положение транспортного средства, следы и предметы, относящиеся к ДТП.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100603602,&quot;group&quot;:1006036,&quot;t&quot;:5,&quot;chapter&quot;:6,&quot;chapters&quot;:[6],&quot;q&quot;:&quot;Разрешается ли водителю, являющемуся участником ДТП, в ожидании прибытия сотрудников ГАИ передвинуть свой автомобиль для организации возможности проезда места ДТП, предварительно зафиксировав в присутствии очевидцев положение транспортного средства при отсутствии пострадавших?&quot;,&quot;a&quot;:[&quot;Да, разрешается.&quot;,&quot;Нет, не разрешается.&quot;],&quot;c&quot;:1,&quot;e&quot;:&quot;&lt;p&gt;В показанной ситуации водителю, являющемуся участником ДТП, в ожидании прибытия сотрудников ГАИ передвинуть свой автомобиль запрещено.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:&quot;assets/adrive-questions/q100603602.jpg&quot;,&quot;sourceImage&quot;:&quot;6.36.2.jpg&quot;},{&quot;id&quot;:100603901,&quot;group&quot;:1006039,&quot;t&quot;:5,&quot;chapter&quot;:6,&quot;chapters&quot;:[6],&quot;q&quot;:&quot;В каком ответе пешеход, являющийся очевидцем дорожно-транспортного происшествия, не нарушил последовательность действий, предписанную в таком случае Правилами дорожного движения?&quot;,&quot;a&quot;:[&quot;Оказал возможную помощь пострадавшему (пострадавшим), записал фамилии и адреса других очевидцев ДТП, а также регистрационные знаки (временные номерные знаки) транспортных средств, находившихся при совершении ДТП, сообщил в милицию о ДТП, после прибытия сотрудников ГАИ сообщил им информацию о ДТП.&quot;,&quot;Сообщил в милицию о ДТП, оказал возможную помощь пострадавшему (пострадавшим), записал фамилии и адреса других очевидцев ДТП, а также регистрационные знаки (временные номерные знаки) транспортных средств, находившихся при совершении ДТП, после прибытия сотрудников ГАИ сообщил им информацию о ДТП.&quot;,&quot;Оказал возможную помощь пострадавшему (пострадавшим), сообщил в милицию о ДТП, записал фамилии и адреса других очевидцев ДТП, а также регистрационные знаки (временные номерные знаки) транспортных средств, находившихся при совершении ДТП, после прибытия сотрудников ГАИ сообщил им информацию о ДТП.&quot;],&quot;c&quot;:0,&quot;e&quot;:&quot;&lt;p&gt;Пешеход, являющийся очевидцем дорожно-транспортного происшествия, обязан оказать возможную помощь пострадавшему (пострадавшим), записать фамилии и адреса других очевидцев ДТП, а также регистрационные знаки (временные номерные знаки) транспортных средств, находившихся при совершении ДТП, сообщить в милицию о ДТП и после прибытия сотрудников ГАИ сообщить им информацию о ДТП.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100603902,&quot;group&quot;:1006039,&quot;t&quot;:5,&quot;chapter&quot;:6,&quot;chapters&quot;:[6],&quot;q&quot;:&quot;В каком ответе пассажир, являющийся участником дорожно-транспортного происшествия, не нарушил последовательность действий, предписанную в таком случае Правилами дорожного движения?&quot;,&quot;a&quot;:[&quot;Сообщил в милицию о ДТП, оказал возможную помощь пострадавшему (пострадавшим), записал фамилии и адреса других очевидцев ДТП, а также регистрационные знаки (временные номерные знаки) транспортных средств, находившихся при совершении ДТП, после прибытия сотрудников ГАИ сообщил им информацию о ДТП.&quot;,&quot;Оказал возможную помощь пострадавшему (пострадавшим), сообщил в милицию о ДТП, записал фамилии и адреса других очевидцев ДТП, а также регистрационные знаки (временные номерные знаки) транспортных средств, находившихся при совершении ДТП, после прибытия сотрудников ГАИ сообщил им информацию о ДТП.&quot;,&quot;Оказал возможную помощь пострадавшему (пострадавшим), записал фамилии и адреса других очевидцев ДТП, а также регистрационные знаки (временные номерные знаки) транспортных средств, находившихся при совершении ДТП, сообщил в милицию о ДТП, после прибытия сотрудников ГАИ сообщил им информацию о ДТП.&quot;],&quot;c&quot;:2,&quot;e&quot;:&quot;&lt;p&gt;Пассажир, являющийся участником дорожно-транспортного происшествия, обязан оказать возможную помощь пострадавшему (пострадавшим), записать фамилии и адреса других очевидцев ДТП, а также регистрационные знаки (временные номерные знаки) транспортных средств, находившихся при совершении ДТП, сообщить в милицию о ДТП и после прибытия сотрудников ГАИ сообщить им информацию о ДТП.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100604001,&quot;group&quot;:1006040,&quot;t&quot;:5,&quot;chapter&quot;:6,&quot;chapters&quot;:[6],&quot;q&quot;:&quot;В каком ответе наиболее полно указано, что обязан сделать водитель при обнаружении на дороге препятствия, создающего опасность для движения?&quot;,&quot;a&quot;:[&quot;Обозначить препятствие в соответствии с Правилами дорожного движения, после чего сообщить о препятствии в милицию либо дорожно-эксплуатационную или коммунальную службу.&quot;,&quot;Принять меры по его устранению, а если его невозможно устранить — обозначить в соответствии с Правилами дорожного движения или иным способом, обеспечивающим безопасность дорожного движения.&quot;,&quot;Принять меры по его устранению, а если его невозможно устранить — обозначить в соответствии с Правилами дорожного движения или иным способом, обеспечивающим безопасность дорожного движения, после чего сообщить о препятствии в милицию либо дорожно-эксплуатационную или коммунальную службу.&quot;],&quot;c&quot;:2,&quot;e&quot;:&quot;&lt;p&gt;Водитель при обнаружении на дороге препятствия, создающего опасность для движения, обязан принять меры по его устранению, а если его невозможно устранить — обозначить в соответствии с Правилами дорожного движения или иным способом, обеспечивающим безопасность дорожного движения, после чего сообщить о препятствии в милицию либо дорожно-эксплуатационную или коммунальную службу.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;},{&quot;id&quot;:100604002,&quot;group&quot;:1006040,&quot;t&quot;:5,&quot;chapter&quot;:6,&quot;chapters&quot;:[6],&quot;q&quot;:&quot;В каком ответе водитель при обнаружении на дороге препятствия, создающего опасность для движения, не нарушил последовательность действий, определённую Правилами дорожного движения?&quot;,&quot;a&quot;:[&quot;Сообщил о препятствии в милицию, после чего попытался устранить его самостоятельно.&quot;,&quot;Принял меры по его устранению, а когда обнаружил, что его невозможно устранить, — обозначил способом, обеспечивающим безопасность дорожного движения, после чего сообщил о препятствии в милицию.&quot;,&quot;Обозначил способом, обеспечивающим безопасность дорожного движения, после чего принял меры по его устранению, а когда обнаружил, что препятствие невозможно устранить — сообщил о нём в милицию.&quot;],&quot;c&quot;:1,&quot;e&quot;:&quot;&lt;p&gt;Водитель при обнаружении на дороге препятствия, создающего опасность для движения, обязан принять меры по его устранению, а если его невозможно устранить — обозначить в соответствии с Правилами дорожного движения или иным способом, обеспечивающим безопасность дорожного движения, после чего сообщить о препятствии в милицию либо дорожно-эксплуатационную или коммунальную службу.&lt;/p&gt;&quot;,&quot;w&quot;:[&quot;Этот вариант не соответствует правилу.&quot;,&quot;Этот вариант соответствует правилу.&quot;,&quot;Этот вариант не соответствует правилу.&quot;],&quot;image&quot;:null,&quot;sourceImage&quot;:&quot;&quot;}];

      const courseTopics = [{
        id: 1,
        title: &#x27;Тема 1&#x27;,
        chapters: &#x27;Главы 1–6 · 445 базовых вопросов ADrive&#x27;,
        lessons,
        cards,
        questions,
        officialTest: &#x27;https://pdd.by/tasks/online/&#x27;,
        adriveTopic: &#x27;https://adrive.by/study/subjects/103/1001/2101&#x27;,
        adriveTicketBase: 5789
      }];

      const lessonQuestionChapter = [0, 0, 0, 0, 1, 2, 2, 3, 4, 5];
      const groupsForChapter = chapter =&gt; [...new Set(questions.filter(q =&gt; q.chapter === chapter).map(q =&gt; q.group))];
      const lessonQuestionGroups = [
        [1001003,1001007,1001014,1001015,1001023,1001024,1001025,1001026,1001028,1001032,1001033,1001034,1001035,1001036,1001037,1001044,1001045,1001046,1001047,1001048,1001052,1001053,1001056,1001057,1001058,1001059,1001065,1001073,1001079],
        [1001001,1001002,1001006,1001013,1001017,1001019,1001020,1001021,1001022,1001040,1001041,1001055,1001066,1001067,1001068,1001072,1001080],
        [1001004,1001005,1001008,1001043,1001049,1001050,1001062,1001078],
        [1001009,1001010,1001011,1001012,1001016,1001018,1001029,1001030,1001031,1001038,1001039,1001042,1001054,1001060,1001061,1001063,1001069,1001070,1001071,1001075,1001076,1001081,1001082,1001083],
        groupsForChapter(2),
        groupsForChapter(3).filter(group =&gt; group &lt; 1003035),
        groupsForChapter(3).filter(group =&gt; group &gt;= 1003035),
        groupsForChapter(4),
        groupsForChapter(5),
        groupsForChapter(6)
      ];

      const assignedGroups = new Set(lessonQuestionGroups.flat());
      groupsForChapter(1).forEach(group =&gt; {
        if (!assignedGroups.has(group)) {
          lessonQuestionGroups[3].push(group);
          assignedGroups.add(group);
        }
      });
      const allQuestionGroups = new Set(questions.map(q =&gt; q.group));
      const coveredQuestionCount = questions.filter(q =&gt; assignedGroups.has(q.group)).length;
      root.querySelector(&#x27;#coverageStatus&#x27;).textContent = `Покрытие: ${assignedGroups.size}/${allQuestionGroups.size} блоков · ${coveredQuestionCount}/${questions.length} вопросов`;

      function escapeText(value) {
        return String(value)
          .replace(/&amp;/g, &#x27;&amp;amp;&#x27;)
          .replace(/&lt;/g, &#x27;&amp;lt;&#x27;)
          .replace(/&gt;/g, &#x27;&amp;gt;&#x27;)
          .replace(/&quot;/g, &#x27;&amp;quot;&#x27;)
          .replace(/&#x27;/g, &#x27;&amp;#039;&#x27;);
      }

      function shortConceptTitle(question) {
        const text = question.q.replace(/\s+/g, &#x27; &#x27;).trim();
        return text.length &gt; 118 ? text.slice(0, 115) + &#x27;…&#x27; : text;
      }

      function renderConceptCoverage(lessonIndex) {
        const groups = lessonQuestionGroups[lessonIndex];
        const options = groups.map((group, position) =&gt; {
          const representative = questions.find(q =&gt; q.group === group);
          return `&lt;option value=&quot;${group}&quot;&gt;${position + 1}. ${escapeText(shortConceptTitle(representative))}&lt;/option&gt;`;
        }).join(&#x27;&#x27;);
        return `&lt;label class=&quot;form-label&quot;&gt;Конкретное правило
          &lt;select id=&quot;conceptPicker&quot; class=&quot;form-select&quot;&gt;${options}&lt;/select&gt;
        &lt;/label&gt;
        &lt;div id=&quot;conceptDetail&quot;&gt;${renderConceptDetail(groups[0])}&lt;/div&gt;`;
      }

      function renderConceptDetail(group) {
        const groupQuestions = questions.filter(q =&gt; q.group === Number(group));
        const representative = groupQuestions[0];
        if (!representative) return &#x27;&lt;p&gt;Для этого правила пока нет вопросов.&lt;/p&gt;&#x27;;
        const examples = groupQuestions.map(q =&gt; `
          &lt;li&gt;
            &lt;strong&gt;${escapeText(q.q)}&lt;/strong&gt;
            ${questionImage(q)}
            &lt;span class=&quot;coverage-answer&quot;&gt;&lt;strong&gt;Правильный ответ:&lt;/strong&gt; ${escapeText(q.a[q.c])}&lt;/span&gt;
            &lt;div class=&quot;adrive-explanation&quot;&gt;${q.e}&lt;/div&gt;
          &lt;/li&gt;`).join(&#x27;&#x27;);
        return `&lt;div class=&quot;coverage-body&quot; data-concept=&quot;${group}&quot;&gt;
          &lt;div class=&quot;coverage-rule&quot;&gt;&lt;strong&gt;Главное правило&lt;/strong&gt;${representative.e}&lt;p&gt;&lt;strong&gt;Ориентир:&lt;/strong&gt; ${escapeText(representative.a[representative.c])}&lt;/p&gt;&lt;/div&gt;
          &lt;ol class=&quot;coverage-examples&quot;&gt;${examples}&lt;/ol&gt;
        &lt;/div&gt;`;
      }

      function readSaved(key, fallback) {
        try { return JSON.parse(localStorage.getItem(key) || JSON.stringify(fallback)); }
        catch { return fallback; }
      }

      function writeSaved(key, value) {
        try { localStorage.setItem(key, JSON.stringify(value)); }
        catch { root.querySelector(&#x27;#savedStatus&#x27;).textContent = &#x27;Прогресс работает до закрытия страницы&#x27;; }
      }

      const state = {
        view: &#x27;learn&#x27;, lesson: 0, card: 0, cardFlipped: false,
        cardStats: readSaved(&#x27;pdd-card-stats-v4&#x27;, {}),
        questionStats: readSaved(&#x27;pdd-question-stats-v4&#x27;, {}),
        completedLessons: new Set(readSaved(&#x27;pdd-lessons-v4&#x27;, [])),
        practiceOrder: [], practiceIndex: 0, practiceCorrect: 0, practiceWrong: 0,
        practiceAnswered: false, practiceSelection: null, practiceConfidence: null,
        practiceTopic: 0, practiceLimit: 7, practiceLessonCheck: false, practiceLessonIndex: null, practiceOrdered: false,
        practiceGroups: null, practiceUnresolvedGroups: new Set(),
        examQuestions: [], examIndex: 0, examAnswers: [], examSelected: null, examSeconds: 900, timer: null
      };

      function save() {
        writeSaved(&#x27;pdd-card-stats-v4&#x27;, state.cardStats);
        writeSaved(&#x27;pdd-question-stats-v4&#x27;, state.questionStats);
        writeSaved(&#x27;pdd-lessons-v4&#x27;, [...state.completedLessons]);
        updateProgress();
      }

      function qStat(index) {
        return state.questionStats[index] || {seen: 0, correct: 0, wrong: 0, streak: 0, due: 0, highWrong: 0};
      }

      function updateProgress() {
        const now = Date.now();
        const mastered = questions.filter((_, i) =&gt; qStat(i).streak &gt;= 2).length;
        const due = questions.filter((_, i) =&gt; qStat(i).seen &amp;&amp; qStat(i).due &lt;= now &amp;&amp; qStat(i).streak &lt; 2).length;
        const score = Math.round(state.completedLessons.size / lessons.length * 100);
        root.querySelector(&#x27;#progressFill&#x27;).style.width = score + &#x27;%&#x27;;
        root.querySelector(&#x27;.progress-track&#x27;).setAttribute(&#x27;aria-valuenow&#x27;, String(score));
        root.querySelector(&#x27;#progressText&#x27;).textContent = `Понятно уроков: ${state.completedLessons.size}/${lessons.length} · закреплено вопросов: ${mastered} · требуют повторения: ${due}`;
        const plan = root.querySelector(&#x27;#todayPlan&#x27;);
        if (!state.completedLessons.size) {
          plan.innerHTML = &#x27;&lt;strong&gt;Как учиться.&lt;/strong&gt; Прочитай один короткий урок → перескажи главное своими словами → пройди 7 задач только по этому уроку. Ошибся — получишь объяснение и другую задачу на то же понятие.&lt;div class=&quot;viz-controls&quot;&gt;&lt;button id=&quot;planAction&quot; class=&quot;btn btn-primary&quot; type=&quot;button&quot;&gt;Начать с урока 1.1&lt;/button&gt;&lt;/div&gt;&#x27;;
          plan.querySelector(&#x27;#planAction&#x27;).addEventListener(&#x27;click&#x27;, () =&gt; switchView(&#x27;learn&#x27;));
        } else {
          const nextLesson = lessons.findIndex((_, index) =&gt; !state.completedLessons.has(index));
          const nextText = nextLesson &gt;= 0 ? `Продолжи урок ${lessons[nextLesson].code}.` : &#x27;Все уроки пройдены — закрепи слабые места.&#x27;;
          plan.innerHTML = `&lt;strong&gt;Следующий шаг.&lt;/strong&gt; ${due ? `Есть ${due} задач на повторение. ` : &#x27;&#x27;}${nextText}&lt;div class=&quot;viz-controls&quot;&gt;&lt;button id=&quot;planAction&quot; class=&quot;btn btn-primary&quot; type=&quot;button&quot;&gt;${nextLesson &gt;= 0 ? `Открыть урок ${lessons[nextLesson].code}` : &#x27;Повторить слабые места&#x27;}&lt;/button&gt;&lt;/div&gt;`;
          plan.querySelector(&#x27;#planAction&#x27;).addEventListener(&#x27;click&#x27;, () =&gt; {
            if (nextLesson &gt;= 0) { state.lesson = nextLesson; renderLessonMenu(); renderLesson(); switchView(&#x27;learn&#x27;); }
            else { startPractice(null, 15); switchView(&#x27;practice&#x27;); }
          });
        }
      }

      function switchView(name) {
        state.view = name;
        root.querySelectorAll(&#x27;[data-view]&#x27;).forEach(btn =&gt; {
          const active = btn.dataset.view === name;
          btn.classList.toggle(&#x27;btn-primary&#x27;, active);
          btn.setAttribute(&#x27;aria-pressed&#x27;, String(active));
        });
        root.querySelectorAll(&#x27;.view&#x27;).forEach(v =&gt; v.classList.remove(&#x27;is-active&#x27;));
        root.querySelector(&#x27;#view-&#x27; + name).classList.add(&#x27;is-active&#x27;);
        if (name === &#x27;cards&#x27;) renderCard();
        if (name === &#x27;practice&#x27; &amp;&amp; !state.practiceOrder.length) startSelectedPractice();
      }

      function renderLessonMenu() {
        const menu = root.querySelector(&#x27;#lessonMenu&#x27;);
        menu.innerHTML = `&lt;label class=&quot;form-label&quot;&gt;Урок
          &lt;select id=&quot;lessonPicker&quot; class=&quot;form-select&quot;&gt;
            ${lessons.map((lesson, index) =&gt; `&lt;option value=&quot;${index}&quot; ${index === state.lesson ? &#x27;selected&#x27; : &#x27;&#x27;}&gt;${state.completedLessons.has(index) ? &#x27;✓ &#x27; : &#x27;&#x27;}${lesson.code} · ${lesson.short.replace(/^\d+\s*·\s*/, &#x27;&#x27;)}&lt;/option&gt;`).join(&#x27;&#x27;)}
          &lt;/select&gt;
        &lt;/label&gt;`;
        menu.querySelector(&#x27;#lessonPicker&#x27;).addEventListener(&#x27;change&#x27;, event =&gt; {
          state.lesson = Number(event.target.value);
          renderLesson();
        });
      }

      function renderLesson() {
        const lesson = lessons[state.lesson];
        const content = root.querySelector(&#x27;#lessonContent&#x27;);
        content.innerHTML = `
          &lt;div class=&quot;viz-row&quot;&gt;&lt;span class=&quot;viz-badge&quot;&gt;Глава ${lesson.chapter} · урок ${lesson.code}&lt;/span&gt;&lt;span class=&quot;text-small text-muted&quot;&gt;${lesson.duration}&lt;/span&gt;&lt;/div&gt;
          &lt;h2&gt;${lesson.title}&lt;/h2&gt;
          ${lesson.visual}
          &lt;p class=&quot;memory&quot;&gt;&lt;strong&gt;Главное:&lt;/strong&gt; ${lesson.rule}&lt;/p&gt;
          &lt;ul class=&quot;rule-list&quot;&gt;${lesson.points.map(p =&gt; `&lt;li&gt;${p}&lt;/li&gt;`).join(&#x27;&#x27;)}&lt;/ul&gt;
          &lt;p class=&quot;memory&quot;&gt;&lt;strong&gt;Запомни:&lt;/strong&gt; ${lesson.memory}&lt;/p&gt;
          &lt;p class=&quot;trap&quot;&gt;&lt;strong&gt;Ловушка:&lt;/strong&gt; ${lesson.trap}&lt;/p&gt;
          &lt;details class=&quot;coverage-master&quot;&gt;
            &lt;summary&gt;&lt;strong&gt;Углублённый уровень:&lt;/strong&gt; конкретные вопросы и изображения&lt;/summary&gt;
            &lt;p class=&quot;text-muted&quot;&gt;Выбери одно правило. Ниже появятся связанные формулировки ADrive, правильные ответы, пояснения и изображения.&lt;/p&gt;
            &lt;div class=&quot;coverage-list&quot;&gt;${renderConceptCoverage(state.lesson)}&lt;/div&gt;
          &lt;/details&gt;
          &lt;div class=&quot;viz-controls&quot;&gt;
            &lt;button id=&quot;lessonQuiz&quot; class=&quot;btn btn-primary btn-block&quot; type=&quot;button&quot;&gt;Закрыть текст и проверить понимание — 7 задач&lt;/button&gt;
          &lt;/div&gt;`;
        content.querySelector(&#x27;#lessonQuiz&#x27;).addEventListener(&#x27;click&#x27;, () =&gt; {
          startPractice(lessonQuestionChapter[state.lesson], 7, true, state.lesson, false, lessonQuestionGroups[state.lesson]);
          switchView(&#x27;practice&#x27;);
        });
        const conceptPicker = content.querySelector(&#x27;#conceptPicker&#x27;);
        if (conceptPicker) conceptPicker.addEventListener(&#x27;change&#x27;, event =&gt; {
          content.querySelector(&#x27;#conceptDetail&#x27;).innerHTML = renderConceptDetail(Number(event.target.value));
        });
      }

      function openConceptForGroup(group) {
        const lessonIndex = lessonQuestionGroups.findIndex(groups =&gt; groups.includes(group));
        if (lessonIndex &lt; 0) return;
        state.lesson = lessonIndex;
        renderLessonMenu();
        renderLesson();
        switchView(&#x27;learn&#x27;);
        const master = root.querySelector(&#x27;.coverage-master&#x27;);
        if (master) master.open = true;
        const picker = root.querySelector(&#x27;#conceptPicker&#x27;);
        const detail = root.querySelector(&#x27;#conceptDetail&#x27;);
        if (picker &amp;&amp; detail) {
          picker.value = String(group);
          detail.innerHTML = renderConceptDetail(group);
          const reduced = window.matchMedia &amp;&amp; window.matchMedia(&#x27;(prefers-reduced-motion: reduce)&#x27;).matches;
          detail.scrollIntoView({behavior: reduced ? &#x27;auto&#x27; : &#x27;smooth&#x27;, block: &#x27;start&#x27;});
        }
      }

      function renderCard() {
        const [front, back] = cards[state.card];
        const card = root.querySelector(&#x27;#flashcard&#x27;);
        const stat = state.cardStats[state.card] || {streak: 0, due: 0};
        root.querySelector(&#x27;#cardCounter&#x27;).textContent = `${state.card + 1} / ${cards.length} · серия ${stat.streak || 0}`;
        card.innerHTML = state.cardFlipped
          ? `&lt;span class=&quot;text-small text-muted&quot;&gt;Ответ&lt;/span&gt;&lt;h2&gt;${back}&lt;/h2&gt;&lt;p class=&quot;text-muted&quot;&gt;Оцени, смог ли ты воспроизвести ответ до открытия&lt;/p&gt;`
          : `&lt;span class=&quot;text-small text-muted&quot;&gt;Вопрос&lt;/span&gt;&lt;h2&gt;${front}&lt;/h2&gt;&lt;p class=&quot;text-muted&quot;&gt;Сначала ответь вслух&lt;/p&gt;`;
        [&#x27;#cardAgain&#x27;,&#x27;#cardHard&#x27;,&#x27;#cardKnow&#x27;].forEach(selector =&gt; root.querySelector(selector).disabled = !state.cardFlipped);
      }

      function moveCard() {
        state.card = (state.card + 1) % cards.length;
        state.cardFlipped = false; renderCard();
      }

      function gradeCard(grade) {
        if (!state.cardFlipped) return;
        const old = state.cardStats[state.card] || {streak: 0, due: 0};
        const day = 86400000;
        if (grade === 0) state.cardStats[state.card] = {streak: 0, due: Date.now() + 10 * 60000};
        if (grade === 1) state.cardStats[state.card] = {streak: Math.max(1, old.streak), due: Date.now() + day};
        if (grade === 2) {
          const streak = (old.streak || 0) + 1;
          const gaps = [1, 3, 7, 14, 30];
          state.cardStats[state.card] = {streak, due: Date.now() + gaps[Math.min(streak - 1, gaps.length - 1)] * day};
        }
        save(); moveCard();
      }

      function shuffledIndexes(count) {
        const arr = Array.from({length: count}, (_, i) =&gt; i);
        for (let i = arr.length - 1; i &gt; 0; i--) {
          const j = Math.floor(Math.random() * (i + 1));
          [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
      }

      function adaptiveIndexes(topic, limit, allowedGroups = null) {
        const now = Date.now();
        const ranked = questions.map((q, i) =&gt; ({q, i}))
          .filter(item =&gt; (topic === null || item.q.t === topic) &amp;&amp; (!allowedGroups || allowedGroups.includes(item.q.group)))
          .map(item =&gt; {
            const s = qStat(item.i);
            const priority = (s.seen ? 0 : 100) + (s.due &lt;= now ? 60 : 0) + s.wrong * 18 + s.highWrong * 25 - s.streak * 12 + Math.random() * 10;
            return {...item, priority};
          })
          .sort((a,b) =&gt; b.priority - a.priority);
        if (!allowedGroups) return ranked.slice(0, Math.min(limit, ranked.length)).map(item =&gt; item.i);

        const bestByGroup = [];
        allowedGroups.forEach(group =&gt; {
          const candidate = ranked.find(item =&gt; item.q.group === group);
          if (candidate) bestByGroup.push(candidate);
        });
        bestByGroup.sort((a,b) =&gt; b.priority - a.priority);
        const chosen = bestByGroup.slice(0, limit);
        if (chosen.length &lt; limit) {
          const used = new Set(chosen.map(item =&gt; item.i));
          ranked.forEach(item =&gt; {
            if (chosen.length &lt; limit &amp;&amp; !used.has(item.i)) { chosen.push(item); used.add(item.i); }
          });
        }
        return chosen.map(item =&gt; item.i);
      }

      function startSelectedPractice() {
        const chapterValue = root.querySelector(&#x27;#practiceChapter&#x27;).value;
        const topic = chapterValue === &#x27;&#x27; ? null : Number(chapterValue);
        const available = topic === null ? questions.length : questions.filter(q =&gt; q.t === topic).length;
        const countValue = root.querySelector(&#x27;#practiceCount&#x27;).value;
        const limit = countValue === &#x27;all&#x27; ? available : Math.min(Number(countValue), available);
        startPractice(topic, limit, false, null, countValue === &#x27;all&#x27;, null);
      }

      function startPractice(topic = 0, limit = 7, lessonCheck = false, lessonIndex = null, ordered = false, groups = null) {
        state.practiceTopic = topic;
        state.practiceLimit = limit;
        state.practiceLessonCheck = lessonCheck;
        state.practiceLessonIndex = lessonIndex;
        state.practiceOrdered = ordered;
        state.practiceGroups = groups;
        state.practiceUnresolvedGroups = new Set();
        state.practiceOrder = ordered
          ? questions.map((q, i) =&gt; ({q, i})).filter(item =&gt; topic === null || item.q.t === topic).slice(0, limit).map(item =&gt; item.i)
          : adaptiveIndexes(topic, limit, groups);
        state.practiceIndex = 0; state.practiceCorrect = 0; state.practiceWrong = 0; state.practiceAnswered = false;
        renderPractice();
      }

      function questionImage(q) {
        return q.image ? `&lt;figure class=&quot;question-figure&quot;&gt;&lt;img src=&quot;${q.image}&quot; alt=&quot;Иллюстрация ADrive к вопросу&quot;&gt;&lt;figcaption class=&quot;text-small&quot;&gt;Иллюстрация из ADrive&lt;/figcaption&gt;&lt;/figure&gt;` : &#x27;&#x27;;
      }

      function renderPractice() {
        root.querySelector(&#x27;#practiceCorrect&#x27;).textContent = state.practiceCorrect;
        root.querySelector(&#x27;#practiceWrong&#x27;).textContent = state.practiceWrong;
        root.querySelector(&#x27;#practiceLeft&#x27;).textContent = Math.max(state.practiceOrder.length - state.practiceIndex, 0);
        const card = root.querySelector(&#x27;#practiceCard&#x27;);
        const next = root.querySelector(&#x27;#practiceNext&#x27;);
        next.classList.add(&#x27;hidden&#x27;);
        if (state.practiceIndex &gt;= state.practiceOrder.length) {
          const total = state.practiceCorrect + state.practiceWrong;
          if (state.practiceLessonCheck &amp;&amp; state.practiceUnresolvedGroups.size === 0) {
            state.completedLessons.add(state.practiceLessonIndex);
            save(); renderLessonMenu();
          }
          const lessonFinished = state.practiceLessonCheck &amp;&amp; state.practiceUnresolvedGroups.size === 0;
          card.innerHTML = `&lt;h2&gt;${lessonFinished ? &#x27;Урок понят&#x27; : &#x27;Сессия завершена&#x27;}&lt;/h2&gt;&lt;p&gt;Верных ответов: &lt;strong&gt;${state.practiceCorrect}&lt;/strong&gt;. Ошибок по пути: &lt;strong&gt;${state.practiceWrong}&lt;/strong&gt;.&lt;/p&gt;&lt;p&gt;${lessonFinished ? &#x27;Все ошибочные понятия ты исправил. Можно переходить к следующему короткому уроку.&#x27; : state.practiceWrong ? &#x27;Ошибки поставлены на ближайшее повторение. Не учи весь банк — повтори только слабые понятия.&#x27; : &#x27;Отлично. Переходи к следующему уроку или сделай смешанное закрепление.&#x27;}&lt;/p&gt;`;
          return;
        }
        state.practiceAnswered = false; state.practiceSelection = null; state.practiceConfidence = null;
        const q = questions[state.practiceOrder[state.practiceIndex]];
        card.innerHTML = `
          &lt;span class=&quot;viz-badge&quot;&gt;Вопрос ${state.practiceIndex + 1} из ${state.practiceOrder.length} · глава ${q.chapter} · ADrive № ${q.id}&lt;/span&gt;
          &lt;h2&gt;${q.q}&lt;/h2&gt;
          ${questionImage(q)}
          &lt;div class=&quot;answer-list&quot;&gt;${q.a.map((a,i) =&gt; `&lt;button class=&quot;btn&quot; type=&quot;button&quot; data-answer=&quot;${i}&quot; aria-pressed=&quot;false&quot;&gt;${String.fromCharCode(1040+i)}) ${a}&lt;/button&gt;`).join(&#x27;&#x27;)}&lt;/div&gt;
          &lt;div class=&quot;confidence-row&quot;&gt;&lt;strong&gt;Насколько уверен до проверки?&lt;/strong&gt;&lt;div class=&quot;viz-controls&quot;&gt;&lt;button class=&quot;btn&quot; type=&quot;button&quot; data-confidence=&quot;1&quot; aria-pressed=&quot;false&quot;&gt;Сомневаюсь&lt;/button&gt;&lt;button class=&quot;btn&quot; type=&quot;button&quot; data-confidence=&quot;2&quot; aria-pressed=&quot;false&quot;&gt;Почти уверен&lt;/button&gt;&lt;button class=&quot;btn&quot; type=&quot;button&quot; data-confidence=&quot;3&quot; aria-pressed=&quot;false&quot;&gt;Уверен&lt;/button&gt;&lt;/div&gt;&lt;button id=&quot;practiceCheck&quot; class=&quot;btn btn-primary&quot; type=&quot;button&quot; disabled&gt;Проверить ответ&lt;/button&gt;&lt;/div&gt;
          &lt;div class=&quot;feedback&quot; aria-live=&quot;polite&quot;&gt;&lt;/div&gt;`;
        card.querySelectorAll(&#x27;[data-answer]&#x27;).forEach(btn =&gt; btn.addEventListener(&#x27;click&#x27;, () =&gt; {
          state.practiceSelection = Number(btn.dataset.answer);
          card.querySelectorAll(&#x27;[data-answer]&#x27;).forEach(b =&gt; b.setAttribute(&#x27;aria-pressed&#x27;, String(b === btn)));
          updateCheckButton();
        }));
        card.querySelectorAll(&#x27;[data-confidence]&#x27;).forEach(btn =&gt; btn.addEventListener(&#x27;click&#x27;, () =&gt; {
          state.practiceConfidence = Number(btn.dataset.confidence);
          card.querySelectorAll(&#x27;[data-confidence]&#x27;).forEach(b =&gt; b.setAttribute(&#x27;aria-pressed&#x27;, String(b === btn)));
          updateCheckButton();
        }));
        card.querySelector(&#x27;#practiceCheck&#x27;).addEventListener(&#x27;click&#x27;, answerPractice);
      }

      function updateCheckButton() {
        const button = root.querySelector(&#x27;#practiceCheck&#x27;);
        if (button) button.disabled = state.practiceSelection === null || state.practiceConfidence === null;
      }

      function recordQuestion(index, ok, confidence) {
        const s = qStat(index);
        s.seen++; s.correct += ok ? 1 : 0; s.wrong += ok ? 0 : 1;
        s.streak = ok ? s.streak + 1 : 0;
        if (!ok &amp;&amp; confidence === 3) s.highWrong++;
        const gaps = [10 * 60000, 86400000, 3 * 86400000, 7 * 86400000, 14 * 86400000];
        s.due = ok ? Date.now() + gaps[Math.min(s.streak - 1, gaps.length - 1)] : Date.now();
        state.questionStats[index] = s;
        save();
      }

      function answerPractice() {
        if (state.practiceAnswered) return;
        state.practiceAnswered = true;
        const questionIndex = state.practiceOrder[state.practiceIndex];
        const q = questions[questionIndex];
        const selected = state.practiceSelection;
        const buttons = root.querySelectorAll(&#x27;#practiceCard [data-answer]&#x27;);
        buttons.forEach((btn, i) =&gt; {
          btn.disabled = true;
          if (i === q.c) btn.classList.add(&#x27;is-correct&#x27;);
          if (i === selected &amp;&amp; i !== q.c) btn.classList.add(&#x27;is-wrong&#x27;);
        });
        const ok = selected === q.c;
        recordQuestion(questionIndex, ok, state.practiceConfidence);
        if (ok) state.practiceCorrect++; else state.practiceWrong++;
        if (state.practiceLessonCheck) {
          if (ok) {
            state.practiceUnresolvedGroups.delete(q.group);
          } else {
            state.practiceUnresolvedGroups.add(q.group);
            const scheduled = new Set(state.practiceOrder);
            const alternative = questions
              .map((candidate, index) =&gt; ({candidate, index}))
              .find(item =&gt; item.candidate.group === q.group &amp;&amp; !scheduled.has(item.index));
            state.practiceOrder.push(alternative ? alternative.index : questionIndex);
          }
        }
        const feedback = root.querySelector(&#x27;#practiceCard .feedback&#x27;);
        feedback.className = `feedback is-visible ${ok ? &#x27;good&#x27; : &#x27;bad&#x27;}`;
        const calibration = !ok &amp;&amp; state.practiceConfidence === 3 ? &#x27;&lt;p class=&quot;trap&quot;&gt;&lt;strong&gt;Опасная ошибка:&lt;/strong&gt; ты был уверен. Эта задача вернётся раньше остальных.&lt;/p&gt;&#x27; : &#x27;&#x27;;
        const retry = !ok &amp;&amp; state.practiceLessonCheck ? &#x27;&lt;p class=&quot;memory&quot;&gt;&lt;strong&gt;Не зубри ответ:&lt;/strong&gt; прочитай объяснение и сформулируй правило одним предложением. В конце будет другая задача на это же понятие.&lt;/p&gt;&#x27; : &#x27;&#x27;;
        const conceptAction = !ok ? &#x27;&lt;div class=&quot;viz-controls&quot;&gt;&lt;button id=&quot;reviewConcept&quot; class=&quot;btn btn-primary&quot; type=&quot;button&quot;&gt;Разобрать это правило в конспекте&lt;/button&gt;&lt;/div&gt;&#x27; : &#x27;&#x27;;
        feedback.innerHTML = `&lt;strong&gt;${ok ? &#x27;Верно.&#x27; : &#x27;Ошибка.&#x27;}&lt;/strong&gt;&lt;p&gt;&lt;strong&gt;Правильный ответ: ${String.fromCharCode(1040+q.c)}) ${q.a[q.c]}&lt;/strong&gt;&lt;/p&gt;&lt;div class=&quot;adrive-explanation&quot;&gt;${q.e}&lt;/div&gt;${retry}${calibration}${conceptAction}`;
        const reviewConcept = feedback.querySelector(&#x27;#reviewConcept&#x27;);
        if (reviewConcept) reviewConcept.addEventListener(&#x27;click&#x27;, () =&gt; openConceptForGroup(q.group));
        root.querySelector(&#x27;#practiceCard .confidence-row&#x27;).classList.add(&#x27;hidden&#x27;);
        root.querySelector(&#x27;#practiceCorrect&#x27;).textContent = state.practiceCorrect;
        root.querySelector(&#x27;#practiceWrong&#x27;).textContent = state.practiceWrong;
        root.querySelector(&#x27;#practiceNext&#x27;).classList.remove(&#x27;hidden&#x27;);
      }

      function startExam() {
        clearInterval(state.timer);
        state.examQuestions = shuffledIndexes(questions.length).slice(0, 10);
        state.examIndex = 0; state.examAnswers = []; state.examSelected = null; state.examSeconds = 900;
        root.querySelector(&#x27;#examStart&#x27;).classList.add(&#x27;hidden&#x27;);
        root.querySelector(&#x27;#examResult&#x27;).classList.add(&#x27;hidden&#x27;);
        root.querySelector(&#x27;#examRun&#x27;).classList.remove(&#x27;hidden&#x27;);
        state.timer = setInterval(() =&gt; {
          state.examSeconds--;
          updateTimer();
          if (state.examSeconds &lt;= 0) finishExam();
        }, 1000);
        updateTimer(); renderExamQuestion();
      }

      function updateTimer() {
        const min = Math.floor(state.examSeconds / 60);
        const sec = String(state.examSeconds % 60).padStart(2, &#x27;0&#x27;);
        root.querySelector(&#x27;#examTimer&#x27;).textContent = `${min}:${sec}`;
      }

      function renderExamQuestion() {
        state.examSelected = null;
        root.querySelector(&#x27;#examNext&#x27;).disabled = true;
        root.querySelector(&#x27;#examNext&#x27;).textContent = state.examIndex === 9 ? &#x27;Завершить экзамен&#x27; : &#x27;Ответить и продолжить&#x27;;
        root.querySelector(&#x27;#examCounter&#x27;).textContent = `Вопрос ${state.examIndex + 1} из 10`;
        const q = questions[state.examQuestions[state.examIndex]];
        const card = root.querySelector(&#x27;#examCard&#x27;);
        card.innerHTML = `&lt;span class=&quot;viz-badge&quot;&gt;Глава ${q.chapter} · ADrive № ${q.id}&lt;/span&gt;&lt;h2&gt;${q.q}&lt;/h2&gt;${questionImage(q)}&lt;div class=&quot;answer-list&quot;&gt;${q.a.map((a,i) =&gt; `&lt;button class=&quot;btn&quot; type=&quot;button&quot; data-exam-answer=&quot;${i}&quot; aria-pressed=&quot;false&quot;&gt;${String.fromCharCode(1040+i)}) ${a}&lt;/button&gt;`).join(&#x27;&#x27;)}&lt;/div&gt;`;
        card.querySelectorAll(&#x27;[data-exam-answer]&#x27;).forEach(btn =&gt; btn.addEventListener(&#x27;click&#x27;, () =&gt; {
          state.examSelected = Number(btn.dataset.examAnswer);
          card.querySelectorAll(&#x27;[data-exam-answer]&#x27;).forEach(b =&gt; b.setAttribute(&#x27;aria-pressed&#x27;, String(b === btn)));
          root.querySelector(&#x27;#examNext&#x27;).disabled = false;
        }));
      }

      function commitExamAnswer() {
        if (state.examSelected === null) return;
        state.examAnswers.push(state.examSelected);
        if (state.examIndex === 9) finishExam();
        else { state.examIndex++; renderExamQuestion(); }
      }

      function finishExam() {
        clearInterval(state.timer); state.timer = null;
        while (state.examAnswers.length &lt; 10) state.examAnswers.push(null);
        const score = state.examQuestions.reduce((sum, qi, i) =&gt; sum + (state.examAnswers[i] === questions[qi].c ? 1 : 0), 0);
        root.querySelector(&#x27;#examRun&#x27;).classList.add(&#x27;hidden&#x27;);
        const result = root.querySelector(&#x27;#examResult&#x27;);
        result.classList.remove(&#x27;hidden&#x27;);
        result.innerHTML = `
          &lt;span class=&quot;viz-badge&quot;&gt;Результат&lt;/span&gt;
          &lt;h2&gt;${score} из 10&lt;/h2&gt;
          &lt;p&gt;${score === 10 ? &#x27;Отлично: тема пройдена без ошибок.&#x27; : score &gt;= 8 ? &#x27;Почти готово. Разбери ошибки и повтори экзамен.&#x27; : &#x27;Вернись в тренировку: там объяснение показывается сразу.&#x27;}&lt;/p&gt;
          &lt;div&gt;${state.examQuestions.map((qi,i) =&gt; {
            const q = questions[qi], ok = state.examAnswers[i] === q.c;
            return `&lt;div class=&quot;result-item&quot;&gt;&lt;strong&gt;${i+1}. ${ok ? &#x27;✓&#x27; : &#x27;✗&#x27;} ${q.q}&lt;/strong&gt;&lt;p class=&quot;text-small&quot;&gt;Правильно: ${String.fromCharCode(1040+q.c)}) ${q.a[q.c]}&lt;/p&gt;&lt;div class=&quot;text-small adrive-explanation&quot;&gt;${q.e}&lt;/div&gt;&lt;/div&gt;`;
          }).join(&#x27;&#x27;)}&lt;/div&gt;
          &lt;div class=&quot;viz-controls&quot;&gt;&lt;button id=&quot;examAgain&quot; class=&quot;btn btn-primary&quot; type=&quot;button&quot;&gt;Ещё один экзамен&lt;/button&gt;&lt;button id=&quot;goPractice&quot; class=&quot;btn&quot; type=&quot;button&quot;&gt;Разобрать в тренировке&lt;/button&gt;&lt;/div&gt;`;
        result.querySelector(&#x27;#examAgain&#x27;).addEventListener(&#x27;click&#x27;, startExam);
        result.querySelector(&#x27;#goPractice&#x27;).addEventListener(&#x27;click&#x27;, () =&gt; { startSelectedPractice(); switchView(&#x27;practice&#x27;); });
      }

      const chapterSelect = root.querySelector(&#x27;#practiceChapter&#x27;);
      const allChaptersOption = document.createElement(&#x27;option&#x27;);
      allChaptersOption.value = &#x27;&#x27;;
      allChaptersOption.textContent = `Вся тема 1 — ${questions.length} вопросов`;
      chapterSelect.appendChild(allChaptersOption);
      chapters.forEach(chapter =&gt; {
        const option = document.createElement(&#x27;option&#x27;);
        option.value = String(chapter.id - 1);
        option.textContent = `${chapter.name}. ${chapter.title} — ${chapter.count}`;
        chapterSelect.appendChild(option);
      });
      chapterSelect.value = &#x27;0&#x27;;

      const ticketSelect = root.querySelector(&#x27;#adriveTicket&#x27;);
      for (let number = 1; number &lt;= 60; number++) {
        const option = document.createElement(&#x27;option&#x27;);
        option.value = String(number);
        option.textContent = `Билет ${number}`;
        ticketSelect.appendChild(option);
      }
      root.querySelector(&#x27;#openAdriveTicket&#x27;).addEventListener(&#x27;click&#x27;, () =&gt; {
        const number = Number(ticketSelect.value);
        const testId = courseTopics[0].adriveTicketBase + number - 1;
        window.open(`https://adrive.by/study/test/${testId}/103/1001/2101`, &#x27;_blank&#x27;, &#x27;noopener&#x27;);
      });

      root.querySelectorAll(&#x27;[data-view]&#x27;).forEach(btn =&gt; btn.addEventListener(&#x27;click&#x27;, () =&gt; switchView(btn.dataset.view)));
      root.querySelector(&#x27;#flashcard&#x27;).addEventListener(&#x27;click&#x27;, () =&gt; { state.cardFlipped = !state.cardFlipped; renderCard(); });
      root.querySelector(&#x27;#cardAgain&#x27;).addEventListener(&#x27;click&#x27;, () =&gt; gradeCard(0));
      root.querySelector(&#x27;#cardHard&#x27;).addEventListener(&#x27;click&#x27;, () =&gt; gradeCard(1));
      root.querySelector(&#x27;#cardKnow&#x27;).addEventListener(&#x27;click&#x27;, () =&gt; gradeCard(2));
      root.querySelector(&#x27;#practiceStart&#x27;).addEventListener(&#x27;click&#x27;, startSelectedPractice);
      root.querySelector(&#x27;#practiceNext&#x27;).addEventListener(&#x27;click&#x27;, () =&gt; { state.practiceIndex++; renderPractice(); });
      root.querySelector(&#x27;#practiceRestart&#x27;).addEventListener(&#x27;click&#x27;, () =&gt; startPractice(state.practiceTopic, state.practiceLimit, state.practiceLessonCheck, state.practiceLessonIndex, state.practiceOrdered, state.practiceGroups));
      root.querySelector(&#x27;#examBegin&#x27;).addEventListener(&#x27;click&#x27;, startExam);
      root.querySelector(&#x27;#examNext&#x27;).addEventListener(&#x27;click&#x27;, commitExamAnswer);

      renderLessonMenu(); renderLesson(); renderCard(); updateProgress();
    })();
  &lt;/script&gt;
&lt;/div&gt;

&lt;script src=&quot;https://unpkg.com/@floating-ui/core@1.7.3/dist/floating-ui.core.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script src=&quot;https://unpkg.com/@floating-ui/dom@1.7.4/dist/floating-ui.dom.umd.min.js&quot;&gt;&lt;/script&gt;
&lt;script&gt;
(() =&gt; {
  if (window.FloatingUIDOM == null) {
    return;
  }
  const { autoUpdate, computePosition, flip, offset, shift, size } =
    window.FloatingUIDOM;
  const tooltipPlacements = new Set([&quot;top&quot;, &quot;right&quot;, &quot;bottom&quot;, &quot;left&quot;]);
  const tooltipId = `codex-visualization-tooltip-${
    window.crypto?.randomUUID?.() ?? Date.now().toString(36)
  }`;
  const tooltipGap = 5;
  const hoverDelay = 700;
  const skipDelay = 300;
  let activeTrigger = null;
  let pendingTrigger = null;
  let tooltip = null;
  let openTimeout = null;
  let autoUpdateCleanup = null;
  let positionRequest = 0;
  let skipDelayUntil = 0;

  const getTrigger = (target) =&gt;
    target?.nodeType === Node.ELEMENT_NODE
      ? target.closest(&quot;[data-tooltip]&quot;)
      : null;
  const containsTarget = (trigger, target) =&gt;
    target?.nodeType != null &amp;&amp; trigger.contains(target);
  const getContent = (trigger) =&gt;
    trigger.getAttribute(&quot;data-tooltip&quot;)?.trim() ?? &quot;&quot;;
  const getPlacement = (trigger) =&gt; {
    const placement = trigger.getAttribute(&quot;data-tooltip-placement&quot;);
    return tooltipPlacements.has(placement) ? placement : &quot;top&quot;;
  };
  const getTooltip = () =&gt; {
    if (tooltip == null) {
      tooltip = document.createElement(&quot;div&quot;);
      tooltip.id = tooltipId;
      tooltip.className = &quot;tooltip&quot;;
      tooltip.setAttribute(&quot;role&quot;, &quot;tooltip&quot;);
    }
    return tooltip;
  };
  const setDescribedBy = (trigger, described) =&gt; {
    const ids = new Set(
      (trigger.getAttribute(&quot;aria-describedby&quot;) ?? &quot;&quot;)
        .split(/\s+/)
        .filter(Boolean),
    );
    if (described) {
      ids.add(tooltipId);
    } else {
      ids.delete(tooltipId);
    }
    if (ids.size === 0) {
      trigger.removeAttribute(&quot;aria-describedby&quot;);
    } else {
      trigger.setAttribute(&quot;aria-describedby&quot;, [...ids].join(&quot; &quot;));
    }
  };
  const clearOpenTimeout = () =&gt; {
    if (openTimeout != null) {
      window.clearTimeout(openTimeout);
      openTimeout = null;
    }
    pendingTrigger = null;
  };
  const closeTooltip = (activateSkipDelay = true) =&gt; {
    clearOpenTimeout();
    positionRequest += 1;
    autoUpdateCleanup?.();
    autoUpdateCleanup = null;
    if (activeTrigger == null) {
      return;
    }
    setDescribedBy(activeTrigger, false);
    activeTrigger = null;
    tooltip?.remove();
    if (activateSkipDelay) {
      skipDelayUntil = Date.now() + skipDelay;
    }
  };
  const updatePosition = (trigger, floating) =&gt; {
    const request = ++positionRequest;
    void computePosition(trigger, floating, {
      middleware: [
        offset(tooltipGap),
        flip({ padding: tooltipGap }),
        shift({ padding: tooltipGap }),
        size({
          padding: tooltipGap,
          apply({ availableHeight, availableWidth, elements }) {
            elements.floating.style.setProperty(
              &quot;--tooltip-available-width&quot;,
              `${Math.max(0, availableWidth)}px`,
            );
            elements.floating.style.setProperty(
              &quot;--tooltip-available-height&quot;,
              `${Math.max(0, availableHeight)}px`,
            );
          },
        }),
      ],
      placement: getPlacement(trigger),
      strategy: &quot;fixed&quot;,
    })
      .then(({ x, y }) =&gt; {
        if (activeTrigger !== trigger || request !== positionRequest) {
          return;
        }
        const scale = window.devicePixelRatio || 1;
        floating.style.transform = `translate(${Math.round(x * scale) / scale}px, ${Math.round(y * scale) / scale}px)`;
        floating.style.visibility = &quot;visible&quot;;
      })
      .catch(() =&gt; {
        if (activeTrigger === trigger &amp;&amp; request === positionRequest) {
          closeTooltip(false);
        }
      });
  };
  const openTooltip = (trigger) =&gt; {
